# Render.com deployment configuration
# Service: n2store-live-chat (Pancake WebSocket Client - Multi-Account)

services:
  - type: web
    name: n2store-live-chat
    env: node
    rootDir: live-chat/server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: MAX_EVENTS
        value: 1000
