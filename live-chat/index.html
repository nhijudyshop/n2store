        <!-- Web 2.0 shell layout — sidebar on the left, main content on the right -->
        <style>
            html,
            body {
                height: 100%;
            }
            body {
                margin: 0;
                font-family:
                    'Inter',
                    system-ui,
                    -apple-system,
                    sans-serif;
                background: #ecf0f5;
            }
            .web2-shell {
                display: flex;
                min-height: 100vh;
                height: 100vh;
                width: 100vw;
                overflow: hidden;
            }
            .web2-aside {
                flex-shrink: 0;
            }
            .web2-shell > main.main-content {
                flex: 1 1 auto;
                min-width: 0;
                width: auto;
                max-width: none;
                height: 100vh;
                max-height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                /* navigation-modern injects `.main-content { margin-left: 260px }` for its
               own legacy sidebar — must zero it out since we use web2-aside (flex sibling). */
                margin-left: 0 !important;
                margin-right: 0 !important;
                transition: none !important;
            }
            /* Hide legacy navigation-modern sidebar/topbar/bottomnav — we use web2-aside instead.
           navigation-modern.js still loads for SePay billing banner (which lives inside
           .main-content, not inside #sidebar), but its own sidebar/topbar must not show. */
            body > aside#sidebar,
            body > aside.sidebar,
            body > .nav-topbar,
            body > .nav-bottom,
            body > .mobile-topbar,
            body > .mobile-bottom-nav,
            body > .sidebar-toggle-fixed {
                display: none !important;
            }
            /* Defensive — navigation-modern injects '.main-content { margin-left:260px }'
           via injectSidebarStyles(). Force-kill margin on any main.main-content
           regardless of wrapper, to catch stale cache scenarios. */
            main.main-content {
                margin: 0 !important;
                transition: none !important;
            }
            /* Modals + popovers anchored to body — keep above shell */
            .pk-modal-overlay {
                z-index: 9999;
            }
            /* Layout 2026-06-22: 3 cột — Comment (Live) | Kho SP | Video+Thống kê.
               Comment hẹp lại; Kho SP rộng hơn (SP to, dễ kéo/bấm); cột Video phải
               chứa ô video live to + bảng "Thông tin Livestream". Trước đây video
               dock vào đỉnh Kho SP — nay tách sang cột riêng (#videoColumn). */
            #liveColumn {
                flex: 1 1 auto !important;
                min-width: 0;
                max-width: none !important;
            }
            #khoSpColumn {
                flex: 0 0 400px !important;
                min-width: 320px;
                border-left: 1px solid var(--gray-200);
            }
            #khoSpColumn.collapsed {
                flex: 0 0 40px !important;
                min-width: 40px;
            }
            #khoSpColumn.collapsed .column-content,
            #khoSpColumn.collapsed .column-title h2 {
                display: none;
            }
            #khoSpColumn.collapsed .column-header {
                flex-direction: column;
                gap: 6px;
            }
            /* Cột Video + Thống kê livestream (phải nhất). */
            #videoColumn {
                flex: 0 0 304px !important;
                min-width: 268px;
                border-left: 1px solid var(--gray-200);
            }
            /* ===== Mobile/tablet (html.lc-mobile, detect qua UA script ở dưới) =====
               Ưu tiên ĐỌC COMMENT LIVESTREAM: chỉ hiện cột Live (panel trái) full
               màn hình; ẩn cột chat Pancake + resize handle + topbar phải +
               sidebar (2026-06-11). !important override inline flex column-manager. */
            html.lc-mobile #khoSpColumn,
            html.lc-mobile #videoColumn,
            html.lc-mobile .top-bar-divider,
            html.lc-mobile .top-bar-right,
            html.lc-mobile .web2-aside,
            html.lc-mobile #liveColumn .column-header {
                display: none !important;
            }
            html.lc-mobile #liveColumn {
                flex: 1 1 100% !important;
                width: 100% !important;
                max-width: 100% !important;
                border: none;
            }
            /* Topbar gọn — selectors wrap được, chip không tràn */
            html.lc-mobile .top-bar {
                padding: 6px 8px;
                gap: 6px;
            }
            html.lc-mobile .top-bar-left {
                flex-wrap: wrap;
            }
            html.lc-mobile #topbarLiveSelectors {
                flex-wrap: wrap;
            }
            /* Touch target thoải mái + KHÔNG để iOS auto-zoom khi focus
               (input font-size < 16px là trigger zoom) */
            html.lc-mobile #topbarLiveSelectors .live-filter-select,
            html.lc-mobile #liveCampaignBtn {
                min-height: 38px;
                font-size: 14px;
            }
            html.lc-mobile .live-conversation-item {
                padding: 12px 10px;
            }
            html.lc-mobile .live-conversation-item input {
                font-size: 16px !important;
                min-height: 38px;
                border-radius: 8px;
            }
            html.lc-mobile .live-conv-message {
                font-size: 15px;
                line-height: 1.5;
            }
            html.lc-mobile .customer-name {
                font-size: 15px;
            }
            html.lc-mobile .live-action-btn {
                min-width: 38px;
                min-height: 38px;
            }
            /* Cuộn mượt trên touch */
            html.lc-mobile .live-conversation-list {
                -webkit-overflow-scrolling: touch;
                overscroll-behavior: contain;
            }
            html.lc-mobile .dual-column-section {
                padding: 0;
            }
        </style>
        <script>
            // Detect mobile/tablet → html.lc-mobile (PHẢI chạy trong <head> để
            // CSS áp ngay, không flash 2 cột). iPadOS khai UA "Macintosh" →
            // nhận diện qua maxTouchPoints.
            (function () {
                var ua = navigator.userAgent || '';
                var isIpadOs = /Macintosh/.test(ua) && (navigator.maxTouchPoints || 0) > 1;
                var isMobileTablet =
                    /Android|iPhone|iPad|iPod|Mobile|Tablet|Silk/i.test(ua) || isIpadOs;
                if (isMobileTablet) document.documentElement.classList.add('lc-mobile');
            })();
        </script>

        <script>
            // Lucide load defer → có thể CHƯA sẵn khi inline script chạy.
            // Helper: tạo icon ngay nếu lucide đã có, không thì đợi window load.
            function ensureIcons() {
                if (window.lucide) {
                    try {
                        lucide.createIcons();
                    } catch {}
                } else {
                    window.addEventListener(
                        'load',
                        () => {
                            try {
                                window.lucide && lucide.createIcons();
                            } catch {}
                        },
                        { once: true }
                    );
                }
            }
            window.ensureIcons = ensureIcons;
            if (window.Web2Sidebar) {
                try {
                    Web2Sidebar.mount('#web2Aside', { activeRoute: 'live-chat' });
                } catch (e) {
                    console.warn('[sidebar]', e);
                }
                ensureIcons();
            }
            // Xét duyệt CK: nút topbar mở danh sách tín hiệu chờ duyệt + badge số.
            (function () {
                const btn = document.getElementById('btnCkReview');
                const cnt = document.getElementById('ckReviewCount');
                const PROXY = 'https://chatomni-proxy.nhijudyshop.workers.dev';
                async function refreshCount() {
                    try {
                        const r = await fetch(PROXY + '/api/web2/payment-signals/stats', {
                            credentials: 'include',
                        });
                        const d = await r.json();
                        const n = d?.data?.pending || 0;
                        cnt.textContent = n;
                        cnt.hidden = n <= 0;
                    } catch (e) {
                        /* ignore */
                    }
                }
                if (btn)
                    btn.onclick = () =>
                        window.Web2CkReview?.openSignalList({ onDone: refreshCount });
                refreshCount();
                if (window.Web2SSE?.subscribe) {
                    // Debounce 400ms (2026-06-22): burst payment-signals → 1 fetch /stats.
                    let _rcT = null;
                    window.Web2SSE.subscribe('web2:payment-signals', () => {
                        clearTimeout(_rcT);
                        _rcT = setTimeout(refreshCount, 400);
                    });
                }
            })();
        </script>

        <!-- Inline: Settings modal functions (backward compat) -->
        <script>
            // Pancake settings modal functions
            function openPancakeSettingsModal() {
                document.getElementById('pancakeSettingsModal').style.display = 'flex';
                if (window.ensureIcons) ensureIcons();
                if (window.pancakeTokenManager) {
                    window.pancakeTokenManager.initialize().then(refreshAccountsList);
                }
            }
            function closePancakeSettingsModal() {
                document.getElementById('pancakeSettingsModal').style.display = 'none';
                hideAddAccountForm();
            }
            function showAddAccountForm() {
                document.getElementById('addAccountForm').style.display = 'block';
                document.getElementById('newAccountTokenInput').value = '';
                document.getElementById('newAccountTokenInput').focus();
            }
            function hideAddAccountForm() {
                document.getElementById('addAccountForm').style.display = 'none';
            }
            function validateTokenInput() {
                var input = document.getElementById('newAccountTokenInput').value;
                var msg = document.getElementById('tokenValidationMessage');
                if (!input || !input.trim()) {
                    msg.style.display = 'none';
                    return;
                }
                try {
                    var clean = input.trim();
                    if (clean.toLowerCase().startsWith('jwt=')) clean = clean.substring(4).trim();
                    clean = clean
                        .replace(/^["']|["']$/g, '')
                        .replace(/\s+/g, '')
                        .replace(/[;,]+$/g, '');
                    var parts = clean.split('.');
                    if (parts.length !== 3) {
                        msg.innerHTML =
                            '<span style="color:#f59e0b">Token cần 3 phần (header.payload.signature)</span>';
                        msg.style.display = 'block';
                        return;
                    }
                    if (window.pancakeTokenManager) {
                        var payload = window.pancakeTokenManager.decodeToken(clean);
                        if (payload) {
                            var exp = window.pancakeTokenManager.isTokenExpired(payload.exp);
                            var d = new Date(payload.exp * 1000).toLocaleDateString('vi-VN');
                            msg.innerHTML = exp
                                ? '<span style="color:#ef4444">Token hết hạn: ' + d + '</span>'
                                : '<span style="color:#10b981">Token hợp lệ - ' +
                                  (payload.name || 'N/A') +
                                  ' - HH: ' +
                                  d +
                                  '</span>';
                            msg.style.display = 'block';
                            return;
                        }
                    }
                    msg.innerHTML = '<span style="color:#f59e0b">Không thể giải mã token</span>';
                    msg.style.display = 'block';
                } catch (e) {
                    msg.innerHTML =
                        '<span style="color:#ef4444">Lỗi: ' +
                        SharedUtils.escapeHtml(e.message) +
                        '</span>';
                    msg.style.display = 'block';
                }
            }
            async function addAccountFromCookie() {
                try {
                    if (!window.pancakeTokenManager) throw new Error('TokenManager not available');
                    var token = window.pancakeTokenManager.getTokenFromCookie();
                    if (!token) throw new Error('Không tìm thấy JWT token trong cookie');
                    await window.pancakeTokenManager.saveTokenToFirebase(token);
                    alert('Đã thêm tài khoản từ cookie!');
                    await refreshAccountsList();
                    hideAddAccountForm();
                    if (window.PancakeInit) window.PancakeInit.refresh();
                } catch (e) {
                    alert('Lỗi: ' + e.message);
                }
            }
            async function addAccountManual() {
                try {
                    var t = document.getElementById('newAccountTokenInput').value.trim();
                    if (!t) throw new Error('Vui lòng nhập JWT token');
                    if (!window.pancakeTokenManager) throw new Error('TokenManager not available');
                    await window.pancakeTokenManager.setTokenManual(t);
                    alert('Đã thêm tài khoản!');
                    await refreshAccountsList();
                    hideAddAccountForm();
                    if (window.PancakeInit) window.PancakeInit.refresh();
                } catch (e) {
                    alert('Lỗi: ' + e.message);
                }
            }
            async function refreshAccountsList() {
                try {
                    if (!window.pancakeTokenManager) return;
                    var accounts = window.pancakeTokenManager.getAllAccounts();
                    var activeId = window.pancakeTokenManager.activeAccountId;
                    var list = document.getElementById('pancakeAccountsList');
                    if (!accounts || Object.keys(accounts).length === 0) {
                        list.innerHTML =
                            '<div style="text-align:center;color:#9ca3af;padding:20px">Chưa có tài khoản nào</div>';
                        return;
                    }
                    var html = '';
                    for (var [id, acc] of Object.entries(accounts)) {
                        var isActive = id === activeId;
                        var isExpired = window.pancakeTokenManager.isTokenExpired(acc.exp);
                        html +=
                            '<div style="padding:12px;border:' +
                            (isActive
                                ? '2px solid #3b82f6;background:#eff6ff'
                                : '1px solid #e5e7eb;background:white') +
                            ';border-radius:8px;margin-bottom:8px">' +
                            '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><div><div style="font-weight:500">' +
                            (isActive ? '✓ ' : '') +
                            SharedUtils.escapeHtml(acc.name || 'Unknown') +
                            '</div></div>' +
                            '<div style="font-size:11px;color:' +
                            (isExpired ? '#ef4444' : '#10b981') +
                            '">' +
                            (isExpired ? 'Hết hạn' : 'Còn hạn') +
                            '</div></div>' +
                            '<div style="display:flex;gap:6px">' +
                            (!isActive && !isExpired
                                ? '<button onclick="selectAccount(\'' +
                                  id +
                                  '\')" style="padding:4px 10px;background:#3b82f6;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px">Chọn</button>'
                                : '') +
                            '<button onclick="deleteAccount(\'' +
                            id +
                            '\')" style="padding:4px 10px;background:#ef4444;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px">Xóa</button></div></div>';
                    }
                    list.innerHTML = html;
                } catch (e) {
                    console.error('Error refreshing accounts:', e);
                }
            }
            async function selectAccount(id) {
                try {
                    await window.pancakeTokenManager.setActiveAccount(id);
                    alert('Đã chọn tài khoản!');
                    await refreshAccountsList();
                    if (window.PancakeInit) window.PancakeInit.refresh();
                } catch (e) {
                    alert('Lỗi: ' + e.message);
                }
            }
            async function deleteAccount(id) {
                if (!confirm('Xóa tài khoản này?')) return;
                try {
                    await window.pancakeTokenManager.deleteAccount(id);
                    await refreshAccountsList();
                } catch (e) {
                    alert('Lỗi: ' + e.message);
                }
            }
            async function clearAllPancakeAccounts() {
                if (!confirm('Xóa TẤT CẢ tài khoản?')) return;
                try {
                    await window.pancakeTokenManager.clearToken();
                    await refreshAccountsList();
                } catch (e) {
                    alert('Lỗi: ' + e.message);
                }
            }

            // Live settings
            function openLiveSettingsModal() {
                document.getElementById('liveSettingsModal').style.display = 'flex';
                loadLiveSettings();
                if (window.ensureIcons) ensureIcons();
            }
            function closeLiveSettingsModal() {
                document.getElementById('liveSettingsModal').style.display = 'none';
            }
            function loadLiveSettings() {
                var saved = localStorage.getItem('liveSettings');
                if (saved) {
                    try {
                        var p = JSON.parse(saved);
                        document.getElementById('liveShowDebt').checked = p.showDebt !== false;
                        document.getElementById('liveShowZeroDebt').checked =
                            p.showZeroDebt === true;
                    } catch (e) {}
                }
            }
            function saveLiveSettings() {
                var s = {
                    showDebt: document.getElementById('liveShowDebt')?.checked ?? true,
                    showZeroDebt: document.getElementById('liveShowZeroDebt')?.checked ?? false,
                };
                localStorage.setItem('liveSettings', JSON.stringify(s));
                window.eventBus?.emit('layout:settingsChanged', {
                    key: 'web2_show_debt',
                    value: s.showDebt,
                });
            }

            // Server mode
            function setServerMode(mode) {
                localStorage.setItem('pancake_server_mode', mode);
                var p = document.getElementById('serverModePancake'),
                    n = document.getElementById('serverModeN2Store');
                if (p && n) {
                    p.style.borderColor = mode === 'pancake' ? '#3b82f6' : '#e5e7eb';
                    p.style.background = mode === 'pancake' ? '#eff6ff' : 'white';
                    n.style.borderColor = mode === 'n2store' ? '#3b82f6' : '#e5e7eb';
                    n.style.background = mode === 'n2store' ? '#eff6ff' : 'white';
                    p.querySelector('input').checked = mode === 'pancake';
                    n.querySelector('input').checked = mode === 'n2store';
                }
                var info = document.getElementById('serverModeInfo');
                if (info) {
                    info.innerHTML =
                        'Đang dùng: <strong>' +
                        (mode === 'n2store' ? 'N2Store Server' : 'Pancake Server') +
                        '</strong>';
                }
                var ind = document.getElementById('serverModeIndicator');
                if (ind) {
                    ind.textContent = mode === 'n2store' ? 'N2Store' : 'Pancake';
                    ind.className = 'server-mode-indicator mode-' + mode;
                }
                window.eventBus?.emit('layout:settingsChanged', {
                    key: 'pancake_server_mode',
                    value: mode,
                });
            }

            // chatAPISettings compat
            window.chatAPISettings = {
                isPancake: () => true,
                isRealtimeEnabled: () => localStorage.getItem('chat_realtime_enabled') !== 'false',
                getRealtimeMode: () => localStorage.getItem('chat_realtime_mode') || 'server',
                setRealtimeMode: (m) => localStorage.setItem('chat_realtime_mode', m),
                setRealtimeEnabled: (e) =>
                    localStorage.setItem('chat_realtime_enabled', e ? 'true' : 'false'),
            };
        </script>
    </body>
</html>
