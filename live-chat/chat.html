        <script>
            if (window.Web2Sidebar) {
                try {
                    Web2Sidebar.mount('#web2Aside', { activeRoute: 'live-chat-chat' });
                } catch (e) {
                    console.warn('[sidebar]', e);
                }
                if (window.lucide)
                    try {
                        window.lucide.createIcons();
                    } catch {}
            }
            // Xét duyệt CK: badge + mở danh sách tín hiệu chờ duyệt.
            (function () {
                const btn = document.getElementById('btnCkReview');
                const cnt = document.getElementById('ckReviewCount');
                // 1 nguồn base-URL = API_CONFIG live-chat; literal chỉ là fallback.
                const PROXY =
                    window.API_CONFIG?.WORKER_URL ||
                    'https://chatomni-proxy.nhijudyshop.workers.dev';
                async function refreshCount() {
                    try {
                        const r = await fetch(PROXY + '/api/web2/payment-signals/stats', {
                            credentials: 'include',
                        });
                        const d = await r.json();
                        const n = d?.data?.pending || 0;
                        cnt.textContent = n;
                        cnt.hidden = n <= 0;
                    } catch (e) {
                        /* ignore */
                    }
                }
                if (btn)
                    btn.onclick = () =>
                        window.Web2CkReview?.openSignalList({ onDone: refreshCount });
                refreshCount();
                if (window.Web2SSE?.subscribe) {
                    // Debounce 400ms (2026-06-22): burst payment-signals → 1 fetch /stats.
                    let _rcT = null;
                    window.Web2SSE.subscribe('web2:payment-signals', () => {
                        clearTimeout(_rcT);
                        _rcT = setTimeout(refreshCount, 400);
                    });
                }
            })();
        </script>

        <!-- Inline: Pancake settings modal functions (giống index.html cũ) -->
        <script>
            function openPancakeSettingsModal() {
                document.getElementById('pancakeSettingsModal').style.display = 'flex';
                if (typeof lucide !== 'undefined') lucide.createIcons();
                if (window.pancakeTokenManager) {
                    window.pancakeTokenManager.initialize().then(refreshAccountsList);
                }
            }
            function closePancakeSettingsModal() {
                document.getElementById('pancakeSettingsModal').style.display = 'none';
                hideAddAccountForm();
            }
            function showAddAccountForm() {
                document.getElementById('addAccountForm').style.display = 'block';
                document.getElementById('newAccountTokenInput').value = '';
                document.getElementById('newAccountTokenInput').focus();
            }
            function hideAddAccountForm() {
                document.getElementById('addAccountForm').style.display = 'none';
            }
            function validateTokenInput() {
                var input = document.getElementById('newAccountTokenInput').value;
                var msg = document.getElementById('tokenValidationMessage');
                if (!input || !input.trim()) {
                    msg.style.display = 'none';
                    return;
                }
                try {
                    var clean = input.trim();
                    if (clean.toLowerCase().startsWith('jwt=')) clean = clean.substring(4).trim();
                    clean = clean
                        .replace(/^["']|["']$/g, '')
                        .replace(/\s+/g, '')
                        .replace(/[;,]+$/g, '');
                    var parts = clean.split('.');
                    if (parts.length !== 3) {
                        msg.innerHTML =
                            '<span style="color:#f59e0b">Token cần 3 phần (header.payload.signature)</span>';
                        msg.style.display = 'block';
                        return;
                    }
                    if (window.pancakeTokenManager) {
                        var payload = window.pancakeTokenManager.decodeToken(clean);
                        if (payload) {
                            var exp = window.pancakeTokenManager.isTokenExpired(payload.exp);
                            var d = new Date(payload.exp * 1000).toLocaleDateString('vi-VN');
                            msg.innerHTML = exp
                                ? '<span style="color:#ef4444">Token hết hạn: ' + d + '</span>'
                                : '<span style="color:#10b981">Token hợp lệ - ' +
                                  (payload.name || 'N/A') +
                                  ' - HH: ' +
                                  d +
                                  '</span>';
                            msg.style.display = 'block';
                            return;
                        }
                    }
                    msg.innerHTML = '<span style="color:#f59e0b">Không thể giải mã token</span>';
                    msg.style.display = 'block';
                } catch (e) {
                    msg.innerHTML = '<span style="color:#ef4444">Lỗi: ' + e.message + '</span>';
                    msg.style.display = 'block';
                }
            }
            async function addAccountFromCookie() {
                try {
                    if (!window.pancakeTokenManager) throw new Error('TokenManager not available');
                    var token = window.pancakeTokenManager.getTokenFromCookie();
                    if (!token) throw new Error('Không tìm thấy JWT token trong cookie');
                    await window.pancakeTokenManager.saveTokenToFirebase(token);
                    alert('Đã thêm tài khoản từ cookie!');
                    await refreshAccountsList();
                    hideAddAccountForm();
                    if (window.PancakeInit) window.PancakeInit.refresh();
                } catch (e) {
                    alert('Lỗi: ' + e.message);
                }
            }
            async function addAccountManual() {
                try {
                    var t = document.getElementById('newAccountTokenInput').value.trim();
                    if (!t) throw new Error('Vui lòng nhập JWT token');
                    if (!window.pancakeTokenManager) throw new Error('TokenManager not available');
                    await window.pancakeTokenManager.setTokenManual(t);
                    alert('Đã thêm tài khoản!');
                    await refreshAccountsList();
                    hideAddAccountForm();
                    if (window.PancakeInit) window.PancakeInit.refresh();
                } catch (e) {
                    alert('Lỗi: ' + e.message);
                }
            }
            async function refreshAccountsList() {
                try {
                    if (!window.pancakeTokenManager) return;
                    var accounts = window.pancakeTokenManager.getAllAccounts();
                    var activeId = window.pancakeTokenManager.activeAccountId;
                    var list = document.getElementById('pancakeAccountsList');
                    if (!accounts || Object.keys(accounts).length === 0) {
                        list.innerHTML =
                            '<div style="text-align:center;color:#9ca3af;padding:20px">Chưa có tài khoản nào</div>';
                        return;
                    }
                    var html = '';
                    for (var [id, acc] of Object.entries(accounts)) {
                        var isActive = id === activeId;
                        var isExpired = window.pancakeTokenManager.isTokenExpired(acc.exp);
                        html +=
                            '<div style="padding:12px;border:' +
                            (isActive
                                ? '2px solid #3b82f6;background:#eff6ff'
                                : '1px solid #e5e7eb;background:white') +
                            ';border-radius:8px;margin-bottom:8px">' +
                            '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><div><div style="font-weight:500">' +
                            (isActive ? '✓ ' : '') +
                            (acc.name || 'Unknown') +
                            '</div></div>' +
                            '<div style="font-size:11px;color:' +
                            (isExpired ? '#ef4444' : '#10b981') +
                            '">' +
                            (isExpired ? 'Hết hạn' : 'Còn hạn') +
                            '</div></div>' +
                            '<div style="display:flex;gap:6px">' +
                            (!isActive && !isExpired
                                ? '<button onclick="selectAccount(\'' +
                                  id +
                                  '\')" style="padding:4px 10px;background:#3b82f6;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px">Chọn</button>'
                                : '') +
                            '<button onclick="deleteAccount(\'' +
                            id +
                            '\')" style="padding:4px 10px;background:#ef4444;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px">Xóa</button></div></div>';
                    }
                    list.innerHTML = html;
                } catch (e) {
                    console.error('Error refreshing accounts:', e);
                }
            }
            async function selectAccount(id) {
                try {
                    await window.pancakeTokenManager.setActiveAccount(id);
                    alert('Đã chọn tài khoản!');
                    await refreshAccountsList();
                    if (window.PancakeInit) window.PancakeInit.refresh();
                } catch (e) {
                    alert('Lỗi: ' + e.message);
                }
            }
            async function deleteAccount(id) {
                if (!confirm('Xóa tài khoản này?')) return;
                try {
                    await window.pancakeTokenManager.deleteAccount(id);
                    await refreshAccountsList();
                } catch (e) {
                    alert('Lỗi: ' + e.message);
                }
            }
            async function clearAllPancakeAccounts() {
                if (!confirm('Xóa TẤT CẢ tài khoản?')) return;
                try {
                    await window.pancakeTokenManager.clearToken();
                    await refreshAccountsList();
                } catch (e) {
                    alert('Lỗi: ' + e.message);
                }
            }

            // Wire settings button + chatAPISettings compat
            document.addEventListener('DOMContentLoaded', function () {
                var btn = document.getElementById('btnPancakeSettings');
                if (btn) btn.addEventListener('click', openPancakeSettingsModal);
            });
            window.chatAPISettings = {
                isPancake: () => true,
                isRealtimeEnabled: () => localStorage.getItem('chat_realtime_enabled') !== 'false',
                getRealtimeMode: () => localStorage.getItem('chat_realtime_mode') || 'server',
                setRealtimeMode: (m) => localStorage.setItem('chat_realtime_mode', m),
                setRealtimeEnabled: (e) =>
                    localStorage.setItem('chat_realtime_enabled', e ? 'true' : 'false'),
            };
        </script>
    </body>
</html>
