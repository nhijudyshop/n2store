<!-- #Note: Đọc CLAUDE.md, MEMORY.md, docs/dev-log.md trước khi code. Cập nhật dev-log sau thay đổi. | WEB2.0 module — viewer comment livestream CHỈ-XEM tối ưu mobile (không tạo đơn/chat). -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
        />
        <meta name="theme-color" content="#0068ff" />
        <meta http-equiv="Cache-Control" content="no-store" />
        <title>Comment Live — Web 2.0</title>
        <!-- AUTH GUARD (2026-06-20): trang Web 2.0 chứa comment khách (PII) — chưa đăng
             nhập web2 thì ĐẨY VỀ LOGIN ngay (chống xem ẩn danh). Backend cũng gate API
             bằng x-web2-token. Chạy SỚM NHẤT, trước mọi script tải data. -->
        <script>
            (function () {
                try {
                    var raw = localStorage.getItem('web2_auth');
                    var a = raw ? JSON.parse(raw) : null;
                    if (a && a.token) return; // đã đăng nhập → cho qua
                } catch (e) {}
                var next = encodeURIComponent(location.pathname + location.search);
                location.replace('../web2/login/index.html?next=' + next);
            })();
        </script>
        <!-- PWA "Thêm vào Màn hình chính": icon + full-screen (trang mobile riêng — không nạp web2-pwa.js) -->
        <link rel="apple-touch-icon" href="../web2/shared/img/logo-emblem.png?v=20260530" />
        <link rel="icon" type="image/png" href="../web2/shared/img/logo-emblem.png?v=20260530" />
        <!-- Manifest RIÊNG của trang này (start_url = chính nó) — KHÔNG dùng manifest chung
             (manifest chung start_url=overview → add màn hình chính sẽ mở nhầm overview). -->
        <link rel="manifest" href="./comments-mobile.webmanifest?v=20260620b" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Comment Live" />
        <link rel="preconnect" href="https://chatomni-proxy.nhijudyshop.workers.dev" crossorigin />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            /* ============================================================
               COMMENT LIVE — MOBILE VIEWER (chỉ xem). Light, Zalo-blue.
               Tham khảo pattern: iOS Messages / Telegram comment list,
               Material bottom-sheet, pull-to-refresh. Anti-lag: animate
               transform/opacity, KHÔNG backdrop-filter trên vùng cuộn.
               ============================================================ */
            :root {
                --c-primary: #0068ff;
                --c-primary-d: #0052cc;
                --c-bg: #eef1f6;
                --c-surface: #ffffff;
                --c-line: #e7ebf1;
                --c-text: #16202c;
                --c-text-2: #5b6b7d;
                --c-text-3: #9aa7b6;
                --c-green: #1aa251;
                --c-green-bg: #e7f7ee;
                --c-amber: #d98a00;
                --c-amber-bg: #fff3da;
                --c-store: #0ea5e9;
                --c-house: #f59e0b;
                --c-radius: 16px;
                --c-shadow: 0 1px 2px rgba(16, 24, 40, 0.05), 0 4px 14px rgba(16, 24, 40, 0.06);
                --sat: env(safe-area-inset-top);
                --sab: env(safe-area-inset-bottom);
                --hd-h: 52px;
            }
            * {
                box-sizing: border-box;
                -webkit-tap-highlight-color: transparent;
            }
            html,
            body {
                margin: 0;
                height: 100%;
            }
            body {
                font-family:
                    'Inter',
                    system-ui,
                    -apple-system,
                    'Segoe UI',
                    Roboto,
                    sans-serif;
                background: var(--c-bg);
                color: var(--c-text);
                font-size: 15px;
                line-height: 1.45;
                overscroll-behavior-y: none;
            }
            img {
                display: block;
            }

            /* ---------- Header (sticky, frosted-faux) ---------- */
            .hd {
                position: sticky;
                top: 0;
                z-index: 20;
                padding: calc(var(--sat) + 8px) 14px 8px;
                background: linear-gradient(180deg, #ffffff, #ffffffe6);
                border-bottom: 1px solid var(--c-line);
            }
            .hd-row {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .hd-title {
                font-size: 18px;
                font-weight: 800;
                letter-spacing: -0.02em;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .hd-live {
                font-size: 10px;
                font-weight: 800;
                color: #fff;
                background: #f0413e;
                padding: 2px 7px;
                border-radius: 999px;
                letter-spacing: 0.04em;
                position: relative;
            }
            .hd-live::before {
                content: '';
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #fff;
                display: inline-block;
                margin-right: 4px;
                vertical-align: middle;
                animation: blink 1.4s infinite;
            }
            @keyframes blink {
                50% {
                    opacity: 0.35;
                }
            }
            .hd-count {
                margin-left: auto;
                font-size: 12.5px;
                font-weight: 700;
                color: var(--c-primary);
                background: #e9f2ff;
                padding: 4px 10px;
                border-radius: 999px;
            }
            .hd-btn {
                width: 38px;
                height: 38px;
                border-radius: 12px;
                border: 1px solid var(--c-line);
                background: #fff;
                color: var(--c-text-2);
                display: grid;
                place-items: center;
                font-size: 18px;
                cursor: pointer;
                flex: 0 0 auto;
                transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            .hd-btn:active {
                transform: scale(0.9);
            }
            .hd-btn.on {
                background: var(--c-primary);
                border-color: var(--c-primary);
                color: #fff;
            }
            .hd-btn.spin svg {
                animation: spin 0.7s linear infinite;
            }
            .hd-hide {
                width: auto;
                min-width: 38px;
                padding: 0 9px;
                gap: 3px;
                font-size: 15px;
                font-weight: 700;
            }
            .hd-hide span {
                font-size: 12px;
                color: var(--c-text-2);
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            /* filter chips */
            .chips {
                display: flex;
                gap: 8px;
                margin-top: 9px;
                overflow-x: auto;
                scrollbar-width: none;
                -webkit-overflow-scrolling: touch;
            }
            .chips::-webkit-scrollbar {
                display: none;
            }
            .chip {
                flex: 0 0 auto;
                padding: 7px 14px;
                border-radius: 999px;
                font-size: 13px;
                font-weight: 600;
                background: #f1f4f9;
                color: var(--c-text-2);
                border: 1px solid transparent;
                cursor: pointer;
                transition: transform 0.1s;
            }
            .chip:active {
                transform: scale(0.95);
            }
            .chip.on {
                background: var(--c-primary);
                color: #fff;
                box-shadow: 0 2px 8px rgba(0, 104, 255, 0.32);
            }
            /* Badge số giỏ đã tạo trên chip Store/House/Đã tạo giỏ. Ẩn khi rỗng. */
            .chip-cnt {
                display: inline-block;
                margin-left: 5px;
                min-width: 17px;
                padding: 0 5px;
                font-size: 10.5px;
                font-weight: 800;
                line-height: 17px;
                text-align: center;
                border-radius: 999px;
                background: rgba(15, 23, 42, 0.1);
                color: inherit;
            }
            .chip.on .chip-cnt {
                background: rgba(255, 255, 255, 0.3);
            }
            .chip-cnt:empty {
                display: none;
            }
            /* divider + toggle pills (ẩn shop / hiện đã ẩn) */
            .chip-div {
                flex: 0 0 auto;
                width: 1px;
                height: 20px;
                align-self: center;
                background: var(--c-line);
                margin: 0 3px;
            }
            .chip.tg {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                background: #f1f4f9;
                color: var(--c-text-2);
                border: 1px solid transparent;
            }
            .chip.tg.on {
                background: #fff;
                color: var(--c-primary);
                border-color: var(--c-primary);
                box-shadow: none;
            }
            .chip.tg .tg-ic {
                font-size: 13px;
                line-height: 1;
            }

            /* ---------- Sub-bar: post (livestream) selector ---------- */
            .subbar {
                margin-top: 9px;
            }
            .postsel {
                width: 100%;
                display: flex;
                align-items: center;
                gap: 9px;
                padding: 9px 12px;
                background: #f1f4f9;
                border: 1px solid var(--c-line);
                border-radius: 12px;
                font-family: inherit;
                font-size: 13.5px;
                font-weight: 600;
                color: var(--c-text);
                cursor: pointer;
                transition: transform 0.1s;
            }
            .postsel:active {
                transform: scale(0.99);
            }
            .postsel .ps-ic {
                font-size: 15px;
                flex: 0 0 auto;
            }
            .postsel .ps-label {
                flex: 1;
                min-width: 0;
                text-align: left;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .postsel .ps-live {
                flex: 0 0 auto;
                font-size: 9.5px;
                font-weight: 800;
                color: #fff;
                background: #f0413e;
                padding: 2px 7px;
                border-radius: 999px;
                letter-spacing: 0.03em;
            }
            .postsel .ps-live::before {
                content: '';
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: #fff;
                display: inline-block;
                margin-right: 4px;
                vertical-align: middle;
                animation: blink 1.4s infinite;
            }
            .postsel .ps-chev {
                flex: 0 0 auto;
                color: var(--c-text-3);
                font-size: 11px;
            }

            /* ---------- New-comments pill ---------- */
            .newpill {
                position: fixed;
                left: 50%;
                top: calc(var(--sat) + var(--hd-h) + 52px);
                transform: translate(-50%, -16px);
                z-index: 18;
                background: var(--c-primary);
                color: #fff;
                font-size: 13px;
                font-weight: 700;
                padding: 8px 16px;
                border-radius: 999px;
                box-shadow: 0 6px 20px rgba(0, 104, 255, 0.4);
                opacity: 0;
                pointer-events: none;
                transition:
                    opacity 0.2s,
                    transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            .newpill.show {
                opacity: 1;
                transform: translate(-50%, 0);
                pointer-events: auto;
            }

            /* ---------- List ---------- */
            .list {
                padding: 12px 12px calc(var(--sab) + 28px);
                display: flex;
                flex-direction: column;
                gap: 11px;
            }
            .card {
                background: var(--c-surface);
                border-radius: var(--c-radius);
                box-shadow: var(--c-shadow);
                padding: 13px 14px;
                position: relative;
                cursor: pointer;
                transition: transform 0.12s ease;
                border-left: 3px solid transparent;
            }
            /* Card MỚI: fade OPACITY THUẦN (chuẩn livestream) — KHÔNG trượt. JS gắn
               .is-new cho card vừa chèn; burst dồn dập (>12/2s) → bỏ qua (hiện tức thì). */
            @keyframes cardIn {
                0% {
                    opacity: 0;
                    box-shadow:
                        0 0 0 2px rgba(0, 104, 255, 0.6),
                        var(--c-shadow);
                }
                8% {
                    opacity: 1;
                    box-shadow:
                        0 0 0 2px rgba(0, 104, 255, 0.6),
                        var(--c-shadow);
                }
                85% {
                    opacity: 1;
                    box-shadow:
                        0 0 0 2px rgba(0, 104, 255, 0.6),
                        var(--c-shadow);
                }
                100% {
                    opacity: 1;
                    box-shadow:
                        0 0 0 0 rgba(0, 104, 255, 0),
                        var(--c-shadow);
                }
            }
            .card.is-new {
                /* fade-in nhanh + KHUNG xanh giữ ~3s rồi mờ → biết comment mới (giữ shadow nền). */
                animation: cardIn 3s ease both;
                will-change: opacity, box-shadow;
            }
            .card:active {
                transform: scale(0.985);
            }
            .card.ordered {
                border-left-color: var(--c-green);
            }
            .c-top {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .av {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                object-fit: cover;
                background: #dde6f2;
                flex: 0 0 auto;
            }
            .av-ph {
                display: grid;
                place-items: center;
                color: #fff;
                font-weight: 800;
                font-size: 17px;
            }
            .c-id {
                min-width: 0;
                flex: 1;
            }
            .c-name {
                font-weight: 700;
                font-size: 15px;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            /* Tên co lại + ellipsis khi dài → status/page LUÔN hiện (name - status - page). */
            .c-nm-txt {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .pgbadge {
                font-size: 9.5px;
                font-weight: 800;
                color: #fff;
                padding: 1.5px 6px;
                border-radius: 999px;
                letter-spacing: 0.02em;
                flex: 0 0 auto;
            }
            .pg-store {
                background: var(--c-store);
            }
            .pg-house {
                background: var(--c-house);
            }
            /* Badge STT giỏ hàng (khách đã tạo giỏ native-orders) — 🛒 + STT. */
            .cart-stt {
                display: inline-flex;
                align-items: center;
                gap: 3px;
                font-size: 10.5px;
                font-weight: 800;
                padding: 1.5px 7px;
                border-radius: 999px;
                background: var(--c-amber-bg);
                color: var(--c-amber);
                flex: 0 0 auto;
            }
            .c-time {
                font-size: 11.5px;
                color: var(--c-text-3);
                margin-top: 1px;
            }
            .st {
                font-size: 10.5px;
                font-weight: 700;
                padding: 3px 9px;
                border-radius: 999px;
                flex: 0 0 auto;
            }
            .st-order {
                color: var(--c-green);
                background: var(--c-green-bg);
            }
            .st-new {
                color: var(--c-amber);
                background: var(--c-amber-bg);
            }
            .st-known {
                color: var(--c-primary);
                background: #e9f2ff;
            }
            .st-vip {
                color: #a16207;
                background: #fef6da;
            }
            .st-bom,
            .st-danger {
                color: #dc2626;
                background: #fde8e8;
            }
            .st-warn {
                color: #d97706;
                background: #fff3da;
            }
            /* comment đã ẩn (chỉ hiện khi bật "Đã ẩn") */
            .card.is-hidden {
                opacity: 0.62;
                border-left-color: #cbd5e1;
            }
            .hidetag {
                display: inline-block;
                font-size: 10px;
                font-weight: 700;
                color: var(--c-text-3);
                background: #eef1f6;
                padding: 2px 7px;
                border-radius: 999px;
                margin-left: 6px;
            }
            .c-msg {
                margin: 9px 0 0;
                font-size: 15px;
                color: var(--c-text);
                /* HIỆN ĐỦ nội dung dài (user 2026-06-15): bỏ -webkit-line-clamp 3 dòng
                   (gây cắt "..."). Wrap chống tràn từ/URL dài. */
                word-break: break-word;
                overflow-wrap: anywhere;
            }
            .c-body {
                display: flex;
                gap: 11px;
                align-items: flex-start;
            }
            .c-body .c-main {
                flex: 1;
                min-width: 0;
            }
            .thumb {
                width: 60px;
                height: 78px;
                border-radius: 10px;
                object-fit: cover;
                background: #e7ebf1;
                flex: 0 0 auto;
                margin-top: 9px;
            }
            .meta {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                margin-top: 9px;
            }
            .mchip {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                font-size: 12px;
                font-weight: 600;
                padding: 4px 9px;
                border-radius: 999px;
                max-width: 100%;
            }
            .mchip svg {
                width: 13px;
                height: 13px;
                flex: 0 0 auto;
            }
            .mc-phone {
                color: var(--c-primary);
                background: #e9f2ff;
            }
            .mc-addr {
                color: var(--c-text-2);
                background: #f1f4f9;
                overflow: hidden;
            }
            .mc-addr span {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .mc-empty {
                color: var(--c-text-3);
                background: #f6f8fb;
                font-weight: 500;
            }

            .more-btn {
                width: 100%;
                margin-top: 4px;
                padding: 13px;
                border: 1px solid var(--c-line);
                border-radius: var(--c-radius);
                background: #fff;
                color: var(--c-primary);
                font-size: 14px;
                font-weight: 700;
                cursor: pointer;
                box-shadow: var(--c-shadow);
            }
            .more-btn:active {
                transform: scale(0.99);
            }

            /* ---------- Skeleton ---------- */
            .sk {
                background: var(--c-surface);
                border-radius: var(--c-radius);
                box-shadow: var(--c-shadow);
                padding: 13px 14px;
            }
            .sk-bar {
                background: linear-gradient(90deg, #eef1f6 25%, #f6f8fb 50%, #eef1f6 75%);
                background-size: 200% 100%;
                animation: sh 1.3s infinite;
                border-radius: 8px;
            }
            @keyframes sh {
                to {
                    background-position: -200% 0;
                }
            }

            /* ---------- Empty / error ---------- */
            .empty {
                text-align: center;
                color: var(--c-text-3);
                padding: 70px 24px;
            }
            .empty .ic {
                font-size: 46px;
                margin-bottom: 10px;
            }

            /* ---------- Bottom-sheet detail ---------- */
            .sheet-back {
                position: fixed;
                inset: 0;
                z-index: 40;
                background: rgba(16, 24, 40, 0.45);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s;
            }
            .sheet-back.open {
                opacity: 1;
                pointer-events: auto;
            }
            .sheet {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 41;
                background: var(--c-surface);
                border-radius: 22px 22px 0 0;
                max-height: 88vh;
                transform: translateY(100%);
                transition: transform 0.32s cubic-bezier(0.2, 0.9, 0.25, 1);
                display: flex;
                flex-direction: column;
                padding-bottom: var(--sab);
                box-shadow: 0 -8px 30px rgba(16, 24, 40, 0.2);
            }
            .sheet.open {
                transform: translateY(0);
            }
            .sheet-grab {
                width: 40px;
                height: 4px;
                border-radius: 999px;
                background: #d4dbe4;
                margin: 9px auto 4px;
                flex: 0 0 auto;
            }
            .sheet-body {
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                padding: 8px 18px 22px;
            }
            .sh-hero {
                display: flex;
                gap: 13px;
                align-items: center;
                margin-bottom: 4px;
            }
            .sh-av {
                width: 60px;
                height: 60px;
                border-radius: 50%;
                object-fit: cover;
                background: #dde6f2;
                flex: 0 0 auto;
            }
            .sh-name {
                font-size: 19px;
                font-weight: 800;
                letter-spacing: -0.02em;
            }
            .sh-sub {
                font-size: 12.5px;
                color: var(--c-text-3);
                margin-top: 2px;
            }
            .sh-quote {
                margin: 14px 0;
                padding: 12px 14px;
                background: #f4f7fb;
                border-radius: 14px;
                border-left: 3px solid var(--c-primary);
                font-size: 15.5px;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .sh-thumb {
                width: 100%;
                max-height: 46vh;
                object-fit: contain;
                border-radius: 14px;
                background: #0b1220;
                margin: 4px 0 14px;
            }
            .sh-field {
                display: flex;
                gap: 10px;
                padding: 11px 0;
                border-top: 1px solid var(--c-line);
                align-items: flex-start;
            }
            .sh-field .k {
                width: 84px;
                flex: 0 0 auto;
                color: var(--c-text-3);
                font-size: 13px;
                font-weight: 600;
                padding-top: 1px;
            }
            .sh-field .v {
                flex: 1;
                min-width: 0;
                font-size: 14.5px;
                font-weight: 500;
                word-break: break-word;
            }
            .sh-actions {
                display: flex;
                gap: 10px;
                margin: 16px 0 4px;
            }
            .sh-act {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 7px;
                padding: 13px;
                border-radius: 14px;
                font-size: 14.5px;
                font-weight: 700;
                text-decoration: none;
                border: none;
                cursor: pointer;
                transition: transform 0.1s;
            }
            .sh-act:active {
                transform: scale(0.96);
            }
            .sh-act.prim {
                background: var(--c-primary);
                color: #fff;
                box-shadow: 0 4px 14px rgba(0, 104, 255, 0.3);
            }
            .sh-act.sec {
                background: #eef2f7;
                color: var(--c-text);
            }
            .sh-act.dis {
                opacity: 0.4;
                pointer-events: none;
            }
            .sh-act svg {
                width: 18px;
                height: 18px;
            }

            /* secondary action in detail sheet (ẩn comment) */
            .sh-hide {
                width: 100%;
                margin-top: 10px;
                padding: 12px;
                border: 1px solid var(--c-line);
                border-radius: 14px;
                background: #fff;
                color: var(--c-text-2);
                font-size: 13.5px;
                font-weight: 700;
                cursor: pointer;
                transition: transform 0.1s;
            }
            .sh-hide:active {
                transform: scale(0.97);
            }

            /* ---------- Post picker (chọn livestream) ---------- */
            .pk-head {
                font-size: 17px;
                font-weight: 800;
                letter-spacing: -0.01em;
                margin: 2px 0 4px;
            }
            .pk-group-h {
                font-size: 12px;
                font-weight: 800;
                color: var(--c-text-3);
                text-transform: uppercase;
                letter-spacing: 0.04em;
                margin: 16px 0 2px;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .pk-group-h .pk-live-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #f0413e;
                animation: blink 1.4s infinite;
            }
            .pk-row {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 2px;
                border-top: 1px solid var(--c-line);
                cursor: pointer;
            }
            .pk-row:active {
                opacity: 0.55;
            }
            .pk-pg {
                flex: 0 0 auto;
                font-size: 9.5px;
                font-weight: 800;
                color: #fff;
                padding: 3px 8px;
                border-radius: 999px;
            }
            .pk-main {
                flex: 1;
                min-width: 0;
            }
            .pk-title {
                font-size: 14px;
                font-weight: 600;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .pk-row.sel .pk-title {
                color: var(--c-primary);
            }
            .pk-sub {
                font-size: 11.5px;
                color: var(--c-text-3);
                margin-top: 2px;
            }
            .pk-cnt {
                flex: 0 0 auto;
                font-size: 12px;
                font-weight: 700;
                color: var(--c-primary);
                background: #e9f2ff;
                padding: 3px 9px;
                border-radius: 999px;
            }
            .pk-check {
                flex: 0 0 auto;
                color: var(--c-primary);
                font-weight: 800;
            }
            .pk-empty {
                text-align: center;
                color: var(--c-text-3);
                padding: 30px 12px;
                font-size: 13.5px;
            }

            /* fullscreen thumbnail */
            .lightbox {
                position: fixed;
                inset: 0;
                z-index: 60;
                background: #000;
                display: none;
                align-items: center;
                justify-content: center;
                padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
            }
            .lightbox.open {
                display: flex;
            }
            .lightbox img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }

            .toast {
                position: fixed;
                left: 50%;
                bottom: calc(var(--sab) + 22px);
                transform: translateX(-50%) translateY(20px);
                background: #16202c;
                color: #fff;
                font-size: 13.5px;
                font-weight: 600;
                padding: 11px 18px;
                border-radius: 999px;
                z-index: 80;
                opacity: 0;
                transition:
                    opacity 0.2s,
                    transform 0.2s;
            }
            .toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            @media (prefers-reduced-motion: reduce) {
                * {
                    animation-duration: 0.001ms !important;
                    transition-duration: 0.001ms !important;
                }
            }
        </style>
    </head>
    <body>
        <header class="hd">
            <div class="hd-row">
                <div class="hd-title">
                    💬 Comment Live
                    <span class="hd-live" id="liveTag" style="display: none">LIVE</span>
                </div>
                <span class="hd-count" id="count">…</span>
                <button
                    class="hd-btn hd-hide"
                    id="btnHidden"
                    aria-label="Người bị ẩn"
                    title="Người bị ẩn comment"
                >
                    🙈<span id="hideCount">2</span>
                </button>
                <button class="hd-btn" id="btnRefresh" aria-label="Làm mới" title="Làm mới">
                    <svg
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M3 12a9 9 0 1 0 3-6.7L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                </button>
                <button
                    class="hd-btn"
                    id="btnFull"
                    aria-label="Toàn màn hình"
                    title="Toàn màn hình (như F11)"
                >
                    <svg
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M8 3H5a2 2 0 0 0-2 2v3" />
                        <path d="M21 8V5a2 2 0 0 0-2-2h-3" />
                        <path d="M3 16v3a2 2 0 0 0 2 2h3" />
                        <path d="M16 21h3a2 2 0 0 0 2-2v-3" />
                    </svg>
                </button>
            </div>
            <div class="subbar">
                <button class="postsel" id="postSel" aria-haspopup="dialog">
                    <span class="ps-ic">🎥</span>
                    <span class="ps-label" id="postSelLabel">Tất cả livestream</span>
                    <span class="ps-chev">▾</span>
                </button>
            </div>
            <div class="chips" id="chips">
                <button class="chip on" data-pg="">Tất cả</button>
                <button class="chip" data-pg="store">
                    Store<span class="chip-cnt" id="cntStore"></span>
                </button>
                <button class="chip" data-pg="house">
                    House<span class="chip-cnt" id="cntHouse"></span>
                </button>
                <button class="chip" data-pg="order">
                    Đã tạo giỏ<span class="chip-cnt" id="cntOrder"></span>
                </button>
                <button class="chip" data-pg="phone">Có SĐT</button>
            </div>
        </header>

        <div class="newpill" id="newpill">⌃ comment mới</div>
        <main class="list" id="list"></main>

        <!-- Bottom-sheet detail -->
        <div class="sheet-back" id="sheetBack"></div>
        <section class="sheet" id="sheet" role="dialog" aria-modal="true">
            <div class="sheet-grab"></div>
            <div class="sheet-body" id="sheetBody"></div>
        </section>

        <!-- Post picker (chọn livestream) -->
        <div class="sheet-back" id="pickerBack"></div>
        <section class="sheet" id="picker" role="dialog" aria-modal="true">
            <div class="sheet-grab"></div>
            <div class="sheet-body" id="pickerBody"></div>
        </section>

        <!-- Fullscreen thumbnail -->
        <div class="lightbox" id="lightbox"><img id="lightboxImg" alt="" /></div>

        <div class="toast" id="toast"></div>

        <!-- Web2Auth: token web2 cho mọi fetch (x-web2-token) — API live-comments đã gate -->
        <script src="../web2/shared/web2-auth.js?v=20260621r7"></script>
        <!-- SSE bridge (realtime) + toast -->
        <script src="../web2/shared/web2-sse-bridge.js?v=20260622r9"></script>
        <script src="../shared/js/notification-system.js?v=20260614cm4"></script>
        <!-- Web2Chat: fetch tổng comment THẬT từ Pancake (comment_count) — trực tiếp browser -->
        <script src="../web2/shared/web2-chat-utils.js?v=20260618w3"></script>
        <script src="../web2/shared/web2-chat-tokens.js?v=20260618w3"></script>
        <script src="../web2/shared/web2-chat-settings.js?v=20260618w3"></script>
        <script src="../web2/shared/web2-chat-api.js?v=20260618w3"></script>
        <script src="../web2/shared/web2-chat-live.js?v=20260618w3"></script>
        <script src="../web2/shared/web2-chat-tags.js?v=20260618w3"></script>
        <script src="../web2/shared/web2-chat-client.js?v=20260618w3"></script>
        <!-- SHARED realtime livestream-comment modules (dùng chung index.html) -->
        <script src="js/shared/live-time.js?v=20260614w2c"></script>
        <script src="js/shared/live-comments-stream.js?v=20260620auth"></script>
        <!-- Web2CustomerStore: NGUỒN DUY NHẤT kho KH (load TRƯỚC live-status/live-customer-sync) -->
        <script src="../web2/shared/web2-phone-utils.js?v=20260630a"></script>
        <script src="../web2/shared/web2-customer-store.js?v=20260621r6"></script>
        <script src="js/shared/live-status.js?v=20260615store"></script>
        <script src="js/shared/live-customer-sync.js?v=20260615store"></script>
        <!-- App controller (tách module: state → render → actions → entry).
             State đặt window.LiveState/LiveCommentList shim cho module ẩn. -->
        <script src="js/live/comments-mobile-state.js?v=20260621auth"></script>
        <script src="js/live/comments-mobile-render.js?v=20260618w3"></script>
        <script src="js/live/comments-mobile-actions.js?v=20260620auth"></script>
        <script src="js/live/comments-mobile-entry.js?v=20260618w3"></script>
        <!-- Module ẩn comment theo NGƯỜI — DÙNG CHUNG nguồn server với live-chat/index.html -->
        <script src="js/live/live-hidden-commenters.js?v=20260614w2c"></script>
    </body>
</html>
