name: Deploy

on:
    push:
        branches:
            - main
        # Push chỉ chạm docs/session-resume/markdown KHÔNG cần rebuild+deploy frontend.
        # Push hỗn hợp (docs + code) vẫn chạy bình thường (GitHub chỉ skip khi TẤT CẢ
        # file thay đổi đều khớp ignore). Diệt double-deploy do auto-commit + save-session.
        paths-ignore:
            - 'docs/**'
            - '**.md'
            - 'serect_dont_push.txt'
            # Backend-only / Worker-only push KHÔNG đổi frontend bundle → khỏi redeploy Firebase.
            # (render.com auto-deploy qua Render; cloudflare-worker deploy qua workflow riêng.)
            # LƯU Ý: shared/universal/** KHÔNG ignore vì nó nằm trong vite build của frontend.
            - 'render.com/**'
            - 'cloudflare-worker/**'
            - '.github/**'

# Chỉ 1 deploy Firebase chạy tại một thời điểm cho mỗi ref. Push mới hủy job cũ
# đang chạy → production LUÔN là commit mới nhất, không còn race "job chậm đè bản cũ".
concurrency:
    group: deploy-firebase-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        name: Build & Deploy

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build:vite

            - name: Deploy to Firebase Hosting
              id: firebase_deploy
              run: npx firebase-tools deploy --only hosting --project n2shop-69e37 --non-interactive
              env:
                  FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

            # NOTE: Cloudflare Worker deploy do workflow riêng `deploy-cloudflare-worker.yml`
            # đảm nhiệm (có paths filter + concurrency riêng). KHÔNG deploy Worker ở đây nữa
            # để tránh 2 `wrangler deploy` chạy đua khi push chạm cloudflare-worker/.

            - name: Notify team - success
              if: success()
              run: echo "✅ Deploy succeeded — Firebase Hosting deployed"

            - name: Notify team - failure
              if: failure()
              run: |
                  echo "❌ Deploy failed — current version retained"
                  echo "Firebase deploy: ${{ steps.firebase_deploy.outcome }}"
