<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N2Store Messenger</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <img src="../images/icon-32.png" alt="N2Store" class="logo">
        <span class="title">N2Store</span>
        <span class="version" id="version">v1.0.0</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="testNotifBtn" title="Test thông báo">&#128276;</button>
        <button class="icon-btn" id="settingsBtn" title="Cài đặt">&#9881;</button>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-item">
        <span class="status-dot" id="extStatus"></span>
        <span>Extension</span>
      </div>
      <div class="status-item">
        <span class="status-dot" id="fbStatus"></span>
        <span>Facebook</span>
      </div>
      <div class="status-item">
        <span class="status-dot" id="sseStatus"></span>
        <span>SSE</span>
      </div>
      <div class="status-item">
        <span class="status-dot" id="tabStatus"></span>
        <span id="tabCount">0 tabs</span>
      </div>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="dashboard">Tổng quan</button>
      <button class="tab-btn" data-tab="notifications">
        Thông báo <span class="badge-small" id="notifBadge" style="display:none">0</span>
      </button>
      <button class="tab-btn" data-tab="activity">Hoạt động</button>
    </div>

    <!-- Tab: Dashboard -->
    <div class="tab-content active" id="tab-dashboard">
      <div class="dashboard">
        <div class="stat-card clickable" data-stat="pages">
          <div class="stat-value" id="sessionCount">0</div>
          <div class="stat-label">FB Pages</div>
        </div>
        <div class="stat-card clickable" data-stat="sent">
          <div class="stat-value" id="msgCount">0</div>
          <div class="stat-label">Đã gửi</div>
        </div>
        <div class="stat-card clickable" data-stat="failed">
          <div class="stat-value" id="msgFailed">0</div>
          <div class="stat-label">Thất bại</div>
        </div>
        <div class="stat-card clickable" data-stat="unread">
          <div class="stat-value" id="unreadCount">0</div>
          <div class="stat-label">Chưa đọc</div>
        </div>
      </div>
      <div class="stat-detail" id="statDetail" style="display:none"></div>

      <!-- Quick Actions -->
      <div class="section-title">Hành động nhanh</div>
      <div class="actions">
        <button class="action-btn primary" id="openInbox">
          <span class="action-icon">&#128172;</span>
          <span>Mở Inbox</span>
        </button>
        <button class="action-btn" id="openOrders">
          <span class="action-icon">&#128230;</span>
          <span>Đơn hàng</span>
        </button>
        <button class="action-btn" id="refreshBtn">
          <span class="action-icon">&#128260;</span>
          <span>Làm mới</span>
        </button>
      </div>

      <!-- SSE Toggle -->
      <div class="toggle-row">
        <span>Nhận thông báo real-time (SSE)</span>
        <label class="switch">
          <input type="checkbox" id="sseToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Tab: Notifications -->
    <div class="tab-content" id="tab-notifications">
      <div class="notif-header">
        <span>Thông báo gần đây</span>
        <button class="text-btn" id="markAllReadBtn">Đánh dấu đã đọc</button>
      </div>
      <div class="notif-list" id="notifList">
        <div class="empty-state">Chưa có thông báo nào</div>
      </div>
    </div>

    <!-- Tab: Activity -->
    <div class="tab-content" id="tab-activity">
      <div class="notif-header">
        <span>Nhật ký hoạt động</span>
        <button class="text-btn" id="clearActivityBtn">Xóa tất cả</button>
      </div>
      <div class="activity-list" id="activityList">
        <div class="empty-state">Chưa có hoạt động nào</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
