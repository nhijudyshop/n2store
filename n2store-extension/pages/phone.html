<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N2Store Phone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      width: 320px;
      min-height: 480px;
      overflow: hidden;
    }
    .phone-container { padding: 16px; }

    /* Header */
    .phone-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .phone-title { font-size: 14px; font-weight: 600; color: #8be9fd; }
    .phone-status {
      font-size: 11px; padding: 3px 8px; border-radius: 10px;
      background: #333; color: #888;
    }
    .phone-status.registered { background: #1b4332; color: #4caf50; }
    .phone-status.calling { background: #3d2c00; color: #ff9800; }
    .phone-status.connected { background: #1b4332; color: #4caf50; animation: pulse 1.5s infinite; }
    .phone-status.error { background: #3d1212; color: #f44336; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Call info */
    .call-info {
      text-align: center; margin-bottom: 20px;
      min-height: 60px; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .call-name { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .call-number { font-size: 14px; color: #8be9fd; font-family: monospace; }
    .call-timer { font-size: 24px; font-weight: 300; color: #ccc; margin-top: 8px; font-family: monospace; }

    /* Dialpad */
    .dialpad-input {
      width: 100%; padding: 10px; text-align: center;
      font-size: 20px; font-family: monospace;
      background: #16213e; border: 1px solid #333; border-radius: 8px;
      color: #8be9fd; outline: none; margin-bottom: 12px;
    }
    .dialpad-input:focus { border-color: #4caf50; }

    .dialpad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 16px;
    }
    .dialpad-btn {
      padding: 12px; border: none; border-radius: 12px;
      background: #16213e; color: #eee; font-size: 18px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .dialpad-btn:hover { background: #1a3a5c; }
    .dialpad-btn:active { background: #0f3460; transform: scale(0.95); }
    .dialpad-sub { display: block; font-size: 9px; color: #666; font-weight: 400; }

    /* Action buttons */
    .actions {
      display: flex; gap: 12px; justify-content: center;
    }
    .action-btn {
      width: 56px; height: 56px; border: none; border-radius: 50%;
      font-size: 22px; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-call { background: #4caf50; color: #fff; }
    .btn-call:hover { background: #388e3c; }
    .btn-call:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-hangup { background: #f44336; color: #fff; display: none; }
    .btn-hangup:hover { background: #d32f2f; }
    .btn-mute { background: #333; color: #ccc; display: none; }
    .btn-mute:hover { background: #444; }
    .btn-mute.active { background: #f44336; color: #fff; }

    /* Log */
    .log-section {
      margin-top: 16px; max-height: 120px; overflow-y: auto;
      font-size: 10px; color: #555; font-family: monospace;
      background: #111; border-radius: 6px; padding: 6px;
    }
    .log-entry { padding: 1px 0; }
    .log-entry.error { color: #f44336; }
    .log-entry.success { color: #4caf50; }

    /* Audio elements (hidden) */
    audio { display: none; }

    /* Scrollbar */
    .log-section::-webkit-scrollbar { width: 3px; }
    .log-section::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="phone-container">
    <div class="phone-header">
      <span class="phone-title">N2Store Phone</span>
      <span class="phone-status" id="status">Connecting...</span>
    </div>

    <div class="call-info" id="callInfo">
      <div class="call-name" id="callName"></div>
      <div class="call-number" id="callNumber">Ready</div>
      <div class="call-timer" id="callTimer" style="display:none">00:00</div>
    </div>

    <input type="tel" class="dialpad-input" id="phoneInput" placeholder="Nhap so dien thoai..." maxlength="15">

    <div class="dialpad">
      <button class="dialpad-btn" onclick="pressKey('1')">1</button>
      <button class="dialpad-btn" onclick="pressKey('2')">2<span class="dialpad-sub">ABC</span></button>
      <button class="dialpad-btn" onclick="pressKey('3')">3<span class="dialpad-sub">DEF</span></button>
      <button class="dialpad-btn" onclick="pressKey('4')">4<span class="dialpad-sub">GHI</span></button>
      <button class="dialpad-btn" onclick="pressKey('5')">5<span class="dialpad-sub">JKL</span></button>
      <button class="dialpad-btn" onclick="pressKey('6')">6<span class="dialpad-sub">MNO</span></button>
      <button class="dialpad-btn" onclick="pressKey('7')">7<span class="dialpad-sub">PQRS</span></button>
      <button class="dialpad-btn" onclick="pressKey('8')">8<span class="dialpad-sub">TUV</span></button>
      <button class="dialpad-btn" onclick="pressKey('9')">9<span class="dialpad-sub">WXYZ</span></button>
      <button class="dialpad-btn" onclick="pressKey('*')">*</button>
      <button class="dialpad-btn" onclick="pressKey('0')">0<span class="dialpad-sub">+</span></button>
      <button class="dialpad-btn" onclick="pressKey('#')">#</button>
    </div>

    <div class="actions">
      <button class="action-btn btn-mute" id="btnMute" onclick="toggleMute()" title="Tat tieng">&#128263;</button>
      <button class="action-btn btn-call" id="btnCall" onclick="makeCall()" title="Goi">&#128222;</button>
      <button class="action-btn btn-hangup" id="btnHangup" onclick="hangup()" title="Ngat">&#128308;</button>
    </div>

    <div class="log-section" id="logSection"></div>
  </div>

  <!-- Remote audio (caller's voice) -->
  <audio id="remoteAudio" autoplay></audio>

  <script src="../lib/jssip.min.js"></script>
  <script src="phone.js"></script>
</body>
</html>
