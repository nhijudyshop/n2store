<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cài đặt lấy comment Live - WEB 2.0</title>
        <link rel="stylesheet" href="../../web2/shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-components.css?v=20260614ux2" />
        <link rel="stylesheet" href="../../web2/shared/web2-theme.css?v=20260625anim" />
        <style>
            .lp-wrap {
                max-width: 880px;
                margin: 0 auto;
                padding: 24px 20px;
            }
            .lp-card {
                background: #fff;
                border: 1px solid var(--web2-border, #e5e7eb);
                border-radius: 12px;
                padding: 18px 20px;
                margin-bottom: 18px;
            }
            .lp-card h2 {
                font-size: 15px;
                margin: 0 0 12px;
            }
            .lp-row {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 10px 0;
                border-bottom: 1px solid #f1f5f9;
            }
            .lp-row:last-child {
                border-bottom: 0;
            }
            .lp-name {
                font-weight: 600;
                flex: 1;
                min-width: 0;
            }
            .lp-sub {
                font-size: 12px;
                color: #6b7280;
            }
            .lp-badge {
                font-size: 11px;
                padding: 2px 8px;
                border-radius: 999px;
                font-weight: 600;
            }
            .lp-on {
                background: #dcfce7;
                color: #166534;
            }
            .lp-off {
                background: #fee2e2;
                color: #991b1b;
            }
            .lp-btn {
                border: 1px solid #d1d5db;
                background: #fff;
                border-radius: 7px;
                padding: 5px 12px;
                font-size: 12.5px;
                cursor: pointer;
            }
            .lp-btn:hover {
                background: #f3f4f6;
            }
            .lp-btn-danger {
                color: #dc2626;
                border-color: #fecaca;
            }
            .lp-form {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                margin-top: 12px;
            }
            .lp-form input {
                border: 1px solid #d1d5db;
                border-radius: 7px;
                padding: 7px 10px;
                font-size: 13px;
            }
            .lp-stat {
                font-size: 26px;
                font-weight: 700;
                color: var(--web2-primary, #2a96ff);
            }
        </style>
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content">
                <div class="lp-wrap">
                    <h1 style="font-size: 20px; margin: 0 0 4px">📡 Cài đặt lấy comment Live</h1>
                    <p class="lp-sub" style="margin: 0 0 20px">
                        Server tự lấy comment khi trang đang livestream (cả khi không mở trình
                        duyệt) → lưu kho. Bật/tắt từng trang.
                    </p>

                    <div class="lp-card">
                        <h2>Tổng comment đã lưu</h2>
                        <div
                            class="lp-stat"
                            id="lpStat"
                            title="Tổng comment livestream đã thu thập"
                        >
                            …
                        </div>
                    </div>

                    <div class="lp-card">
                        <h2>Trang tự lấy comment</h2>
                        <div id="lpList"><div class="lp-sub">Đang tải…</div></div>
                        <div class="lp-form">
                            <input
                                id="lpPageId"
                                placeholder="Page ID (vd 270136663390370)"
                                style="width: 220px"
                            />
                            <input id="lpPageName" placeholder="Tên trang" style="width: 160px" />
                            <input
                                id="lpPageUrl"
                                placeholder="URL facebook (tuỳ chọn)"
                                style="flex: 1; min-width: 180px"
                            />
                            <button class="lp-btn" id="lpAdd">+ Thêm trang</button>
                        </div>
                    </div>

                    <p class="lp-sub" style="margin-top: 4px">
                        💡 Quản lý <b>chiến dịch cha</b> (gom nhiều buổi livestream) nằm trong trang
                        <a href="../../live-chat/index.html">Live Chat</a>.
                    </p>
                </div>
            </main>
        </div>

        <script src="../../web2/shared/web2-auth.js?v=20260621r7"></script>
        <script src="../../web2/shared/web2-sidebar.js?v=20260629d"></script>
        <!-- notification-system.js KHÔNG include thủ công: web2-sidebar.js
             autoLoadSharedModules đã nạp (include lại → redeclare NOTIFICATION_CONFIG). -->
        <script src="../../web2/shared/web2-optimistic.js?v=20260610"></script>
        <script src="../../web2/shared/web2-sse-bridge.js?v=20260622r9"></script>
        <script>
            if (window.Web2Sidebar)
                Web2Sidebar.mount('#web2Aside', { activeRoute: 'livestream-poller' });
        </script>
        <script>
            (function () {
                'use strict';
                const API = 'https://chatomni-proxy.nhijudyshop.workers.dev/api/web2-live-comments';
                const $ = (s) => document.querySelector(s);
                const esc = (s) =>
                    String(s == null ? '' : s).replace(
                        /[&<>"]/g,
                        (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]
                    );
                // Toast thay alert. notification-system.js đã load → window.notificationManager.
                const notify = (msg, type) => {
                    if (window.notificationManager?.show)
                        window.notificationManager.show(msg, type || 'info');
                    else console.log('[poller]', type || 'info', msg);
                };

                async function loadStat() {
                    try {
                        // GET /stats soft-gated → PHẢI gửi x-web2-token (_httpJson), bare fetch = 401.
                        const d = await _httpJson(`${API}/stats`).then((r) => r.json());
                        $('#lpStat').textContent =
                            (d.count || 0).toLocaleString('vi-VN') + ' comment';
                    } catch {
                        $('#lpStat').textContent = '—';
                    }
                }

                async function loadPages() {
                    const list = $('#lpList');
                    try {
                        // GET /poller-pages soft-gated → PHẢI gửi x-web2-token (_httpJson).
                        const d = await _httpJson(`${API}/poller-pages`).then((r) => r.json());
                        const rows = d.data || [];
                        if (!rows.length) {
                            list.innerHTML = '<div class="lp-sub">Chưa có trang nào.</div>';
                            return;
                        }
                        list.innerHTML = rows
                            .map(
                                (p) => `
                            <div class="lp-row" data-id="${esc(p.page_id)}">
                                <div class="lp-name">${esc(p.page_name || p.page_id)}
                                    <div class="lp-sub">${esc(p.page_url || p.page_id)}</div>
                                </div>
                                <span class="lp-badge ${p.enabled ? 'lp-on' : 'lp-off'}">${p.enabled ? 'Đang lấy' : 'Tắt'}</span>
                                <button class="lp-btn" data-act="toggle">${p.enabled ? 'Tắt' : 'Bật'}</button>
                                <button class="lp-btn lp-btn-danger" data-act="del">Xoá</button>
                            </div>`
                            )
                            .join('');
                    } catch (e) {
                        list.innerHTML = `<div class="lp-sub">Lỗi: ${esc(e.message)}</div>`;
                    }
                }

                // Toggle bật/tắt 1 row TRONG DOM ngay (UI-first) — đổi badge + nhãn nút.
                function _applyToggleRow(row, on) {
                    const badge = row.querySelector('.lp-badge');
                    const tBtn = row.querySelector('[data-act="toggle"]');
                    if (badge) {
                        badge.className = 'lp-badge ' + (on ? 'lp-on' : 'lp-off');
                        badge.textContent = on ? 'Đang lấy' : 'Tắt';
                    }
                    if (tBtn) tBtn.textContent = on ? 'Tắt' : 'Bật';
                }

                async function _httpJson(url, opts) {
                    // ENFORCE-PREP (2026-06-12): choke point — gắn x-web2-token cho mọi
                    // mutation poller-pages (POST/PATCH/DELETE soft-gated, WEB2_AUTH_ENFORCE).
                    // Không token (chưa login web2) → bỏ qua header (server enforce → 401).
                    const o = { ...(opts || {}) };
                    if (window.Web2Auth?.authHeaders) {
                        o.headers = window.Web2Auth.authHeaders(o.headers);
                    } else {
                        try {
                            const t = JSON.parse(
                                localStorage.getItem('web2_auth') || 'null'
                            )?.token;
                            if (t) o.headers = { ...(o.headers || {}), 'x-web2-token': t };
                        } catch {
                            /* no token */
                        }
                    }
                    const r = await fetch(url, o);
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r;
                }

                document.addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-act]');
                    if (!btn) return;
                    const row = btn.closest('.lp-row');
                    const id = row?.dataset.id;
                    if (!id) return;
                    const act = btn.dataset.act;

                    if (act === 'toggle') {
                        const on = btn.textContent.trim() === 'Bật'; // trạng thái MỚI sau toggle
                        if (window.Web2Optimistic?.run) {
                            window.Web2Optimistic.run({
                                snapshot: () => !on, // trạng thái cũ
                                apply: () => _applyToggleRow(row, on),
                                run: () =>
                                    _httpJson(`${API}/poller-pages/${encodeURIComponent(id)}`, {
                                        method: 'PATCH',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ enabled: on }),
                                    }),
                                rollback: (prevOn) => _applyToggleRow(row, prevOn),
                                successMsg: on ? 'Đã bật lấy comment' : 'Đã tắt',
                                errLabel: 'đổi trạng thái trang',
                            });
                            return;
                        }
                        // Fallback legacy.
                        _applyToggleRow(row, on);
                        _httpJson(`${API}/poller-pages/${encodeURIComponent(id)}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ enabled: on }),
                        })
                            .then(() => notify(on ? 'Đã bật lấy comment' : 'Đã tắt', 'success'))
                            .catch((err) => {
                                _applyToggleRow(row, !on);
                                notify('Lỗi đổi trạng thái trang: ' + err.message, 'error');
                            });
                        return;
                    }

                    if (act === 'del') {
                        if (!confirm('Xoá trang này khỏi danh sách tự lấy comment?')) return;
                        const next = row.nextSibling;
                        const parent = row.parentNode;
                        if (window.Web2Optimistic?.run) {
                            window.Web2Optimistic.run({
                                apply: () => row.remove(), // bỏ row khỏi DOM ngay
                                run: () =>
                                    _httpJson(`${API}/poller-pages/${encodeURIComponent(id)}`, {
                                        method: 'DELETE',
                                    }),
                                rollback: () => {
                                    // Khôi phục row về đúng vị trí cũ.
                                    if (parent) parent.insertBefore(row, next);
                                },
                                successMsg: 'Đã xoá trang',
                                errLabel: 'xoá trang',
                            });
                            return;
                        }
                        // Fallback legacy.
                        row.remove();
                        _httpJson(`${API}/poller-pages/${encodeURIComponent(id)}`, {
                            method: 'DELETE',
                        })
                            .then(() => notify('Đã xoá trang', 'success'))
                            .catch((err) => {
                                if (parent) parent.insertBefore(row, next);
                                notify('Lỗi xoá trang: ' + err.message, 'error');
                            });
                    }
                });

                // Fix 7: Enter key on add-page form inputs triggers add
                ['#lpPageId', '#lpPageName', '#lpPageUrl'].forEach((sel) => {
                    $(sel).addEventListener('keydown', (e) => {
                        if (e.isComposing || e.keyCode === 229) return; // IME tiếng Việt
                        if (e.key === 'Enter') $('#lpAdd').click();
                    });
                });

                // Fix 8: realtime validation on Page ID (visual only, no server calls)
                const lpPageIdEl = $('#lpPageId');
                lpPageIdEl.addEventListener('blur', () => {
                    if (!lpPageIdEl.value.trim()) lpPageIdEl.style.borderColor = '#dc3545';
                });
                lpPageIdEl.addEventListener('input', () => {
                    lpPageIdEl.style.borderColor = '';
                });

                $('#lpAdd').addEventListener('click', () => {
                    const pageId = $('#lpPageId').value.trim();
                    if (!pageId) return notify('Nhập Page ID', 'error');
                    const pageName = $('#lpPageName').value.trim() || null;
                    const pageUrl = $('#lpPageUrl').value.trim() || null;
                    const clearForm = () => {
                        $('#lpPageId').value = $('#lpPageName').value = $('#lpPageUrl').value = '';
                    };

                    if (window.Web2Optimistic?.run) {
                        window.Web2Optimistic.run({
                            apply: clearForm, // clear form ngay (cảm giác tức thì)
                            run: () =>
                                _httpJson(`${API}/poller-pages`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ pageId, pageName, pageUrl }),
                                }),
                            onSuccess: () => loadPages(), // sync list authoritative từ server
                            successMsg: 'Đã thêm trang',
                            errLabel: 'thêm trang',
                        });
                        return;
                    }
                    // Fallback legacy.
                    _httpJson(`${API}/poller-pages`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pageId, pageName, pageUrl }),
                    })
                        .then(() => {
                            clearForm();
                            loadPages();
                            notify('Đã thêm trang', 'success');
                        })
                        .catch((err) => notify('Lỗi thêm trang: ' + err.message, 'error'));
                });

                loadStat();
                loadPages();
                // Poll stat 15s = fallback an toàn (GIỮ). Thêm SSE để loadStat NGAY khi
                // poller push comment mới (web2:live-comments) — số liệu cập nhật realtime.
                setInterval(loadStat, 15000);
                if (window.Web2SSE?.subscribe) {
                    let _statTimer = null;
                    let _pagesTimer = null;
                    window.Web2SSE.subscribe('web2:live-comments', (msg) => {
                        const action = msg && msg.data && msg.data.action;
                        // Audit SSE 2026-06-25: thêm/xoá/bật-tắt trang poller ở máy
                        // khác (_notify('poller-pages')) → danh sách page config phải
                        // reload, trước đây chỉ reload stat → stale tới khi F5.
                        if (action === 'poller-pages') {
                            clearTimeout(_pagesTimer);
                            _pagesTimer = setTimeout(loadPages, 600);
                            return;
                        }
                        clearTimeout(_statTimer);
                        _statTimer = setTimeout(loadStat, 800); // debounce gom burst
                    });
                }
            })();
        </script>
    </body>
</html>
