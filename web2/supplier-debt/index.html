<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Công nợ Nhà Cung Cấp - WEB 2.0</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-components.css?v=20260613z" />
        <link rel="stylesheet" href="css/styles.css?v=20260623w3" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>

        <!-- Firebase SDK gỡ 2026-06-14: Web 2.0 đã sang Postgres+SSE, trang không dùng Firestore -->
        <script src="../../shared/js/notification-system.js?v=20260521b"></script>
        <script src="../../shared/js/core-loader.js?v=20260521b"></script>
        <!-- token-manager.js gỡ 2026-06-14: trang Web 2.0 không dùng token bearer cũ -->
        <link rel="stylesheet" href="../../web2/shared/web2-theme.css?v=20260625anim" />
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content sd-main">
                <header class="sd-page-head">
                    <div class="sd-page-title">
                        <i data-lucide="receipt"></i>
                        <h1>Công nợ Nhà Cung Cấp</h1>
                    </div>
                    <div class="sd-page-counters">
                        <span class="counter-pill" id="sdCountSuppliers">0 NCC</span>
                        <span class="counter-pill" id="sdCountEnd">Nợ cuối: 0₫</span>
                        <button
                            id="sdRefreshBtn"
                            class="btn btn-secondary"
                            type="button"
                            title="Tải lại"
                        >
                            <i data-lucide="refresh-cw"></i>
                        </button>
                    </div>
                </header>

                <section class="sd-toolbar">
                    <div class="sd-filter-row">
                        <div class="sd-filter-group">
                            <label>Từ ngày</label>
                            <input id="sdDateFrom" type="date" />
                        </div>
                        <div class="sd-filter-group">
                            <label>Đến ngày</label>
                            <input id="sdDateTo" type="date" />
                        </div>
                        <div class="sd-filter-group sd-filter-group-search">
                            <label>NCC</label>
                            <input
                                id="sdSearch"
                                type="search"
                                placeholder="Tìm theo tên NCC…"
                                autocomplete="off"
                            />
                        </div>
                        <div class="sd-filter-group sd-filter-group-radio">
                            <label>Hiển thị</label>
                            <div class="sd-radio-group">
                                <label class="sd-radio-label">
                                    <input type="radio" name="sdDisplay" value="all" checked />
                                    <span>Tất cả</span>
                                </label>
                                <label class="sd-radio-label">
                                    <input type="radio" name="sdDisplay" value="endnonzero" />
                                    <span>Nợ cuối kỳ &ne; 0</span>
                                </label>
                            </div>
                        </div>
                        <div class="sd-filter-actions">
                            <button class="btn btn-primary" id="sdSearchBtn" type="button">
                                <i data-lucide="search"></i> Áp dụng
                            </button>
                            <button class="btn btn-secondary" id="sdResetBtn" type="button">
                                <i data-lucide="rotate-ccw"></i> Reset
                            </button>
                            <button class="btn btn-primary" id="sdCreateNccBtn" type="button">
                                <i data-lucide="plus"></i> Tạo NCC
                            </button>
                            <button class="btn btn-success" id="sdExportBtn" type="button">
                                <i data-lucide="file-spreadsheet"></i> Xuất CSV
                            </button>
                        </div>
                    </div>
                </section>

                <div class="sd-table-wrap">
                    <table class="data-table sd-table" id="sdTable">
                        <thead>
                            <tr>
                                <th class="num-stt">#</th>
                                <th class="col-expand"></th>
                                <th class="col-code sortable" data-sort="code">Mã NCC</th>
                                <th>Nhà Cung Cấp</th>
                                <th class="num sortable" data-sort="opening">Nợ đầu kỳ</th>
                                <th class="num sortable" data-sort="debit">Phát sinh</th>
                                <th
                                    class="num sortable"
                                    data-sort="credit"
                                    title="Gồm thanh toán + trả hàng (cả hai đều giảm nợ NCC)"
                                >
                                    Đã giảm nợ
                                </th>
                                <th class="num sortable" data-sort="ending">Nợ cuối kỳ</th>
                            </tr>
                        </thead>
                        <tbody id="sdTableBody"></tbody>
                        <tfoot>
                            <tr class="sd-total-row">
                                <td colspan="4"><strong>Tổng</strong></td>
                                <td class="num" id="sdTotalOpening">0₫</td>
                                <td class="num" id="sdTotalDebit">0₫</td>
                                <td class="num" id="sdTotalCredit">0₫</td>
                                <td class="num" id="sdTotalEnding">0₫</td>
                            </tr>
                        </tfoot>
                    </table>
                    <div class="sd-empty" id="sdEmpty" hidden>
                        <i data-lucide="package-x"></i>
                        <p>Không có NCC nào trong kỳ này.</p>
                    </div>
                </div>

                <div class="sd-pagination" id="sdPagination" hidden>
                    <button class="btn-page" id="sdPagePrev" type="button" title="Trang trước">
                        <i data-lucide="chevron-left"></i>
                    </button>
                    <span class="sd-page-info" id="sdPageInfo">Trang 1 / 1</span>
                    <button class="btn-page" id="sdPageNext" type="button" title="Trang sau">
                        <i data-lucide="chevron-right"></i>
                    </button>
                </div>
            </main>
        </div>

        <!-- Edit Note modal -->
        <div class="sd-modal" id="sdEditNoteModal" hidden>
            <div class="sd-modal-backdrop" data-sd-modal-close></div>
            <div class="sd-modal-panel sd-modal-panel-narrow">
                <header class="sd-modal-head">
                    <h2>Ghi chú NCC: <span id="sdEditNoteSupplier">—</span></h2>
                    <button class="sd-modal-close" type="button" data-sd-modal-close>
                        <i data-lucide="x"></i>
                    </button>
                </header>
                <div class="sd-modal-body">
                    <label class="sd-form-field">
                        <span>Ghi chú</span>
                        <textarea
                            id="sdNoteTextarea"
                            rows="4"
                            placeholder="Vd: CẮT LAI >10SP - 5K / >20SP - 10K ( TÍNH 1 MẪU SP )"
                            maxlength="500"
                        ></textarea>
                        <small>Lưu cùng NCC. Hiển thị dưới tên NCC (italic xanh).</small>
                    </label>
                </div>
                <footer class="sd-modal-foot">
                    <button class="btn btn-secondary" type="button" data-sd-modal-close>Hủy</button>
                    <button class="btn btn-primary" id="sdNoteConfirmBtn" type="button">
                        <i data-lucide="check"></i> Lưu ghi chú
                    </button>
                </footer>
            </div>
        </div>

        <!-- Payment modal -->
        <!-- Modal Thanh toán NCC = dùng CHUNG Web2SupplierPay (web2/shared), markup
             tự tạo trong <body> bởi component — KHÔNG còn #sdPayModal ở đây. -->

        <!-- Create NCC modal -->
        <div class="sd-modal" id="sdCreateNccModal" hidden>
            <div class="sd-modal-backdrop" data-sd-modal-close></div>
            <div class="sd-modal-panel sd-modal-panel-narrow">
                <header class="sd-modal-head">
                    <h2>Tạo Nhà Cung Cấp</h2>
                    <button class="sd-modal-close" type="button" data-sd-modal-close>
                        <i data-lucide="x"></i>
                    </button>
                </header>
                <div class="sd-modal-body">
                    <label class="sd-form-field">
                        <span>Mã NCC <em>*</em></span>
                        <input
                            id="sdNccCode"
                            type="text"
                            placeholder="Vd: B5, A12, MM2 …"
                            autocomplete="off"
                            maxlength="20"
                        />
                        <small>Chữ + số. Vd: B5 → hiển thị `[B5]`. Sort theo mã.</small>
                    </label>
                    <label class="sd-form-field">
                        <span>Tên NCC <em>*</em></span>
                        <input
                            id="sdNccName"
                            type="text"
                            placeholder="Vd: CHIẾN NGỌC ( HÀ NỘI )"
                            autocomplete="off"
                            maxlength="120"
                            list="sdNccNameList"
                        />
                        <datalist id="sdNccNameList"></datalist>
                        <small>
                            Tên đầy đủ, KHÔNG cần thêm mã ở đầu — hiển thị tự động.
                            <br />Vd: tên `CHIẾN NGỌC ( HÀ NỘI )` + mã `B5` →
                            <code>[B5] B5 CHIẾN NGỌC ( HÀ NỘI )</code>
                        </small>
                    </label>
                </div>
                <footer class="sd-modal-foot">
                    <button class="btn btn-secondary" type="button" data-sd-modal-close>Hủy</button>
                    <button class="btn btn-primary" id="sdNccConfirmBtn" type="button">
                        <i data-lucide="check"></i> Lưu NCC
                    </button>
                </footer>
            </div>
        </div>

        <script src="../shared/web2-deeplink.js?v=20260614dl"></script>
        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/web2-number-input.js?v=20260626a"></script>
        <!-- Modal Thanh toán NCC dùng CHUNG (so-order + supplier-debt) -->
        <script src="../shared/web2-supplier-pay.js?v=20260628a"></script>
        <script src="../shared/web2-sidebar.js?v=20260629c"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <script src="../shared/web2-so-order-reader.js?v=20260613a"></script>
        <script src="../shared/web2-suppliers-cache.js?v=20260623sc"></script>
        <script src="js/supplier-debt-state.js?v=20260618w3"></script>
        <script src="js/supplier-debt-api.js?v=20260618w3"></script>
        <script src="js/supplier-debt-render.js?v=20260623w3"></script>
        <script src="js/supplier-debt-actions.js?v=20260629a"></script>
        <script src="js/supplier-debt-filters.js?v=20260618w3"></script>
        <script src="js/supplier-debt-app.js?v=20260618w3"></script>
        <script>
            Web2Sidebar.mount('#web2Aside', { activeUrl: window.location.href });
        </script>
    </body>
</html>
