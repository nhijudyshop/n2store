<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Nhóm sản phẩm - WEB 2.0</title>
        <meta name="web2-db" content="render" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../../web2/shared/web2-sidebar.css?v=20260613z" />
        <link rel="stylesheet" href="../shared/web2-base.css?v=20260613z" />
        <link rel="stylesheet" href="../shared/web2-components.css?v=20260613z" />
        <link rel="stylesheet" href="../../web2/shared/page-builder.css?v=20260613z" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>

        <script src="../../shared/js/shared-auth-manager.js?v=20260521b"></script>
        <script src="../../shared/js/notification-system.js?v=20260521b"></script>

        <style>
            body {
                margin: 0;
                font-family: Inter, system-ui, sans-serif;
                background: #ecf0f5;
            }
            .web2-shell {
                display: flex;
                min-height: 100vh;
            }
            .web2-aside {
                flex-shrink: 0;
            }
            .main-content {
                flex: 1;
                overflow: auto;
                height: 100vh;
            }
            #pageRoot {
                padding: 12px 16px 32px;
            }
            .web2-main-header {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 12px;
            }
            .web2-breadcrumb {
                font-size: 13px;
                color: #777;
                flex: 1;
            }
            .web2-breadcrumb-sep {
                margin: 0 6px;
                color: #ccc;
            }
            .web2-breadcrumb-current {
                color: #444;
                font-weight: 600;
            }
        </style>
        <link rel="stylesheet" href="../../web2/shared/web2-theme.css?v=20260613z" />
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content">
                <div id="pageRoot"></div>
            </main>
        </div>

        <script src="../../web2/shared/web2-auth.js?v=20260613guard"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../../web2/shared/web2-sidebar.js?v=20260620b"></script>
        <script src="../../web2/shared/web2-api.js?v=20260521b"></script>
        <!-- SSE realtime: bridge TRƯỚC page-builder để subscribe web2:<slug> tự kích hoạt -->
        <script src="../../web2/shared/web2-sse-bridge.js?v=20260613h"></script>
        <script src="../../web2/shared/page-builder.js?v=20260615opt"></script>
        <script>
            if (window.Web2Sidebar) {
                Web2Sidebar.mount('#web2Aside', { activeRoute: 'productcategory' });
            }
            document.addEventListener('DOMContentLoaded', () => {
                if (window.lucide) lucide.createIcons();
            });

            Web2Page.mount('#pageRoot', {
                slug: 'productcategory',
                title: 'Nhóm sản phẩm',
                breadcrumb: ['App', 'Sản phẩm'],
                columns: [
                    { key: 'code', label: 'Mã', width: 140, align: 'center' },
                    { key: 'name', label: 'Tên nhóm', align: 'left' },
                    {
                        key: 'data.parentCode',
                        label: 'Nhóm cha',
                        width: 160,
                        align: 'left',
                        link: 'product-category',
                    },
                    { key: 'data.note', label: 'Ghi chú', align: 'left' },
                ],
                fields: [
                    {
                        key: 'code',
                        label: 'Mã',
                        type: 'text',
                        required: true,
                        placeholder: 'VD: NSP001',
                    },
                    { key: 'name', label: 'Tên nhóm', type: 'text', required: true },
                    {
                        key: 'data.parentCode',
                        label: 'Nhóm cha (Mã)',
                        type: 'ref',
                        ref: 'productcategory',
                        placeholder: 'Để trống nếu là nhóm gốc',
                        link: 'product-category',
                    },
                    { key: 'data.note', label: 'Ghi chú', type: 'textarea', placeholder: '' },
                ],
            });
        </script>
    </body>
</html>
