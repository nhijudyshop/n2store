<!doctype html>
<!-- TEMP audit harness — delete after QR audit. Not linked anywhere. -->
<html lang="vi">
    <head>
        <meta charset="utf-8" />
        <title>QR Audit Harness</title>
        <style>
            body {
                font-family: Inter, system-ui, sans-serif;
                background: #eef2f6;
                margin: 0;
                padding: 18px;
                color: #0f172a;
            }
            h2 {
                font-size: 15px;
                margin: 18px 0 8px;
            }
            .grid {
                display: flex;
                flex-wrap: wrap;
                gap: 14px;
            }
            .card {
                background: #fff;
                border: 1px solid #e2e8f0;
                border-radius: 10px;
                padding: 10px;
                width: 170px;
            }
            .card .t {
                font-size: 11px;
                font-weight: 700;
                color: #334155;
                margin-bottom: 6px;
                min-height: 28px;
            }
            .card .q {
                width: 152px;
                height: 152px;
                background: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .card .q img,
            .card .q canvas,
            .card .q svg {
                width: 152px;
                height: 152px;
                image-rendering: auto;
            }
            .b {
                display: inline-block;
                font-size: 10px;
                font-weight: 700;
                border-radius: 5px;
                padding: 1px 6px;
                margin-top: 6px;
            }
            .ok {
                background: #dcfce7;
                color: #166534;
            }
            .bad {
                background: #fee2e2;
                color: #b91c1c;
            }
            .meta {
                font-size: 10px;
                color: #64748b;
                margin-top: 4px;
                line-height: 1.4;
                word-break: break-all;
            }
            #summary {
                background: #0f172a;
                color: #e2e8f0;
                padding: 10px 14px;
                border-radius: 8px;
                font-size: 12px;
                white-space: pre-wrap;
            }
        </style>
    </head>
    <body>
        <div id="summary">Đang dựng…</div>
        <div id="root"></div>

        <script src="../shared/qrcode.min.js"></script>
        <script src="../shared/web2-qr.js"></script>
        <script src="../shared/jsbarcode-code128.min.js"></script>
        <script>
            (async function () {
                const PBH = 'NJ-20260625-0084'; // 16 chars (mã PBH thật)
                const SKU = 'KHOAOTRANGM'; // ~11 chars (mã SP)
                const VAR = 'Trắng / M'; // biến thể (bake giữa QR tem SP)
                const PRINT_PX = 304; // 38mm @ 8 dots/mm ≈ thước in nhiệt thật
                const results = [];
                const root = document.getElementById('root');

                await Web2QR.ready();
                const hasBD = typeof window.BarcodeDetector === 'function';
                let detector = null;
                if (hasBD) {
                    try {
                        detector = new BarcodeDetector({ formats: ['qr_code'] });
                    } catch (e) {}
                }

                // SVG string -> canvas at sizePx (rasterize the vector at print resolution)
                function svgToCanvas(svg, sizePx) {
                    return new Promise((res, rej) => {
                        const img = new Image();
                        img.onload = () => {
                            const c = document.createElement('canvas');
                            c.width = sizePx;
                            c.height = sizePx;
                            const ctx = c.getContext('2d');
                            ctx.fillStyle = '#fff';
                            ctx.fillRect(0, 0, sizePx, sizePx);
                            ctx.drawImage(img, 0, 0, sizePx, sizePx);
                            res(c);
                        };
                        img.onerror = rej;
                        img.src =
                            'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
                    });
                }
                // pure 1-bit threshold copy (thermal B&W proxy)
                function threshold(srcCanvas) {
                    const c = document.createElement('canvas');
                    c.width = srcCanvas.width;
                    c.height = srcCanvas.height;
                    const ctx = c.getContext('2d');
                    ctx.drawImage(srcCanvas, 0, 0);
                    const d = ctx.getImageData(0, 0, c.width, c.height);
                    const a = d.data;
                    for (let i = 0; i < a.length; i += 4) {
                        const lum = 0.299 * a[i] + 0.587 * a[i + 1] + 0.114 * a[i + 2];
                        const v = lum < 128 ? 0 : 255;
                        a[i] = a[i + 1] = a[i + 2] = v;
                        a[i + 3] = 255;
                    }
                    ctx.putImageData(d, 0, 0);
                    return c;
                }
                async function decode(canvas) {
                    if (!detector) return null;
                    try {
                        const r = await detector.detect(canvas);
                        return r && r[0] ? r[0].rawValue : null;
                    } catch (e) {
                        return null;
                    }
                }

                // Add a card: render svg at print px, decode AA + thresholded, show result.
                async function addCard(title, svg, expect, sizePx) {
                    sizePx = sizePx || PRINT_PX;
                    const canvas = await svgToCanvas(svg, sizePx);
                    const aa = await decode(canvas);
                    const th = threshold(canvas);
                    const bw = await decode(th);
                    const okAA = aa === expect,
                        okBW = bw === expect;
                    results.push({ title, expect, decAA: aa, decBW: bw, okAA, okBW });
                    const card = document.createElement('div');
                    card.className = 'card';
                    const disp = document.createElement('div');
                    disp.className = 'q';
                    // show the thresholded (thermal) version — that is what prints
                    th.style.width = '152px';
                    th.style.height = '152px';
                    disp.appendChild(th);
                    card.innerHTML = '<div class="t">' + title + '</div>';
                    card.appendChild(disp);
                    const tag = document.createElement('div');
                    tag.innerHTML =
                        '<span class="b ' +
                        (okAA ? 'ok' : 'bad') +
                        '">AA ' +
                        (okAA ? '✓' : '✗') +
                        '</span> ' +
                        '<span class="b ' +
                        (okBW ? 'ok' : 'bad') +
                        '">B&amp;W ' +
                        (okBW ? '✓' : '✗') +
                        '</span>' +
                        '<div class="meta">' +
                        sizePx +
                        'px • decode: ' +
                        (bw ? '«' + bw + '»' : 'FAIL') +
                        '</div>';
                    card.appendChild(tag);
                    root.appendChild(card);
                }

                // ── Section: PBH thermal QR (data = PBH number, centerLabel = number) ──
                const hp = document.createElement('h2');
                hp.textContent = 'PBH thermal QR (data=' + PBH + ')';
                root.appendChild(hp);
                await addCard(
                    'A. RAW davidshimjs (fallback hiện tại của printer-settings)',
                    rawSvg(PBH, 'M'),
                    PBH
                );
                await addCard(
                    'B. Web2QR rounded r0.30 + centerLabel (PBH thật)',
                    Web2QR.toSvg(PBH, { style: 'rounded', margin: 2, centerLabel: PBH }),
                    PBH
                );
                await addCard(
                    'C. Web2QR rounded r0.30 KHÔNG centerLabel, margin 4',
                    Web2QR.toSvg(PBH, { style: 'rounded', radius: 0.3, margin: 4 }),
                    PBH
                );
                await addCard(
                    'D. Web2QR DOTS r0.5 (fancy, rủi ro)',
                    Web2QR.toSvg(PBH, { style: 'dots', margin: 4, ec: 'H' }),
                    PBH
                );
                await addCard(
                    'E. Web2QR rounded r0.45 + centerLabel, margin 4',
                    Web2QR.toSvg(PBH, {
                        style: 'rounded',
                        radius: 0.45,
                        margin: 4,
                        centerLabel: PBH,
                    }),
                    PBH
                );

                // ── Section: Product label QR (data = SKU) ──
                const hs = document.createElement('h2');
                hs.textContent = 'Tem SP QR (data=' + SKU + ')';
                root.appendChild(hs);
                await addCard('F. RAW davidshimjs EC=H (fallback tem SP)', rawSvg(SKU, 'H'), SKU);
                await addCard(
                    'G. Web2QR rounded (tem SP không biến thể)',
                    Web2QR.toSvg(SKU, { style: 'rounded', margin: 2 }),
                    SKU
                );
                await addCard(
                    'H. Web2QR rounded + centerLabel biến thể "' + VAR + '"',
                    Web2QR.toSvg(SKU, { style: 'rounded', margin: 2, centerLabel: VAR, ec: 'H' }),
                    SKU
                );

                // ── Section: Code128 barcode (label option / bill fallback) ──
                const hb = document.createElement('h2');
                hb.textContent = 'Code128 barcode (data=' + SKU + ')';
                root.appendChild(hb);
                try {
                    const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                    window.JsBarcode(svgEl, SKU, {
                        format: 'CODE128',
                        width: 2,
                        height: 80,
                        displayValue: true,
                        fontSize: 18,
                        margin: 8,
                    });
                    const wrap = document.createElement('div');
                    wrap.className = 'card';
                    wrap.style.width = '300px';
                    wrap.innerHTML = '<div class="t">I. JsBarcode CODE128 (tem/PBH fallback)</div>';
                    const box = document.createElement('div');
                    box.style.background = '#fff';
                    box.style.padding = '6px';
                    svgEl.style.width = '280px';
                    svgEl.style.height = 'auto';
                    box.appendChild(svgEl);
                    wrap.appendChild(box);
                    root.appendChild(wrap);
                } catch (e) {}

                // raw davidshimjs styled-free QR -> svg (square modules) for baseline compare
                function rawSvg(text, ec) {
                    const holder = document.createElement('div');
                    new window.QRCode(holder, {
                        text: String(text),
                        correctLevel: window.QRCode.CorrectLevel[ec || 'M'],
                        width: 300,
                        height: 300,
                    });
                    // davidshimjs renders a table or canvas; grab its module matrix via Web2QR.matrix for a clean square SVG
                    const m = Web2QR.matrix(text, ec);
                    const margin = 4,
                        dim = m.count + margin * 2;
                    let body = '';
                    for (let r = 0; r < m.count; r++)
                        for (let c = 0; c < m.count; c++)
                            if (m.isDark(r, c))
                                body +=
                                    '<rect x="' +
                                    (c + margin) +
                                    '" y="' +
                                    (r + margin) +
                                    '" width="1" height="1"/>';
                    return (
                        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' +
                        dim +
                        ' ' +
                        dim +
                        '" width="' +
                        dim * 4 +
                        '" height="' +
                        dim * 4 +
                        '"><rect width="' +
                        dim +
                        '" height="' +
                        dim +
                        '" fill="#fff"/><g fill="#000">' +
                        body +
                        '</g></svg>'
                    );
                }

                const pass = results.filter((r) => r.okBW).length;
                window.__qrAuditResults = results;
                document.getElementById('summary').textContent =
                    'QR Audit — ' +
                    results.length +
                    ' biến thể, decode B&W (thermal 1-bit) PASS: ' +
                    pass +
                    '/' +
                    results.length +
                    '\n' +
                    results
                        .map(
                            (r) =>
                                (r.okBW ? '✓' : '✗') +
                                ' ' +
                                r.title.split('(')[0].trim() +
                                (r.okBW ? '' : '  → decode=' + (r.decBW || 'FAIL'))
                        )
                        .join('\n');
            })();
        </script>
    </body>
</html>
