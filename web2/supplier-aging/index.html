<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Aging công nợ NCC - WEB 2.0</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../shared/tpos-sidebar.css?v=20260522f" />
        <link rel="stylesheet" href="../shared/web2-tpos-theme.css?v=20260522d" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.js" defer></script>
        <!-- Firebase compat (đọc Firestore web2_so_order + web2_supplier_wallet — Web 2.0 source) -->
        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
        <script src="../../shared/js/firebase-config.js?v=20260521b"></script>
        <style>
            .age-main {
                padding: 20px 28px;
            }
            .age-summary {
                display: grid;
                gap: 12px;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                margin-bottom: 20px;
            }
            .age-card {
                padding: 14px 16px;
                background: #fff;
                border-radius: 10px;
                border-top: 4px solid;
                box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
            }
            .age-card .v {
                font-size: 22px;
                font-weight: 700;
            }
            .age-card .l {
                font-size: 11px;
                text-transform: uppercase;
                color: #58666e;
            }
            .ab1 {
                border-top-color: #16a34a;
            }
            .ab1 .v {
                color: #16a34a;
            }
            .ab2 {
                border-top-color: #f59e0b;
            }
            .ab2 .v {
                color: #d97706;
            }
            .ab3 {
                border-top-color: #ef4444;
            }
            .ab3 .v {
                color: #dc2626;
            }
            .ab4 {
                border-top-color: #7c2d12;
            }
            .ab4 .v {
                color: #7c2d12;
            }
            .ab-total {
                border-top-color: #7266ba;
            }
            .ab-total .v {
                color: #5e51ac;
            }
            .age-tools {
                display: flex;
                gap: 10px;
                margin-bottom: 14px;
                align-items: center;
            }
            .age-tools input {
                padding: 7px 10px;
                border: 1px solid #d1d5db;
                border-radius: 6px;
            }
            .age-tools button {
                padding: 7px 14px;
                background: linear-gradient(135deg, #7266ba, #5e51ac);
                color: #fff;
                border: 0;
                border-radius: 6px;
                cursor: pointer;
                font-weight: 600;
            }
            table.age-tbl {
                width: 100%;
                border-collapse: collapse;
                background: #fff;
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
                font-size: 13px;
            }
            table.age-tbl th {
                background: #f0eeee;
                padding: 9px 10px;
                text-align: left;
            }
            table.age-tbl td {
                padding: 8px 10px;
                border-top: 1px solid #f3f4f6;
            }
            table.age-tbl tr:nth-child(even) td {
                background: #fafafa;
            }
            .num {
                text-align: right;
                font-variant-numeric: tabular-nums;
            }
        </style>
    </head>
    <body class="tpos-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="web2-main age-main">
                <h1 style="margin: 0 0 6px">Công nợ NCC theo Aging buckets</h1>
                <p style="color: #58666e; margin: 0 0 16px; font-size: 13px">
                    Phân chia khoản nợ theo thời gian quá hạn 0-30 / 31-60 / 61-90 / 90+ ngày.
                </p>
                <div class="age-tools">
                    <label>Ngày tham chiếu: <input id="refDate" type="date" /></label>
                    <button id="btnLoad">Tính</button>
                    <button id="btnExport" style="background: #14b8a6">Export Excel</button>
                </div>
                <div class="age-summary" id="ageSummary"></div>
                <div
                    style="
                        display: grid;
                        grid-template-columns: 1fr 1fr;
                        gap: 14px;
                        margin-bottom: 18px;
                    "
                >
                    <div
                        style="
                            background: #fff;
                            padding: 16px;
                            border-radius: 10px;
                            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
                        "
                    >
                        <h3 style="margin: 0 0 10px; font-size: 14px">Phân bố aging</h3>
                        <canvas id="agingChart" style="max-height: 220px"></canvas>
                    </div>
                    <div
                        style="
                            background: #fff;
                            padding: 16px;
                            border-radius: 10px;
                            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
                        "
                    >
                        <h3 style="margin: 0 0 10px; font-size: 14px">Top 5 NCC nợ nhiều nhất</h3>
                        <canvas id="topChart" style="max-height: 220px"></canvas>
                    </div>
                </div>
                <table class="age-tbl">
                    <thead>
                        <tr>
                            <th>NCC</th>
                            <th class="num">0-30 ngày</th>
                            <th class="num">31-60</th>
                            <th class="num">61-90</th>
                            <th class="num">90+</th>
                            <th class="num">Tổng</th>
                        </tr>
                    </thead>
                    <tbody id="ageBody"></tbody>
                </table>
            </main>
        </div>
        <script src="../shared/web2-auth.js?v=20260522f"></script>
        <script src="../shared/web2-aging.js?v=20260522a"></script>
        <script src="../shared/web2-export-helpers.js?v=20260522a"></script>
        <script src="../shared/tpos-sidebar.js?v=20260522f"></script>
        <script>
            (function () {
                let aChart = null,
                    tChart = null;
                let currentData = null;
                function fmt(n) {
                    return Number(n || 0).toLocaleString('vi-VN');
                }
                function rateToVnd(currency, tab) {
                    if (!currency || currency === 'VND') return 1;
                    return Number(tab?.exchangeRate) || 1;
                }
                // FIFO aging: sort shipments asc → apply payments oldest-first → remaining unpaid bucketed by age.
                function computeAging(soData, walletData, refDateStr) {
                    const refDate = new Date(refDateStr);
                    const refMs = refDate.getTime();
                    // Map supplier → { shipments: [{ date, amount }], paid: number }
                    const byName = {};
                    const tabs = soData?.tabs || [];
                    for (const tab of tabs) {
                        const rate = rateToVnd(tab.currency, tab);
                        for (const sh of tab.shipments || []) {
                            for (const r of sh.rows || []) {
                                const sup = (r.supplier || '').trim();
                                if (!sup) continue;
                                const qty = Number(r.qty) || 0;
                                const cost = (Number(r.costPrice) || 0) * rate;
                                const amt = qty * cost;
                                if (amt <= 0) continue;
                                if (!byName[sup]) byName[sup] = { shipments: [], paid: 0 };
                                byName[sup].shipments.push({ date: sh.date, amount: amt });
                            }
                        }
                    }
                    const wallets = walletData?.wallets || {};
                    for (const sup of Object.keys(wallets)) {
                        if (!byName[sup]) byName[sup] = { shipments: [], paid: 0 };
                        for (const tx of wallets[sup].transactions || []) {
                            if (tx.type !== 'payment' && tx.type !== 'return') continue;
                            byName[sup].paid += Number(tx.amount) || 0;
                        }
                    }
                    const total = { b0_30: 0, b31_60: 0, b61_90: 0, b90_plus: 0, total: 0 };
                    const suppliers = [];
                    for (const [name, s] of Object.entries(byName)) {
                        // sort oldest first
                        s.shipments.sort((a, b) => String(a.date).localeCompare(String(b.date)));
                        let remaining = s.paid;
                        const buckets = { b0_30: 0, b31_60: 0, b61_90: 0, b90_plus: 0 };
                        for (const sh of s.shipments) {
                            if (!sh.date) continue;
                            let unpaid = sh.amount;
                            if (remaining > 0) {
                                const used = Math.min(remaining, unpaid);
                                unpaid -= used;
                                remaining -= used;
                            }
                            if (unpaid <= 0) continue;
                            const shDate = new Date(sh.date);
                            const ageDays = Math.floor((refMs - shDate.getTime()) / 86400000);
                            if (ageDays < 0) continue;
                            if (ageDays <= 30) buckets.b0_30 += unpaid;
                            else if (ageDays <= 60) buckets.b31_60 += unpaid;
                            else if (ageDays <= 90) buckets.b61_90 += unpaid;
                            else buckets.b90_plus += unpaid;
                        }
                        const tot =
                            buckets.b0_30 + buckets.b31_60 + buckets.b61_90 + buckets.b90_plus;
                        if (tot <= 0) continue;
                        total.b0_30 += buckets.b0_30;
                        total.b31_60 += buckets.b31_60;
                        total.b61_90 += buckets.b61_90;
                        total.b90_plus += buckets.b90_plus;
                        total.total += tot;
                        suppliers.push({ name, ...buckets, total: tot });
                    }
                    suppliers.sort((a, b) => b.total - a.total);
                    return { ref: refDate.toISOString(), buckets: total, suppliers };
                }
                async function load() {
                    if (typeof firebase === 'undefined' || !firebase.firestore) {
                        document.getElementById('ageBody').innerHTML =
                            '<tr><td colspan="6" style="text-align:center; padding:20px; color:#dc2626">Firebase chưa load — F5 lại</td></tr>';
                        return;
                    }
                    const ref =
                        document.getElementById('refDate').value ||
                        new Date().toISOString().slice(0, 10);
                    document.getElementById('ageBody').innerHTML =
                        '<tr><td colspan="6" style="text-align:center; padding:20px; color:#94a3b8">Đang tải Firestore web2_so_order + web2_supplier_wallet…</td></tr>';
                    let soData = null,
                        walletData = null;
                    try {
                        const db = firebase.firestore();
                        const [soSnap, walletSnap] = await Promise.all([
                            db.collection('web2_so_order').doc('main').get(),
                            db.collection('web2_supplier_wallet').doc('main').get(),
                        ]);
                        soData = soSnap.exists ? soSnap.data()?.data || null : null;
                        walletData = walletSnap.exists ? walletSnap.data()?.data || null : null;
                    } catch (e) {
                        document.getElementById('ageBody').innerHTML =
                            '<tr><td colspan="6" style="text-align:center; padding:20px; color:#dc2626">Lỗi Firestore: ' +
                            esc(e.message) +
                            '</td></tr>';
                        return;
                    }
                    const d = computeAging(soData, walletData, ref);
                    currentData = d;
                    const b = d.buckets;
                    document.getElementById('ageSummary').innerHTML = `
                    <div class="age-card ab1"><div class="l">0-30 ngày</div><div class="v">${fmt(b.b0_30)}đ</div></div>
                    <div class="age-card ab2"><div class="l">31-60 ngày</div><div class="v">${fmt(b.b31_60)}đ</div></div>
                    <div class="age-card ab3"><div class="l">61-90 ngày</div><div class="v">${fmt(b.b61_90)}đ</div></div>
                    <div class="age-card ab4"><div class="l">> 90 ngày</div><div class="v">${fmt(b.b90_plus)}đ</div></div>
                    <div class="age-card ab-total"><div class="l">Tổng nợ</div><div class="v">${fmt(b.total)}đ</div></div>
                `;
                    document.getElementById('ageBody').innerHTML =
                        (d.suppliers || [])
                            .map(
                                (s) => `<tr>
                    <td>${esc(s.name)}</td>
                    <td class="num">${fmt(s.b0_30)}</td>
                    <td class="num">${fmt(s.b31_60)}</td>
                    <td class="num">${fmt(s.b61_90)}</td>
                    <td class="num">${fmt(s.b90_plus)}</td>
                    <td class="num"><strong>${fmt(s.total)}</strong></td>
                </tr>`
                            )
                            .join('') ||
                        '<tr><td colspan="6" style="text-align:center; padding:20px; color:#94a3b8">Không có data</td></tr>';
                    renderCharts(d);
                }
                function renderCharts(d) {
                    if (!window.Chart) return;
                    if (aChart) aChart.destroy();
                    aChart = new Chart(document.getElementById('agingChart'), {
                        type: 'bar',
                        data: {
                            labels: ['0-30', '31-60', '61-90', '>90'],
                            datasets: [
                                {
                                    data: [
                                        d.buckets.b0_30,
                                        d.buckets.b31_60,
                                        d.buckets.b61_90,
                                        d.buckets.b90_plus,
                                    ],
                                    backgroundColor: ['#16a34a', '#f59e0b', '#ef4444', '#7c2d12'],
                                },
                            ],
                        },
                        options: {
                            plugins: { legend: { display: false } },
                            responsive: true,
                            maintainAspectRatio: false,
                        },
                    });
                    const top5 = (d.suppliers || []).slice(0, 5);
                    if (tChart) tChart.destroy();
                    tChart = new Chart(document.getElementById('topChart'), {
                        type: 'bar',
                        data: {
                            labels: top5.map((s) => s.name),
                            datasets: [
                                {
                                    data: top5.map((s) => s.total),
                                    backgroundColor: '#7266ba',
                                },
                            ],
                        },
                        options: {
                            indexAxis: 'y',
                            plugins: { legend: { display: false } },
                            responsive: true,
                            maintainAspectRatio: false,
                        },
                    });
                }
                document.getElementById('btnLoad').onclick = load;
                document.getElementById('btnExport').onclick = async () => {
                    if (!currentData || !window.Web2Export) return;
                    await Web2Export.toExcel(
                        (currentData.suppliers || []).map((s) => ({
                            NCC: s.name,
                            '0-30': s.b0_30,
                            '31-60': s.b31_60,
                            '61-90': s.b61_90,
                            '>90': s.b90_plus,
                            Tổng: s.total,
                        })),
                        {
                            filename:
                                'supplier-aging-' +
                                (document.getElementById('refDate').value || 'today') +
                                '.xlsx',
                            sheetName: 'Aging',
                        }
                    );
                };
                function esc(s) {
                    const d = document.createElement('div');
                    d.textContent = String(s ?? '');
                    return d.innerHTML;
                }
                document.addEventListener('DOMContentLoaded', () => {
                    document.getElementById('refDate').value = new Date()
                        .toISOString()
                        .slice(0, 10);
                    if (window.Web2Sidebar)
                        Web2Sidebar.mount('#web2Aside', { activeRoute: 'supplier-aging' });
                    load();
                });
            })();
        </script>
    </body>
</html>
