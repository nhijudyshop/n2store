<!-- #Note: WEB2.0 module. F11 — Inventory Forecasting. -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Dự báo tồn kho - WEB 2.0</title>
        <meta name="web2-db" content="both" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../shared/tpos-sidebar.css?v=20260522f" />
        <link rel="stylesheet" href="../shared/web2-tpos-theme.css?v=20260522d" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <style>
            .fc-main {
                padding: 20px 28px;
            }
            .fc-tools {
                display: flex;
                gap: 10px;
                margin-bottom: 14px;
                align-items: center;
            }
            .fc-tools input {
                padding: 7px 10px;
                border: 1px solid #d1d5db;
                border-radius: 6px;
                width: 80px;
            }
            .fc-tools button {
                padding: 7px 14px;
                background: linear-gradient(135deg, #7266ba, #5e51ac);
                color: #fff;
                border: 0;
                border-radius: 6px;
                cursor: pointer;
                font-weight: 600;
            }
            .fc-tools button.alt {
                background: #14b8a6;
            }
            table.fc-tbl {
                width: 100%;
                border-collapse: collapse;
                background: #fff;
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
                font-size: 13px;
            }
            table.fc-tbl th {
                background: #f0eeee;
                padding: 9px 10px;
                text-align: left;
            }
            table.fc-tbl td {
                padding: 8px 10px;
                border-top: 1px solid #f3f4f6;
            }
            tr:nth-child(even) td {
                background: #fafafa;
            }
            .danger {
                color: #dc2626;
                font-weight: 600;
            }
            .warn {
                color: #d97706;
                font-weight: 600;
            }
            .ok {
                color: #16a34a;
                font-weight: 600;
            }
            .num {
                text-align: right;
                font-variant-numeric: tabular-nums;
            }
        </style>
    </head>
    <body class="tpos-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="web2-main fc-main">
                <h1 style="margin: 0 0 6px">Dự báo tồn kho</h1>
                <p style="color: #58666e; margin: 0 0 16px; font-size: 13px">
                    Velocity = SL bán 30 ngày qua / 30 · Days left = stock / velocity. Bấm
                    "Recompute" để chạy lại velocity từ PBH state=done.
                </p>
                <div class="fc-tools">
                    <label
                        >Hiện SP còn dưới
                        <input id="maxDays" type="number" value="14" /> ngày</label
                    >
                    <button id="btnLoad">Tải</button>
                    <button id="btnRecompute" class="alt">Recompute velocity</button>
                </div>
                <table class="fc-tbl">
                    <thead>
                        <tr>
                            <th>Mã SP</th>
                            <th>Tên</th>
                            <th class="num">Tồn</th>
                            <th class="num">Bán/ngày</th>
                            <th class="num">Còn ~ngày</th>
                        </tr>
                    </thead>
                    <tbody id="fcBody">
                        <tr>
                            <td
                                colspan="5"
                                style="text-align: center; padding: 20px; color: #94a3b8"
                            >
                                Bấm "Tải"…
                            </td>
                        </tr>
                    </tbody>
                </table>
            </main>
        </div>
        <script src="../shared/web2-auth.js?v=20260522f"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/tpos-sidebar.js?v=20260522f"></script>
        <script>
            (function () {
                const API =
                    'https://chatomni-proxy.nhijudyshop.workers.dev/api/web2/inventory-forecast';
                function esc(s) {
                    const d = document.createElement('div');
                    d.textContent = String(s ?? '');
                    return d.innerHTML;
                }
                async function load() {
                    const max = document.getElementById('maxDays').value || '14';
                    const r = await fetch(API + '/list?days_left_max=' + max, {
                        credentials: 'include',
                    });
                    const d = await r.json();
                    // Fix 2026-06-03: generic /api/web2/:entity trả `records`, route cũ
                    // trả `items`. Normalize để không crash `.length` sau tách DB web2Db.
                    const items = d.items || d.records || d.data || [];
                    const body = document.getElementById('fcBody');
                    if (!d.success || !items.length) {
                        body.innerHTML =
                            '<tr><td colspan="5" style="text-align:center;padding:20px;color:#94a3b8">Không có data — chạy Recompute trước</td></tr>';
                        return;
                    }
                    body.innerHTML = items
                        .map((it) => {
                            let cls = 'ok';
                            if (it.days_left !== null) {
                                if (it.days_left <= 3) cls = 'danger';
                                else if (it.days_left <= 7) cls = 'warn';
                            } else cls = '';
                            return `<tr>
                        <td><a href="../products/index.html?search=${esc(it.code)}">${esc(it.code)}</a></td>
                        <td>${esc(it.name)}</td>
                        <td class="num">${it.stock}</td>
                        <td class="num">${(it.daily_avg || 0).toFixed(2)}</td>
                        <td class="num ${cls}">${it.days_left === null ? '—' : it.days_left + ' ngày'}</td>
                    </tr>`;
                        })
                        .join('');
                }
                document.getElementById('btnLoad').onclick = load;
                document.getElementById('btnRecompute').onclick = async () => {
                    const btn = document.getElementById('btnRecompute');
                    btn.disabled = true;
                    btn.textContent = 'Đang tính…';
                    try {
                        const r = await fetch(API + '/recompute', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ days: 30 }),
                            credentials: 'include',
                        });
                        const d = await r.json();
                        alert(
                            d.success
                                ? `Recompute xong: ${d.upserted} SP${d.hasLines ? '' : ' (table fast_sale_order_lines chưa có — velocity = 0)'}`
                                : 'Lỗi: ' + d.error
                        );
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Recompute velocity';
                        load();
                    }
                };
                document.addEventListener('DOMContentLoaded', () => {
                    if (window.Web2Sidebar)
                        Web2Sidebar.mount('#web2Aside', { activeRoute: 'inventory-forecast' });
                    load();
                });
            })();
        </script>
    </body>
</html>
