<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
        />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Đếm SP — Web 2.0</title>

        <meta name="theme-color" content="#05070d" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Đếm SP" />
        <link rel="apple-touch-icon" href="../shared/img/logo-emblem.png" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <link rel="stylesheet" href="./product-counter.css?v=20260618b" />
    </head>
    <body>
        <div class="pc-app">
            <header class="pc-bar">
                <button class="pc-bar-btn" id="pcBack" aria-label="Quay lại">
                    <i data-lucide="chevron-left"></i>
                </button>
                <span class="pc-bar-title">Đếm SP qua camera</span>
                <button
                    class="pc-bar-btn"
                    id="pcPack"
                    aria-label="Đếm bó / pack"
                    title="Đếm bó / pack (chạm sửa tay)"
                >
                    <i data-lucide="package"></i>
                </button>
                <button class="pc-bar-btn" id="pcInfo" aria-label="Hướng dẫn">
                    <i data-lucide="info"></i>
                </button>
            </header>

            <main id="pcMount" class="pc-mount"></main>

            <!-- Bottom-sheet mẹo (toggle bằng nút ⓘ) -->
            <div class="pc-hint" id="pcHint" hidden>
                <div class="pc-hint-card">
                    <i data-lucide="lightbulb"></i>
                    <p>
                        Đưa sản phẩm vào khung hình để đếm <b>realtime ngay trên máy</b> (không gửi
                        hình đi đâu). Đếm chính xác nhất khi đặt <b>tách rời nhau</b>; cầm chồng
                        đống nhiều món sẽ kém chính xác. Số đã được làm mượt qua nhiều khung hình.
                    </p>
                    <button class="pc-hint-close" id="pcHintClose">Đã hiểu</button>
                </div>
            </div>
        </div>

        <script src="../../shared/js/notification-system.js?v=20260613a"></script>
        <script src="../shared/web2-auth.js?v=20260613guard"></script>
        <script src="../shared/web2-product-counter.js?v=20260620c"></script>
        <script src="../shared/web2-pack-counter.js?v=20260618a"></script>
        <script src="./js/product-counter.js?v=20260620c"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                // Back → quay lại trang trước, fallback Tổng quan.
                document.getElementById('pcBack').addEventListener('click', () => {
                    if (history.length > 1) history.back();
                    else location.href = '../overview/index.html';
                });
                // Toggle mẹo
                const hint = document.getElementById('pcHint');
                document
                    .getElementById('pcInfo')
                    .addEventListener('click', () => (hint.hidden = !hint.hidden));
                document
                    .getElementById('pcHintClose')
                    .addEventListener('click', () => (hint.hidden = true));
                hint.addEventListener('click', (e) => {
                    if (e.target === hint) hint.hidden = true;
                });
                // Đếm bó / pack (opencv + chạm sửa tay) — overlay riêng
                document.getElementById('pcPack').addEventListener('click', () => {
                    if (window.Web2PackCounter) {
                        window.Web2PackCounter.open({ title: 'Đếm bó / pack' });
                    } else {
                        window.notificationManager?.show?.('Chưa tải được bộ đếm bó.', 'error');
                    }
                });

                if (window.ProductCounterPage) window.ProductCounterPage.init();
                if (window.lucide) lucide.createIcons();
            });
        </script>
    </body>
</html>
