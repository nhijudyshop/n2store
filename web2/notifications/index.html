<!-- #Note: WEB2.0 module. F06 Notification Center full page. -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Thông báo - WEB 2.0</title>
        <meta name="web2-db" content="render" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260625anim" />
        <link rel="stylesheet" href="../shared/web2-notification-bell.css?v=20260522a" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <style>
            .noti-main {
                padding: 20px 28px;
            }
            .noti-toolbar {
                display: flex;
                gap: 10px;
                margin-bottom: 14px;
                align-items: center;
                flex-wrap: wrap;
            }
            .noti-toolbar select,
            .noti-toolbar button {
                padding: 7px 12px;
                border-radius: 6px;
                border: 1px solid #d1d5db;
                background: #fff;
                font-size: 13px;
                cursor: pointer;
            }
            .noti-toolbar button.primary {
                background: linear-gradient(135deg, #0068ff, #0058da);
                color: #fff;
                border: 0;
                font-weight: 600;
            }
            .noti-list {
                background: #fff;
                border-radius: 10px;
                box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
                overflow: hidden;
            }
            .noti-row {
                display: flex;
                gap: 12px;
                padding: 12px 18px;
                border-bottom: 1px solid #f3f4f6;
                text-decoration: none;
                color: #1c1f25;
            }
            .noti-row.unread {
                background: #eef5ff;
            }
            .noti-row:hover {
                background: #f9fafb;
            }
            .noti-row .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #0068ff;
                margin-top: 8px;
                flex-shrink: 0;
            }
            .noti-row.read .dot {
                background: transparent;
            }
            .noti-title {
                font-weight: 600;
                font-size: 14px;
            }
            .noti-body {
                font-size: 13px;
                color: #58666e;
                margin-top: 3px;
            }
            .noti-meta {
                font-size: 11.5px;
                color: #94a3b8;
                margin-top: 4px;
            }
            .noti-empty {
                padding: 60px 20px;
                text-align: center;
                color: #94a3b8;
            }
            /* Fix 1: mobile responsive toolbar + rows */
            @media (max-width: 640px) {
                .noti-toolbar {
                    flex-wrap: wrap;
                    gap: 6px;
                }
                .noti-toolbar select,
                .noti-toolbar button {
                    flex: 1 1 auto;
                    min-width: 120px;
                }
                .noti-row {
                    flex-wrap: wrap;
                    align-items: flex-start;
                }
                .noti-row .dot {
                    margin-top: 5px;
                }
                .noti-title,
                .noti-body,
                .noti-meta {
                    word-break: break-word;
                    width: 100%;
                }
            }
        </style>
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="web2-main noti-main">
                <h1 style="margin: 0 0 6px; font-size: 22px">Trung tâm thông báo</h1>
                <p style="color: #58666e; margin: 0 0 18px; font-size: 13px">
                    Toàn bộ cảnh báo Web 2.0 — PBH cần xác nhận, hàng sắp hết, ví âm, SePay pending.
                </p>
                <div class="noti-toolbar">
                    <select id="filterUnread">
                        <option value="0">Tất cả</option>
                        <option value="1">Chưa đọc</option>
                    </select>
                    <button id="btnScan" title="Quét lại từ DB ngay">Quét noti mới</button>
                    <button id="btnMarkAll" class="primary">Đánh dấu tất cả đã đọc</button>
                </div>
                <div class="noti-list" id="notiList">
                    <div class="noti-empty">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="36"
                            height="36"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#cbd5e1"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            style="margin-bottom: 10px"
                        >
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                            <path d="M18.63 13A17.89 17.89 0 0 1 18 8" />
                            <path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14" />
                            <path d="M18 8a6 6 0 0 0-9.33-5" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                        <div>Đang tải thông báo…</div>
                    </div>
                </div>
            </main>
        </div>
        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <script src="../shared/web2-sse-topics.js?v=20260522a"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/web2-sidebar.js?v=20260629d"></script>
        <script>
            (function () {
                const API = 'https://chatomni-proxy.nhijudyshop.workers.dev/api/web2/notifications';
                // ENFORCE-PREP (2026-06-12): gắn x-web2-token cho /api/web2/notifications/* (soft-gate → WEB2_AUTH_ENFORCE=1)
                function AUTHH(extra) {
                    if (window.Web2Auth?.authHeaders) return window.Web2Auth.authHeaders(extra);
                    try {
                        const t = JSON.parse(localStorage.getItem('web2_auth'))?.token;
                        return t ? { ...(extra || {}), 'x-web2-token': t } : { ...(extra || {}) };
                    } catch {
                        return { ...(extra || {}) };
                    }
                }
                let unreadOnly = false;
                function _skelRows() {
                    return ['80%', '65%', '72%']
                        .map(
                            (w) => `
                        <div class="noti-row" style="gap:12px;align-items:center">
                            <span class="w2-skel" style="width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>
                            <div style="flex:1">
                                <span class="w2-skel" style="display:block;height:13px;border-radius:4px;width:${w};margin-bottom:6px"></span>
                                <span class="w2-skel" style="display:block;height:10px;border-radius:4px;width:40%"></span>
                            </div>
                        </div>`
                        )
                        .join('');
                }
                async function load() {
                    const list = document.getElementById('notiList');
                    list.innerHTML = _skelRows();
                    let d;
                    try {
                        const r = await fetch(
                            API + '/list?limit=100&unreadOnly=' + (unreadOnly ? '1' : '0'),
                            {
                                credentials: 'include',
                                headers: AUTHH(), // ENFORCE-PREP (2026-06-12)
                            }
                        );
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        d = await r.json();
                    } catch (err) {
                        list.innerHTML = `<div class="noti-empty">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fca5a5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:8px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            <div style="margin-bottom:8px">Không tải được thông báo</div>
                            <button onclick="load()" style="padding:5px 14px;border-radius:6px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:13px">Thử lại</button>
                        </div>`;
                        window.notificationManager?.show('Không tải được thông báo', 'error');
                        return;
                    }
                    // Fix 2026-06-03: route generic /api/web2/:entity trả mảng ở field
                    // `records`, route dedicated cũ trả `items`. Normalize cả 2 + `data`
                    // để không crash `.length` khi shape đổi sau tách DB web2Db.
                    const items = d.items || d.records || d.data || [];
                    window.Web2NotificationsData = items; // expose full cho widget AI (Web2AiPageRegistry)
                    if (!d.success || !items.length) {
                        list.innerHTML = `<div class="noti-empty">
                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:10px"><path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0 1 18 8"/><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 0 0-9.33-5"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            <div>Không có thông báo</div>
                        </div>`;
                        return;
                    }
                    list.innerHTML = items
                        .map((it) => {
                            const cls = it.read_at ? 'read' : 'unread';
                            const meta = new Date(it.created_at).toLocaleString('vi-VN');
                            return `<a class="noti-row ${cls}" href="${escAttr(safeUrl(it.url))}" data-id="${it.id}">
                            <span class="dot"></span>
                            <div>
                                <div class="noti-title">${esc(it.title)}</div>
                                ${it.body ? `<div class="noti-body">${esc(it.body)}</div>` : ''}
                                <div class="noti-meta">${esc(meta)} · ${esc(it.severity || 'info')}</div>
                            </div>
                        </a>`;
                        })
                        .join('');
                    list.querySelectorAll('.noti-row').forEach((el) => {
                        el.onclick = () => {
                            const id = el.getAttribute('data-id');
                            // UI-first: mark read style NGAY, POST background
                            const prevClass = el.className;
                            if (window.Web2Optimistic?.run) {
                                Web2Optimistic.run({
                                    snapshot: () => prevClass,
                                    apply: () => {
                                        el.classList.remove('unread');
                                        el.classList.add('read');
                                    },
                                    run: () =>
                                        fetch(API + '/' + id + '/read', {
                                            method: 'POST',
                                            credentials: 'include',
                                            headers: AUTHH(), // ENFORCE-PREP (2026-06-12)
                                        }),
                                    rollback: (cls) => {
                                        el.className = cls;
                                    },
                                    errLabel: 'mark đã đọc',
                                });
                            } else {
                                fetch(API + '/' + id + '/read', {
                                    method: 'POST',
                                    credentials: 'include',
                                    headers: AUTHH(), // ENFORCE-PREP (2026-06-12)
                                });
                            }
                        };
                    });
                }
                document.getElementById('filterUnread').onchange = (e) => {
                    unreadOnly = e.target.value === '1';
                    load();
                };
                document.getElementById('btnMarkAll').onclick = () => {
                    // UI-first: tất cả rows mark read style NGAY, reload sau background
                    const rows = document.querySelectorAll('.noti-row.unread');
                    const prevCount = rows.length;
                    if (window.Web2Optimistic?.run && prevCount > 0) {
                        Web2Optimistic.run({
                            apply: () => {
                                rows.forEach((r) => {
                                    r.classList.remove('unread');
                                    r.classList.add('read');
                                });
                            },
                            run: async () => {
                                const r = await fetch(API + '/mark-all-read', {
                                    method: 'POST',
                                    credentials: 'include',
                                    headers: AUTHH(), // ENFORCE-PREP (2026-06-12)
                                });
                                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                            },
                            onSuccess: () => load(),
                            rollback: () => {
                                rows.forEach((r) => {
                                    r.classList.add('unread');
                                    r.classList.remove('read');
                                });
                            },
                            successMsg: `Đã đánh dấu đọc ${prevCount} thông báo`,
                            errLabel: 'mark all read',
                        });
                    } else {
                        (async () => {
                            await fetch(API + '/mark-all-read', {
                                method: 'POST',
                                credentials: 'include',
                                headers: AUTHH(), // ENFORCE-PREP (2026-06-12)
                            });
                            load();
                        })();
                    }
                };
                document.getElementById('btnScan').onclick = async () => {
                    const btn = document.getElementById('btnScan');
                    btn.disabled = true;
                    btn.textContent = 'Đang quét…';
                    try {
                        // ENFORCE-PREP (2026-06-12)
                        await fetch(API + '/scan', { credentials: 'include', headers: AUTHH() });
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Quét noti mới';
                        load();
                    }
                };
                function esc(s) {
                    const d = document.createElement('div');
                    d.textContent = String(s ?? '');
                    return d.innerHTML;
                }
                function escAttr(s) {
                    return String(s ?? '').replace(
                        /[&<>"']/g,
                        (c) =>
                            ({
                                '&': '&amp;',
                                '<': '&lt;',
                                '>': '&gt;',
                                '"': '&quot;',
                                "'": '&#39;',
                            })[c]
                    );
                }
                // S7 fix 2026-06-11: chặn javascript:/data: URL từ it.url —
                // chỉ cho http(s), protocol-relative, path tuyệt đối, path
                // tương đối ../, fragment. (Server-side validation là lớp
                // chính; đây là defense-in-depth.)
                function safeUrl(u) {
                    const s = String(u ?? '').trim();
                    return /^(https?:)?\/\/|^\/|^\.\.\/|^#/.test(s) ? s : '#';
                }
                document.addEventListener('DOMContentLoaded', () => {
                    if (window.Web2Sidebar)
                        Web2Sidebar.mount('#web2Aside', { activeRoute: 'notifications' });
                    load();
                    if (window.Web2SSE) {
                        // Debounce 500ms — /scan tạo nhiều noti liên tiếp, gom burst
                        // để không reload N lần.
                        let _sseT = null;
                        Web2SSE.subscribe('web2:notifications', () => {
                            clearTimeout(_sseT);
                            _sseT = setTimeout(load, 500);
                        });
                    }
                });
            })();
        </script>
    </body>
</html>
