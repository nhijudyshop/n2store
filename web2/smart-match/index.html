<!-- #Note: WEB2.0 module. F09 — Smart Match SePay → Order preview & confirm. -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Smart Match SePay - WEB 2.0</title>
        <meta name="web2-db" content="render" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../shared/tpos-sidebar.css?v=20260522f" />
        <link rel="stylesheet" href="../shared/web2-tpos-theme.css?v=20260522d" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <style>
            .sm-main {
                padding: 20px 28px;
            }
            .sm-tools {
                display: flex;
                gap: 10px;
                margin-bottom: 14px;
                align-items: center;
                flex-wrap: wrap;
            }
            .sm-tools input {
                padding: 7px 10px;
                border: 1px solid #d1d5db;
                border-radius: 6px;
                width: 200px;
            }
            .sm-tools button {
                padding: 7px 14px;
                background: linear-gradient(135deg, #7266ba, #5e51ac);
                color: #fff;
                border: 0;
                border-radius: 6px;
                cursor: pointer;
                font-weight: 600;
            }
            .sm-tx {
                background: #fff;
                padding: 14px 18px;
                border-radius: 10px;
                box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
                margin-bottom: 14px;
                border-left: 4px solid #14b8a6;
            }
            .sm-suggestions {
                display: grid;
                gap: 10px;
            }
            .sm-sugg {
                padding: 12px 14px;
                background: #fff;
                border-radius: 10px;
                box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
                display: flex;
                gap: 12px;
                align-items: center;
            }
            .sm-score {
                width: 50px;
                text-align: center;
                font-size: 22px;
                font-weight: 700;
                color: #16a34a;
            }
            .sm-score.med {
                color: #d97706;
            }
            .sm-info {
                flex: 1;
                font-size: 13px;
            }
            .sm-info strong {
                font-size: 14px;
            }
            .sm-info code {
                font-size: 11px;
                padding: 1px 5px;
                background: #f3f4f6;
                border-radius: 3px;
            }
            .sm-info .reasons {
                color: #58666e;
                margin-top: 4px;
                font-size: 11.5px;
            }
            .sm-confirm {
                padding: 7px 14px;
                background: #16a34a;
                color: #fff;
                border: 0;
                border-radius: 6px;
                cursor: pointer;
                font-weight: 600;
            }
        </style>
    </head>
    <body class="tpos-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="web2-main sm-main">
                <h1 style="margin: 0 0 6px">Smart Match SePay → Đơn hàng</h1>
                <p style="color: #58666e; margin: 0 0 16px; font-size: 13px">
                    Nhập ID giao dịch SePay → gợi ý top 3 đơn match theo amount + SĐT + tên + thời
                    gian.
                </p>
                <div class="sm-tools">
                    <input id="txId" placeholder="ID giao dịch (ví dụ 123456)" />
                    <button id="btnSuggest">Gợi ý match</button>
                </div>
                <div id="smOutput"></div>
            </main>
        </div>
        <script src="../shared/web2-auth.js?v=20260522f"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/tpos-sidebar.js?v=20260522f"></script>
        <script>
            (function () {
                const API = 'https://chatomni-proxy.nhijudyshop.workers.dev/api/web2/smart-match';
                // Phase 6: web2 balance-history (web2Db) — KHÔNG đụng /api/v2 Web 1.0
                const BHAPI =
                    'https://chatomni-proxy.nhijudyshop.workers.dev/api/web2/balance-history';
                function esc(s) {
                    const d = document.createElement('div');
                    d.textContent = String(s ?? '');
                    return d.innerHTML;
                }
                function fmt(n) {
                    return Number(n || 0).toLocaleString('vi-VN');
                }
                async function suggest() {
                    const id = document.getElementById('txId').value.trim();
                    if (!id) return;
                    const r = await fetch(API + '/' + encodeURIComponent(id), {
                        credentials: 'include',
                    });
                    const d = await r.json();
                    const out = document.getElementById('smOutput');
                    if (!d.success) {
                        out.innerHTML =
                            '<div style="padding: 20px; color:#dc2626">' +
                            esc(d.error || 'Lỗi') +
                            '</div>';
                        return;
                    }
                    const tx = d.tx;
                    let html = `<div class="sm-tx">
                    <strong>GD #${esc(tx.id)}</strong> · ${fmt(tx.amount)}đ<br/>
                    <span style="color:#58666e">${esc(tx.description || tx.content || '—')}</span><br/>
                    <span style="font-size: 11px; color: #94a3b8">${esc(new Date(tx.transaction_date).toLocaleString('vi-VN'))}</span>
                </div>`;
                    if (!d.suggestions || !d.suggestions.length) {
                        html +=
                            '<div style="padding:16px; color:#94a3b8">Không tìm được đơn match (score &lt; 30)</div>';
                    } else {
                        html +=
                            '<h3 style="margin: 0 0 10px; font-size: 14px">Top ' +
                            d.suggestions.length +
                            ' gợi ý:</h3>';
                        html += '<div class="sm-suggestions">';
                        for (const s of d.suggestions) {
                            const scoreClass = s.score >= 80 ? '' : 'med';
                            html += `<div class="sm-sugg">
                            <div class="sm-score ${scoreClass}">${s.score}</div>
                            <div class="sm-info">
                                <strong>PBH ${esc(s.candidate.number)}</strong> — ${esc(s.candidate.customer_name || '')}<br/>
                                <code>${esc(s.candidate.customer_phone || '')}</code> · ${fmt(s.candidate.amount_total)}đ ·
                                ${esc(new Date(s.candidate.created_at).toLocaleString('vi-VN'))}
                                <div class="reasons">Lý do: ${s.reasons.join(' · ')}</div>
                            </div>
                            <button class="sm-confirm" data-pbh="${esc(s.candidate.number)}" data-phone="${esc(s.candidate.customer_phone || '')}">Link</button>
                        </div>`;
                        }
                        html += '</div>';
                    }
                    out.innerHTML = html;
                    out.querySelectorAll('.sm-confirm').forEach((btn) => {
                        btn.onclick = async () => {
                            const phone = btn.dataset.phone;
                            const pbh = btn.dataset.pbh;
                            if (!phone) return alert('Đơn không có SĐT');
                            if (!confirm('Link GD #' + id + ' tới PBH ' + pbh + '?')) return;
                            // web2 endpoint: PATCH /:id/link {phone} (gán SĐT + cộng ví web2Db)
                            const r = await fetch(BHAPI + '/' + id + '/link', {
                                method: 'PATCH',
                                headers: { 'Content-Type': 'application/json' },
                                credentials: 'include',
                                body: JSON.stringify({
                                    phone: phone,
                                    pbh_number: pbh,
                                    // Audit: tên staff đối soát (qua smart-match) → performed_by
                                    verifiedBy:
                                        (window.Web2UserInfo?.get?.()?.userName ||
                                            window.Web2UserInfo?.label?.() ||
                                            'staff') + ' (smart-match)',
                                }),
                            });
                            const d = await r.json();
                            alert(d.success ? 'Link thành công' : 'Lỗi: ' + (d.error || ''));
                        };
                    });
                }
                document.getElementById('btnSuggest').onclick = suggest;
                document.addEventListener('DOMContentLoaded', () => {
                    if (window.Web2Sidebar)
                        Web2Sidebar.mount('#web2Aside', { activeRoute: 'smart-match' });
                });
            })();
        </script>
    </body>
</html>
