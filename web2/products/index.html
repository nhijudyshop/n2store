<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Kho Sản Phẩm - WEB 2.0</title>
        <meta name="web2-db" content="both" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
            rel="stylesheet"
        />

        <!-- Share CSS with native-orders cho consistency, plus local overrides -->
        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-effects.css?v=20260622tag" />
        <link rel="stylesheet" href="../shared/web2-base.css?v=20260623fix" />
        <link rel="stylesheet" href="../shared/web2-components.css?v=20260613z" />
        <link rel="stylesheet" href="../shared/web2-product-group.css?v=20260628p9" />
        <link rel="stylesheet" href="css/web2-products.css?v=20260628p9" />
        <!-- Import dữ liệu CSV/JSON (NGUỒN CHUNG Web2Import) -->
        <link rel="stylesheet" href="../shared/web2-import.css?v=20260614imp" />
        <!-- Print barcode dialog CSS (WEB2.0 module) -->
        <link rel="stylesheet" href="css/web2-products-print.css?v=20260525l" />
        <!-- Drawer chi tiết SP (WEB2.0 module) -->
        <link rel="stylesheet" href="css/web2-product-detail.css?v=20260613a" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>

        <script src="../../shared/js/shared-auth-manager.js?v=20260521c"></script>
        <script src="../../shared/js/notification-system.js?v=20260521c"></script>
        <link rel="stylesheet" href="../../web2/shared/web2-theme.css?v=20260625anim" />
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content" style="overflow: auto; height: 100vh">
                <!-- Page head — title + counters + primary action (Thêm SP) -->
                <header class="page-head-mini">
                    <h1 class="page-head-title">
                        <i data-lucide="box"></i>
                        Kho Sản Phẩm
                    </h1>
                    <div class="page-head-counters">
                        <span class="counter-pill" id="totalCounter">— sản phẩm</span>
                        <span class="source-pill">Kho sản phẩm</span>
                        <button
                            class="btn-ghost page-head-action"
                            id="btnImportProducts"
                            type="button"
                            title="Nhập SP hàng loạt từ file CSV / JSON"
                        >
                            <i data-lucide="upload"></i> Nhập
                        </button>
                        <button
                            class="btn-ghost page-head-action"
                            id="btnSampleProducts"
                            type="button"
                            title="Tải file CSV mẫu để xem cấu trúc"
                        >
                            <i data-lucide="download"></i> Tải mẫu
                        </button>
                        <button
                            class="btn-ghost page-head-action"
                            id="btnReprintUnits"
                            type="button"
                            title="In lại tem đơn vị — chọn mã đơn vị (qr1..qrN) của 1 SP rồi in"
                        >
                            <i data-lucide="printer"></i> In lại tem
                        </button>
                        <button
                            class="btn-primary page-head-action"
                            id="btnCreateProduct"
                            type="button"
                        >
                            <i data-lucide="plus"></i> Thêm SP
                        </button>
                    </div>
                </header>

                <!-- Toolbar / filters — chip filters only, action buttons removed -->
                <section class="search-section">
                    <div class="filter-row">
                        <div class="search-wrapper">
                            <i data-lucide="search" class="search-icon"></i>
                            <input
                                type="text"
                                class="search-input"
                                id="filterSearch"
                                placeholder="Tìm theo mã SP hoặc tên..."
                                autocomplete="off"
                            />
                            <button class="search-clear" id="filterSearchClear" title="Xóa">
                                <i data-lucide="x"></i>
                            </button>
                        </div>

                        <div class="filter-chip-group">
                            <label class="chip-label chip-label-primary">
                                <i data-lucide="eye"></i> Hiển thị:
                            </label>
                            <div class="chip-select-wrapper">
                                <select id="filterActive" class="chip-select chip-select-primary">
                                    <option value="true" selected>Đang bán</option>
                                    <option value="het_hang">Hết hàng</option>
                                    <option value="all">Tất cả</option>
                                </select>
                                <i data-lucide="chevron-down" class="chip-caret"></i>
                            </div>
                        </div>

                        <div class="filter-chip-group">
                            <label class="chip-label chip-label-muted">
                                <i data-lucide="list"></i> Limit:
                            </label>
                            <div class="chip-select-wrapper">
                                <select id="filterLimit" class="chip-select chip-select-muted">
                                    <option value="100">100 / trang</option>
                                    <option value="200" selected>200 / trang</option>
                                    <option value="500">500 / trang</option>
                                    <option value="1000">1000 / trang</option>
                                </select>
                                <i data-lucide="chevron-down" class="chip-caret"></i>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Bulk action bar — chỉ hiện khi >0 SP đã chọn.
                     Đặt NGAY TRƯỚC table (sticky top trong section) thay vì
                     fixed-bottom để user thấy ngay khi tick checkbox, không
                     bị che bởi notification toast / scroll viewport. -->
                <div
                    class="w2p-bulk-bar"
                    id="w2pBulkBar"
                    hidden
                    role="region"
                    aria-label="Thao tác hàng loạt"
                >
                    <div class="w2p-bulk-info">
                        <i data-lucide="check-square"></i>
                        <strong id="w2pBulkCount">0</strong>
                        <span>SP đã chọn</span>
                    </div>
                    <div class="w2p-bulk-actions">
                        <button
                            type="button"
                            class="w2p-bulk-btn-secondary"
                            id="w2pBulkClear"
                            title="Bỏ chọn tất cả"
                        >
                            <i data-lucide="x"></i>
                            Bỏ chọn
                        </button>
                        <button
                            type="button"
                            class="w2p-bulk-btn-primary"
                            id="w2pBulkPrint"
                            title="In tem mã vạch cho các SP đã chọn"
                        >
                            <i data-lucide="printer"></i>
                            In tem (<span id="w2pBulkPrintCount">0</span>)
                        </button>
                    </div>
                </div>

                <!-- Table -->
                <section class="table-section">
                    <div class="table-scroll">
                        <table class="data-table" id="productsTable">
                            <thead>
                                <tr>
                                    <th style="width: 36px" class="select-cell">
                                        <input
                                            type="checkbox"
                                            id="selectAllProducts"
                                            class="w2p-checkbox"
                                            title="Chọn tất cả SP trên trang"
                                        />
                                    </th>
                                    <th style="width: 48px">#</th>
                                    <th style="width: 72px">ẢNH</th>
                                    <th style="width: 140px">MÃ SP</th>
                                    <th>TÊN SẢN PHẨM</th>
                                    <th style="width: 180px">BIẾN THỂ / TỒN KHO</th>
                                    <th style="width: 120px">GIÁ MUA</th>
                                    <th style="width: 120px">GIÁ BÁN</th>
                                    <th style="width: 110px">ĐỊA DANH</th>
                                    <th>GHI CHÚ</th>
                                    <th style="width: 110px">TRẠNG THÁI</th>
                                    <th style="width: 140px">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody id="productsTbody">
                                <tr>
                                    <td colspan="12" class="loading-row">
                                        <div class="spinner"></div>
                                        Đang tải dữ liệu...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination" id="pagination"></div>
                </section>
            </main>
        </div>
        <!-- /.web2-shell -->

        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/web2-number-input.js?v=20260626a"></script>
        <script src="../shared/web2-skeleton.js?v=20260625a"></script>
        <script src="../shared/web2-sidebar.js?v=20260629b"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => Web2Sidebar.mount('#web2Aside'));
        </script>

        <!-- Create/Edit Modal -->
        <div class="modal-overlay" id="productModal">
            <div class="modal-content" style="min-width: 520px; max-width: 640px">
                <div class="modal-header">
                    <h3 id="productModalTitle">
                        <i data-lucide="box"></i>
                        <span>Thêm sản phẩm</span>
                    </h3>
                    <button class="btn-icon-round" id="btnCloseProductModal">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="field-row">
                        <label
                            >NCC <span style="color: #ef4444">*</span>
                            <span style="font-weight: 400; color: #64748b; font-size: 11px"
                                >(từ Ví NCC)</span
                            ></label
                        >
                        <select id="pmSupplier">
                            <option value="">— Chọn NCC —</option>
                        </select>
                    </div>
                    <div class="field-row">
                        <label>Tên sản phẩm *</label>
                        <input id="pmName" placeholder="VD: ÁO ĐỎ SIZE 3" autocomplete="off" />
                    </div>
                    <div class="field-row">
                        <label>Mã SP *</label>
                        <div style="display: flex; gap: 6px; align-items: stretch">
                            <input
                                id="pmCode"
                                placeholder="VD: SP-001"
                                autocomplete="off"
                                style="flex: 1"
                            />
                            <button
                                type="button"
                                id="pmSuggestCode"
                                class="btn-ghost"
                                style="
                                    white-space: nowrap;
                                    padding: 4px 10px;
                                    font-size: 12px;
                                    border: 1px solid #cbd5e1;
                                    border-radius: 6px;
                                    background: #f1f5f9;
                                    cursor: pointer;
                                "
                                title="Sinh mã tự động từ NCC + Tên SP + Biến thể"
                            >
                                <i data-lucide="sparkles" style="width: 14px; height: 14px"></i>
                                Sinh mã
                            </button>
                        </div>
                        <div
                            id="pmCodeHint"
                            style="
                                font-size: 11px;
                                color: #64748b;
                                margin-top: 4px;
                                min-height: 14px;
                            "
                        ></div>
                    </div>
                    <div class="field-row">
                        <label>
                            Loại sản phẩm — chọn 1 hoặc nhiều (bộ Áo + Quần)
                            <a
                                href="../product-types/index.html"
                                target="_blank"
                                class="field-aux-link"
                                title="Quản lý loại SP (mở tab mới)"
                            >
                                <i data-lucide="shirt"></i> Loại SP
                            </a>
                        </label>
                        <div class="pm-type-chips" id="pmTypeChips"></div>
                    </div>
                    <div class="field-row">
                        <label>
                            Biến thể — chọn Màu + Size cùng lúc
                            <a
                                href="../variants/index.html"
                                target="_blank"
                                class="field-aux-link"
                                title="Quản lý kho biến thể (mở tab mới)"
                            >
                                <i data-lucide="layers"></i> Kho Biến Thể
                            </a>
                        </label>
                        <div class="field-row-grid field-row-grid-2">
                            <div class="variant-picker-wrap">
                                <input
                                    id="pmVariantColor"
                                    placeholder="🎨 Màu — gõ chọn · Đen / Đỏ = nhiều SP"
                                    autocomplete="off"
                                />
                                <div
                                    class="variant-suggest-dropdown"
                                    id="pmVariantColorSuggest"
                                    hidden
                                ></div>
                            </div>
                            <div class="variant-picker-wrap">
                                <input
                                    id="pmVariantSize"
                                    placeholder="📏 Size — gõ chọn · S / M / L = nhiều SP"
                                    autocomplete="off"
                                />
                                <div
                                    class="variant-suggest-dropdown"
                                    id="pmVariantSizeSuggest"
                                    hidden
                                ></div>
                            </div>
                        </div>
                        <div class="variant-picker-hint" id="pmVariantHint"></div>
                        <!-- Nhập nhiều: Màu "Đen / Đỏ" × Size "S / M" → preview N SP tạo cùng lúc -->
                        <div class="variant-multi-preview" id="pmVariantMultiPreview" hidden></div>
                    </div>
                    <div class="field-row-grid field-row-grid-3">
                        <div class="field-row">
                            <label>Giá Mua (đ)</label>
                            <input
                                id="pmPriceBuy"
                                type="text"
                                inputmode="numeric"
                                data-w2num
                                value="0"
                            />
                        </div>
                        <div class="field-row">
                            <label>Giá Bán (đ)</label>
                            <input
                                id="pmPriceSell"
                                type="text"
                                inputmode="numeric"
                                data-w2num
                                value="0"
                            />
                        </div>
                        <div class="field-row">
                            <label>Tồn kho</label>
                            <input id="pmStock" type="number" step="1" value="0" />
                        </div>
                    </div>
                    <div class="field-row">
                        <label>Ảnh sản phẩm</label>
                        <div class="pm-image-drop" id="pmImageDrop" tabindex="0">
                            <div class="w2fx-drop-hint">
                                <i data-lucide="clipboard-paste"></i>
                                <span
                                    >Đưa chuột vào đây → Ctrl+V để dán ảnh · Kéo thả file · hoặc dán
                                    URL bên dưới</span
                                >
                            </div>
                            <input
                                id="pmImage"
                                type="url"
                                placeholder="https://... (hoặc Ctrl+V vào khung này)"
                                autocomplete="off"
                            />
                            <div class="image-preview" id="pmImagePreview" style="display: none">
                                <img id="pmImagePreviewImg" />
                            </div>
                        </div>
                    </div>
                    <div class="field-row">
                        <label>Ghi chú</label>
                        <textarea
                            id="pmNote"
                            placeholder="Ghi chú nội bộ, tag nhập hàng (HÀ NỘI, HƯƠNG CHÂU)..."
                        ></textarea>
                    </div>
                    <div class="field-row">
                        <label>Trạng thái</label>
                        <select id="pmIsActive">
                            <option value="true" selected>Đang bán</option>
                            <option value="false">Tạm dừng</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-ghost" id="btnCancelProduct">Hủy</button>
                    <button class="btn-primary" id="btnSaveProduct">
                        <i data-lucide="save"></i> Lưu
                    </button>
                </div>
            </div>
        </div>

        <script src="../shared/web2-effects.js?v=20260521c"></script>
        <script src="../shared/web2-product-code.js?v=20260521c"></script>
        <script src="../shared/web2-products-api.js?v=20260620a"></script>
        <script src="../variants/js/web2-variants-api.js?v=20260615auth"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <script src="../shared/web2-products-cache.js?v=20260623sc"></script>
        <script src="../shared/web2-variants-cache.js?v=20260623sc"></script>
        <!-- Loại sản phẩm (Áo/Quần/Đầm) — chọn loại khi tạo SP, lưu vào category. Shared. -->
        <script src="../product-types/js/web2-product-types-api.js?v=20260626a"></script>
        <script src="../shared/web2-product-types-cache.js?v=20260626a"></script>
        <!-- Nhập nhanh nhiều biến thể (Màu "Đen / Đỏ" × Size "S / M" → N SP) — shared web2 -->
        <script src="../shared/web2-variant-multi.js?v=20260616c"></script>
        <script src="../shared/web2-so-order-reader.js?v=20260613a"></script>
        <script src="../shared/web2-suppliers-cache.js?v=20260623sc"></script>
        <script src="../shared/web2-deeplink.js?v=20260614dl"></script>
        <!-- Import dữ liệu CSV/JSON + MÃ N2 (NGUỒN CHUNG Web2Import) -->
        <script src="../shared/web2-import.js?v=20260626a"></script>
        <!-- [SPLIT 2026-06-18] web2-products-app.js (2010 dòng) → 6 module. Thứ tự BẮT BUỘC:
             state → render → modal → actions → filters → app (orchestrator LAST). -->
        <!-- Gom SP CHA-CON (P4): render.js dùng để gom nhiều biến thể thành 1 dòng cha -->
        <script src="../shared/web2-variant-group.js?v=20260627tv12"></script>
        <!-- Module CHUNG SP cha-con (gom + mã cha + bảng con drawer) cho mọi trang SP -->
        <script src="../shared/web2-product-group.js?v=20260628p9"></script>
        <script src="js/web2-products-state.js?v=20260628hh"></script>
        <script src="js/web2-products-render.js?v=20260628ii"></script>
        <script src="js/web2-products-modal.js?v=20260626a"></script>
        <script src="js/web2-products-variant-picker.js?v=20260626b"></script>
        <script src="js/web2-products-actions.js?v=20260628a"></script>
        <script src="js/web2-products-filters.js?v=20260628hh"></script>
        <script src="js/web2-products-app.js?v=20260627p4"></script>
        <!-- Máy in: in tem thẳng ra máy IP (role 'label') nếu đã cấu hình -->
        <script src="../shared/web2-printer.js?v=20260623role"></script>
        <!-- NGUỒN CHUNG sinh QR "trang trí" đen trắng (tem SP + PBH) -->
        <script src="../shared/web2-qr.js?v=20260625qr"></script>
        <!-- Print barcode (WEB2.0 module — mirror WEB2 100%, dùng WEB2 public barcode image endpoint) -->
        <!-- [SPLIT 2026-06-18] tách 1293 dòng → 5 module: utils → barcode → render → modal → entry. Thứ tự BẮT BUỘC. -->
        <script src="js/web2-products-print-utils.js?v=20260623fix"></script>
        <script src="js/web2-products-print-barcode.js?v=20260618w2"></script>
        <script src="js/web2-products-print-render.js?v=20260628b"></script>
        <script src="js/web2-products-print-modal.js?v=20260628b"></script>
        <script src="js/web2-products-print.js?v=20260618w2"></script>
        <!-- Drawer chi tiết SP (WEB2.0 module — bấm row → tabs NCC/đơn hàng/lịch sử/sửa) -->
        <script src="js/web2-product-detail.js?v=20260628hh"></script>
        <!-- In lại tem ĐƠN VỊ (per-unit reprint) — dùng Web2ProductsPrint + API web2-product-units -->
        <script src="../shared/web2-unit-reprint.js?v=20260628a"></script>
    </body>
</html>
