<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Kho Sản Phẩm - WEB 2.0</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
            rel="stylesheet"
        />

        <!-- Share CSS with native-orders cho consistency, plus local overrides -->
        <link rel="stylesheet" href="../shared/tpos-sidebar.css?v=20260518e" />
        <link rel="stylesheet" href="../shared/web2-effects.css?v=20260517b" />
        <link rel="stylesheet" href="../../native-orders/css/native-orders.css?v=20260425h" />
        <link rel="stylesheet" href="../../native-orders/css/tpos-theme.css?v=20260425h" />
        <link rel="stylesheet" href="css/web2-products.css?v=20260518b" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>

        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

        <script src="../../shared/js/firebase-config.js"></script>
        <script src="../../shared/js/shared-auth-manager.js"></script>
        <script src="../../shared/js/notification-system.js"></script>
    </head>
    <body class="tpos-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content" style="overflow: auto; height: 100vh">
                <!-- Page head — title + counters + primary action (Thêm SP) -->
                <header class="page-head-mini">
                    <h1 class="page-head-title">
                        <i data-lucide="box"></i>
                        Kho Sản Phẩm
                    </h1>
                    <div class="page-head-counters">
                        <span class="counter-pill" id="totalCounter">— sản phẩm</span>
                        <span class="source-pill">web2_products</span>
                        <button
                            class="btn-primary page-head-action"
                            id="btnCreateProduct"
                            type="button"
                        >
                            <i data-lucide="plus"></i> Thêm SP
                        </button>
                    </div>
                </header>

                <!-- Toolbar / filters — chip filters only, action buttons removed -->
                <section class="search-section">
                    <div class="filter-row">
                        <div class="search-wrapper">
                            <i data-lucide="search" class="search-icon"></i>
                            <input
                                type="text"
                                class="search-input"
                                id="filterSearch"
                                placeholder="Tìm theo mã SP hoặc tên..."
                                autocomplete="off"
                            />
                            <button class="search-clear" id="filterSearchClear" title="Xóa">
                                <i data-lucide="x"></i>
                            </button>
                        </div>

                        <div class="filter-chip-group">
                            <label class="chip-label chip-label-primary">
                                <i data-lucide="eye"></i> Hiển thị:
                            </label>
                            <div class="chip-select-wrapper">
                                <select id="filterActive" class="chip-select chip-select-primary">
                                    <option value="true">Đang bán</option>
                                    <option value="all" selected>Tất cả</option>
                                </select>
                                <i data-lucide="chevron-down" class="chip-caret"></i>
                            </div>
                        </div>

                        <div class="filter-chip-group">
                            <label class="chip-label chip-label-muted">
                                <i data-lucide="list"></i> Limit:
                            </label>
                            <div class="chip-select-wrapper">
                                <select id="filterLimit" class="chip-select chip-select-muted">
                                    <option value="100">100 / trang</option>
                                    <option value="200" selected>200 / trang</option>
                                    <option value="500">500 / trang</option>
                                    <option value="1000">1000 / trang</option>
                                </select>
                                <i data-lucide="chevron-down" class="chip-caret"></i>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Table -->
                <section class="table-section">
                    <div class="table-scroll">
                        <table class="data-table" id="productsTable">
                            <thead>
                                <tr>
                                    <th style="width: 48px">#</th>
                                    <th style="width: 72px">ẢNH</th>
                                    <th style="width: 140px">MÃ SP</th>
                                    <th>TÊN SẢN PHẨM</th>
                                    <th style="width: 160px">BIẾN THỂ</th>
                                    <th style="width: 120px">GIÁ MUA</th>
                                    <th style="width: 120px">GIÁ BÁN</th>
                                    <th style="width: 80px">TỒN KHO</th>
                                    <th>GHI CHÚ</th>
                                    <th style="width: 110px">TRẠNG THÁI</th>
                                    <th style="width: 140px">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody id="productsTbody">
                                <tr>
                                    <td colspan="11" class="loading-row">
                                        <div class="spinner"></div>
                                        Đang tải dữ liệu...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination" id="pagination"></div>
                </section>
            </main>
        </div>
        <!-- /.web2-shell -->

        <script src="../shared/tpos-sidebar.js?v=20260514f"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => Web2Sidebar.mount('#web2Aside'));
        </script>

        <!-- Create/Edit Modal -->
        <div class="modal-overlay" id="productModal">
            <div class="modal-content" style="min-width: 520px; max-width: 640px">
                <div class="modal-header">
                    <h3 id="productModalTitle">
                        <i data-lucide="box"></i>
                        <span>Thêm sản phẩm</span>
                    </h3>
                    <button class="btn-icon-round" id="btnCloseProductModal">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="field-row">
                        <label>Mã SP *</label>
                        <input id="pmCode" placeholder="VD: SP-001" autocomplete="off" />
                    </div>
                    <div class="field-row">
                        <label>Tên sản phẩm *</label>
                        <input id="pmName" placeholder="Tên hiển thị" autocomplete="off" />
                    </div>
                    <div class="field-row">
                        <label>
                            Biến thể
                            <a
                                href="../variants/index.html"
                                target="_blank"
                                class="field-aux-link"
                                title="Quản lý kho biến thể (mở tab mới)"
                            >
                                <i data-lucide="layers"></i> Kho Biến Thể
                            </a>
                        </label>
                        <div class="variant-picker-wrap">
                            <input
                                id="pmVariant"
                                placeholder="Gõ để chọn biến thể từ kho..."
                                autocomplete="off"
                            />
                            <div
                                class="variant-suggest-dropdown"
                                id="pmVariantSuggest"
                                hidden
                            ></div>
                            <div class="variant-picker-hint" id="pmVariantHint"></div>
                        </div>
                    </div>
                    <div class="field-row-grid field-row-grid-3">
                        <div class="field-row">
                            <label>Giá Mua (đ)</label>
                            <input id="pmPriceBuy" type="number" min="0" step="1000" value="0" />
                        </div>
                        <div class="field-row">
                            <label>Giá Bán (đ)</label>
                            <input id="pmPriceSell" type="number" min="0" step="1000" value="0" />
                        </div>
                        <div class="field-row">
                            <label>Tồn kho</label>
                            <input id="pmStock" type="number" step="1" value="0" />
                        </div>
                    </div>
                    <div class="field-row">
                        <label>Ảnh sản phẩm</label>
                        <div class="pm-image-drop" id="pmImageDrop" tabindex="0">
                            <div class="w2fx-drop-hint">
                                <i data-lucide="clipboard-paste"></i>
                                <span
                                    >Đưa chuột vào đây → Ctrl+V để dán ảnh · Kéo thả file · hoặc dán
                                    URL bên dưới</span
                                >
                            </div>
                            <input
                                id="pmImage"
                                type="url"
                                placeholder="https://... (hoặc Ctrl+V vào khung này)"
                                autocomplete="off"
                            />
                            <div class="image-preview" id="pmImagePreview" style="display: none">
                                <img id="pmImagePreviewImg" />
                            </div>
                        </div>
                    </div>
                    <div class="field-row">
                        <label>Ghi chú</label>
                        <textarea
                            id="pmNote"
                            placeholder="Ghi chú nội bộ, tag nhập hàng (HÀ NỘI, HƯƠNG CHÂU)..."
                        ></textarea>
                    </div>
                    <div class="field-row">
                        <label>Trạng thái</label>
                        <select id="pmIsActive">
                            <option value="true" selected>Đang bán</option>
                            <option value="false">Tạm dừng</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-ghost" id="btnCancelProduct">Hủy</button>
                    <button class="btn-primary" id="btnSaveProduct">
                        <i data-lucide="save"></i> Lưu
                    </button>
                </div>
            </div>
        </div>

        <script src="../shared/web2-effects.js?v=20260518a"></script>
        <script src="js/web2-products-api.js?v=20260518b"></script>
        <script src="../variants/js/web2-variants-api.js?v=20260517a"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260519a"></script>
        <script src="../shared/web2-products-cache.js?v=20260519a"></script>
        <script src="../shared/web2-variants-cache.js?v=20260517a"></script>
        <script src="js/web2-products-app.js?v=20260518c"></script>
    </body>
</html>
