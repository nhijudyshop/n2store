<!-- #Note: WEB2.0 module. F10 — Variants matrix UI (tạo SP × biến thể nhanh). -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Matrix biến thể - WEB 2.0</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../shared/tpos-sidebar.css?v=20260522f" />
        <link rel="stylesheet" href="../shared/web2-tpos-theme.css?v=20260522d" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <style>
            .mtx-main {
                padding: 20px 28px;
            }
            .mtx-form {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
                margin-bottom: 18px;
                max-width: 760px;
            }
            .mtx-form label {
                font-size: 12px;
                font-weight: 600;
                color: #58666e;
            }
            .mtx-form input,
            .mtx-form textarea {
                width: 100%;
                padding: 8px 10px;
                border: 1px solid #d1d5db;
                border-radius: 6px;
                font-size: 13px;
                margin-top: 4px;
            }
            .mtx-pick {
                display: flex;
                gap: 18px;
                flex-wrap: wrap;
                margin-bottom: 16px;
            }
            .mtx-pick fieldset {
                border: 1px solid #d1d5db;
                border-radius: 8px;
                padding: 10px 14px;
            }
            .mtx-pick legend {
                font-weight: 600;
                color: #58666e;
                font-size: 13px;
                padding: 0 4px;
            }
            .mtx-pick label {
                display: inline-block;
                margin: 3px 8px 3px 0;
                font-size: 13px;
            }
            .mtx-pick label input {
                vertical-align: middle;
                margin-right: 4px;
            }
            table.mtx-tbl {
                background: #fff;
                border-collapse: collapse;
                font-size: 13px;
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
            }
            table.mtx-tbl th,
            table.mtx-tbl td {
                border: 1px solid #e5e7eb;
                padding: 6px 8px;
            }
            table.mtx-tbl th {
                background: #f0eeee;
                font-weight: 600;
            }
            table.mtx-tbl input {
                width: 70px;
                padding: 4px 6px;
                border: 1px solid #d1d5db;
                border-radius: 4px;
                font-size: 12px;
            }
            .mtx-actions {
                margin-top: 18px;
            }
            .mtx-actions button {
                padding: 9px 22px;
                background: linear-gradient(135deg, #7266ba, #5e51ac);
                color: #fff;
                border: 0;
                border-radius: 6px;
                cursor: pointer;
                font-weight: 600;
            }
            .mtx-result {
                padding: 12px 14px;
                border-radius: 8px;
                margin-top: 14px;
                font-size: 13px;
            }
            .mtx-result.ok {
                background: #e3f7e8;
                color: #14532d;
            }
            .mtx-result.err {
                background: #fef2f2;
                color: #991b1b;
            }
        </style>
    </head>
    <body class="tpos-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="web2-main mtx-main">
                <h1 style="margin: 0 0 6px">Tạo SP × biến thể (matrix)</h1>
                <p style="color: #58666e; margin: 0 0 16px; font-size: 13px">
                    Nhập mã gốc + chọn nhiều size/màu → auto sinh ra matrix variant nhanh. Mã sinh:
                    <code>&lt;base_code&gt;-&lt;size&gt;-&lt;color&gt;</code>.
                </p>
                <div class="mtx-form">
                    <div>
                        <label>Mã gốc *</label>
                        <input id="baseCode" placeholder="VD: SP-001" />
                    </div>
                    <div>
                        <label>Tên SP *</label>
                        <input id="baseName" placeholder="VD: Áo thun cotton" />
                    </div>
                    <div>
                        <label>Giá mua (mặc định)</label>
                        <input id="basePriceBuy" type="number" />
                    </div>
                    <div>
                        <label>Giá bán (mặc định)</label>
                        <input id="basePriceSell" type="number" />
                    </div>
                </div>
                <div class="mtx-pick">
                    <fieldset>
                        <legend>Sizes</legend>
                        <div id="sizesList"></div>
                    </fieldset>
                    <fieldset>
                        <legend>Màu</legend>
                        <div id="colorsList"></div>
                    </fieldset>
                </div>
                <div id="matrixPreview"></div>
                <div class="mtx-actions">
                    <button id="btnBuild">Build matrix preview</button>
                    <button id="btnSubmit" style="margin-left: 8px; background: #16a34a">
                        Tạo SP &amp; biến thể
                    </button>
                </div>
                <div id="mtxResult"></div>
            </main>
        </div>
        <script src="../shared/web2-auth.js?v=20260522f"></script>
        <script src="../shared/tpos-sidebar.js?v=20260522f"></script>
        <script>
            (function () {
                const VAPI = 'https://chatomni-proxy.nhijudyshop.workers.dev/api/web2-variants';
                const PAPI = 'https://chatomni-proxy.nhijudyshop.workers.dev/api/web2-products';
                let availableSizes = [],
                    availableColors = [];
                function esc(s) {
                    const d = document.createElement('div');
                    d.textContent = String(s ?? '');
                    return d.innerHTML;
                }
                async function loadVariants() {
                    try {
                        const r = await fetch(VAPI + '/list', { credentials: 'include' });
                        const d = await r.json();
                        const items = d.items || [];
                        const sizes = items.filter((v) => /size/i.test(v.group || ''));
                        const colors = items.filter((v) => /màu|color/i.test(v.group || ''));
                        availableSizes = sizes;
                        availableColors = colors;
                        document.getElementById('sizesList').innerHTML =
                            sizes
                                .map(
                                    (s) =>
                                        `<label><input type="checkbox" value="${esc(s.short_code || s.name)}" data-name="${esc(s.name)}"/> ${esc(s.name)}</label>`
                                )
                                .join('') ||
                            '<span style="color:#94a3b8; font-size:13px">Chưa có size — tạo ở trang Biến thể trước</span>';
                        document.getElementById('colorsList').innerHTML =
                            colors
                                .map(
                                    (c) =>
                                        `<label><input type="checkbox" value="${esc(c.short_code || c.name)}" data-name="${esc(c.name)}"/> ${esc(c.name)}</label>`
                                )
                                .join('') ||
                            '<span style="color:#94a3b8; font-size:13px">Chưa có màu</span>';
                    } catch {}
                }
                function pickedList(containerId) {
                    return [...document.querySelectorAll('#' + containerId + ' input:checked')].map(
                        (cb) => ({
                            code: cb.value,
                            name: cb.dataset.name,
                        })
                    );
                }
                function buildPreview() {
                    const sizes = pickedList('sizesList');
                    const colors = pickedList('colorsList');
                    if (!sizes.length || !colors.length) {
                        document.getElementById('matrixPreview').innerHTML =
                            '<div style="color:#94a3b8">Chọn ít nhất 1 size + 1 màu</div>';
                        return;
                    }
                    const base = document.getElementById('baseCode').value.trim() || 'SP-NEW';
                    const ph = document.getElementById('basePriceSell').value || '';
                    const html = [
                        '<table class="mtx-tbl"><thead><tr><th></th>' +
                            colors.map((c) => `<th>${esc(c.name)}</th>`).join('') +
                            '</tr></thead><tbody>',
                    ];
                    for (const s of sizes) {
                        html.push('<tr><th>' + esc(s.name) + '</th>');
                        for (const c of colors) {
                            const code = `${base}-${s.code}-${c.code}`;
                            html.push(
                                `<td><code style="font-size:11px">${esc(code)}</code><br/><input type="number" placeholder="SL" data-mtx-cell value="0" data-code="${esc(code)}" data-size="${esc(s.code)}" data-color="${esc(c.code)}"/></td>`
                            );
                        }
                        html.push('</tr>');
                    }
                    html.push('</tbody></table>');
                    document.getElementById('matrixPreview').innerHTML = html.join('');
                }
                async function submit() {
                    const baseCode = document.getElementById('baseCode').value.trim();
                    const baseName = document.getElementById('baseName').value.trim();
                    if (!baseCode || !baseName) return alert('Mã gốc + tên SP bắt buộc');
                    const priceBuy = Number(document.getElementById('basePriceBuy').value) || 0;
                    const priceSell = Number(document.getElementById('basePriceSell').value) || 0;
                    const cells = [...document.querySelectorAll('[data-mtx-cell]')];
                    if (!cells.length) return alert('Build matrix trước');
                    const variants = cells.map((c) => ({
                        code: c.dataset.code,
                        name: baseName + ' ' + c.dataset.size + ' ' + c.dataset.color,
                        stock: Number(c.value) || 0,
                        price_buy: priceBuy,
                        price_sell: priceSell,
                        parent_code: baseCode,
                        variant_size: c.dataset.size,
                        variant_color: c.dataset.color,
                        active: true,
                    }));
                    const r = await fetch(PAPI + '/bulk-create-matrix', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({
                            base: {
                                code: baseCode,
                                name: baseName,
                                price_buy: priceBuy,
                                price_sell: priceSell,
                            },
                            variants,
                        }),
                    }).catch((e) => ({ ok: false, _err: e.message }));
                    const out = document.getElementById('mtxResult');
                    if (r.ok === false) {
                        out.className = 'mtx-result err';
                        out.textContent = 'Lỗi: ' + (r._err || 'request failed');
                        return;
                    }
                    const d = await r.json().catch(() => ({}));
                    if (d.success) {
                        out.className = 'mtx-result ok';
                        out.textContent = `Tạo thành công: ${d.created || variants.length + 1} SP`;
                    } else {
                        out.className = 'mtx-result err';
                        out.textContent = 'Lỗi: ' + (d.error || 'unknown');
                    }
                }
                document.getElementById('btnBuild').onclick = buildPreview;
                document.getElementById('btnSubmit').onclick = submit;
                document.addEventListener('DOMContentLoaded', () => {
                    if (window.Web2Sidebar)
                        Web2Sidebar.mount('#web2Aside', { activeRoute: 'variants-matrix' });
                    loadVariants();
                });
            })();
        </script>
    </body>
</html>
