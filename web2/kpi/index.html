<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>KPI Dashboard — WEB 2.0</title>
        <meta name="web2-db" content="render" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-components.css?v=20260613z" />
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260625anim" />
        <link rel="stylesheet" href="css/kpi.css?v=20260531a" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <script src="../../shared/js/notification-system.js?v=20260521b"></script>
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content kpi-main">
                <header class="kpi-page-head">
                    <div class="kpi-page-title">
                        <i data-lucide="trophy"></i>
                        <h1>KPI Dashboard</h1>
                    </div>
                    <div class="kpi-page-actions">
                        <select id="kpiCampaignFilter" class="kpi-select">
                            <option value="">— Chọn chiến dịch —</option>
                        </select>
                        <button class="btn btn-secondary" id="kpiRefreshBtn" type="button">
                            <i data-lucide="refresh-cw"></i>
                        </button>
                        <a class="btn btn-primary" href="assignments.html">
                            <i data-lucide="user-cog"></i> Phân công khoảng STT
                        </a>
                    </div>
                </header>

                <section class="kpi-tabs">
                    <button class="kpi-tab active" data-view="kpi" type="button">
                        <i data-lucide="trophy"></i> KPI
                    </button>
                    <button class="kpi-tab" data-view="audit" type="button">
                        <i data-lucide="history"></i> Lịch sử thao tác
                    </button>
                </section>

                <div class="kpi-content" id="kpiContent">
                    <div class="kpi-empty">
                        <i data-lucide="trophy"></i>
                        <p>Chọn chiến dịch để xem KPI nhân viên.</p>
                    </div>
                </div>
            </main>
        </div>

        <!-- MEDIUM-cleanup (2026-06-13): gỡ Firebase compat SDK (~470KB) + firebase-config — trang chỉ dùng Web2Auth token + fetch, KHÔNG firestore/onSnapshot -->
        <script src="../../shared/js/shared-auth-manager.js?v=20260521c"></script>
        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-kpi.js?v=20260621kpi"></script>
        <script src="../shared/web2-user-info.js?v=20260531kpi"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/web2-sse-topics.js?v=20260522a"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <!-- MODULE CHÍNH Lịch sử thao tác (dùng chung với trang web2/audit-log) -->
        <script src="../shared/web2-audit-log.js?v=20260626act"></script>
        <script src="../shared/web2-sidebar.js?v=20260629e"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => Web2Sidebar.mount('#web2Aside'));
        </script>
        <script src="js/kpi-dashboard.js?v=20260622al1"></script>
    </body>
</html>
