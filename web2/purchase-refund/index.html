<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Trả hàng NCC - WEB 2.0</title>
        <link rel="stylesheet" href="../shared/tpos-sidebar.css?v=20260518e" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <script src="../../shared/js/firebase-config.js"></script>
        <script src="../../shared/js/notification-system.js"></script>
        <link rel="stylesheet" href="css/purchase-refund.css?v=20260520a" />
    </head>
    <body>
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="pr-main">
                <header class="pr-header">
                    <div>
                        <h1>Trả hàng NCC</h1>
                        <p class="pr-sub">
                            Quản lý phiếu trả hàng cho Nhà Cung Cấp + state machine + tự trừ tồn
                            kho.
                        </p>
                    </div>
                    <div class="pr-header-actions">
                        <button id="prNewBtn" class="btn btn-primary">
                            <i data-lucide="plus"></i> Tạo phiếu mới
                        </button>
                        <button id="prReloadBtn" class="btn btn-secondary">
                            <i data-lucide="refresh-cw"></i> Tải lại
                        </button>
                    </div>
                </header>

                <div class="pr-filters">
                    <label>Trạng thái:</label>
                    <select id="prFilterStatus">
                        <option value="">Tất cả</option>
                        <option value="draft">Nháp</option>
                        <option value="sent">Đã gửi NCC</option>
                        <option value="approved">NCC duyệt (đã trừ kho)</option>
                        <option value="refunded">NCC đã hoàn tiền</option>
                        <option value="rejected">NCC từ chối</option>
                        <option value="cancelled">Hủy</option>
                    </select>
                    <input type="text" id="prSearch" placeholder="Tìm mã / NCC / lý do..." />
                </div>

                <div class="pr-layout">
                    <section class="pr-list-section">
                        <div class="pr-list-head">
                            <span id="prListCount">0 phiếu</span>
                        </div>
                        <ul class="pr-list" id="prList"></ul>
                        <div class="pr-empty" id="prEmpty" hidden>Chưa có phiếu trả hàng nào.</div>
                    </section>
                    <section class="pr-detail-section">
                        <div class="pr-detail-empty" id="prDetailEmpty">
                            Chọn 1 phiếu bên trái để xem chi tiết.
                        </div>
                        <div class="pr-detail" id="prDetail" hidden></div>
                    </section>
                </div>
            </main>
        </div>

        <!-- Modal Create / Edit -->
        <div class="pr-modal" id="prModal" hidden>
            <div class="pr-modal-backdrop" data-pr-modal-close></div>
            <div class="pr-modal-content">
                <header>
                    <h2 id="prModalTitle">Phiếu trả hàng NCC mới</h2>
                    <button data-pr-modal-close class="pr-modal-close">×</button>
                </header>
                <form id="prForm">
                    <div class="pr-form-grid">
                        <label>
                            Mã phiếu <span style="color: #dc2626">*</span>
                            <input name="code" required placeholder="TRA-20260520-001" />
                        </label>
                        <label>
                            Tiêu đề <span style="color: #dc2626">*</span>
                            <input name="name" required placeholder="Trả lô áo lỗi cho NCC ABC" />
                        </label>
                        <label>
                            Mã NCC
                            <input name="supplierCode" placeholder="NCC-001" />
                        </label>
                        <label>
                            Tên NCC
                            <input name="supplierName" placeholder="Công ty ABC" />
                        </label>
                        <label>
                            SĐT NCC
                            <input name="supplierPhone" />
                        </label>
                        <label>
                            Mã Sổ Order gốc
                            <input name="sourcePurchaseCode" placeholder="SO-2026-001" />
                        </label>
                        <label>
                            Ngày trả
                            <input type="date" name="refundDate" />
                        </label>
                        <label>
                            Lý do
                            <select name="reason">
                                <option value="defect">Hàng lỗi / hỏng</option>
                                <option value="wrong_item">Sai mã / sai SP</option>
                                <option value="excess">Dư hàng / nhận thừa</option>
                                <option value="quality">Chất lượng kém</option>
                                <option value="other">Khác</option>
                            </select>
                        </label>
                        <label>
                            Phương thức hoàn
                            <select name="refundMethod">
                                <option value="cash">Tiền mặt</option>
                                <option value="bank">Chuyển khoản</option>
                                <option value="debt_offset">Trừ vào công nợ kỳ sau</option>
                                <option value="replace">Đổi hàng mới</option>
                            </select>
                        </label>
                        <label>
                            Tổng số lượng
                            <input type="number" name="totalQty" min="0" />
                        </label>
                        <label>
                            Tổng tiền (NCC sẽ hoàn)
                            <input type="number" name="totalAmount" min="0" />
                        </label>
                    </div>
                    <label class="pr-form-full">
                        Danh sách SP trả (1 dòng / SP — format: <code>MA_SP | TÊN | SL | GIÁ</code>)
                        <textarea
                            name="productsText"
                            rows="6"
                            placeholder="AO001 | Áo thun trắng | 5 | 80000&#10;AO002 | Áo thun đen | 3 | 80000"
                        ></textarea>
                        <small style="color: #64748b; font-size: 11px">
                            Backend tự parse thành JSON [{code, name, qty, price}]. Khi NCC duyệt,
                            stock sẽ −= qty cho mỗi SP.
                        </small>
                    </label>
                    <label class="pr-form-full">
                        Ghi chú
                        <textarea name="note" rows="3"></textarea>
                    </label>
                    <div class="pr-form-actions">
                        <button type="button" data-pr-modal-close class="btn btn-secondary">
                            Hủy
                        </button>
                        <button type="submit" class="btn btn-primary">Lưu phiếu</button>
                    </div>
                </form>
            </div>
        </div>

        <script src="../shared/web2-auth.js?v=20260519k"></script>
        <script src="../shared/tpos-sidebar.js?v=20260514f"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260519a"></script>
        <script src="js/purchase-refund-app.js?v=20260520a"></script>
    </body>
</html>
