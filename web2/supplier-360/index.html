<!-- #Note: WEB2.0 module. F07 — Customer 360 cho NCC. -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>NCC 360 - WEB 2.0</title>
        <meta name="web2-db" content="both" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../shared/tpos-sidebar.css?v=20260522f" />
        <link rel="stylesheet" href="../shared/web2-tpos-theme.css?v=20260522d" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <style>
            .s360-main {
                padding: 20px 28px;
            }
            .s360-search {
                display: flex;
                gap: 10px;
                margin-bottom: 18px;
            }
            .s360-search input {
                flex: 1;
                max-width: 400px;
                padding: 9px 12px;
                border: 1px solid #d1d5db;
                border-radius: 6px;
                font-size: 14px;
            }
            .s360-search button {
                padding: 9px 20px;
                background: linear-gradient(135deg, #7266ba, #5e51ac);
                color: #fff;
                border: 0;
                border-radius: 6px;
                font-weight: 600;
                cursor: pointer;
            }
            .s360-grid {
                display: grid;
                gap: 14px;
                grid-template-columns: 1fr 1fr;
            }
            @media (max-width: 880px) {
                .s360-grid {
                    grid-template-columns: 1fr;
                }
            }
            .s360-panel {
                background: #fff;
                padding: 16px 18px;
                border-radius: 10px;
                box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
            }
            .s360-panel h3 {
                margin: 0 0 12px;
                font-size: 14px;
            }
            .rating-stars {
                font-size: 22px;
                color: #f59e0b;
            }
            .rating-form textarea {
                width: 100%;
                min-height: 60px;
                padding: 8px;
                border: 1px solid #d1d5db;
                border-radius: 6px;
                font-family: inherit;
            }
            .star-pick {
                display: inline-flex;
                gap: 4px;
                cursor: pointer;
                user-select: none;
                font-size: 24px;
                color: #d1d5db;
            }
            .star-pick span.on {
                color: #f59e0b;
            }
            .rating-form button {
                margin-top: 8px;
                padding: 7px 16px;
                background: #7266ba;
                color: #fff;
                border: 0;
                border-radius: 6px;
                cursor: pointer;
            }
            .recent-rating {
                padding: 8px 0;
                border-bottom: 1px dashed #e5e7eb;
                font-size: 13px;
            }
            .refund-row {
                padding: 6px 0;
                border-bottom: 1px solid #f3f4f6;
                font-size: 13px;
            }
        </style>
    </head>
    <body class="tpos-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="web2-main s360-main">
                <h1 style="margin: 0 0 6px">Hồ sơ NCC 360°</h1>
                <p style="color: #58666e; margin: 0 0 16px; font-size: 13px">
                    Tổng hợp đơn mua, công nợ, ví, trả hàng, rating cho mỗi NCC.
                </p>
                <div class="s360-search">
                    <input id="supCode" placeholder="Mã NCC… (ví dụ: NCC-001)" />
                    <button id="btnLoad">Tải</button>
                </div>
                <div id="s360Content" style="display: none">
                    <div class="s360-grid">
                        <div class="s360-panel">
                            <h3>Rating</h3>
                            <div class="rating-stars" id="ratingAvg">—</div>
                            <div style="font-size: 12px; color: #58666e" id="ratingCount"></div>
                            <hr style="border: 0; border-top: 1px solid #f3f4f6; margin: 12px 0" />
                            <div class="rating-form">
                                <label>Chấm sao mới:</label>
                                <div class="star-pick" id="starPick">
                                    <span data-s="1">★</span><span data-s="2">★</span
                                    ><span data-s="3">★</span><span data-s="4">★</span
                                    ><span data-s="5">★</span>
                                </div>
                                <textarea id="ratingComment" placeholder="Nhận xét…"></textarea>
                                <button id="btnRate">Gửi đánh giá</button>
                            </div>
                            <hr style="border: 0; border-top: 1px solid #f3f4f6; margin: 12px 0" />
                            <h4 style="margin: 0 0 8px; font-size: 13px">Đánh giá gần đây</h4>
                            <div id="recentRatings"></div>
                        </div>
                        <div class="s360-panel">
                            <h3>Trả hàng (purchase-refund)</h3>
                            <div id="refundsList"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <script src="../shared/web2-auth.js?v=20260522f"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/tpos-sidebar.js?v=20260522f"></script>
        <script>
            (function () {
                const API = 'https://chatomni-proxy.nhijudyshop.workers.dev/api/web2/supplier-360';
                let currentCode = null;
                let pickedScore = 0;
                function esc(s) {
                    const d = document.createElement('div');
                    d.textContent = String(s ?? '');
                    return d.innerHTML;
                }
                async function load() {
                    const code = document.getElementById('supCode').value.trim();
                    if (!code) return;
                    currentCode = code;
                    const r = await fetch(API + '/' + encodeURIComponent(code) + '/summary', {
                        credentials: 'include',
                    });
                    const d = await r.json();
                    if (!d.success) return;
                    document.getElementById('s360Content').style.display = 'block';
                    const avg = d.rating?.avg;
                    document.getElementById('ratingAvg').textContent = avg
                        ? '★'.repeat(Math.round(avg)) + ' (' + avg.toFixed(1) + ')'
                        : '— Chưa có đánh giá';
                    document.getElementById('ratingCount').textContent =
                        (d.rating?.count || 0) + ' đánh giá';
                    document.getElementById('recentRatings').innerHTML =
                        (d.rating?.recent || [])
                            .map(
                                (rt) =>
                                    `<div class="recent-rating">★${rt.score} — ${esc(rt.comment || '—')} <span style="color:#94a3b8">· ${esc(rt.user_name || '—')} · ${esc(new Date(rt.created_at).toLocaleString('vi-VN'))}</span></div>`
                            )
                            .join('') ||
                        '<div style="color:#94a3b8; font-size:13px">Chưa có data</div>';
                    document.getElementById('refundsList').innerHTML =
                        (d.refunds || [])
                            .map(
                                (rf) =>
                                    `<div class="refund-row"><strong>${esc(rf.code)}</strong> — ${esc(rf.name || '')} <span style="color:#94a3b8">${esc(new Date(rf.created_at).toLocaleString('vi-VN'))}</span></div>`
                            )
                            .join('') ||
                        '<div style="color:#94a3b8; font-size:13px">Chưa có data</div>';
                }
                document.getElementById('btnLoad').onclick = load;
                document.getElementById('starPick').onclick = (e) => {
                    const s = e.target.dataset.s;
                    if (!s) return;
                    pickedScore = Number(s);
                    document
                        .querySelectorAll('#starPick span')
                        .forEach((sp, i) => sp.classList.toggle('on', i < pickedScore));
                };
                document.getElementById('btnRate').onclick = async () => {
                    if (!currentCode || !pickedScore) return alert('Chọn sao trước');
                    await fetch(API + '/' + encodeURIComponent(currentCode) + '/rating', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({
                            score: pickedScore,
                            comment: document.getElementById('ratingComment').value,
                        }),
                    });
                    document.getElementById('ratingComment').value = '';
                    pickedScore = 0;
                    document
                        .querySelectorAll('#starPick span')
                        .forEach((sp) => sp.classList.remove('on'));
                    load();
                };
                document.addEventListener('DOMContentLoaded', () => {
                    if (window.Web2Sidebar)
                        Web2Sidebar.mount('#web2Aside', { activeRoute: 'supplier-360' });
                });
            })();
        </script>
    </body>
</html>
