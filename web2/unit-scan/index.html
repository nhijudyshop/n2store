<!-- #Note: Đọc CLAUDE.md, MEMORY.md, docs/dev-log.md trước khi code. Cập nhật dev-log sau thay đổi. | WEB2.0 — Quét tem (mobile): 1 view DUY NHẤT — quét → vị trí (kệ/STT/📍) + chi tiết SP + tiến độ 9 kệ + sơ đồ kệ (gộp bỏ tab 2026-06-29). Đặc tả: docs/web2/KB-PRODUCT-CODE-UNITS.md -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
        />
        <meta name="theme-color" content="#0068ff" />
        <meta http-equiv="Cache-Control" content="no-store" />
        <title>Quét tem — Web 2.0</title>
        <!-- AUTH GUARD: trang Web 2.0 (đụng đơn KH có PII) — chưa đăng nhập → đẩy login ngay. -->
        <script>
            (function () {
                try {
                    var raw = localStorage.getItem('web2_auth');
                    var a = raw ? JSON.parse(raw) : null;
                    if (a && a.token) return;
                } catch (e) {}
                var next = encodeURIComponent(location.pathname + location.search);
                location.replace('../login/index.html?next=' + next);
            })();
        </script>
        <!-- PWA "Thêm vào màn hình chính" -->
        <link rel="apple-touch-icon" href="../shared/img/logo-emblem.png?v=20260530" />
        <link rel="icon" type="image/png" href="../shared/img/logo-emblem.png?v=20260530" />
        <link rel="manifest" href="./unit-scan.webmanifest?v=20260628a" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Quét tem" />
        <link rel="preconnect" href="https://chatomni-proxy.nhijudyshop.workers.dev" crossorigin />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./css/unit-scan.css?v=20260701d" />
    </head>
    <body>
        <header class="hd">
            <span class="hd-title">Quét tem</span>
            <a
                class="hd-btn"
                id="tagBtn"
                href="../shelf-labels/index.html"
                target="_blank"
                rel="noopener"
                title="In nhãn ô kệ (dán STT lên ô)"
            >
                <i data-lucide="tag"></i>
            </a>
            <button
                class="hd-btn"
                id="putwallBtn"
                aria-label="Đèn LED kệ"
                title="Đèn LED chỉ ô kệ (put-to-light)"
            >
                <i data-lucide="lightbulb"></i>
            </button>
            <button class="hd-btn" id="torchBtn" aria-label="Đèn flash" title="Đèn flash">
                <i data-lucide="zap"></i>
            </button>
        </header>

        <!-- Thanh nút hành động DÍNH đầu trang (dưới header) — khỏi kéo xuống mới bấm được -->
        <div class="actionbar" id="actionBar">
            <button class="ab-btn" id="batchMapBtn" type="button">
                <i data-lucide="layout-grid"></i> Sơ đồ kệ
            </button>
            <button class="ab-btn" id="manifestBtn" type="button">
                <i data-lucide="list-checks"></i> Đưa xe ra
            </button>
            <button class="ab-btn primary disabled" id="batchPrintBtn" type="button">
                <i data-lucide="printer"></i> In DS (<span id="batchCount">0</span>)
            </button>
        </div>

        <main class="wrap">
            <div class="scanner">
                <div id="scanHost"></div>
                <!-- Overlay khung quét: 4 góc + laser + chớp xanh/đỏ khi quét (decorative, pointer-events:none) -->
                <div class="scan-frame" aria-hidden="true">
                    <i></i><i></i><i></i><i></i>
                    <div class="scan-laser"></div>
                </div>
                <div class="scan-flash" id="scanFlash" aria-hidden="true"></div>
                <div class="scan-hint">Đưa mã QR vào khung</div>
            </div>
            <div class="manual">
                <input
                    id="manualInput"
                    inputmode="text"
                    autocomplete="off"
                    placeholder="Nhập mã đơn vị (vd KHOAODEN-017)"
                />
                <button id="manualGo">Tra</button>
            </div>

            <!-- Kết quả quét: vị trí (kệ/STT/📍) + chi tiết SP -->
            <div id="result" hidden></div>

            <!-- Tiến độ chia hàng: 9 kệ (xe) + sơ đồ kệ -->
            <div class="stats" id="stats"></div>
            <div class="meter" id="statsMeter"><i id="statsMeterFill"></i></div>
            <div class="sec-row">
                <div class="sec-title" id="gridTitle">9 kệ (xe) — tiến độ chia</div>
            </div>
            <div class="grid" id="grid">
                <div class="muted">Đang tải danh sách đơn chờ xếp kệ…</div>
            </div>

            <!-- ── Danh sách đã quét → in tem QR cả batch → Đã in (nhóm thời gian) ── -->
            <div class="sec-row sec-break">
                <div class="sec-title" id="batchTitle">Danh sách đã quét (0)</div>
            </div>
            <div class="batch" id="batchList">
                <div class="muted">Chưa quét món nào — quét tem để thêm vào danh sách.</div>
            </div>
            <div class="batch-actions" id="batchActions" hidden>
                <button class="link-btn batch-clear" id="batchClearBtn" type="button">
                    <i data-lucide="trash-2"></i> Xoá danh sách đã quét
                </button>
            </div>

            <div class="sec-row sec-break">
                <div class="sec-title">Đã in — <span id="printedGroups">0</span> đợt</div>
            </div>
            <div class="printed" id="printedList">
                <div class="muted">Chưa có đợt in nào.</div>
            </div>
        </main>

        <!-- Bottom sheet: chi tiết kệ (SP theo STT) / manifest -->
        <div class="sheet-back" id="sheetBack" hidden>
            <div class="sheet" role="dialog" aria-modal="true">
                <div class="sheet-hd">
                    <h3 id="sheetTitle">Đưa xe ra kệ</h3>
                    <button class="hd-btn dark" id="sheetClose" aria-label="Đóng">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <div class="sheet-body" id="sheetBody"></div>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <!-- lucide icons -->
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
        <!-- base-URL + auth guard + token (1 nguồn WEB2_CONFIG) -->
        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <!-- SSE realtime bridge (web2:product-units) -->
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <!-- camera barcode/QR scanner (on-device) -->
        <script src="../shared/web2-barcode-scanner.js?v=20260618a"></script>
        <!-- IN LẠI TEM: tái dùng Web2ProductsPrint (Kho SP) — bộ 5 file -->
        <script src="../shared/web2-printer.js?v=20260630tun"></script>
        <script src="../shared/web2-qr.js?v=20260625qr"></script>
        <script src="../products/js/web2-products-print-utils.js?v=20260623fix"></script>
        <script src="../products/js/web2-products-print-barcode.js?v=20260618w2"></script>
        <script src="../products/js/web2-products-print-render.js?v=20260629b"></script>
        <script src="../products/js/web2-products-print-modal.js?v=20260628b"></script>
        <script src="../products/js/web2-products-print.js?v=20260618w2"></script>
        <!-- Client CHUNG /api/web2-product-units/* + sơ đồ kệ -->
        <script src="../shared/web2-product-units.js?v=20260629b"></script>
        <script src="../shared/web2-shelf-map.js?v=20260629a"></script>
        <!-- Put-to-light: đèn LED chỉ ô kệ (ESP32) -->
        <script src="../shared/web2-putwall.js?v=20260629a"></script>
        <!-- Format tiền ₫ 1-nguồn (trang KHÔNG có sidebar nên không auto-inject) -->
        <script src="../shared/web2-format.js?v=20260618"></script>
        <!-- app (1 view) -->
        <script src="./js/unit-scan.js?v=20260701d"></script>
    </body>
</html>
