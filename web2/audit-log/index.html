<!-- #Note: WEB2.0 module. F05 Audit Trail UI — MODULE CHÍNH "Lịch sử thao tác". Render qua shared Web2AuditLog. -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Lịch sử thao tác - WEB 2.0</title>
        <meta name="web2-db" content="render" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260625anim" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <style>
            .audit-main {
                padding: 20px 28px;
            }
        </style>
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="web2-main audit-main">
                <h1 style="margin: 0 0 6px">Lịch sử thao tác</h1>
                <p style="color: #58666e; margin: 0 0 14px; font-size: 13px">
                    Nhật ký toàn bộ thao tác Web 2.0 (sửa SP · PBH · đối soát · chỉnh ví). Nhân viên
                    chỉ thấy thao tác của chính mình; quản trị viên thấy tất cả.
                </p>
                <div id="auditMount"></div>
            </main>
        </div>
        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <script src="../shared/web2-audit-log.js?v=20260626act"></script>
        <script src="../shared/web2-sidebar.js?v=20260629d"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                if (window.Web2Sidebar)
                    Web2Sidebar.mount('#web2Aside', { activeRoute: 'audit-log' });
                if (window.Web2AuditLog) Web2AuditLog.mount('#auditMount', { limit: 200 });
            });
        </script>
    </body>
</html>
