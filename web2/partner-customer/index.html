<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khách hàng — Web 2.0</title>
    <script src="../../web2-shared/page-shell.js?v=20260425n"></script>

<body>
<script>
    Web2Shell.bootstrap({
        slug: 'partner-customer',
        title: 'Khách hàng',
        breadcrumb: ['App', 'Khách hàng'],
        columns: [
            { key: 'code',                label: 'Mã KH',     width: 130, align: 'center' },
