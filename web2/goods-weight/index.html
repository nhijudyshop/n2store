<!-- #Note: Đọc CLAUDE.md, MEMORY.md, docs/dev-log.md trước khi code. Cập nhật dev-log sau thay đổi. | WEB2.0 — Cân nặng hàng (mobile, phone-native, học từ unit-scan). -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
        />
        <meta name="theme-color" content="#0068ff" />
        <meta http-equiv="Cache-Control" content="no-store" />
        <title>Cân Nặng Hàng — Web 2.0</title>
        <!-- AUTH GUARD: trang Web 2.0 — chưa đăng nhập → đẩy login ngay. -->
        <script>
            (function () {
                try {
                    var raw = localStorage.getItem('web2_auth');
                    var a = raw ? JSON.parse(raw) : null;
                    if (a && a.token) return;
                } catch (e) {}
                var next = encodeURIComponent(location.pathname + location.search);
                location.replace('../login/index.html?next=' + next);
            })();
        </script>
        <!-- PWA "Thêm vào màn hình chính" = app Cân Hàng -->
        <link rel="apple-touch-icon" href="../shared/img/logo-emblem.png?v=20260530" />
        <link rel="icon" type="image/png" href="../shared/img/logo-emblem.png?v=20260530" />
        <link rel="manifest" href="./goods-weight.webmanifest?v=20260629a" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Cân Hàng" />
        <link rel="preconnect" href="https://chatomni-proxy.nhijudyshop.workers.dev" crossorigin />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./css/goods-weight.css?v=20260701g" />
    </head>
    <body>
        <header class="hd">
            <a
                class="hd-btn"
                href="../overview/index.html"
                aria-label="Về trang chủ"
                title="Trang chủ"
            >
                <i data-lucide="arrow-left"></i>
            </a>
            <span class="hd-title">Cân Nặng Hàng ⚖️</span>
            <button class="hd-btn" id="gwRefresh" aria-label="Làm mới" title="Làm mới">
                <i data-lucide="refresh-cw"></i>
            </button>
        </header>

        <nav class="gw-tabs" role="tablist" aria-label="Chế độ">
            <button class="gw-tab is-active" id="tabLog" role="tab" type="button">
                <i data-lucide="scale"></i> Cân hàng
            </button>
            <button class="gw-tab" id="tabReport" role="tab" type="button">
                <i data-lucide="bar-chart-3"></i> Báo cáo
            </button>
        </nav>

        <main class="wrap" id="panelLog">
            <!-- FORM ghi nhận -->
            <section class="gw-form" aria-label="Ghi nhận cân nặng">
                <!-- Ảnh cân: chụp trực tiếp (camera) HOẶC tải ảnh có sẵn (gallery/file) -->
                <input type="file" id="gwPhoto" accept="image/*" capture="environment" hidden />
                <input type="file" id="gwUpload" accept="image/*" hidden />
                <div class="gw-photo-actions" id="gwPhotoBtns">
                    <button type="button" class="gw-photo-btn" id="gwPhotoBtn">
                        <i data-lucide="camera"></i>
                        <span>Chụp ảnh mặt cân</span>
                    </button>
                    <button type="button" class="gw-photo-btn gw-upload-btn" id="gwUploadBtn">
                        <i data-lucide="upload"></i>
                        <span>Tải ảnh lên</span>
                    </button>
                </div>
                <div class="gw-preview" id="gwPreview" hidden>
                    <img id="gwPreviewImg" alt="Ảnh cân" />
                    <button type="button" class="gw-preview-x" id="gwPreviewX" title="Đổi ảnh">
                        <i data-lucide="rotate-ccw"></i>
                    </button>
                </div>

                <!-- Số liệu -->
                <div class="gw-row2">
                    <label class="gw-field">
                        <span>Số kg</span>
                        <input
                            type="number"
                            id="gwKg"
                            inputmode="decimal"
                            step="0.1"
                            min="0"
                            placeholder="20.5"
                        />
                    </label>
                    <label class="gw-field">
                        <span>Số kiện</span>
                        <input
                            type="number"
                            id="gwBales"
                            inputmode="numeric"
                            step="1"
                            min="0"
                            placeholder="0"
                        />
                    </label>
                </div>
                <label class="gw-field">
                    <span>Ghi chú</span>
                    <textarea
                        id="gwNote"
                        rows="2"
                        placeholder="NCC, mã đợt, tình trạng kiện…"
                    ></textarea>
                </label>

                <div class="gw-meta-row">
                    <span class="gw-meta"><i data-lucide="user"></i> <b id="gwUserName">—</b></span>
                    <span class="gw-meta" id="gwClock"><i data-lucide="clock"></i> <b>—</b></span>
                </div>
                <button type="button" class="gw-save" id="gwSave">
                    <i data-lucide="save"></i> Lưu cân nặng
                </button>
            </section>

            <div class="gw-list-head">
                <h2>Lịch sử cân</h2>
                <span class="gw-count" id="gwCount"></span>
            </div>
            <div id="gwList"><div class="gw-muted">Đang tải…</div></div>
        </main>

        <!-- BÁO CÁO theo ngày (chủ yếu xem trên PC) -->
        <section class="gw-report" id="panelReport" hidden aria-label="Báo cáo theo ngày">
            <!-- Chọn tháng (12 tháng gần nhất) — LUÔN hiện trên bảng, không nằm trong drawer -->
            <div class="rp-months-bar">
                <div
                    class="rp-months"
                    id="rpMonths"
                    aria-label="Chọn tháng (12 tháng gần nhất)"
                ></div>
            </div>
            <!-- Bộ lọc chi tiết (từ/đến ngày, nhân viên, preset, đơn giá) → chuyển vào drawer "BỘ LỌC" -->
            <div class="rp-bar">
                <div class="rp-filters">
                    <label class="rp-f">
                        <span>Từ ngày</span>
                        <input type="date" id="rpFrom" />
                    </label>
                    <label class="rp-f">
                        <span>Đến ngày</span>
                        <input type="date" id="rpTo" />
                    </label>
                    <label class="rp-f">
                        <span>Nhân viên</span>
                        <select id="rpUser">
                            <option value="">Tất cả</option>
                        </select>
                    </label>
                    <button class="rp-reset" id="rpReset" type="button" title="Xoá lọc">
                        <i data-lucide="x"></i> Xoá lọc
                    </button>
                </div>
                <div class="rp-presets" id="rpPresets">
                    <button class="rp-chip" type="button" data-range="today">Hôm nay</button>
                    <button class="rp-chip" type="button" data-range="7">7 ngày</button>
                    <button class="rp-chip" type="button" data-range="30">30 ngày</button>
                    <button class="rp-chip" type="button" data-range="month">Tháng này</button>
                </div>
                <div class="rp-rate" id="rpRate"></div>
            </div>

            <div class="rp-summary" id="rpSummary"></div>

            <div class="rp-table-wrap">
                <table class="rp-table">
                    <thead>
                        <tr>
                            <th>Thời gian</th>
                            <th>Ảnh</th>
                            <th class="num">Kg</th>
                            <th class="num">Kiện</th>
                            <th class="num">Tiền kg</th>
                            <th class="num">Tiền kiện</th>
                            <th class="num">Tổng tiền ship</th>
                            <th class="rp-act rp-act2" aria-label="Thao tác"></th>
                        </tr>
                    </thead>
                    <tbody id="rpBody">
                        <tr>
                            <td colspan="8" class="rp-muted">Đang tải…</td>
                        </tr>
                    </tbody>
                    <tfoot id="rpFoot"></tfoot>
                </table>
            </div>
        </section>

        <div class="gw-toast" id="gwToast"></div>

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <script src="../shared/web2-image-lightbox.js?v=20260629a"></script>
        <script src="../shared/web2-drawer.js?v=20260701a"></script>
        <script src="./js/goods-weight.js?v=20260701g"></script>
    </body>
</html>
