<!-- #Note: WEB2.0 module. F12 — Permission matrix UI. -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Phân quyền - WEB 2.0</title>
        <meta name="web2-db" content="render" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260625anim" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <style>
            .perm-main {
                padding: 20px 28px;
            }
            .perm-tools {
                display: flex;
                gap: 10px;
                margin-bottom: 14px;
                align-items: center;
            }
            .perm-tools select,
            .perm-tools button {
                padding: 7px 12px;
                border: 1px solid #d1d5db;
                border-radius: 6px;
                background: #fff;
                cursor: pointer;
                font-size: 13px;
            }
            .perm-tools button.primary {
                background: linear-gradient(135deg, #0068ff, #0058da);
                color: #fff;
                border: 0;
                font-weight: 600;
            }
            table.perm-tbl {
                width: 100%;
                background: #fff;
                border-collapse: collapse;
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
                font-size: 13px;
            }
            table.perm-tbl th {
                background: #f0eeee;
                padding: 8px;
                text-align: center;
            }
            table.perm-tbl td {
                padding: 6px 10px;
                border-top: 1px solid #f3f4f6;
            }
            td.page-cell {
                text-align: left;
            }
            td input[type='checkbox'] {
                width: 15px;
                height: 15px;
                cursor: pointer;
            }
            td.acts-cell {
                display: flex;
                flex-wrap: wrap;
                gap: 6px 14px;
            }
            .act-chk {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                font-size: 12.5px;
                cursor: pointer;
                white-space: nowrap;
            }
            .page-slug {
                font-size: 11px;
                color: #94a3b8;
                font-family: monospace;
            }
            .grp-row td {
                background: linear-gradient(135deg, #e8f2ff, #fff);
                font-weight: 600;
                padding: 8px 10px;
            }
            /* ── Mobile: wrap table horizontally, stack Trang column ── */
            .perm-table-wrap {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            @media (max-width: 768px) {
                .perm-main {
                    padding: 14px 12px;
                }
                .perm-tools {
                    flex-wrap: wrap;
                }
                .perm-tools select,
                .perm-tools button {
                    flex: 1 1 auto;
                    min-width: 0;
                }
                table.perm-tbl th,
                table.perm-tbl td {
                    padding: 6px 8px;
                }
                table.perm-tbl th:first-child,
                table.perm-tbl td.page-cell {
                    white-space: nowrap;
                    min-width: 130px;
                }
                td.acts-cell {
                    gap: 4px 10px;
                }
            }
            /* Embed mode (?embed=1) — nhúng trong trang Người dùng (web2/users) qua
               iframe: ẩn sidebar + chrome, full-width, bỏ tiêu đề lặp. */
            body.w2-embed .web2-aside,
            body.w2-embed .w2-mobile-menu-btn,
            body.w2-embed .web2-aside-scrim {
                display: none !important;
            }
            /* Embed: shell mặc định grid 100vh + overflow:hidden (clip). Khi nhúng
               iframe, đổi block + bỏ ràng buộc chiều cao/clip để nội dung cao tự
               trào → iframe TỰ scroll (fix "không scroll được" 2026-06-24). */
            body.w2-embed .web2-shell {
                display: block !important;
                height: auto !important;
                min-height: 0 !important;
                overflow: visible !important;
            }
            body.w2-embed .web2-main {
                margin-left: 0 !important;
                max-width: 100% !important;
                padding: 14px 18px !important;
                height: auto !important;
                overflow: visible !important;
            }
            /* iframe document phải tự cao bằng nội dung để xuất hiện thanh cuộn. */
            body.w2-embed,
            html:has(body.w2-embed) {
                height: auto !important;
                overflow: auto !important;
            }
            body.w2-embed .perm-main > h1,
            body.w2-embed .perm-main > p {
                display: none;
            }
        </style>
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="web2-main perm-main">
                <h1 style="margin: 0 0 6px">Ma trận phân quyền Web 2.0</h1>
                <p style="color: #58666e; margin: 0 0 16px; font-size: 13px">
                    Chọn người dùng → tick quyền theo từng action của trang → Save.
                </p>
                <div class="perm-tools">
                    <select id="userPick">
                        <option value="">Chọn user…</option>
                    </select>
                    <select id="rolePick">
                        <option value="">Áp role template…</option>
                        <option value="admin">Admin</option>
                        <option value="manager">Manager</option>
                        <option value="staff">Staff</option>
                    </select>
                    <button
                        id="btnClear"
                        title="Bỏ tick toàn bộ quyền của user đang chọn (chưa lưu — cần bấm Save để có hiệu lực)"
                    >
                        Xoá tất cả
                    </button>
                    <button id="btnSave" class="primary">Save</button>
                </div>
                <div class="perm-table-wrap">
                    <table class="perm-tbl">
                        <thead>
                            <tr>
                                <th style="width: 220px">Trang</th>
                                <th>Quyền (actions)</th>
                            </tr>
                        </thead>
                        <tbody id="permBody"></tbody>
                    </table>
                </div>
            </main>
        </div>
        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/web2-sidebar.js?v=20260629e"></script>
        <script src="../shared/web2-skeleton.js?v=20260625a"></script>
        <script>
            (function () {
                // 1 nguồn base-URL = WEB2_CONFIG (web2-auth.js); literal chỉ là fallback.
                const API =
                    (window.API_CONFIG?.WORKER_URL ||
                        window.WEB2_CONFIG?.WORKER_URL ||
                        'https://chatomni-proxy.nhijudyshop.workers.dev') + '/api/web2-users';
                // Token admin cho mutation (PUT permissions). Web2Auth lưu ở 'web2_auth'.
                function authToken() {
                    try {
                        const t = window.Web2Auth?.getStored?.()?.token;
                        if (t) return t;
                        const raw = localStorage.getItem('web2_users_session');
                        if (raw) return JSON.parse(raw)?.token || '';
                    } catch (_) {}
                    return '';
                }
                // H7 fix 2026-06-11: registry trang + action lấy từ server
                // (GET /pages — nguồn chuẩn WEB2_PAGES). Server validate
                // permissions dạng {slug: [actions]} với action list RIÊNG
                // từng trang → không hardcode slug/view-edit-admin nữa.
                const REG = { pages: [], actionLabels: {} };
                function authHeaders() {
                    return { 'x-web2-token': authToken() };
                }
                // TASK 1 helper — show error toast + error row in matrix
                function _showLoadError(msg) {
                    window.notificationManager?.show('Không tải được dữ liệu phân quyền', 'error');
                    const body = document.getElementById('permBody');
                    if (body) {
                        body.innerHTML = `<tr><td colspan="2" style="text-align:center;color:#dc2626;padding:20px">${esc(msg || 'Lỗi tải dữ liệu — thử reload lại trang')}</td></tr>`;
                    }
                }
                async function loadRegistry() {
                    try {
                        const r = await fetch(API + '/pages', { credentials: 'include' });
                        const d = await r.json();
                        if (d?.success && Array.isArray(d.pages)) {
                            REG.pages = d.pages;
                            REG.actionLabels = d.actionLabels || {};
                        }
                    } catch (e) {
                        _showLoadError(
                            'Không lấy được danh sách trang (' + (e?.message || e) + ')'
                        );
                    }
                    // AUTO-DISCOVER (2026-06-24): bổ sung trang có trong sidebar NAV mà
                    // THIẾU ở registry backend (trang mới chưa thêm WEB2_PAGES) → hiện với
                    // action 'view' để admin vẫn chặn được ngay. Slug khớp Web2Perm.
                    try {
                        REG.pages = REG.pages || [];
                        const have = new Set(REG.pages.map((p) => p.slug));
                        const sf = window.Web2Perm && window.Web2Perm.slugFromUrl;
                        const nav = (window.Web2Sidebar && window.Web2Sidebar.NAV) || [];
                        const walk = (items, group) => {
                            for (const it of items || []) {
                                if (it.children) walk(it.children, it.label);
                                if (!it.our || !sf) continue;
                                const slug = sf(it.our);
                                if (slug && !have.has(slug)) {
                                    have.add(slug);
                                    REG.pages.push({
                                        slug,
                                        label:
                                            (it.label || slug)
                                                // Bỏ emoji/biểu tượng trang trí ở ĐẦU/CUỐI (✨🪄🎬).
                                                // KHÔNG dùng \w (ASCII-only) vì nó coi dấu tiếng Việt
                                                // (ợ, ý, ử…) là ký tự "lạ" → nuốt cụt nhãn
                                                // ("Trợ lý AI…"→"Tr", "Sửa ảnh AI…"→"S").
                                                .replace(
                                                    /^[\s\p{Extended_Pictographic}\uFE0F\u200D]+|[\s\p{Extended_Pictographic}\uFE0F\u200D]+$/gu,
                                                    ''
                                                )
                                                .trim() || slug,
                                        group: group || 'Khác',
                                        actions: ['view'],
                                    });
                                }
                            }
                        };
                        walk(nav, null);
                    } catch (_) {
                        /* ignore — backend registry đã đủ */
                    }
                }
                async function loadUsers() {
                    try {
                        // GET /list gated requireWeb2Auth → gửi kèm x-web2-token.
                        const r = await fetch(API + '/list', {
                            credentials: 'include',
                            headers: authHeaders(),
                        });
                        const d = await r.json();
                        const sel = document.getElementById('userPick');
                        // Server trả {success, users:[...]} (fallback items cho shape cũ).
                        const users = Array.isArray(d?.users)
                            ? d.users
                            : Array.isArray(d?.items)
                              ? d.items
                              : [];
                        if (users.length) {
                            sel.innerHTML =
                                '<option value="">Chọn user…</option>' +
                                users
                                    .map(
                                        (u) =>
                                            `<option value="${u.id}">${esc(u.username || u.email || u.id)}</option>`
                                    )
                                    .join('');
                        } else if (r.status === 401 || r.status === 403) {
                            sel.innerHTML = '<option value="">Cần đăng nhập Web 2.0…</option>';
                        }
                    } catch (e) {
                        window.notificationManager?.show(
                            'Không tải được dữ liệu phân quyền',
                            'error'
                        );
                        const sel = document.getElementById('userPick');
                        if (sel)
                            sel.innerHTML = '<option value="">Lỗi tải user — thử reload</option>';
                    }
                }
                // perm shape server: { [slug]: [actions] }
                function renderTable(perm) {
                    const body = document.getElementById('permBody');
                    const html = [];
                    const groups = new Map();
                    for (const p of REG.pages) {
                        const g = p.group || 'Khác';
                        if (!groups.has(g)) groups.set(g, []);
                        groups.get(g).push(p);
                    }
                    for (const [grp, pages] of groups) {
                        html.push(`<tr class="grp-row"><td colspan="2">${esc(grp)}</td></tr>`);
                        for (const p of pages) {
                            const granted = new Set(
                                Array.isArray(perm[p.slug]) ? perm[p.slug] : []
                            );
                            const checks = (p.actions || [])
                                .map(
                                    (a) =>
                                        `<label class="act-chk"><input type="checkbox" data-a="${esc(a)}" ${granted.has(a) ? 'checked' : ''}/>${esc(REG.actionLabels[a] || a)}</label>`
                                )
                                .join('');
                            html.push(`<tr data-page="${esc(p.slug)}">
                            <td class="page-cell">${esc(p.label || p.slug)}<div class="page-slug">${esc(p.slug)}</div></td>
                            <td class="acts-cell">${checks}</td>
                        </tr>`);
                        }
                    }
                    body.innerHTML = html.length
                        ? html.join('')
                        : '<tr><td colspan="2" style="text-align:center;color:#94a3b8;padding:20px">Không tải được danh sách trang</td></tr>';
                }
                async function loadPerm(uid) {
                    try {
                        // GET /:id gated requireWeb2Auth, trả {success, user:{permissions}}.
                        const r = await fetch(API + '/' + uid, {
                            credentials: 'include',
                            headers: authHeaders(),
                        });
                        const d = await r.json();
                        renderTable(d?.user?.permissions || {});
                    } catch {
                        renderTable({});
                    }
                }
                function collectPerm() {
                    // Build {slug: [actions]} — đúng shape server validate.
                    const out = {};
                    document.querySelectorAll('#permBody tr[data-page]').forEach((tr) => {
                        const acts = [];
                        tr.querySelectorAll('input[type=checkbox]').forEach((cb) => {
                            if (cb.checked) acts.push(cb.dataset.a);
                        });
                        out[tr.dataset.page] = acts;
                    });
                    return out;
                }
                async function applyRole(role) {
                    // Role template lấy từ server (GET /role-defaults/:role) —
                    // đồng bộ với ROLE_DEFAULTS thay vì đoán view/edit/admin.
                    try {
                        const r = await fetch(API + '/role-defaults/' + encodeURIComponent(role), {
                            credentials: 'include',
                        });
                        const d = await r.json();
                        if (d?.success && d.permissions) {
                            renderTable(d.permissions);
                            // TASK 2: confirm role template applied
                            window.notificationManager?.show('Đã áp role template', 'success');
                        }
                    } catch {}
                }
                function esc(s) {
                    const d = document.createElement('div');
                    d.textContent = String(s ?? '');
                    return d.innerHTML;
                }
                document.getElementById('userPick').onchange = (e) => {
                    if (e.target.value) loadPerm(e.target.value);
                };
                document.getElementById('rolePick').onchange = (e) => {
                    if (e.target.value) applyRole(e.target.value);
                    e.target.value = '';
                };
                document.getElementById('btnClear').onclick = () => {
                    // TASK 3: confirm before clearing all checkboxes
                    const doIt = window.Popup?.confirm
                        ? window.Popup.confirm('Bỏ tick toàn bộ quyền của user này?')
                        : Promise.resolve(
                              confirm(
                                  'Bỏ tick toàn bộ quyền của user này?\n(chưa lưu cho đến khi bấm Save)'
                              )
                          );
                    Promise.resolve(doIt).then((ok) => {
                        if (!ok) return;
                        document
                            .querySelectorAll('#permBody input[type=checkbox]')
                            .forEach((cb) => (cb.checked = false));
                    });
                };
                const _toast = (m, t) =>
                    window.notificationManager
                        ? notificationManager.show(m, t || 'info')
                        : alert(m);
                document.getElementById('btnSave').onclick = async () => {
                    const uid = document.getElementById('userPick').value;
                    if (!uid) return _toast('Chọn user trước', 'warning');
                    const btn = document.getElementById('btnSave');
                    if (btn.disabled) return; // tránh double-submit
                    const perm = collectPerm();
                    btn.disabled = true;
                    const origText = btn.textContent;
                    btn.textContent = 'Đang lưu…';
                    try {
                        const r = await fetch(API + '/' + uid + '/permissions', {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'x-web2-token': authToken(),
                            },
                            credentials: 'include',
                            body: JSON.stringify({ permissions: perm }),
                        });
                        const d = await r.json().catch(() => ({}));
                        if (r.status === 401 || r.status === 403) {
                            _toast('Cần đăng nhập admin để lưu phân quyền.', 'error');
                        } else if (r.ok && d.success) {
                            _toast('Lưu phân quyền thành công', 'success');
                        } else {
                            _toast('Lỗi: ' + (d.error || 'HTTP ' + r.status), 'error');
                        }
                    } catch (e) {
                        _toast('Lỗi mạng: ' + (e.message || e), 'error');
                    } finally {
                        btn.disabled = false;
                        btn.textContent = origText;
                    }
                };
                const _embed = new URLSearchParams(location.search).get('embed') === '1';
                if (_embed) document.body.classList.add('w2-embed');
                document.addEventListener('DOMContentLoaded', async () => {
                    // Embed (nhúng trong trang Người dùng) → KHÔNG mount sidebar.
                    if (!_embed && window.Web2Sidebar)
                        Web2Sidebar.mount('#web2Aside', { activeRoute: 'users-permissions' });
                    loadUsers();
                    // First-load skeleton: chỉ khi tbody còn rỗng (chưa có data).
                    // Mọi nhánh sau (renderTable / _showLoadError) đều set innerHTML
                    // → overwrite skeleton, không bị kẹt.
                    const _permBody = document.getElementById('permBody');
                    if (_permBody && !_permBody.children.length) {
                        if (window.Web2Skeleton) {
                            window.Web2Skeleton.rows(_permBody, { rows: 8, cols: 2 });
                        }
                    }
                    // Matrix render cần registry trang từ server trước.
                    await loadRegistry();
                    renderTable({});
                });
            })();
        </script>
    </body>
</html>
