<!-- #Note: WEB2.0 login page. Đọc CLAUDE.md, MEMORY.md trước khi sửa. -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Đăng nhập - WEB 2.0</title>
        <meta name="web2-db" content="render" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>

        <style>
            * {
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                margin: 0;
            }
            body {
                font-family:
                    'Inter',
                    system-ui,
                    -apple-system,
                    sans-serif;
                background:
                    radial-gradient(at 20% 30%, rgba(0, 104, 255, 0.15) 0%, transparent 50%),
                    radial-gradient(at 80% 80%, rgba(168, 85, 247, 0.12) 0%, transparent 50%),
                    linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                color: #0f172a;
            }
            .login-card {
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(12px);
                width: 100%;
                max-width: 420px;
                border-radius: 16px;
                padding: 36px 32px 28px 32px;
                box-shadow:
                    0 20px 60px rgba(15, 23, 42, 0.12),
                    0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            }
            .login-brand {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 28px;
            }
            .login-brand-logo {
                width: 48px;
                height: 48px;
                border-radius: 12px;
                background: linear-gradient(135deg, #0058da, #0068ff);
                color: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 800;
                font-size: 1.05rem;
                letter-spacing: 0.04em;
                box-shadow: 0 8px 20px rgba(67, 56, 202, 0.3);
            }
            .login-brand-title {
                font-size: 1.05rem;
                font-weight: 700;
                color: #0f172a;
                line-height: 1.2;
            }
            .login-brand-sub {
                font-size: 0.78rem;
                color: #64748b;
                margin-top: 2px;
            }
            h1 {
                font-size: 1.5rem;
                font-weight: 800;
                margin: 0 0 6px 0;
                color: #0f172a;
                letter-spacing: -0.01em;
            }
            .login-hint {
                color: #64748b;
                font-size: 0.875rem;
                margin: 0 0 22px 0;
                line-height: 1.5;
            }
            .login-field {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-bottom: 14px;
            }
            .login-field label {
                font-size: 0.8125rem;
                font-weight: 600;
                color: #334155;
            }
            .login-field input {
                padding: 11px 13px;
                border: 1px solid #cbd5e1;
                border-radius: 8px;
                font-size: 0.9375rem;
                color: #0f172a;
                background: #fff;
                transition:
                    border-color 120ms,
                    box-shadow 120ms;
            }
            .login-field input:focus {
                outline: none;
                border-color: #0058da;
                box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.12);
            }
            .login-error {
                background: #fef2f2;
                border: 1px solid #fecaca;
                color: #991b1b;
                padding: 9px 12px;
                border-radius: 8px;
                font-size: 0.8125rem;
                margin-bottom: 14px;
                display: flex;
                gap: 8px;
                align-items: flex-start;
            }
            .login-error i {
                width: 16px;
                height: 16px;
                flex-shrink: 0;
                margin-top: 1px;
            }
            .login-error[hidden] {
                display: none;
            }
            .login-submit {
                width: 100%;
                margin-top: 8px;
                padding: 12px 16px;
                background: linear-gradient(135deg, #0058da, #0068ff);
                color: #fff;
                border: 0;
                border-radius: 8px;
                font-size: 0.9375rem;
                font-weight: 600;
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                transition:
                    transform 100ms,
                    box-shadow 120ms,
                    opacity 120ms;
                box-shadow: 0 8px 20px rgba(67, 56, 202, 0.25);
            }
            .login-submit:hover:not(:disabled) {
                transform: translateY(-1px);
                box-shadow: 0 12px 28px rgba(67, 56, 202, 0.35);
            }
            .login-submit:disabled {
                opacity: 0.7;
                cursor: not-allowed;
            }
            .login-submit i {
                width: 16px;
                height: 16px;
            }
            .login-foot {
                margin-top: 22px;
                padding-top: 16px;
                border-top: 1px solid #e2e8f0;
                font-size: 0.78rem;
                color: #94a3b8;
                line-height: 1.5;
            }
            .login-foot code {
                background: #f1f5f9;
                padding: 1px 6px;
                border-radius: 3px;
                font-family: 'SF Mono', Menlo, Monaco, monospace;
                font-size: 0.72rem;
                color: #334155;
            }
            .login-loading {
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin {
                from {
                    transform: rotate(0deg);
                }
                to {
                    transform: rotate(360deg);
                }
            }
        </style>

        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260625anim" />
    </head>
    <body>
        <main class="login-card">
            <div class="login-brand">
                <div class="login-brand-logo">N2</div>
                <div>
                    <div class="login-brand-title">N2Store · Web 2.0</div>
                    <div class="login-brand-sub">Hệ thống quản lý nội bộ</div>
                </div>
            </div>

            <h1>Đăng nhập</h1>
            <p class="login-hint">Sử dụng tài khoản Web 2.0 được cấp.</p>

            <div class="login-error" id="loginError" hidden>
                <i data-lucide="alert-circle"></i>
                <span id="loginErrorText"></span>
            </div>

            <form id="loginForm" autocomplete="on">
                <div class="login-field">
                    <label for="loginUsername">Username</label>
                    <input
                        id="loginUsername"
                        type="text"
                        autocomplete="username"
                        autocapitalize="off"
                        autocorrect="off"
                        spellcheck="false"
                        required
                    />
                </div>
                <div class="login-field">
                    <label for="loginPassword">Mật khẩu</label>
                    <input
                        id="loginPassword"
                        type="password"
                        autocomplete="current-password"
                        required
                    />
                </div>
                <button class="login-submit" type="submit" id="loginSubmit">
                    <i data-lucide="log-in"></i> Đăng nhập
                </button>
            </form>
        </main>

        <script>
            (function () {
                // Landing sau đăng nhập = Đơn Web (native-orders) cho MỌI user.
                // native-orders ở ROOT site; login ở /web2/login/ (depth 2) → cần '../../'
                // (nếu chỉ '../native-orders' sẽ ra /web2/native-orders = 404).
                function landingFor() {
                    return '../../native-orders/index.html';
                }

                // If already logged in, redirect to next page or role landing.
                const stored = window.Web2Auth.getStored();
                if (stored?.token) {
                    const params = new URLSearchParams(location.search);
                    const next = params.get('next');
                    location.replace(next || landingFor(stored.user));
                    return;
                }

                const form = document.getElementById('loginForm');
                const errBox = document.getElementById('loginError');
                const errText = document.getElementById('loginErrorText');
                const submitBtn = document.getElementById('loginSubmit');

                function showError(msg) {
                    errText.textContent = msg;
                    errBox.hidden = false;
                }
                function clearError() {
                    errBox.hidden = true;
                    errText.textContent = '';
                }

                // Bị chuyển về đây do phiên Web 2.0 hết hạn (401 từ web2-auth.handleAuthExpired)
                // → báo rõ lý do để user không tưởng là lỗi. Token đã được clear trước khi tới đây.
                if (new URLSearchParams(location.search).get('expired') === '1') {
                    showError('Phiên đăng nhập đã hết hạn. Vui lòng đăng nhập lại để tiếp tục.');
                }

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    clearError();
                    const username = document.getElementById('loginUsername').value.trim();
                    const password = document.getElementById('loginPassword').value;
                    if (!username || !password) {
                        showError('Vui lòng nhập username + mật khẩu');
                        return;
                    }
                    submitBtn.disabled = true;
                    const origHtml = submitBtn.innerHTML;
                    submitBtn.innerHTML =
                        '<i data-lucide="loader-2" class="login-loading"></i> Đang đăng nhập…';
                    if (window.lucide?.createIcons) window.lucide.createIcons();
                    try {
                        const r = await fetch(`${window.Web2Auth.API}/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password }),
                        });
                        const data = await r.json().catch(() => ({}));
                        if (!r.ok || !data.success) {
                            throw new Error(data?.error || `HTTP ${r.status}`);
                        }
                        window.Web2Auth.storeLogin({
                            token: data.token,
                            expiresAt: data.expiresAt,
                            user: data.user,
                        });
                        const params = new URLSearchParams(location.search);
                        const next = params.get('next');
                        location.replace(next || landingFor(data.user));
                    } catch (err) {
                        showError(err.message || 'Đăng nhập thất bại');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = origHtml;
                        if (window.lucide?.createIcons) window.lucide.createIcons();
                    }
                });

                if (window.lucide?.createIcons) window.lucide.createIcons();
                document.getElementById('loginUsername')?.focus();
            })();
        </script>
    </body>
</html>
