        <script>
            (function () {
                'use strict';
                const WORKER =
                    (window.WEB2_CONFIG && window.WEB2_CONFIG.WORKER_URL) ||
                    (window.API_CONFIG && window.API_CONFIG.WORKER_URL) ||
                    'https://chatomni-proxy.nhijudyshop.workers.dev';
                const $ = (s) => document.querySelector(s);

                let currentView = 'region'; // 'region' | 'ncc' | 'product' (địa danh = cha)
                let currentRegion = ''; // '' = tất cả địa danh
                let lastData = null; // toàn bộ payload gần nhất (để đổi view/search/CSV không cần fetch lại)
                let sortKey = null;
                // Expose FULL dataset cho widget AI (Web2AiPageRegistry) — getter vì let reassign.
                window.Web2WarehouseReport = {
                    get lastData() {
                        return lastData;
                    },
                    get currentView() {
                        return currentView;
                    },
                    get currentRegion() {
                        return currentRegion;
                    },
                };
                let sortDir = -1; // -1 desc, 1 asc
                let _loadSeq = 0;
                let _abort = null;

                function authHeaders(extra) {
                    if (window.Web2Auth && window.Web2Auth.authHeaders)
                        return window.Web2Auth.authHeaders(extra || {});
                    try {
                        const t = JSON.parse(localStorage.getItem('web2_auth') || 'null');
                        return t && t.token
                            ? { ...(extra || {}), 'x-web2-token': t.token }
                            : { ...(extra || {}) };
                    } catch {
                        return { ...(extra || {}) };
                    }
                }

                const fmtInt = (n) => (Number(n) || 0).toLocaleString('vi-VN');
                const fmtMoney = (n) => Math.round(Number(n) || 0).toLocaleString('vi-VN') + '₫';
                function esc(s) {
                    const d = document.createElement('div');
                    d.textContent = String(s == null ? '' : s);
                    return d.innerHTML;
                }

                // ---------- date helpers (GMT+7) ----------
                function todayYmd() {
                    return new Date(Date.now() + 7 * 3600 * 1000).toISOString().slice(0, 10);
                }
                function addDays(ymd, delta) {
                    const [y, m, d] = ymd.split('-').map(Number);
                    const dt = new Date(Date.UTC(y, m - 1, d));
                    dt.setUTCDate(dt.getUTCDate() + delta);
                    return dt.toISOString().slice(0, 10);
                }
                function firstOfMonth(ymd) {
                    return ymd.slice(0, 8) + '01';
                }

                function applyPreset(preset) {
                    const today = todayYmd();
                    let from = today,
                        to = today;
                    if (preset === 'today') {
                        from = to = today;
                    } else if (preset === 'month') {
                        from = firstOfMonth(today);
                        to = today;
                    } else {
                        const days = Number(preset) || 30;
                        from = addDays(today, -(days - 1));
                        to = today;
                    }
                    $('#fromDate').value = from;
                    $('#toDate').value = to;
                    document
                        .querySelectorAll('#presetRow button')
                        .forEach((b) => b.classList.toggle('active', b.dataset.preset === preset));
                    load();
                }

                // ---------- fetch ----------
                async function load() {
                    const from = $('#fromDate').value;
                    const to = $('#toDate').value;
                    if (!from || !to) return;
                    if (_abort) _abort.abort();
                    _abort = new AbortController();
                    const seq = ++_loadSeq;
                    $('#tableWrap').innerHTML =
                        '<span class="w2-skel" style="display:block;height:280px;border-radius:10px"></span>';
                    try {
                        const r = await fetch(
                            `${WORKER}/api/web2-warehouse-report/summary?from=${from}&to=${to}`,
                            { signal: _abort.signal, headers: authHeaders() }
                        );
                        const d = await r.json();
                        if (seq !== _loadSeq) return;
                        if (!d.success) throw new Error(d.error || 'load failed');
                        lastData = d;
                        populateRegions(d.regions || []);
                        renderKpi(d.totals);
                        render();
                    } catch (e) {
                        if (e.name === 'AbortError' || seq !== _loadSeq) return;
                        console.error('[report-warehouse]', e);
                        $('#kpiGrid').innerHTML =
                            '<div class="empty" style="grid-column:1/-1;color:#dc2626">Lỗi tải số liệu.</div>';
                        $('#tableWrap').innerHTML = `<div class="empty" style="color:#dc2626">
                            Lỗi tải dữ liệu.
                            <button class="btn-csv" id="whRetryBtn" style="margin-left:8px">Thử lại</button>
                          </div>`;
                        $('#whRetryBtn')?.addEventListener('click', load);
                        window.notificationManager?.show?.('Không tải được báo cáo kho', 'error');
                    }
                }

                function renderKpi(t) {
                    t = t || {};
                    $('#kpiGrid').innerHTML = `
                        <div class="kpi-card buy">
                            <div class="label">Mua vào (đã nhận)</div>
                            <div class="value">${fmtMoney(t.buyAmount)}</div>
                            <div class="sub">${fmtInt(t.buyQty)} sản phẩm</div>
                        </div>
                        <div class="kpi-card pending">
                            <div class="label">Chưa nhận hàng</div>
                            <div class="value">${fmtMoney(t.pendingAmount)}</div>
                            <div class="sub">${fmtInt(t.pendingQty)} sản phẩm đang chờ về</div>
                        </div>
                        <div class="kpi-card sell">
                            <div class="label">Bán ra (PBH hoàn thành)</div>
                            <div class="value">${fmtMoney(t.sellAmount)}</div>
                            <div class="sub">${fmtInt(t.sellQty)} sản phẩm</div>
                        </div>
                        <div class="kpi-card gray">
                            <div class="label">Địa danh</div>
                            <div class="value">${fmtInt(t.regionCount)}</div>
                            <div class="sub">${fmtInt(t.supplierCount)} NCC · ${fmtInt(t.productCount)} mã SP</div>
                        </div>
                    `;
                }

                // Đổ danh sách địa danh vào dropdown (giữ lựa chọn hiện tại nếu còn).
                function populateRegions(regions) {
                    const sel = $('#regionFilter');
                    const names = regions
                        .map((g) => g.region)
                        .sort((a, b) => a.localeCompare(b, 'vi'));
                    const keep = names.includes(currentRegion) ? currentRegion : '';
                    if (keep !== currentRegion) currentRegion = keep;
                    sel.innerHTML =
                        '<option value="">Tất cả địa danh</option>' +
                        names.map((n) => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
                    sel.value = currentRegion;
                }

                // ---------- render table (region | NCC | product) ----------
                function currentRows() {
                    if (!lastData) return [];
                    let rows =
                        currentView === 'region'
                            ? lastData.regions || []
                            : currentView === 'ncc'
                              ? lastData.suppliers || []
                              : lastData.products || [];
                    // Lọc theo địa danh (cha). View "region" → chỉ còn dòng địa danh đó.
                    if (currentRegion) rows = rows.filter((r) => r.region === currentRegion);
                    const q = ($('#searchBox').value || '').trim().toLowerCase();
                    let out = rows;
                    if (q) {
                        out = rows.filter((r) =>
                            currentView === 'region'
                                ? String(r.region || '')
                                      .toLowerCase()
                                      .includes(q)
                                : currentView === 'ncc'
                                  ? String(r.supplier || '')
                                        .toLowerCase()
                                        .includes(q)
                                  : String(r.code || '')
                                        .toLowerCase()
                                        .includes(q) ||
                                    String(r.name || '')
                                        .toLowerCase()
                                        .includes(q) ||
                                    String(r.supplier || '')
                                        .toLowerCase()
                                        .includes(q)
                        );
                    }
                    if (sortKey) {
                        out = [...out].sort((a, b) => {
                            const av = a[sortKey],
                                bv = b[sortKey];
                            if (typeof av === 'number' || typeof bv === 'number')
                                return ((Number(av) || 0) - (Number(bv) || 0)) * sortDir;
                            return String(av || '').localeCompare(String(bv || '')) * sortDir;
                        });
                    }
                    return out;
                }

                function th(label, key, cls) {
                    const arrow = sortKey === key ? (sortDir === -1 ? ' ▾' : ' ▴') : '';
                    return `<th class="${cls || ''}" data-sort="${key}">${label}${arrow}</th>`;
                }

                function render() {
                    if (!lastData) return;
                    const rows = currentRows();
                    if (!rows.length) {
                        $('#tableWrap').innerHTML =
                            '<div class="empty">Không có dữ liệu trong khoảng ngày đã chọn.</div>';
                        $('#tableNote').textContent = '';
                        return;
                    }
                    // Cấu hình cột định danh (bên trái) theo từng view. Địa danh = cha.
                    const ID_COLS = {
                        region: {
                            head:
                                '<th rowspan="2" data-sort="region">Địa danh</th>' +
                                '<th rowspan="2" class="r" data-sort="supplierCount">Số NCC</th>' +
                                '<th rowspan="2" class="r" data-sort="productCount">Số SP</th>',
                            span: 3,
                            cell: (r) =>
                                `<td class="ncc-cell">${esc(r.region)}</td><td class="r">${fmtInt(r.supplierCount)}</td><td class="r">${fmtInt(r.productCount)}</td>`,
                        },
                        ncc: {
                            head:
                                '<th rowspan="2" data-sort="region">Địa danh</th>' +
                                '<th rowspan="2" data-sort="supplier">NCC</th>' +
                                '<th rowspan="2" class="r" data-sort="productCount">Số SP</th>',
                            span: 3,
                            cell: (r) =>
                                `<td>${esc(r.region)}</td><td class="ncc-cell">${esc(r.supplier)}</td><td class="r">${fmtInt(r.productCount)}</td>`,
                        },
                        product: {
                            head:
                                '<th rowspan="2" data-sort="code">Mã</th>' +
                                '<th rowspan="2" data-sort="name">Tên SP</th>' +
                                '<th rowspan="2" data-sort="region">Địa danh</th>' +
                                '<th rowspan="2" data-sort="supplier">NCC</th>',
                            span: 4,
                            cell: (r) =>
                                `<td class="code-cell">${esc(r.code || '—')}</td><td>${esc(r.name)}${r.variant ? ` <span style="color:#9ca3af">· ${esc(r.variant)}</span>` : ''}</td><td>${esc(r.region)}</td><td>${esc(r.supplier)}</td>`,
                        },
                    };
                    const cfg = ID_COLS[currentView] || ID_COLS.region;
                    // Tổng cộng = Σ các dòng ĐANG HIỂN THỊ (sau search) để footer luôn khớp
                    // body. Khi không lọc, rows = toàn bộ → khớp lastData.totals.
                    const tot = rows.reduce(
                        (t, r) => {
                            t.buyQty += Number(r.buyQty) || 0;
                            t.buyAmount += Number(r.buyAmount) || 0;
                            t.pendingQty += Number(r.pendingQty) || 0;
                            t.pendingAmount += Number(r.pendingAmount) || 0;
                            t.sellQty += Number(r.sellQty) || 0;
                            t.sellAmount += Number(r.sellAmount) || 0;
                            return t;
                        },
                        {
                            buyQty: 0,
                            buyAmount: 0,
                            pendingQty: 0,
                            pendingAmount: 0,
                            sellQty: 0,
                            sellAmount: 0,
                        }
                    );
                    const filtered = ($('#searchBox').value || '').trim().length > 0;

                    const headTop = `
                        <tr>
                            <th rowspan="2">#</th>
                            ${cfg.head}
                            <th class="grp buy" colspan="2">Mua vào (đã nhận)</th>
                            <th class="grp pending" colspan="2">Chưa nhận hàng</th>
                            <th class="grp sell" colspan="2">Bán ra</th>
                        </tr>
                        <tr>
                            ${th('SL', 'buyQty', 'r')}${th('Tiền', 'buyAmount', 'r')}
                            ${th('SL', 'pendingQty', 'r pend')}${th('Tiền', 'pendingAmount', 'r pend')}
                            ${th('SL', 'sellQty', 'r')}${th('Tiền', 'sellAmount', 'r')}
                        </tr>`;

                    const body = rows
                        .map((r, i) => {
                            const zero =
                                !r.buyQty && !r.pendingQty && !r.sellQty ? ' class="zero"' : '';
                            return `<tr${zero}>
                                <td>${i + 1}</td>
                                ${cfg.cell(r)}
                                <td class="r money">${r.buyQty ? fmtInt(r.buyQty) : '—'}</td>
                                <td class="r money">${r.buyAmount ? fmtMoney(r.buyAmount) : '—'}</td>
                                <td class="r pend">${r.pendingQty ? fmtInt(r.pendingQty) : '—'}</td>
                                <td class="r pend">${r.pendingAmount ? fmtMoney(r.pendingAmount) : '—'}</td>
                                <td class="r money">${r.sellQty ? fmtInt(r.sellQty) : '—'}</td>
                                <td class="r money">${r.sellAmount ? fmtMoney(r.sellAmount) : '—'}</td>
                            </tr>`;
                        })
                        .join('');

                    const foot = `<tr>
                        <td colspan="${cfg.span + 1}">${filtered ? 'TỔNG (đã lọc)' : 'TỔNG CỘNG'}</td>
                        <td class="r">${fmtInt(tot.buyQty)}</td>
                        <td class="r">${fmtMoney(tot.buyAmount)}</td>
                        <td class="r pend">${fmtInt(tot.pendingQty)}</td>
                        <td class="r pend">${fmtMoney(tot.pendingAmount)}</td>
                        <td class="r">${fmtInt(tot.sellQty)}</td>
                        <td class="r">${fmtMoney(tot.sellAmount)}</td>
                    </tr>`;

                    $('#tableWrap').innerHTML = `<table class="wh">
                        <thead>${headTop}</thead>
                        <tbody>${body}</tbody>
                        <tfoot>${foot}</tfoot>
                    </table>`;

                    $('#tableWrap')
                        .querySelectorAll('thead th[data-sort]')
                        .forEach((el) =>
                            el.addEventListener('click', () => {
                                const k = el.dataset.sort;
                                if (sortKey === k) sortDir = -sortDir;
                                else {
                                    sortKey = k;
                                    sortDir =
                                        k === 'supplier' ||
                                        k === 'name' ||
                                        k === 'code' ||
                                        k === 'region'
                                            ? 1
                                            : -1;
                                }
                                render();
                            })
                        );

                    const scope = currentRegion ? ` · địa danh "${currentRegion}"` : '';
                    $('#tableNote').textContent =
                        currentView === 'region'
                            ? `${rows.length} địa danh${scope} · Địa danh (HÀ NỘI, HƯƠNG CHÂU…) là cha của NCC + SP. "Chưa nhận" = phần chưa về kho.`
                            : currentView === 'ncc'
                              ? `${rows.length} NCC theo địa danh${scope} · "Chưa nhận hàng" = phần chưa về kho (Nháp + phần còn lại của dòng nhận 1 phần). Mua vào = SL nhận thật.`
                              : `${rows.length} mã SP${scope} · Mua vào = hàng đã nhận thật (Sổ Order); Bán ra = PBH Hoàn thành. Lọc theo khoảng ngày.`;
                }

                // ---------- CSV ----------
                const METRIC_HEAD = [
                    'Mua vào SL',
                    'Mua vào Tiền',
                    'Chưa nhận SL',
                    'Chưa nhận Tiền',
                    'Bán ra SL',
                    'Bán ra Tiền',
                ];
                const metricCells = (r) => [
                    r.buyQty,
                    r.buyAmount,
                    r.pendingQty,
                    r.pendingAmount,
                    r.sellQty,
                    r.sellAmount,
                ];
                const CSV_CFG = {
                    region: {
                        tag: 'diadanh',
                        head: ['Địa danh', 'Số NCC', 'Số SP', ...METRIC_HEAD],
                        row: (r) => [r.region, r.supplierCount, r.productCount, ...metricCells(r)],
                    },
                    ncc: {
                        tag: 'ncc',
                        head: ['Địa danh', 'NCC', 'Số SP', ...METRIC_HEAD],
                        row: (r) => [r.region, r.supplier, r.productCount, ...metricCells(r)],
                    },
                    product: {
                        tag: 'sp',
                        head: ['Mã', 'Tên SP', 'Biến thể', 'Địa danh', 'NCC', ...METRIC_HEAD],
                        row: (r) => [
                            r.code || '',
                            r.name,
                            r.variant || '',
                            r.region,
                            r.supplier,
                            ...metricCells(r),
                        ],
                    },
                };
                function exportCsv() {
                    if (!lastData) return;
                    const rows = currentRows();
                    const cfg = CSV_CFG[currentView] || CSV_CFG.region;
                    // Quote RFC4180 + chống CSV/formula injection: cell bắt đầu = + - @ TAB CR
                    // → Excel/Sheets thực thi như công thức → prefix dấu ' (mirror supplier-debt csvEscape).
                    const csvCell = (v) => {
                        let s = String(v == null ? '' : v);
                        if (/^[=+\-@\t\r]/.test(s.trimStart())) s = "'" + s;
                        return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
                    };
                    const lines = [cfg.head.join(',')];
                    for (const r of rows) lines.push(cfg.row(r).map(csvCell).join(','));
                    const blob = new Blob(['﻿' + lines.join('\n')], {
                        type: 'text/csv;charset=utf-8',
                    });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    // Tên file theo khoảng ngày ĐÃ FETCH (lastData.range), không phải ô input
                    // hiện tại — tránh lệch khi user đổi ngày nhưng chưa load xong.
                    const rg = lastData.range || {};
                    a.download = `bao-cao-kho-${cfg.tag}-${rg.from || $('#fromDate').value}_${rg.to || $('#toDate').value}.csv`;
                    a.click();
                    setTimeout(() => URL.revokeObjectURL(url), 2000);
                }

                // ---------- init ----------
                document.addEventListener('DOMContentLoaded', () => {
                    if (window.Web2Sidebar) Web2Sidebar.mount('#web2Aside');
                    if (window.lucide) lucide.createIcons();

                    applyPreset('30'); // sets dates + loads

                    document
                        .querySelectorAll('#presetRow button')
                        .forEach((b) =>
                            b.addEventListener('click', () => applyPreset(b.dataset.preset))
                        );
                    $('#fromDate').addEventListener('change', () => {
                        document
                            .querySelectorAll('#presetRow button')
                            .forEach((b) => b.classList.remove('active'));
                        load();
                    });
                    $('#toDate').addEventListener('change', () => {
                        document
                            .querySelectorAll('#presetRow button')
                            .forEach((b) => b.classList.remove('active'));
                        load();
                    });
                    document.querySelectorAll('#viewSeg button').forEach((b) =>
                        b.addEventListener('click', () => {
                            document
                                .querySelectorAll('#viewSeg button')
                                .forEach((x) => x.classList.remove('active'));
                            b.classList.add('active');
                            currentView = b.dataset.view;
                            sortKey = null;
                            sortDir = -1;
                            render();
                        })
                    );
                    $('#regionFilter').addEventListener('change', (e) => {
                        currentRegion = e.target.value || '';
                        render();
                    });
                    let _t;
                    $('#searchBox').addEventListener('input', () => {
                        clearTimeout(_t);
                        _t = setTimeout(render, 150);
                    });
                    $('#csvBtn').addEventListener('click', exportCsv);

                    // SSE realtime: Sổ Order đổi (mua vào/nhận hàng) hoặc PBH đổi (bán ra) → reload.
                    if (window.Web2SSE?.subscribe) {
                        let _sse;
                        const reload = () => {
                            clearTimeout(_sse);
                            _sse = setTimeout(load, 700);
                        };
                        window.Web2SSE.subscribe('web2:so-order', reload);
                        window.Web2SSE.subscribe('web2:fast-sale-orders', reload);
                    }
                });
            })();
        </script>
    </body>
</html>
