<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Phiếu giao hàng - WEB 2.0</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../../web2/shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-base.css?v=20260623fix" />
        <link rel="stylesheet" href="../shared/web2-components.css?v=20260618w1" />
        <link rel="stylesheet" href="../../web2/shared/page-builder.css?v=20260622cons" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260625anim" />
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content" style="overflow: auto; height: 100vh">
                <header
                    class="web2-main-header"
                    style="padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: #fff"
                >
                    <div class="web2-breadcrumb">
                        <span class="web2-breadcrumb-item">App</span>
                        <span class="web2-breadcrumb-sep">/</span>
                        <span class="web2-breadcrumb-item">Bán Hàng</span>
                        <span class="web2-breadcrumb-sep">/</span>
                        <span class="web2-breadcrumb-current">Phiếu giao hàng</span>
                    </div>
                    <span class="counter-pill" id="dlvCounter">— phiếu</span>
                </header>
                <section class="search-section" style="padding: 12px 20px">
                    <div class="filter-row">
                        <div class="search-wrapper">
                            <i data-lucide="search" class="search-icon"></i>
                            <input
                                type="text"
                                class="search-input"
                                id="dlvSearch"
                                placeholder="Tìm số phiếu, PBH, SĐT, tên KH, tracking..."
                                autocomplete="off"
                            />
                            <button class="search-clear" id="dlvSearchClear">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                        <div class="filter-chip-group">
                            <label class="chip-label chip-label-primary"
                                ><i data-lucide="truck"></i> Trạng thái:</label
                            >
                            <div class="chip-select-wrapper">
                                <select id="dlvState" class="chip-select chip-select-primary">
                                    <option value="">Tất cả</option>
                                    <option value="pending">Chờ giao</option>
                                    <option value="shipping">Đang giao</option>
                                    <option value="delivered">Đã giao</option>
                                    <option value="returned">Bị trả</option>
                                    <option value="cancel">Đã hủy</option>
                                </select>
                                <i data-lucide="chevron-down" class="chip-caret"></i>
                            </div>
                        </div>
                    </div>
                    <div class="search-info">
                        <div class="search-info-left">
                            <span class="search-result-count" id="dlvResultCount">0</span>
                            <span class="search-result-label">phiếu giao</span>
                        </div>
                        <div class="search-info-right">
                            <button class="web2-btn web2-btn-default web2-btn-sm" id="dlvReload">
                                <i data-lucide="refresh-cw" style="width: 12px; height: 12px"></i>
                                Tải lại
                            </button>
                            <button class="web2-btn web2-btn-default web2-btn-sm" id="dlvApply">
                                <i data-lucide="filter" style="width: 12px; height: 12px"></i> Áp
                                dụng
                            </button>
                            <button class="web2-btn web2-btn-default web2-btn-sm" id="dlvClear">
                                <i data-lucide="x" style="width: 12px; height: 12px"></i> Xóa lọc
                            </button>
                        </div>
                    </div>
                </section>
                <section class="table-section" style="padding: 0 20px 24px">
                    <div class="table-scroll">
                        <table class="data-table" id="dlvTable">
                            <thead>
                                <tr>
                                    <th style="width: 30px">
                                        <input type="checkbox" id="dlvCheckAll" />
                                    </th>
                                    <th style="width: 160px">Thao tác</th>
                                    <th style="width: 50px; text-align: center">STT</th>
                                    <th style="width: 170px">Số phiếu</th>
                                    <th style="width: 170px">PBH</th>
                                    <th>Khách hàng</th>
                                    <th style="width: 140px">SĐT</th>
                                    <th style="width: 150px">Hãng VC</th>
                                    <th style="width: 150px">Tracking</th>
                                    <th style="width: 70px; text-align: right">SL</th>
                                    <th style="width: 110px">Trạng thái</th>
                                    <th style="width: 140px">Ngày giao</th>
                                </tr>
                            </thead>
                            <tbody id="dlvTbody">
                                <tr>
                                    <td colspan="12" class="empty-row">
                                        <div class="empty-state">
                                            <i data-lucide="inbox" class="empty-state-icon"></i>
                                            <div class="empty-state-title">Đang tải...</div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination" id="dlvPagination"></div>
                </section>
            </main>
        </div>
        <!-- 3W4: pbh-realtime.js (WS) đã gỡ — realtime qua web2-sse-bridge.js bên dưới -->
        <script src="../../web2/shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../../web2/shared/web2-sidebar.js?v=20260629c"></script>
        <script src="../shared/web2-skeleton.js?v=20260625a"></script>
        <!-- SSE realtime bridge (web2:delivery) -->
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                if (window.Web2Sidebar) Web2Sidebar.mount('#web2Aside');
            });
        </script>
        <script src="dlv-app.js?v=20260623w3"></script>
    </body>
</html>
