<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="n2shop Web 2.0">
  <!-- WEB2.0 brand mark — N monogram on signature gradient squircle. 1 nguồn dùng chung (nav, sidebar, favicon). -->
  <defs>
    <linearGradient id="n2bg" x1="5" y1="3" x2="43" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a74ff"/>
      <stop offset=".52" stop-color="#6d5cff"/>
      <stop offset="1" stop-color="#c026d3"/>
    </linearGradient>
    <radialGradient id="n2hi" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(12 8) scale(40)">
      <stop stop-color="#fff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="48" height="48" rx="13.5" fill="url(#n2bg)"/>
  <rect width="48" height="48" rx="13.5" fill="url(#n2hi)"/>
  <rect x=".75" y=".75" width="46.5" height="46.5" rx="12.75" stroke="#fff" stroke-opacity=".2" stroke-width="1.5"/>
  <!-- N monogram (rounded stems + solid diagonal) -->
  <g fill="#fff">
    <rect x="14" y="14" width="5.7" height="20" rx="2.4"/>
    <rect x="28.3" y="14" width="5.7" height="20" rx="2.4"/>
    <path d="M14 14h5.7L34 34h-5.7z"/>
  </g>
  <!-- realtime spark (the "luôn đồng bộ / 2.0" accent) -->
  <circle cx="36.4" cy="11.6" r="3.2" fill="#fff"/>
</svg>
