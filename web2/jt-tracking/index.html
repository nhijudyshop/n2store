<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tra cứu vận đơn J&T — WEB 2.0</title>
        <meta name="web2-db" content="render" />

        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260613z" />
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260613ns1" />
        <link rel="stylesheet" href="css/jt-tracking.css?v=20260615s" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <!-- Lottie (airbnb/lottie-web) — hiệu ứng trạng thái giao hàng -->
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"
            defer
        ></script>
        <script src="../../shared/js/notification-system.js?v=20260521b"></script>
    </head>
    <body>
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main>
                <div class="jt-main">
                    <div class="jt-head">
                        <div class="jt-head-titles">
                            <h1><span class="jt-jt">J&T</span> Tra cứu vận đơn</h1>
                            <p>
                                Gom mã 12 số từ tin nhắn Zalo + nhập tay → theo dõi trạng thái giao
                                hàng J&amp;T Express.
                            </p>
                        </div>
                        <div class="jt-actions">
                            <button class="jt-btn jt-btn-ghost" id="jtScan" type="button">
                                <i data-lucide="scan-line"></i> Quét Zalo
                            </button>
                            <button
                                class="jt-btn jt-btn-ghost"
                                id="jtScanHistory"
                                type="button"
                                title="Đọc lịch sử nhóm Zalo (hôm nay) để quét đơn cũ/bị thiếu"
                            >
                                <i data-lucide="history"></i> Quét lịch sử
                            </button>
                            <button
                                class="jt-btn jt-btn-ghost"
                                id="jtPaste"
                                type="button"
                                title="Dán nội dung chat copy từ Zalo (Web/PC) → quét mã đơn cũ"
                            >
                                <i data-lucide="clipboard-paste"></i> Dán lịch sử
                            </button>
                            <button class="jt-btn jt-btn-ghost" id="jtRefreshAll" type="button">
                                <i data-lucide="refresh-cw"></i> Làm mới tất cả
                            </button>
                            <button
                                class="jt-btn jt-btn-danger"
                                id="jtClearAll"
                                type="button"
                                title="Xóa toàn bộ rồi quét lại sạch"
                            >
                                <i data-lucide="eraser"></i> Xóa hết & quét lại
                            </button>
                        </div>
                    </div>

                    <!-- Nhập mã thủ công (cellphone tự điền 8674) -->
                    <form class="jt-quickadd" id="jtQuickForm" autocomplete="off">
                        <div class="jt-qa-code">
                            <i data-lucide="package-search"></i>
                            <input
                                id="jtQaCode"
                                type="text"
                                inputmode="numeric"
                                placeholder="Nhập mã vận đơn 12 số (vd 802762251204)…"
                                aria-label="Mã vận đơn"
                            />
                        </div>
                        <input
                            id="jtQaCell"
                            class="jt-qa-cell"
                            type="text"
                            value="8674"
                            maxlength="4"
                            inputmode="numeric"
                            title="4 số cuối SĐT người gửi (mặc định 8674 — shop)"
                            aria-label="4 số cuối SĐT gửi"
                        />
                        <button class="jt-btn jt-btn-primary" id="jtQaBtn" type="submit">
                            <i data-lucide="search"></i> Tra cứu
                        </button>
                    </form>

                    <div class="jt-kpis" id="jtKpis"></div>

                    <div class="jt-toolbar">
                        <div class="jt-search">
                            <i data-lucide="search"></i>
                            <input
                                id="jtSearch"
                                type="search"
                                placeholder="Tìm mã / sự kiện / ghi chú…"
                            />
                        </div>
                        <span class="jt-count" id="jtCount"></span>
                    </div>

                    <div id="jtList" class="jt-list"></div>
                </div>
            </main>
        </div>

        <!-- modal + chat drawer mounts -->
        <div id="jtModalMount"></div>
        <div id="jtChatMount"></div>

        <!-- Script chạy trong Console Zalo Web (chat.zalo.me) để moi mã đơn từ IndexedDB + DOM.
             type="text/plain" → browser KHÔNG chạy; modal "Dán lịch sử" đọc textContent để hiện + copy. -->
        <script type="text/plain" id="jtZaloScript">
            (async () => {
              const RE = /(\d{12})\s+Shop\s+NHI\s*JUDY[^\r\n]*/gi;
              const lines = new Set();
              const grab = () => {
                const t = document.body.innerText; const r = new RegExp(RE.source, 'gi'); let m;
                while ((m = r.exec(t))) lines.add(m[0].replace(/\s+/g, ' ').trim().slice(0, 300));
              };
              console.log('Dang quet + tu cuon len (toi da 60s)... giu tab Zalo mo, dung chuyen trang.');
              grab();
              const scroller = [...document.querySelectorAll('div')]
                .filter(e => e.scrollHeight - e.clientHeight > 300)
                .sort((a, b) => b.scrollHeight - a.scrollHeight)[0];
              if (scroller) {
                const t0 = Date.now(); let stable = 0, last = 0;
                while (Date.now() - t0 < 60000 && stable < 12) {
                  scroller.scrollTop = 0;
                  await new Promise(r => setTimeout(r, 500));
                  grab();
                  if (lines.size === last) { stable++; } else { stable = 0; last = lines.size; }
                  console.log('... ' + lines.size + ' ma (' + Math.round((Date.now() - t0) / 1000) + 's)');
                }
              } else {
                console.log('Khong thay khung cuon - cuon tay len roi chay lai de lay them.');
              }
              const out = [...lines].join('\n');
              console.log('XONG - ' + lines.size + ' ma don:\n' + (out || '(khong thay ma - mo dung nhom J&T + cuon len roi chay lai)'));
              try { await navigator.clipboard.writeText(out); console.log('Da copy clipboard - quay lai trang J&T, bam "Dan lich su" roi Ctrl+V.'); }
              catch { console.log('Khong tu copy duoc - boi den doan ket qua tren roi Ctrl+C.'); }
            })();
        </script>

        <script src="../shared/web2-auth.js?v=20260613guard"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/web2-sidebar.js?v=20260615mt"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260614ux2"></script>
        <!-- Web2Zalo.mountChat → mở chat nhóm Zalo nguồn của mã (lazy-load chat engine) -->
        <script src="../shared/web2-zalo.js?v=20260615e"></script>
        <!-- Web2Chat → nhắn tin / gắn thẻ Pancake cho khách (theo SĐT) -->
        <script src="../shared/web2-chat-client.js?v=20260615tags"></script>
        <!-- N2 Extension bridge (tùy chọn) → gửi Pancake bypass 24h -->
        <script src="../shared/web2-extension-bridge.js?v=20260615a"></script>
        <!-- Web2CustomerChat → FULL chat KH (Pancake + Zalo) dùng chung, bấm SĐT mở -->
        <script src="../shared/web2-customer-chat.js?v=20260615b"></script>
        <script src="js/jt-tracking-app.js?v=20260615t"></script>
    </body>
</html>
