<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tra cứu vận đơn J&T — WEB 2.0</title>
        <meta name="web2-db" content="render" />

        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260625anim" />
        <link rel="stylesheet" href="css/jt-tracking.css?v=20260622t6" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <!-- Lottie (airbnb/lottie-web) — hiệu ứng trạng thái giao hàng -->
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"
            defer
        ></script>
        <script src="../../shared/js/notification-system.js?v=20260521b"></script>
    </head>
    <body>
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main>
                <div class="jt-main">
                    <div class="jt-head">
                        <div class="jt-head-titles">
                            <h1><span class="jt-jt">J&T</span> Tra cứu vận đơn</h1>
                            <p>
                                Gom mã 12 số từ tin nhắn Zalo + nhập tay → theo dõi trạng thái giao
                                hàng J&amp;T Express.
                            </p>
                        </div>
                        <div class="jt-actions">
                            <button class="jt-btn jt-btn-ghost" id="jtScan" type="button">
                                <i data-lucide="scan-line"></i> Quét Zalo
                            </button>
                            <button
                                class="jt-btn jt-btn-ghost"
                                id="jtScanHistory"
                                type="button"
                                title="Đọc lịch sử nhóm Zalo (hôm nay) để quét đơn cũ/bị thiếu"
                            >
                                <i data-lucide="history"></i> Quét lịch sử
                            </button>
                            <button
                                class="jt-btn jt-btn-ghost"
                                id="jtPaste"
                                type="button"
                                title="Dán nội dung chat copy từ Zalo (Web/PC) → quét mã đơn cũ"
                            >
                                <i data-lucide="clipboard-paste"></i> Dán lịch sử
                            </button>
                            <span
                                class="jt-auto-indicator"
                                id="jtAutoStatus"
                                title="Trạng thái tự cập nhật khi bạn mở trang (tra lại nhỏ giọt các đơn đang giao/vấn đề). Cần tra NGAY 1 đơn → bấm nút ↻ ở dòng đó."
                            >
                                <i data-lucide="refresh-cw"></i> Tự động cập nhật
                            </span>
                        </div>
                    </div>

                    <!-- Nhập mã thủ công (cellphone tự điền 8674) -->
                    <form class="jt-quickadd" id="jtQuickForm" autocomplete="off">
                        <div class="jt-qa-code">
                            <i data-lucide="package-search"></i>
                            <input
                                id="jtQaCode"
                                type="text"
                                inputmode="numeric"
                                placeholder="Nhập mã vận đơn 12 số (vd 802762251204)…"
                                aria-label="Mã vận đơn"
                            />
                        </div>
                        <input
                            id="jtQaCell"
                            class="jt-qa-cell"
                            type="text"
                            value="8674"
                            maxlength="4"
                            inputmode="numeric"
                            title="4 số cuối SĐT người gửi (mặc định 8674 — shop)"
                            aria-label="4 số cuối SĐT gửi"
                        />
                        <button class="jt-btn jt-btn-primary" id="jtQaBtn" type="submit">
                            <i data-lucide="search"></i> Tra cứu
                        </button>
                    </form>

                    <div class="jt-kpis" id="jtKpis"></div>

                    <div class="jt-toolbar">
                        <div class="jt-search">
                            <i data-lucide="search"></i>
                            <input
                                id="jtSearch"
                                type="search"
                                placeholder="Tìm mã / tên KH / SĐT / sự kiện / ghi chú…"
                            />
                        </div>
                        <span class="jt-count" id="jtCount"></span>
                    </div>

                    <div id="jtList" class="jt-list"></div>
                </div>
            </main>
        </div>

        <!-- modal + chat drawer mounts -->
        <div id="jtModalMount"></div>
        <div id="jtChatMount"></div>

        <!-- Script chạy trong Console Zalo Web (chat.zalo.me) để moi mã đơn từ IndexedDB + DOM.
             type="text/plain" → browser KHÔNG chạy; modal "Dán lịch sử" đọc textContent để hiện + copy. -->
        <script type="text/plain" id="jtZaloScript">
            (async () => {
              const RE = /(\d{12})\s+Shop\s+NHI\s*JUDY[^\r\n]*/gi;
              const seen = new Map();
              const grab = () => {
                const t = document.body.innerText, r = new RegExp(RE.source, 'gi'); let m;
                while ((m = r.exec(t))) { if (!seen.has(m[1])) seen.set(m[1], m[0].replace(/\s+/g, ' ').trim().slice(0, 200)); }
              };
              const esc = s => String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
              const old = document.getElementById('__jtbox'); if (old) old.remove();
              const box = document.createElement('div'); box.id = '__jtbox';
              box.style.cssText = 'position:fixed;z-index:2147483647;right:16px;top:16px;width:400px;max-width:92vw;background:#fff;color:#111;border:2px solid #0068ff;border-radius:12px;box-shadow:0 14px 44px rgba(0,0,0,.4);padding:14px;font:13px/1.45 system-ui,Arial';
              document.body.appendChild(box);
              const render = (msg, done) => {
                box.innerHTML = '<div style="font-weight:800;color:#0068ff;margin-bottom:8px">J&amp;T quet ma don - ' + msg + '</div>'
                  + (done ? ('<textarea id="__jtta" readonly style="width:100%;height:150px;font:11px/1.4 monospace;border:1px solid #ccc;border-radius:8px;padding:6px;box-sizing:border-box">' + esc([...seen.values()].join('\n')) + '</textarea>'
                    + '<div style="margin:8px 0;color:#16a34a;font-weight:600">Da boi den + copy san. Ve trang J&amp;T bam "Dan lich su" roi Ctrl+V. (hoac trong o tren: Ctrl+A, Ctrl+C)</div>'
                    + '<button id="__jtclose" style="padding:6px 14px;border:0;background:#0068ff;color:#fff;border-radius:8px;cursor:pointer">Dong</button>') : '');
              };
              render('dang quet + tu cuon len...', false);
              grab();
              const sc = [...document.querySelectorAll('div')].filter(e => e.scrollHeight - e.clientHeight > 300).sort((a, b) => b.scrollHeight - a.scrollHeight)[0];
              if (sc) {
                const t0 = Date.now(); let stable = 0, last = 0;
                while (Date.now() - t0 < 45000 && stable < 12) {
                  sc.scrollTop = 0;
                  await new Promise(r => setTimeout(r, 450));
                  grab();
                  if (seen.size === last) { stable++; } else { stable = 0; last = seen.size; }
                  render('dang quet... ' + seen.size + ' ma (' + Math.round((Date.now() - t0) / 1000) + 's)', false);
                }
              }
              const outText = [...seen.values()].join('\n');
              try { await navigator.clipboard.writeText(outText); } catch (e) {}
              render('XONG - ' + seen.size + ' ma don', true);
              const ta = document.getElementById('__jtta'); if (ta) { ta.focus(); ta.select(); }
              const cb = document.getElementById('__jtclose'); if (cb) cb.onclick = () => box.remove();
            })();
        </script>

        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/web2-sidebar.js?v=20260629c"></script>
        <script src="../shared/web2-skeleton.js?v=20260625a"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <!-- Web2Zalo.mountChat → mở chat nhóm Zalo nguồn của mã (lazy-load chat engine) -->
        <script src="../shared/web2-zalo.js?v=20260623own"></script>
        <!-- Focus-lease: giữ phiên Zalo khi đang xem trang J&T (ăn tin Zalo realtime), nhường chat.zalo.me khi rời -->
        <script src="../shared/web2-zalo-api.js?v=20260623own"></script>
        <script src="../shared/web2-zalo-presence.js?v=20260627cookie"></script>
        <!-- Web2Chat → nhắn tin / gắn thẻ Pancake cho khách (theo SĐT) -->
        <script src="../shared/web2-chat-utils.js?v=20260618w3"></script>
        <script src="../shared/web2-chat-tokens.js?v=20260618w3"></script>

        <script src="../shared/web2-chat-tags.js?v=20260618w3"></script>

        <!-- N2 Extension bridge (tùy chọn) → gửi Pancake bypass 24h -->
        <script src="../shared/web2-extension-bridge.js?v=20260615a"></script>
        <!-- Web2CustomerChat → FULL chat KH (Pancake + Zalo) dùng chung, bấm SĐT mở -->
        <script src="../shared/web2-customer-chat-core.js?v=20260625sse"></script>
        <script src="../shared/web2-customer-chat-modal.js?v=20260625sse"></script>
        <script src="../shared/web2-customer-chat.js?v=20260625sse"></script>
        <!-- J&T Tracking page app — split modules, load in dependency order (app LAST) -->
        <script src="js/jt-tracking-constants.js?v=20260618w1"></script>
        <script src="js/jt-tracking-api.js?v=20260619srcat"></script>
        <script src="js/jt-tracking-state.js?v=20260618w1"></script>
        <script src="js/jt-tracking-render.js?v=20260623w3"></script>
        <script src="js/jt-tracking-modals.js?v=20260620chat"></script>
        <script src="js/jt-tracking-actions.js?v=20260619auto"></script>
        <script src="js/jt-tracking-app.js?v=20260623w3"></script>
        <script>
            // Giữ phiên Zalo khi đang ở trang J&T (ăn mã vận đơn realtime); rời/đóng → nhường chat.zalo.me.
            if (window.Web2ZaloPresence) window.Web2ZaloPresence.start();
