<!-- #Note: WEB2.0 module. F08 — Print / Export hub. -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Print / Export - WEB 2.0</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../shared/tpos-sidebar.css?v=20260522f" />
        <link rel="stylesheet" href="../shared/web2-tpos-theme.css?v=20260522d" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <style>
            .px-main {
                padding: 20px 28px;
            }
            .px-card {
                background: #fff;
                padding: 18px;
                border-radius: 10px;
                box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
                margin-bottom: 16px;
            }
            .px-card h3 {
                margin: 0 0 10px;
                font-size: 14.5px;
            }
            .px-row {
                display: flex;
                gap: 8px;
                align-items: center;
                flex-wrap: wrap;
            }
            .px-row input,
            .px-row select {
                padding: 7px 10px;
                border: 1px solid #d1d5db;
                border-radius: 6px;
                font-size: 13px;
            }
            .px-row button {
                padding: 7px 14px;
                border: 0;
                border-radius: 6px;
                cursor: pointer;
                font-weight: 600;
                color: #fff;
            }
            .btn-pdf {
                background: linear-gradient(135deg, #dc2626, #b91c1c);
            }
            .btn-excel {
                background: linear-gradient(135deg, #16a34a, #15803d);
            }
            .px-hint {
                font-size: 12px;
                color: #58666e;
                margin-top: 8px;
            }
        </style>
    </head>
    <body class="tpos-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="web2-main px-main">
                <h1 style="margin: 0 0 6px">Print &amp; Export hàng loạt</h1>
                <p style="color: #58666e; margin: 0 0 18px; font-size: 13px">
                    Sinh barcode PDF, export Excel cho SP/PBH/SePay log.
                </p>

                <div class="px-card">
                    <h3>1. Barcode labels SP — PDF (A4)</h3>
                    <div class="px-row">
                        <label
                            >Layout
                            <select id="bcLayout">
                                <option value="8x1-A4">8 nhãn dọc</option>
                                <option value="4x6-A4">4×6 grid</option>
                                <option value="2x8-A4">2×8 grid</option>
                            </select>
                        </label>
                        <label
                            >Filter mã (regex tuỳ chọn):
                            <input id="bcFilter" placeholder="VD: ^SP-001"
                        /></label>
                        <button class="btn-pdf" id="btnBarcode">Tạo PDF</button>
                    </div>
                    <p class="px-hint">
                        Lấy data từ <code>/api/web2-products/list</code>. Mỗi nhãn = mã + tên.
                    </p>
                </div>

                <div class="px-card">
                    <h3>2. Export Excel — SP</h3>
                    <div class="px-row">
                        <button class="btn-excel" id="btnExpProducts">Tải Excel SP</button>
                    </div>
                </div>

                <div class="px-card">
                    <h3>3. Export Excel — PBH (Phiếu Bán Hàng)</h3>
                    <div class="px-row">
                        <label>Từ <input id="pbhFrom" type="date" /></label>
                        <label>Đến <input id="pbhTo" type="date" /></label>
                        <button class="btn-excel" id="btnExpPbh">Tải Excel PBH</button>
                    </div>
                </div>

                <div class="px-card">
                    <h3>4. Export Excel — SePay log</h3>
                    <div class="px-row">
                        <label>Từ <input id="seFrom" type="date" /></label>
                        <label>Đến <input id="seTo" type="date" /></label>
                        <button class="btn-excel" id="btnExpSepay">Tải Excel SePay</button>
                    </div>
                </div>
            </main>
        </div>
        <script src="../shared/web2-auth.js?v=20260522f"></script>
        <script src="../shared/web2-export-helpers.js?v=20260522a"></script>
        <script src="../shared/tpos-sidebar.js?v=20260522f"></script>
        <script>
            (function () {
                const PROXY = 'https://chatomni-proxy.nhijudyshop.workers.dev';
                async function fetchProducts() {
                    const r = await fetch(PROXY + '/api/web2-products/list?limit=2000', {
                        credentials: 'include',
                    });
                    const d = await r.json();
                    return d.items || d.products || [];
                }
                document.getElementById('btnBarcode').onclick = async (e) => {
                    const btn = e.target;
                    btn.disabled = true;
                    btn.textContent = 'Đang tạo…';
                    try {
                        let items = await fetchProducts();
                        const f = document.getElementById('bcFilter').value.trim();
                        if (f) {
                            const re = new RegExp(f);
                            items = items.filter((p) => re.test(p.code || ''));
                        }
                        if (!items.length) return alert('Không có SP');
                        await Web2Export.toPDFBarcodes(items.slice(0, 200), {
                            layout: document.getElementById('bcLayout').value,
                            filename: 'barcodes-' + Date.now() + '.pdf',
                            valueKey: 'code',
                            labelKeys: ['name', 'price'],
                        });
                    } catch (err) {
                        alert('Lỗi: ' + err.message);
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Tạo PDF';
                    }
                };
                document.getElementById('btnExpProducts').onclick = async (e) => {
                    const btn = e.target;
                    btn.disabled = true;
                    btn.textContent = 'Đang tạo…';
                    try {
                        const items = await fetchProducts();
                        await Web2Export.toExcel(items, {
                            filename: 'web2-products.xlsx',
                            sheetName: 'Products',
                        });
                    } catch (err) {
                        alert('Lỗi: ' + err.message);
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Tải Excel SP';
                    }
                };
                document.getElementById('btnExpPbh').onclick = async (e) => {
                    const btn = e.target;
                    btn.disabled = true;
                    btn.textContent = 'Đang tạo…';
                    try {
                        const f = document.getElementById('pbhFrom').value;
                        const t = document.getElementById('pbhTo').value;
                        const q = new URLSearchParams();
                        if (f) q.set('from', f);
                        if (t) q.set('to', t);
                        q.set('limit', '5000');
                        const r = await fetch(PROXY + '/api/fast-sale-orders/load?' + q, {
                            credentials: 'include',
                        });
                        const d = await r.json();
                        const items = d.items || d.orders || [];
                        await Web2Export.toExcel(items, {
                            filename: 'pbh-' + (f || 'all') + '.xlsx',
                            sheetName: 'PBH',
                        });
                    } catch (err) {
                        alert('Lỗi: ' + err.message);
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Tải Excel PBH';
                    }
                };
                document.getElementById('btnExpSepay').onclick = async (e) => {
                    const btn = e.target;
                    btn.disabled = true;
                    btn.textContent = 'Đang tạo…';
                    try {
                        const f = document.getElementById('seFrom').value;
                        const t = document.getElementById('seTo').value;
                        const q = new URLSearchParams();
                        if (f) q.set('from', f);
                        if (t) q.set('to', t);
                        q.set('limit', '5000');
                        const r = await fetch(PROXY + '/api/v2/balance-history/?' + q, {
                            credentials: 'include',
                        });
                        const d = await r.json();
                        const items = d.items || d.transactions || [];
                        await Web2Export.toExcel(items, {
                            filename: 'sepay-' + (f || 'all') + '.xlsx',
                            sheetName: 'SePay',
                        });
                    } catch (err) {
                        alert('Lỗi: ' + err.message);
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Tải Excel SePay';
                    }
                };
                document.addEventListener('DOMContentLoaded', () => {
                    if (window.Web2Sidebar)
                        Web2Sidebar.mount('#web2Aside', { activeRoute: 'print-export' });
                });
            })();
        </script>
    </body>
</html>
