<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Lịch sử biến động số dư - WEB 2.0</title>

        <script type="application/json" id="web2-page-meta">
            {
                "title": "Lịch sử biến động số dư (SePay)",
                "slug": "balance-history",
                "breadcrumb": ["App", "Tài chính"]
            }
        </script>

        <script>
            window.__SKIP_LEGACY_NAV_AUTH = true;
        </script>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../../web2/shared/tpos-sidebar.css?v=20260526a" />
        <link rel="stylesheet" href="../../native-orders/css/tpos-theme.css?v=20260526a" />
        <link rel="stylesheet" href="../../web2/shared/web2-tpos-theme.css?v=20260526a" />
        <link rel="stylesheet" href="css/web2-balance-history.css?v=20260526a" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>

        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

        <script src="../../shared/js/firebase-config.js?v=20260526a"></script>
        <script src="../../shared/js/notification-system.js?v=20260526a"></script>
        <script src="../../shared/js/core-loader.js?v=20260526a"></script>
        <script src="../../shared/js/token-manager.js?v=20260526a"></script>
    </head>
    <body class="tpos-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main
                class="main-content w2bh-app"
                id="web2BhApp"
                style="overflow: auto; height: 100vh"
            >
                <header class="w2bh-head">
                    <div class="w2bh-title">
                        <i data-lucide="receipt"></i>
                        <h1>Lịch sử biến động số dư</h1>
                        <span class="w2bh-pill-info">
                            <i data-lucide="shield-check" style="width: 12px; height: 12px"></i>
                            Web 2.0 isolated — auto-credit
                        </span>
                    </div>
                    <div class="w2bh-head-actions">
                        <button
                            type="button"
                            class="w2bh-btn"
                            id="w2bhReprocessBtn"
                            title="Reprocess unmatched: chạy lại extractor cho rows chưa gán KH"
                        >
                            <i data-lucide="wand-2"></i> Reprocess chưa gán
                        </button>
                        <button type="button" class="w2bh-btn" id="w2bhRefreshBtn" title="Tải lại">
                            <i data-lucide="refresh-cw"></i> Tải lại
                        </button>
                    </div>
                </header>

                <!-- Stats -->
                <section class="w2bh-stats" id="w2bhStatsBar">
                    <div class="w2bh-stat-card">
                        <span class="w2bh-stat-label">Tổng GD</span>
                        <span class="w2bh-stat-value" id="w2bhStatTotal">—</span>
                    </div>
                    <div class="w2bh-stat-card">
                        <span class="w2bh-stat-label">Tự động</span>
                        <span class="w2bh-stat-value" id="w2bhStatAuto">—</span>
                    </div>
                    <div class="w2bh-stat-card stat-pending">
                        <span class="w2bh-stat-label">Trùng SĐT</span>
                        <span class="w2bh-stat-value" id="w2bhStatPending">—</span>
                    </div>
                    <div class="w2bh-stat-card stat-nophone">
                        <span class="w2bh-stat-label">Chưa gán</span>
                        <span class="w2bh-stat-value" id="w2bhStatNoPhone">—</span>
                    </div>
                    <div class="w2bh-stat-card stat-in">
                        <span class="w2bh-stat-label">Tổng tiền vào</span>
                        <span class="w2bh-stat-value" id="w2bhStatSumIn">—</span>
                    </div>
                </section>

                <!-- Filter chips -->
                <div class="w2bh-chips" id="w2bhChips"></div>

                <!-- Toolbar: search + date range + CSV -->
                <div class="w2bh-toolbar">
                    <div class="w2bh-search">
                        <input
                            id="w2bhSearch"
                            type="search"
                            placeholder="Tìm SĐT / sepay_id / nội dung (không dấu OK)… (Ctrl/⌘+K)"
                            autocomplete="off"
                        />
                        <kbd class="w2bh-kbd" title="Ctrl/⌘+K">⌘K</kbd>
                    </div>
                    <div class="w2bh-date-range">
                        <label>Từ:</label>
                        <input id="w2bhDateFrom" type="date" />
                        <label>Đến:</label>
                        <input id="w2bhDateTo" type="date" />
                        <button
                            type="button"
                            class="w2bh-btn-sm"
                            id="w2bhDateClear"
                            title="Xoá lọc ngày"
                        >
                            ×
                        </button>
                    </div>
                    <button
                        type="button"
                        class="w2bh-btn"
                        id="w2bhCsvBtn"
                        title="Xuất CSV theo filter"
                    >
                        <i data-lucide="download"></i> CSV
                    </button>
                </div>

                <!-- Table -->
                <div class="w2bh-table-wrap">
                    <table class="w2bh-table">
                        <thead>
                            <tr>
                                <th>Thời gian</th>
                                <th style="text-align: right">Số tiền</th>
                                <th>Nội dung</th>
                                <th>Mã tham chiếu</th>
                                <th>Khách hàng</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="w2bhTbody">
                            <tr>
                                <td colspan="6" class="w2bh-loading">Đang tải…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <footer class="w2bh-pagination">
                    <span class="w2bh-page-info" id="w2bhPageInfo">—</span>
                    <div class="w2bh-page-buttons" id="w2bhPageButtons"></div>
                    <select id="w2bhPageSize" class="w2bh-page-size">
                        <option value="20">20 / trang</option>
                        <option value="50" selected>50 / trang</option>
                        <option value="100">100 / trang</option>
                        <option value="200">200 / trang</option>
                    </select>
                </footer>
            </main>
        </div>

        <!-- Web 2.0 isolated scripts ONLY (no legacy /api/sepay, no /api/v2/balance-history) -->
        <script src="../../web2/shared/web2-auth.js?v=20260526a"></script>
        <script src="../../web2/shared/tpos-sidebar.js?v=20260526a"></script>
        <script src="../../web2/shared/web2-sse-bridge.js?v=20260526a"></script>
        <script src="../partner-customer/js/partner-customer-api.js?v=20260526a"></script>
        <script src="js/tpos-partner-enricher.js?v=20260526a"></script>
        <script src="js/web2-pending-match.js?v=20260526a"></script>
        <script src="js/web2-link-customer-modal.js?v=20260526a"></script>
        <script src="js/web2-balance-history-app.js?v=20260526a"></script>
        <script>
            Web2Sidebar.mount('#web2Aside', { activeUrl: window.location.href });
            if (window.lucide) window.lucide.createIcons();
        </script>
    </body>
</html>
