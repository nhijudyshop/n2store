<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Người dùng - WEB 2.0</title>
        <meta name="web2-db" content="render" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-components.css?v=20260613z" />
        <link rel="stylesheet" href="css/users.css?v=20260624pw" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <script src="../../shared/js/notification-system.js?v=20260521b"></script>
        <link rel="stylesheet" href="../../web2/shared/web2-theme.css?v=20260625anim" />
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content u-main">
                <header class="u-page-head">
                    <div class="u-page-title">
                        <i data-lucide="users"></i>
                        <h1>Người dùng Web 2.0</h1>
                    </div>
                    <div class="u-page-counters">
                        <span class="counter-pill" id="uCount">0 user</span>
                        <button
                            class="btn btn-secondary"
                            id="uRefreshBtn"
                            type="button"
                            title="Tải lại"
                        >
                            <i data-lucide="refresh-cw"></i>
                        </button>
                        <button class="btn btn-primary" id="uCreateBtn" type="button">
                            <i data-lucide="user-plus"></i> Tạo người dùng
                        </button>
                    </div>
                </header>

                <!-- 2026-06-24: gộp "Phân quyền" (users-permissions) vào module Người
                     dùng — 2 tab: danh sách user + ma trận phân quyền (nhúng iframe). -->
                <div
                    class="u-tabs"
                    role="tablist"
                    style="
                        display: flex;
                        gap: 6px;
                        margin: 0 0 14px;
                        border-bottom: 1px solid var(--web2-border, #e2e8f0);
                    "
                >
                    <button
                        class="u-tab is-active"
                        data-utab="users"
                        type="button"
                        role="tab"
                        style="
                            background: none;
                            border: none;
                            border-bottom: 2px solid var(--web2-primary, #2563eb);
                            color: var(--web2-primary, #2563eb);
                            font-weight: 600;
                            font-size: 14px;
                            padding: 8px 14px;
                            cursor: pointer;
                            display: inline-flex;
                            align-items: center;
                            gap: 6px;
                        "
                    >
                        <i data-lucide="users" style="width: 16px; height: 16px"></i> Người dùng
                    </button>
                    <button
                        class="u-tab"
                        data-utab="perms"
                        type="button"
                        role="tab"
                        style="
                            background: none;
                            border: none;
                            border-bottom: 2px solid transparent;
                            color: #64748b;
                            font-weight: 600;
                            font-size: 14px;
                            padding: 8px 14px;
                            cursor: pointer;
                            display: inline-flex;
                            align-items: center;
                            gap: 6px;
                        "
                    >
                        <i data-lucide="shield-check" style="width: 16px; height: 16px"></i> Phân
                        quyền
                    </button>
                </div>

                <div id="uPanelUsers" class="u-tabpanel">
                    <section class="u-toolbar">
                        <div class="u-toolbar-row">
                            <input
                                id="uSearch"
                                type="search"
                                placeholder="Tìm theo username, tên, email…"
                                autocomplete="off"
                                class="u-search-input"
                            />
                            <label class="u-toggle">
                                <input type="checkbox" id="uShowInactive" />
                                <span>Hiển thị user đã vô hiệu</span>
                            </label>
                            <button
                                class="btn btn-secondary u-purge-all"
                                id="uPurgeAllBtn"
                                type="button"
                                hidden
                                title="Xoá vĩnh viễn toàn bộ user đã vô hiệu"
                            >
                                <i data-lucide="trash-2"></i> Xoá hẳn user vô hiệu
                            </button>
                        </div>
                    </section>

                    <div class="u-table-wrap">
                        <table class="data-table u-table" id="uTable">
                            <thead>
                                <tr>
                                    <th class="u-col-stt">#</th>
                                    <th>Username</th>
                                    <th class="u-col-pwd">Mật khẩu</th>
                                    <th>Họ tên</th>
                                    <th>Email / SĐT</th>
                                    <th class="u-col-role">Vai trò</th>
                                    <th class="u-col-state">Trạng thái</th>
                                    <th>Đăng nhập gần nhất</th>
                                    <th class="u-col-actions">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="uTableBody"></tbody>
                        </table>
                        <div class="u-empty" id="uEmpty" hidden>
                            <i data-lucide="user-x"></i>
                            <p>Chưa có user nào.</p>
                        </div>
                    </div>
                </div>
                <!-- /uPanelUsers -->

                <div id="uPanelPerms" class="u-tabpanel" hidden>
                    <iframe
                        id="uPermFrame"
                        title="Ma trận phân quyền Web 2.0"
                        loading="lazy"
                        style="
                            width: 100%;
                            height: calc(100vh - 190px);
                            min-height: 480px;
                            border: 1px solid var(--web2-border, #e2e8f0);
                            border-radius: 10px;
                            background: #fff;
                        "
                    ></iframe>
                </div>
            </main>
        </div>

        <!-- Create / Edit user modal -->
        <div class="u-modal" id="uUserModal" hidden>
            <div class="u-modal-backdrop" data-u-close></div>
            <div class="u-modal-panel u-modal-panel-narrow">
                <header class="u-modal-head">
                    <h2 id="uUserModalTitle">Tạo người dùng</h2>
                    <button class="u-modal-close" type="button" data-u-close>
                        <i data-lucide="x"></i>
                    </button>
                </header>
                <div class="u-modal-body">
                    <label class="u-field">
                        <span>Username <em>*</em></span>
                        <input id="uFormUsername" type="text" autocomplete="off" maxlength="40" />
                        <small>2-40 ký tự, chỉ a-z 0-9 _ . -</small>
                    </label>
                    <label class="u-field" id="uPasswordField">
                        <span id="uPasswordLabel">Mật khẩu <em>*</em></span>
                        <div class="u-pass-row">
                            <input id="uFormPassword" type="text" autocomplete="new-password" />
                            <button
                                class="u-pass-gen"
                                type="button"
                                id="uFormPassGen"
                                title="Tạo mật khẩu ngẫu nhiên (1 từ tiếng Anh 9 chữ)"
                            >
                                <i data-lucide="dices"></i> Tạo
                            </button>
                        </div>
                        <small id="uPasswordHint"
                            >Tối thiểu 6 ký tự. Bấm "Tạo" để sinh 1 từ tiếng Anh dễ nhớ.</small
                        >
                    </label>
                    <label class="u-field">
                        <span>Họ tên <em>*</em></span>
                        <input id="uFormDisplayName" type="text" maxlength="100" />
                    </label>
                    <div class="u-field-row">
                        <label class="u-field">
                            <span>Email</span>
                            <input id="uFormEmail" type="email" maxlength="120" />
                        </label>
                        <label class="u-field">
                            <span>SĐT</span>
                            <input id="uFormPhone" type="tel" maxlength="30" />
                        </label>
                    </div>
                    <label class="u-field">
                        <span>Vai trò</span>
                        <select id="uFormRole">
                            <option value="admin">Admin (toàn quyền)</option>
                            <option value="manager">Quản lý</option>
                            <option value="staff" selected>Nhân viên</option>
                            <option value="viewer">Chỉ xem</option>
                        </select>
                        <small
                            >Quyết định phân quyền mặc định. Có thể tinh chỉnh sau qua nút "Phân
                            quyền".</small
                        >
                    </label>
                    <label class="u-field">
                        <span>Ghi chú</span>
                        <textarea id="uFormNote" rows="2" maxlength="300"></textarea>
                    </label>
                </div>
                <footer class="u-modal-foot">
                    <button class="btn btn-secondary" type="button" data-u-close>Hủy</button>
                    <button class="btn btn-primary" id="uUserSaveBtn" type="button">
                        <i data-lucide="check"></i> Lưu
                    </button>
                </footer>
            </div>
        </div>

        <!-- Change password modal -->
        <div class="u-modal" id="uPasswordModal" hidden>
            <div class="u-modal-backdrop" data-u-close></div>
            <div class="u-modal-panel u-modal-panel-narrow">
                <header class="u-modal-head">
                    <h2>Đổi mật khẩu: <span id="uPwdUsername">—</span></h2>
                    <button class="u-modal-close" type="button" data-u-close>
                        <i data-lucide="x"></i>
                    </button>
                </header>
                <div class="u-modal-body">
                    <label class="u-field">
                        <span>Mật khẩu mới <em>*</em></span>
                        <div class="u-pass-row">
                            <input id="uPwdNew" type="text" autocomplete="new-password" />
                            <button
                                class="u-pass-gen"
                                type="button"
                                id="uPwdGen"
                                title="Tạo mật khẩu ngẫu nhiên (1 từ tiếng Anh 9 chữ)"
                            >
                                <i data-lucide="dices"></i> Tạo
                            </button>
                        </div>
                        <small>Tối thiểu 6 ký tự. Mọi session hiện tại sẽ bị logout.</small>
                    </label>
                </div>
                <footer class="u-modal-foot">
                    <button class="btn btn-secondary" type="button" data-u-close>Hủy</button>
                    <button class="btn btn-primary" id="uPwdSaveBtn" type="button">
                        <i data-lucide="check"></i> Đổi mật khẩu
                    </button>
                </footer>
            </div>
        </div>

        <!-- Permissions matrix modal -->
        <div class="u-modal" id="uPermsModal" hidden>
            <div class="u-modal-backdrop" data-u-close></div>
            <div class="u-modal-panel u-modal-panel-wide">
                <header class="u-modal-head">
                    <h2>Phân quyền: <span id="uPermsUsername">—</span></h2>
                    <button class="u-modal-close" type="button" data-u-close>
                        <i data-lucide="x"></i>
                    </button>
                </header>
                <div class="u-modal-body">
                    <div class="u-perms-toolbar">
                        <button
                            class="btn btn-secondary btn-sm"
                            id="uPermsResetDefaults"
                            type="button"
                        >
                            <i data-lucide="rotate-ccw"></i> Reset về mặc định theo vai trò
                        </button>
                        <button class="btn btn-secondary btn-sm" id="uPermsCheckAll" type="button">
                            ✓ Tick tất cả
                        </button>
                        <button
                            class="btn btn-secondary btn-sm"
                            id="uPermsUncheckAll"
                            type="button"
                        >
                            ✗ Bỏ tất cả
                        </button>
                    </div>
                    <div class="u-perms-grid" id="uPermsGrid"></div>
                    <p class="u-perms-hint">
                        Tick action user được phép làm trên page. Bỏ tick "Xem trang" → user không
                        vào được page.
                    </p>
                </div>
                <footer class="u-modal-foot">
                    <button class="btn btn-secondary" type="button" data-u-close>Hủy</button>
                    <button class="btn btn-primary" id="uPermsSaveBtn" type="button">
                        <i data-lucide="check"></i> Lưu phân quyền
                    </button>
                </footer>
            </div>
        </div>

        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/web2-sidebar.js?v=20260629b"></script>
        <script src="../shared/web2-skeleton.js?v=20260625a"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <!-- Avatar DiceBear (Web2UserProfile.avatarUrl) — load TRƯỚC app để table render
             avatar ngay, không chờ sidebar inject async. -->
        <script src="../shared/web2-user-profile.js?v=20260624a"></script>
        <script src="js/users-app.js?v=20260624pw6"></script>
        <script>
            Web2Sidebar.mount('#web2Aside', { activeUrl: window.location.href });
            // Tab switch: Người dùng ↔ Phân quyền (iframe lazy-load). Gộp users-permissions
            // vào module Người dùng (2026-06-24).
            (function () {
                const tabs = document.querySelectorAll('.u-tab');
                const panU = document.getElementById('uPanelUsers');
                const panP = document.getElementById('uPanelPerms');
                const frame = document.getElementById('uPermFrame');
                function activate(name) {
                    tabs.forEach((t) => {
                        const on = t.dataset.utab === name;
                        t.classList.toggle('is-active', on);
                        t.style.color = on ? 'var(--web2-primary,#2563eb)' : '#64748b';
                        t.style.borderBottomColor = on
                            ? 'var(--web2-primary,#2563eb)'
                            : 'transparent';
                    });
                    if (panU) panU.hidden = name !== 'users';
                    if (panP) panP.hidden = name !== 'perms';
                    // Reload iframe MỖI lần vào tab Phân quyền (cache-bust) → luôn lấy
                    // ma trận mới nhất, tránh ghi đè quyền bằng state cũ sau khi vừa
                    // sửa user ở tab Người dùng. (iframe không có SSE riêng.)
                    if (name === 'perms' && frame) {
                        frame.src = '../users-permissions/index.html?embed=1&t=' + Date.now();
                    }
                }
                tabs.forEach((t) => t.addEventListener('click', () => activate(t.dataset.utab)));
                // Deep-link: web2/users/?tab=perms mở thẳng tab Phân quyền.
                if (new URLSearchParams(location.search).get('tab') === 'perms') activate('perms');
            })();
        </script>
    </body>
</html>
