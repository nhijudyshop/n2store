<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Thống kê doanh thu - WEB 2.0</title>
        <meta name="web2-db" content="render" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <style>
            body {
                background: #f5f6f8;
                font-family: Inter, system-ui, sans-serif;
            }
            .main-content {
                padding: 24px;
                overflow: auto;
                height: 100vh;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
            }
            .header h1 {
                margin: 0;
                font-size: 22px;
                color: #111827;
            }
            .range-select {
                display: flex;
                gap: 6px;
            }
            .range-select button {
                padding: 6px 14px;
                border: 1px solid #d1d5db;
                background: #fff;
                border-radius: 6px;
                cursor: pointer;
                font-size: 13px;
            }
            .range-select button.active {
                background: #0058da;
                color: #fff;
                border-color: #0058da;
            }
            .kpi-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 16px;
                margin-bottom: 24px;
            }
            .kpi-card {
                background: #fff;
                border: 1px solid #e5e7eb;
                border-radius: 10px;
                padding: 16px;
            }
            .kpi-card .label {
                font-size: 11px;
                font-weight: 600;
                color: #6b7280;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                margin-bottom: 6px;
            }
            .kpi-card .value {
                font-size: 24px;
                font-weight: 700;
                color: #111827;
            }
            .kpi-card .sub {
                font-size: 11px;
                color: #9ca3af;
                margin-top: 4px;
            }
            .kpi-card.green {
                border-top: 3px solid #10b981;
            }
            .kpi-card.purple {
                border-top: 3px solid #0058da;
            }
            .kpi-card.orange {
                border-top: 3px solid #f59e0b;
            }
            .kpi-card.red {
                border-top: 3px solid #ef4444;
            }
            .kpi-card.blue {
                border-top: 3px solid #3b82f6;
            }
            .panels {
                display: grid;
                grid-template-columns: 2fr 1fr;
                gap: 16px;
                margin-bottom: 24px;
            }
            .panel {
                background: #fff;
                border: 1px solid #e5e7eb;
                border-radius: 10px;
                padding: 16px;
            }
            .panel h3 {
                margin: 0 0 12px;
                font-size: 14px;
                color: #374151;
            }
            .chart {
                height: 240px;
                display: flex;
                align-items: flex-end;
                gap: 4px;
                padding: 8px 0;
                border-bottom: 1px solid #e5e7eb;
            }
            .bar {
                flex: 1;
                background: linear-gradient(180deg, #2a96ff, #0058da);
                border-radius: 4px 4px 0 0;
                min-height: 4px;
                position: relative;
                transition: opacity 0.15s;
            }
            .bar:hover {
                opacity: 0.8;
            }
            .bar .tip {
                display: none;
                position: absolute;
                bottom: 100%;
                left: 50%;
                transform: translateX(-50%);
                background: #111827;
                color: #fff;
                padding: 4px 8px;
                font-size: 11px;
                border-radius: 4px;
                white-space: nowrap;
                margin-bottom: 4px;
            }
            .bar:hover .tip {
                display: block;
            }
            .chart-x-axis {
                display: flex;
                gap: 4px;
                font-size: 9px;
                color: #9ca3af;
                margin-top: 4px;
            }
            .chart-x-axis span {
                flex: 1;
                text-align: center;
            }
            /* Table look uses canonical .data-table; keep only the right-aligned money cell */
            .table-list td.right {
                text-align: right;
                font-weight: 600;
            }
            .state-pies {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
            }
            .state-pie {
                flex: 1;
                min-width: 100px;
                padding: 10px;
                background: #f9fafb;
                border-radius: 6px;
                text-align: center;
            }
            .state-pie .count {
                font-size: 22px;
                font-weight: 700;
            }
            .state-pie.draft .count {
                color: #6b7280;
            }
            .state-pie.confirmed .count {
                color: #3b82f6;
            }
            .state-pie.done .count {
                color: #10b981;
            }
            .state-pie.cancel .count {
                color: #ef4444;
            }
            .state-pie .label-pie {
                font-size: 11px;
                color: #6b7280;
                margin-top: 4px;
                text-transform: uppercase;
            }
            .loading {
                color: #9ca3af;
                padding: 16px;
                text-align: center;
                font-style: italic;
            }
            @media (max-width: 768px) {
                .panels {
                    grid-template-columns: 1fr;
                }
                .main-content {
                    padding: 14px;
                }
            }
        </style>
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260625anim" />
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content">
                <div class="header">
                    <div>
                        <div style="font-size: 11px; color: #9ca3af">App / Báo cáo</div>
                        <h1>📊 Thống kê doanh thu PBH</h1>
                    </div>
                    <div class="range-select" id="rangeSelect">
                        <button data-days="7">7 ngày</button>
                        <button data-days="30" class="active">30 ngày</button>

                        <button data-days="365">365 ngày</button>
                    </div>
                </div>

                <div class="kpi-grid" id="kpiGrid">
                    <span class="w2-skel" style="height: 88px; border-radius: 12px"></span>
                    <span class="w2-skel" style="height: 88px; border-radius: 12px"></span>
                    <span class="w2-skel" style="height: 88px; border-radius: 12px"></span>
                    <span class="w2-skel" style="height: 88px; border-radius: 12px"></span>
                    <span class="w2-skel" style="height: 88px; border-radius: 12px"></span>
                    <span class="w2-skel" style="height: 88px; border-radius: 12px"></span>
                </div>

                <div class="panels">
                    <div class="panel">
                        <h3>📈 Doanh thu theo ngày</h3>
                        <div id="revenueChart" class="loading">
                            <span
                                class="w2-skel"
                                style="display: block; height: 240px; border-radius: 10px"
                            ></span>
                        </div>
                    </div>
                    <div class="panel">
                        <h3>📦 Phân loại đơn theo trạng thái</h3>
                        <div id="stateBreakdown" class="loading">
                            <span
                                class="w2-skel"
                                style="display: block; height: 64px; border-radius: 8px"
                            ></span>

                    </div>

                <div class="panels">
                    <div class="panel">
                        <h3>🏆 Top khách hàng</h3>
                        <div id="topCustomers" class="loading">
                            <span
                                class="w2-skel"
                                style="display: block; height: 180px; border-radius: 8px"
                            ></span>

                    <div class="panel">
                        <h3>📣 Theo chiến dịch</h3>
                        <div id="byCampaign" class="loading">
                            <span
                                class="w2-skel"
                                style="display: block; height: 180px; border-radius: 8px"

                    </div>
                </div>

                <div class="panels" style="grid-template-columns: 1fr">
                    <div class="panel">
                        <h3>🌐 Top khách hàng 360° (NW + PBH combined)</h3>
                        <div
                            id="topCustomers360Hint"
                            style="font-size: 12px; color: #6b7280; margin-bottom: 8px"

                        <div id="topCustomers360" class="loading">

        <!-- 3W4: pbh-realtime.js (WS) đã gỡ — realtime qua web2-sse-bridge.js -->
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <script src="../../web2/shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../../web2/shared/web2-sidebar.js?v=20260629c"></script>
        <script>
            const WORKER = 'https://chatomni-proxy.nhijudyshop.workers.dev';
            let currentDays = 30;
            const $ = (s) => document.querySelector(s);

            // Filter đổi nhanh → hủy request cũ + bỏ qua response cũ (tránh race ghi đè).
            let _loadSeq = 0; // version counter
            let _loadAbort = null; // AbortController của loadAll đang chạy
            function _signal() {
                return _loadAbort ? _loadAbort.signal : undefined;
            }

            // ENFORCE-PREP (2026-06-12): gắn x-web2-token cho /api/pbh-reports/* (soft-gate → WEB2_AUTH_ENFORCE=1)
            function AUTHH(extra) {
                if (window.Web2Auth?.authHeaders) return window.Web2Auth.authHeaders(extra);
                try {
                    const t = JSON.parse(localStorage.getItem('web2_auth'))?.token;
                    return t ? { ...(extra || {}), 'x-web2-token': t } : { ...(extra || {}) };
                } catch {
                    return { ...(extra || {}) };
                }
            }

            function fmtMoney(n) {
                const v = Number(n) || 0;
                if (v >= 1e9) return (v / 1e9).toFixed(2) + ' tỷ';
                if (v >= 1e6) return (v / 1e6).toFixed(1) + ' tr';
                if (v >= 1e3) return (v / 1e3).toFixed(0) + 'k';
                return v.toLocaleString('vi-VN');
            }
            function esc(s) {
                const d = document.createElement('div');
                d.textContent = String(s ?? '');
                return d.innerHTML;
            }

            async function loadSummary(seq) {
                const r = await fetch(`${WORKER}/api/pbh-reports/summary?days=${currentDays}`, {
                    signal: _signal(),
                    headers: AUTHH(), // ENFORCE-PREP (2026-06-12)
                });
                const d = await r.json();
                if (seq !== _loadSeq) return; // response cũ — bỏ qua
                if (!d.success) throw new Error(d.error);
                // expose tổng quan doanh thu cho widget AI (Web2AiPageRegistry). Các phần chi tiết
                // (biểu đồ/top KH/chiến dịch) render ra bảng DOM — widget đọc DOM bổ sung.
                window.Web2ReportRevenueData = Object.assign(window.Web2ReportRevenueData || {}, {
                    summary: d,
                });
                // revenue.total = tổng đúng theo range days (month/week chỉ đúng cho 30/7 ngày)
                $('#kpiGrid').innerHTML = `
                    <div class="kpi-card green">
                        <div class="label">Doanh thu hôm nay</div>
                        <div class="value">${fmtMoney(d.revenue.today)}</div>
                        <div class="sub">${d.pbh.today} đơn</div>
                    </div>
                    <div class="kpi-card purple">
                        <div class="label">Doanh thu ${currentDays} ngày</div>
                        <div class="value">${fmtMoney(d.revenue.total)}</div>
                        <div class="sub">${d.pbh.total} PBH</div>
                    </div>
                    <div class="kpi-card orange">
                        <div class="label">Tổng còn nợ</div>
                        <div class="value">${fmtMoney(d.revenue.residual)}</div>
                        <div class="sub">Đơn chưa thu hết tiền</div>
                    </div>
                    <div class="kpi-card blue">
                        <div class="label">Đơn Web</div>
                        <div class="value">${d.nativeOrders.total || 0}</div>
                        <div class="sub">${d.nativeOrders.native_draft || 0} giỏ hàng · ${d.nativeOrders.native_confirmed || 0} đã PBH</div>
                    </div>
                    <div class="kpi-card blue">
                        <div class="label">Phiếu giao đang ship</div>
                        <div class="value">${d.delivery.dlv_shipping || 0}</div>
                        <div class="sub">${d.delivery.dlv_delivered || 0} đã giao · ${d.delivery.total || 0} tổng</div>
                    </div>
                    <div class="kpi-card red">
                        <div class="label">Trả hàng hoàn thành</div>
                        <div class="value">${fmtMoney(d.refunds.totalAmount)}</div>
                        <div class="sub">${d.refunds.completed} phiếu</div>
                    </div>
                `;
                $('#stateBreakdown').innerHTML = `
                    <div class="state-pies">
                        <div class="state-pie draft"><div class="count">${d.pbh.states.draft}</div><div class="label-pie">Nháp</div></div>
                        <div class="state-pie confirmed"><div class="count">${d.pbh.states.confirmed}</div><div class="label-pie">Đã XN</div></div>
                        <div class="state-pie done"><div class="count">${d.pbh.states.done}</div><div class="label-pie">Hoàn thành</div></div>
                        <div class="state-pie cancel"><div class="count">${d.pbh.states.cancel}</div><div class="label-pie">Đã hủy</div></div>
                    </div>
                `;
            }

            async function loadRevenueChart(seq) {
                const r = await fetch(`${WORKER}/api/pbh-reports/revenue?days=${currentDays}`, {
                    signal: _signal(),
                    headers: AUTHH(), // ENFORCE-PREP (2026-06-12)
                });
                const d = await r.json();
                if (seq !== _loadSeq) return;
                if (!d.success) throw new Error(d.error);
                if (d.series.length === 0) {
                    $('#revenueChart').innerHTML =
                        '<div class="loading">Chưa có doanh thu trong khoảng thời gian này</div>';
                    return;
                }
                const max = Math.max(...d.series.map((s) => s.revenue || 1));
                const bars = d.series
                    .map((s) => {
                        const h = max > 0 ? (s.revenue / max) * 100 : 0;
                        const [_y, _mo, _d] = String(s.day).split('-').map(Number);
                        const day = new Date(_y, (_mo || 1) - 1, _d || 1); // audit r9: local midnight (hết lệch -1 ngày GMT+7)
                        const lbl = `${String(day.getDate()).padStart(2, '0')}/${String(day.getMonth() + 1).padStart(2, '0')}`;
                        return `<div class="bar" style="height:${h}%"><span class="tip">${lbl}: ${fmtMoney(s.revenue)} · ${s.orderCount} đơn</span></div>`;
                    })
                    .join('');
                const skipEvery = Math.max(1, Math.floor(d.series.length / 10));
                const xLabels = d.series
                    .map((s, i) => {
                        if (i % skipEvery !== 0) return '<span></span>';
                        const [_y, _mo, _d] = String(s.day).split('-').map(Number);
                        const day = new Date(_y, (_mo || 1) - 1, _d || 1); // audit r9: local midnight (hết lệch -1 ngày GMT+7)
                        return `<span>${String(day.getDate()).padStart(2, '0')}/${String(day.getMonth() + 1).padStart(2, '0')}</span>`;
                    })
                    .join('');
                $('#revenueChart').innerHTML =
                    `<div class="chart">${bars}</div><div class="chart-x-axis">${xLabels}</div>`;
            }

            async function loadTopCustomers(seq) {
                const r = await fetch(
                    `${WORKER}/api/pbh-reports/top-customers?days=${currentDays}&limit=10`,
                    { signal: _signal(), headers: AUTHH() } // ENFORCE-PREP (2026-06-12)
                );
                const d = await r.json();
                if (seq !== _loadSeq) return;
                if (!d.success) throw new Error(d.error);
                if (d.customers.length === 0) {
                    $('#topCustomers').innerHTML = '<div class="loading">Chưa có dữ liệu</div>';
                    return;
                }
                $('#topCustomers').innerHTML = `
                    <table class="data-table table-list">
                        <thead><tr><th>#</th><th>Khách hàng</th><th>SĐT</th><th class="right">Đơn</th><th class="right">Doanh thu</th></tr></thead>
                        <tbody>
                            ${d.customers
                                .map(
                                    (c, i) => `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td><strong>${esc(c.name || '—')}</strong></td>
                                    <td><code style="font-size:11px">${esc(c.phone || '—')}</code></td>
                                    <td class="right">${c.orderCount}</td>
                                    <td class="right" style="color:#10b981">${fmtMoney(c.totalRevenue)}</td>
                                </tr>
                            `
                                )
                                .join('')}
                        </tbody>
                    </table>
                `;
            }

            async function loadByCampaign(seq) {
                const r = await fetch(`${WORKER}/api/pbh-reports/by-campaign?days=${currentDays}`, {
                    signal: _signal(),
                    headers: AUTHH(), // ENFORCE-PREP (2026-06-12)
                });
                const d = await r.json();
                if (seq !== _loadSeq) return;
                if (!d.success) throw new Error(d.error);
                if (d.campaigns.length === 0) {
                    $('#byCampaign').innerHTML =
                        '<div class="loading">Chưa có chiến dịch nào</div>';
                    return;
                }
                $('#byCampaign').innerHTML = `
                    <table class="data-table table-list">
                        <thead><tr><th>Chiến dịch</th><th class="right">Đơn</th><th class="right">Doanh thu</th></tr></thead>
                        <tbody>
                            ${d.campaigns
                                .slice(0, 15)
                                .map(
                                    (c) => `
                                <tr>
                                    <td>${esc(c.name)}</td>
                                    <td class="right">${c.orderCount}</td>
                                    <td class="right" style="color:#0058da">${fmtMoney(c.revenue)}</td>
                                </tr>
                            `
                                )
                                .join('')}
                        </tbody>
                    </table>
                `;
            }

            async function loadTopCustomers360(seq) {
                const r = await fetch(
                    `${WORKER}/api/pbh-reports/top-customers-360?days=${currentDays}&limit=15`,
                    { signal: _signal(), headers: AUTHH() } // ENFORCE-PREP (2026-06-12)
                );
                const d = await r.json();
                if (seq !== _loadSeq) return;
                if (!d.success) throw new Error(d.error);
                // Hint above the table about unlinked counts (data-quality signal).
                // Coerce sang số để chặn XSS (giá trị server nội suy vào innerHTML).
                const unNative = Number(d.unlinked?.native) || 0;
                const unPbh = Number(d.unlinked?.pbh) || 0;
                const hint = `Đơn chưa liên kết customer 360 trong ${currentDays} ngày: <strong>${unNative}</strong> Đơn web + <strong>${unPbh}</strong> PBH. Bấm "👤" trên 1 row để xem chi tiết.`;
                $('#topCustomers360Hint').innerHTML = hint;
                if (d.customers.length === 0) {
                    $('#topCustomers360').innerHTML =
                        '<div class="loading">Chưa có khách hàng nào được liên kết</div>';
                    return;
                }
                $('#topCustomers360').innerHTML = `
                    <table class="data-table table-list">
                        <thead><tr>
                            <th>#</th>
                            <th>Khách hàng</th>
                            <th>SĐT</th>
                            <th class="right">NW</th>
                            <th class="right">PBH</th>
                            <th class="right">Tổng</th>
                            <th></th>
                        </tr></thead>
                        <tbody>
                            ${d.customers
                                .map(
                                    (c, i) => `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td><strong>${esc(c.name || '—')}</strong>${c.status ? ` <span style="font-size:10px;color:#0068ff;background:#e8f2ff;padding:1px 5px;border-radius:3px;">${esc(c.status)}</span>` : ''}</td>
                                    <td><code style="font-size:11px">${esc(c.phone || '—')}</code></td>
                                    <td class="right">${c.nw.count} <span style="color:#9ca3af;font-size:11px;">/ ${fmtMoney(c.nw.total)}</span></td>
                                    <td class="right">${c.pbh.count} <span style="color:#9ca3af;font-size:11px;">/ ${fmtMoney(c.pbh.total)}</span></td>
                                    <td class="right" style="color:#10b981;font-weight:700;">${fmtMoney(c.combinedTotal)}</td>
                                    <td>
                                        <button class="web2-btn web2-btn-default web2-btn-xs" title="Xem khách 360°" aria-label="Xem khách 360°" style="color:#0068ff;" onclick="openCustomerModal(${Number(c.customerId) || 0})">
                                            <i data-lucide="user-circle" style="width:12px;height:12px;"></i>
                                        </button>
                                    </td>
                                </tr>
                            `
                                )
                                .join('')}
                        </tbody>
                    </table>
                `;
                if (window.lucide) lucide.createIcons();
            }

            // Inline customer 360 modal (same shape as PBH + Native pages)
            async function openCustomerModal(customerId) {
                if (!customerId) return;
                let modal = document.getElementById('customer360Modal');
                if (!modal) {
                    modal = document.createElement('div');
                    modal.id = 'customer360Modal';
                    modal.style.cssText =
                        'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9999;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;';
                    modal.innerHTML = `
                        <div style="background:#fff;border-radius:10px;max-width:760px;width:100%;padding:0;box-shadow:0 16px 48px rgba(0,0,0,0.15);">
                            <div style="padding:14px 18px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;">
                                <strong id="c360Title" style="font-size:14px;color:#1f2937;">Khách hàng 360°</strong>
                                <button id="c360Close" aria-label="Đóng" style="background:transparent;border:none;font-size:18px;cursor:pointer;color:#6b7280;padding:8px;min-width:44px;min-height:44px;">×</button>
                            </div>
                            <div id="c360Body" style="padding:16px;font-size:13px;color:#374151;">Đang tải…</div>
                        </div>`;
                    document.body.appendChild(modal);
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) modal.style.display = 'none';
                    });
                    modal.querySelector('#c360Close').addEventListener('click', () => {
                        modal.style.display = 'none';
                    });
                }
                modal.style.display = 'flex';
                const body = modal.querySelector('#c360Body');
                const title = modal.querySelector('#c360Title');
                title.textContent = `Khách hàng #${customerId} — Đơn web + PBH`;
                body.innerHTML = '<div style="color:#6b7280;">Đang tải…</div>';
                try {
                    // 2026-06-01: Web 2.0 aggregate (native + PBH + refunds)
                    const r = await fetch(
                        `${WORKER}/api/web2/customer-orders/${customerId}?limit=20`
                    );
                    const data = await r.json();
                    if (!data?.success) throw new Error(data?.error || `HTTP ${r.status}`);
                    const { native, pbh, summary } = data;
                    const m = (n) => Number(n || 0).toLocaleString('vi-VN') + 'đ';
                    const renderRows = (label, items, codeKey, totalKey, stateKey) => `
                        <div style="margin-bottom:14px;">
                            <div style="font-weight:600;margin-bottom:6px;color:#111827;">${label} (${items.length})</div>
                            ${
                                items.length === 0
                                    ? '<div style="color:#9ca3af;font-style:italic;">Không có</div>'
                                    : `<table class="data-table">
                                        <thead><tr><th>Mã</th><th style="text-align:right;">Tổng</th><th>Trạng thái</th><th>Chiến dịch</th></tr></thead>
                                        <tbody>${items
                                            .slice(0, 10)
                                            .map(
                                                (it) =>
                                                    `<tr><td style="font-weight:600;">${esc(it[codeKey])}</td><td style="text-align:right;">${m(it[totalKey])}</td><td>${esc(it[stateKey] || '—')}</td><td style="color:#6b7280;">${esc(it.liveCampaign?.name || '—')}</td></tr>`
                                            )
                                            .join('')}</tbody>
                                    </table>`
                            }
                        </div>`;
                    body.innerHTML = `
                        <div style="display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;">
                            <div style="background:#e8f2ff;color:#004bb5;padding:10px 14px;border-radius:8px;flex:1;min-width:140px;">
                                <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.04em;">Đơn web</div>
                                <div style="font-size:18px;font-weight:700;">${summary?.totalNative ?? 0}</div>
                                <div style="font-size:11px;">${m(summary?.totalNativeAmount ?? 0)}</div>
                            </div>
                            <div style="background:#dbeafe;color:#1e40af;padding:10px 14px;border-radius:8px;flex:1;min-width:140px;">
                                <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.04em;">PBH</div>
                                <div style="font-size:18px;font-weight:700;">${summary?.totalPbh ?? 0}</div>
                                <div style="font-size:11px;">${m(summary?.totalPbhAmount ?? 0)}</div>
                            </div>
                        </div>
                        ${renderRows('Đơn web', native, 'number', 'totalAmount', 'state')}
                        ${renderRows('PBH', pbh, 'number', 'totalAmount', 'state')}
                    `;
                } catch (e) {
                    body.innerHTML = `<div style="color:#dc2626;">Lỗi: ${esc(e.message)}</div>`;
                }
            }

            async function loadAll() {
                // Hủy loadAll trước (nếu đang chạy) + tăng version.
                if (_loadAbort) _loadAbort.abort();
                _loadAbort = new AbortController();
                const seq = ++_loadSeq;
                try {
                    await Promise.all([
                        loadSummary(seq),
                        loadRevenueChart(seq),
                        loadTopCustomers(seq),
                        loadByCampaign(seq),
                        loadTopCustomers360(seq),
                    ]);
                } catch (e) {
                    // Request bị hủy do đổi filter → bỏ qua, không hiện lỗi.
                    if (e.name === 'AbortError' || seq !== _loadSeq) return;
                    console.error('[reports] load error', e);
                    window.notificationManager?.show(
                        'Không tải được báo cáo. Thử lại sau.',
                        'error'
                    );
                    const errBlock = `<div class="loading" style="color:#dc2626;padding:20px 16px;">
                        Lỗi tải dữ liệu.
                        <button onclick="loadAll()" style="margin-left:8px;padding:4px 12px;background:#0068ff;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:13px;">Thử lại</button>
                    </div>`;
                    $('#kpiGrid').innerHTML = errBlock;
                    $('#revenueChart').innerHTML = errBlock;
                    $('#stateBreakdown').innerHTML = errBlock;
                    $('#topCustomers').innerHTML = errBlock;
                    $('#byCampaign').innerHTML = errBlock;
                    $('#topCustomers360').innerHTML = errBlock;
                }
            }

            document.addEventListener('DOMContentLoaded', () => {
                if (window.Web2Sidebar) Web2Sidebar.mount('#web2Aside');
                if (window.lucide) lucide.createIcons();
                document.querySelectorAll('#rangeSelect button').forEach((b) => {
                    b.addEventListener('click', () => {
                        document
                            .querySelectorAll('#rangeSelect button')
                            .forEach((x) => x.classList.remove('active'));
                        b.classList.add('active');
                        currentDays = Number(b.dataset.days);
                        loadAll();
                    });
                });
                loadAll();
                // 3W4: thay PbhRealtime (WS) bằng Web2SSE — PBH/đơn web đổi → reload báo cáo.
                // Debounce 600ms chung 2 topic; loadAll đã có _loadSeq/_loadAbort chống race.
                if (window.Web2SSE?.subscribe) {
                    let _sseTimer = null;
                    const sseReload = () => {
                        clearTimeout(_sseTimer);
                        _sseTimer = setTimeout(loadAll, 600);
                    };
                    window.Web2SSE.subscribe('web2:fast-sale-orders', sseReload);
                    window.Web2SSE.subscribe('web2:native-orders', sseReload);
                }
            });
        </script>
    </body>
</html>
