<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Loại Sản Phẩm - WEB 2.0</title>
        <meta name="web2-db" content="both" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-effects.css?v=20260622tag" />
        <link rel="stylesheet" href="../shared/web2-base.css?v=20260623fix" />
        <link rel="stylesheet" href="../shared/web2-components.css?v=20260613z" />
        <link rel="stylesheet" href="css/web2-product-types.css?v=20260626a" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>

        <script src="../../shared/js/shared-auth-manager.js?v=20260521b"></script>
        <script src="../../shared/js/notification-system.js?v=20260521b"></script>
        <link rel="stylesheet" href="../../web2/shared/web2-theme.css?v=20260625anim" />
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content" style="overflow: auto; height: 100vh">
                <header class="page-head-mini">
                    <h1 class="page-head-title">
                        <i data-lucide="shirt"></i>
                        Loại Sản Phẩm
                    </h1>
                    <div class="page-head-counters">
                        <span class="counter-pill" id="totalCounter">— loại</span>
                        <span class="source-pill">web2_product_types</span>
                        <button
                            class="btn-primary page-head-action"
                            id="btnCreateType"
                            type="button"
                        >
                            <i data-lucide="plus"></i> Thêm Loại
                        </button>
                    </div>
                </header>

                <section class="search-section">
                    <div class="filter-row">
                        <div class="search-wrapper">
                            <i data-lucide="search" class="search-icon"></i>
                            <input
                                type="text"
                                class="search-input"
                                id="filterSearch"
                                placeholder="Tìm theo tên loại..."
                                autocomplete="off"
                            />
                            <button class="search-clear" id="filterSearchClear" title="Xóa">
                                <i data-lucide="x"></i>
                            </button>
                        </div>

                        <div class="filter-chip-group">
                            <label class="chip-label chip-label-primary">
                                <i data-lucide="eye"></i> Hiển thị:
                            </label>
                            <div class="chip-select-wrapper">
                                <select id="filterActive" class="chip-select chip-select-primary">
                                    <option value="true">Đang dùng</option>
                                    <option value="all" selected>Tất cả</option>
                                </select>
                                <i data-lucide="chevron-down" class="chip-caret"></i>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="table-section">
                    <div class="table-scroll">
                        <table class="data-table" id="typesTable">
                            <thead>
                                <tr>
                                    <th style="width: 48px">#</th>
                                    <th>TÊN LOẠI</th>
                                    <th style="width: 110px">THỨ TỰ</th>
                                    <th style="width: 120px">TRẠNG THÁI</th>
                                    <th style="width: 150px">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody id="typesTbody">
                                <tr>
                                    <td colspan="5" class="loading-row">
                                        <div class="spinner"></div>
                                        Đang tải dữ liệu...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </main>
        </div>

        <script src="../shared/popup.js?v=20260626a"></script>
        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/web2-sidebar.js?v=20260629b"></script>
        <script src="../shared/web2-skeleton.js?v=20260625a"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => Web2Sidebar.mount('#web2Aside'));
        </script>

        <!-- Create/Edit Modal -->
        <div class="modal-overlay" id="typeModal">
            <div
                class="modal-content"
                style="min-width: min(440px, calc(100vw - 32px)); max-width: 520px"
            >
                <div class="modal-header">
                    <h3 id="typeModalTitle">
                        <i data-lucide="shirt"></i>
                        <span>Thêm loại</span>
                    </h3>
                    <button class="btn-icon-round" id="btnCloseTypeModal">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="field-row">
                        <label>Tên loại *</label>
                        <input
                            id="tmName"
                            placeholder="VD: Áo / Quần / Đầm / Váy"
                            autocomplete="off"
                        />
                    </div>
                    <div class="field-row-grid field-row-grid-2">
                        <div class="field-row">
                            <label>Thứ tự</label>
                            <input id="tmSortOrder" type="number" step="1" value="0" />
                        </div>
                        <div class="field-row">
                            <label>Trạng thái</label>
                            <select id="tmIsActive">
                                <option value="true" selected>Đang dùng</option>
                                <option value="false">Đã ẩn</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-ghost" id="btnCancelType">Hủy</button>
                    <button class="btn-primary" id="btnSaveType">
                        <i data-lucide="save"></i> Lưu
                    </button>
                </div>
            </div>
        </div>

        <script src="../shared/web2-effects.js?v=20260521b"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <script src="js/web2-product-types-api.js?v=20260626a"></script>
        <script src="../shared/web2-product-types-cache.js?v=20260626a"></script>
        <script src="js/web2-product-types-app.js?v=20260626a"></script>
    </body>
</html>
