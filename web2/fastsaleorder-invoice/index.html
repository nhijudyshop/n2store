<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Phiếu bán hàng (PBH) - WEB 2.0</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../../web2/shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-base.css?v=20260623fix" />
        <link rel="stylesheet" href="../shared/web2-components.css?v=20260618w1" />
        <link rel="stylesheet" href="../../web2/shared/page-builder.css?v=20260622cons" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <link rel="stylesheet" href="../../web2/shared/web2-theme.css?v=20260625anim" />
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content" style="overflow: auto; height: 100vh">
                <header
                    class="web2-main-header"
                    style="padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: #fff"
                >
                    <div class="web2-breadcrumb">
                        <span class="web2-breadcrumb-item">App</span>
                        <span class="web2-breadcrumb-sep">/</span>
                        <span class="web2-breadcrumb-item">Bán Hàng</span>
                        <span class="web2-breadcrumb-sep">/</span>
                        <span class="web2-breadcrumb-current">Bán hàng (Hóa đơn)</span>
                    </div>
                    <span class="counter-pill" id="pbhCounter">— PBH</span>
                </header>

                <section class="search-section" style="padding: 12px 20px">
                    <div class="filter-row">
                        <div class="search-wrapper">
                            <i data-lucide="search" class="search-icon"></i>
                            <input
                                type="text"
                                class="search-input"
                                id="pbhSearch"
                                placeholder="Tìm số HĐ, SĐT, tên khách, mã đơn nguồn..."
                                autocomplete="off"
                            />
                            <button class="search-clear" id="pbhSearchClear">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                        <div class="filter-chip-group">
                            <label class="chip-label chip-label-primary"
                                ><i data-lucide="bookmark-check"></i> Trạng thái:</label
                            >
                            <div class="chip-select-wrapper">
                                <select id="pbhState" class="chip-select chip-select-primary">
                                    <option value="">Tất cả</option>
                                    <option value="done">Hoàn thành</option>
                                    <option value="cancel">Đã hủy</option>
                                </select>
                                <i data-lucide="chevron-down" class="chip-caret"></i>
                            </div>
                        </div>
                        <div class="filter-chip-group">
                            <label class="chip-label chip-label-muted"
                                ><i data-lucide="list"></i> Limit:</label
                            >
                            <div class="chip-select-wrapper">
                                <select id="pbhLimit" class="chip-select chip-select-muted">
                                    <option value="100">100 / trang</option>
                                    <option value="200" selected>200 / trang</option>
                                    <option value="500">500 / trang</option>
                                </select>
                                <i data-lucide="chevron-down" class="chip-caret"></i>
                            </div>
                        </div>
                    </div>
                    <div class="search-info">
                        <div class="search-info-left">
                            <span class="search-result-count" id="pbhResultCount">0</span>
                            <span class="search-result-label">PBH</span>
                        </div>
                        <div class="search-info-right">
                            <button class="web2-btn web2-btn-default web2-btn-sm" id="pbhReload">
                                <i data-lucide="refresh-cw" style="width: 12px; height: 12px"></i>
                                Tải lại
                            </button>
                            <button class="web2-btn web2-btn-default web2-btn-sm" id="pbhApply">
                                <i data-lucide="filter" style="width: 12px; height: 12px"></i> Áp
                                dụng
                            </button>
                            <button class="web2-btn web2-btn-default web2-btn-sm" id="pbhClear">
                                <i data-lucide="x" style="width: 12px; height: 12px"></i> Xóa lọc
                            </button>
                            <button
                                class="web2-btn web2-btn-default web2-btn-sm"
                                id="pbhExportCsv"
                                title="Xuất Excel CSV"
                            >
                                <i data-lucide="download" style="width: 12px; height: 12px"></i>
                                Xuất Excel
                            </button>
                        </div>
                    </div>

                    <!-- Bulk action toolbar — visible when any row checked -->
                    <div
                        id="pbhBulkBar"
                        style="
                            display: none;
                            margin-top: 10px;
                            padding: 10px 14px;
                            background: #e8f2ff;
                            border: 1px solid #bcdcff;
                            border-radius: 8px;
                            align-items: center;
                            gap: 12px;
                        "
                    >
                        <span><strong id="pbhBulkCount">0</strong> đơn được chọn</span>
                        <button class="web2-btn web2-btn-success web2-btn-sm" id="pbhBulkConfirm">
                            <i data-lucide="check" style="width: 12px; height: 12px"></i> Xác nhận
                            tất cả
                        </button>
                        <button class="web2-btn web2-btn-warning web2-btn-sm" id="pbhBulkCancel">
                            <i data-lucide="x-circle" style="width: 12px; height: 12px"></i> Hủy tất
                            cả
                        </button>
                        <button
                            class="web2-btn web2-btn-default web2-btn-sm"
                            id="pbhBulkUnselect"
                            style="margin-left: auto"
                        >
                            <i data-lucide="x" style="width: 12px; height: 12px"></i> Bỏ chọn
                        </button>
                    </div>
                </section>

                <section class="table-section" style="padding: 0 20px 24px">
                    <div class="table-scroll">
                        <table class="data-table" id="pbhTable">
                            <thead>
                                <tr>
                                    <th style="width: 30px">
                                        <input type="checkbox" id="pbhCheckAll" />
                                    </th>
                                    <th style="width: 110px">Thao tác</th>
                                    <th style="width: 50px; text-align: center">STT</th>
                                    <th style="width: 170px">Số HĐ</th>
                                    <th>Khách hàng</th>
                                    <th style="width: 140px">SĐT</th>
                                    <th>Địa chỉ</th>
                                    <th style="width: 130px; text-align: right">Tổng tiền</th>
                                    <th style="width: 110px">Trạng thái</th>
                                    <th style="width: 160px">Đơn nguồn</th>
                                    <th style="width: 140px">Ngày HĐ</th>
                                </tr>
                            </thead>
                            <tbody id="pbhTbody">
                                <tr>
                                    <td colspan="11" class="empty-row">
                                        <div class="empty-state">
                                            <i data-lucide="inbox" class="empty-state-icon"></i>
                                            <div class="empty-state-title">Đang tải...</div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination" id="pbhPagination"></div>
                </section>
            </main>
        </div>

        <!-- 3W4: pbh-realtime.js (WS) đã gỡ — realtime qua web2-sse-bridge.js bên dưới -->
        <script src="../../web2/shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../../web2/shared/web2-sidebar.js?v=20260629d"></script>
        <script src="../shared/web2-skeleton.js?v=20260625a"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                if (window.Web2Sidebar) Web2Sidebar.mount('#web2Aside');
            });
        </script>
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <!-- JsBarcode local — load 1 lần, browser cache, pre-render SVG ở parent → bill in instant -->
        <script src="../shared/jsbarcode-code128.min.js?v=20260521c"></script>
        <script src="../shared/qrcode.min.js?v=20260607qr"></script>
        <!-- NGUỒN CHUNG sinh QR "trang trí" đen trắng (tem SP + PBH) -->
        <script src="../shared/web2-qr.js?v=20260625qr"></script>
        <script src="../shared/receiptline.js?v=20260604nj"></script>
        <script src="../shared/web2-bill-service.js?v=20260625qr2"></script>
        <script src="../shared/web2-printer.js?v=20260623role"></script>
        <!-- html2canvas chỉ load lazy khi cần sinh image bill (gửi messenger). Bỏ qua cho print only. -->
        <!-- PBH page-app split: state → api → render → actions → filters → app (app LAST). -->
        <script src="pbh-state.js?v=20260618w1"></script>
        <script src="pbh-api.js?v=20260618w1"></script>
        <script src="pbh-render.js?v=20260623auth"></script>
        <script src="pbh-actions.js?v=20260623fix"></script>
        <script src="pbh-filters.js?v=20260618w1"></script>
        <script src="pbh-app.js?v=20260623fix"></script>
    </body>
</html>
