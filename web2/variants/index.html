<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Kho Biến Thể - WEB 2.0</title>
        <meta name="web2-db" content="both" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-effects.css?v=20260622tag" />
        <link rel="stylesheet" href="../shared/web2-base.css?v=20260623fix" />
        <link rel="stylesheet" href="../shared/web2-components.css?v=20260613z" />
        <link rel="stylesheet" href="css/web2-variants.css?v=20260614ux" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>

        <script src="../../shared/js/shared-auth-manager.js?v=20260521b"></script>
        <script src="../../shared/js/notification-system.js?v=20260521b"></script>
        <link rel="stylesheet" href="../../web2/shared/web2-theme.css?v=20260625anim" />
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content" style="overflow: auto; height: 100vh">
                <header class="page-head-mini">
                    <h1 class="page-head-title">
                        <i data-lucide="layers"></i>
                        Kho Biến Thể
                    </h1>
                    <div class="page-head-counters">
                        <span class="counter-pill" id="totalCounter">— biến thể</span>
                        <span class="source-pill">web2_variants</span>
                        <button
                            class="btn-primary page-head-action"
                            id="btnCreateVariant"
                            type="button"
                        >
                            <i data-lucide="plus"></i> Thêm Biến Thể
                        </button>
                    </div>
                </header>

                <section class="search-section">
                    <div class="filter-row">
                        <div class="search-wrapper">
                            <i data-lucide="search" class="search-icon"></i>
                            <input
                                type="text"
                                class="search-input"
                                id="filterSearch"
                                placeholder="Tìm theo giá trị biến thể..."
                                autocomplete="off"
                            />
                            <button class="search-clear" id="filterSearchClear" title="Xóa">
                                <i data-lucide="x"></i>
                            </button>
                        </div>

                        <div class="filter-chip-group">
                            <label class="chip-label chip-label-primary">
                                <i data-lucide="eye"></i> Hiển thị:
                            </label>
                            <div class="chip-select-wrapper">
                                <select id="filterActive" class="chip-select chip-select-primary">
                                    <option value="true">Đang dùng</option>
                                    <option value="all" selected>Tất cả</option>
                                </select>
                                <i data-lucide="chevron-down" class="chip-caret"></i>
                            </div>
                        </div>

                        <div class="filter-chip-group">
                            <label class="chip-label chip-label-muted">
                                <i data-lucide="layers"></i> Nhóm:
                            </label>
                            <div class="chip-select-wrapper">
                                <select id="filterGroup" class="chip-select chip-select-muted">
                                    <option value="">Tất cả</option>
                                </select>
                                <i data-lucide="chevron-down" class="chip-caret"></i>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="table-section">
                    <div class="table-scroll">
                        <table class="data-table" id="variantsTable">
                            <thead>
                                <tr>
                                    <th style="width: 48px">#</th>
                                    <th>BIẾN THỂ</th>
                                    <th style="width: 160px">NHÓM</th>
                                    <th style="width: 130px">VIẾT TẮT</th>
                                    <th style="width: 100px">THỨ TỰ</th>
                                    <th style="width: 110px">TRẠNG THÁI</th>
                                    <th style="width: 140px">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody id="variantsTbody">
                                <tr>
                                    <td colspan="7" class="loading-row">
                                        <div class="spinner"></div>
                                        Đang tải dữ liệu...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </main>
        </div>

        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-user-info.js?v=20260530a"></script>
        <script src="../shared/web2-history-timeline.js?v=20260530a"></script>
        <script src="../shared/web2-db-badge.js?v=20260530a"></script>
        <script src="../shared/web2-optimistic.js?v=20260601a"></script>
        <script src="../shared/web2-sidebar.js?v=20260629e"></script>
        <script src="../shared/web2-skeleton.js?v=20260625a"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => Web2Sidebar.mount('#web2Aside'));
        </script>

        <!-- Create/Edit Modal -->
        <div class="modal-overlay" id="variantModal">
            <div
                class="modal-content"
                style="min-width: min(480px, calc(100vw - 32px)); max-width: 560px"
            >
                <div class="modal-header">
                    <h3 id="variantModalTitle">
                        <i data-lucide="layers"></i>
                        <span>Thêm biến thể</span>
                    </h3>
                    <button class="btn-icon-round" id="btnCloseVariantModal">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="field-row">
                        <label>Giá trị biến thể *</label>
                        <input
                            id="vmValue"
                            placeholder="VD: Màu Xanh Dương / Size M / Size 3"
                            autocomplete="off"
                        />
                    </div>
                    <div class="field-row-grid field-row-grid-2">
                        <div class="field-row">
                            <label>Nhóm *</label>
                            <select id="vmGroup">
                                <option value="">— Chọn —</option>
                                <option value="Màu">Màu</option>
                                <option value="Size">Size</option>
                            </select>
                        </div>
                        <div class="field-row">
                            <label>Thứ tự</label>
                            <input id="vmSortOrder" type="number" step="1" value="0" />
                        </div>
                    </div>
                    <div class="field-row">
                        <label>
                            Viết tắt (dùng cho mã SP) *
                            <span style="font-weight: 400; color: #64748b; font-size: 11px">
                                — A-Z và 0-9, 1-20 ký tự, duy nhất
                            </span>
                        </label>
                        <div style="display: flex; gap: 6px; align-items: stretch">
                            <input
                                id="vmShortCode"
                                placeholder="VD: XANDUONG / M / S3"
                                autocomplete="off"
                                style="
                                    flex: 1;
                                    text-transform: uppercase;
                                    font-family: 'SF Mono', 'Menlo', monospace;
                                    font-weight: 600;
                                "
                                maxlength="20"
                            />
                            <button
                                type="button"
                                id="vmSuggestShortCode"
                                class="btn-ghost"
                                style="
                                    white-space: nowrap;
                                    padding: 4px 10px;
                                    font-size: 12px;
                                    border: 1px solid #cbd5e1;
                                    border-radius: 6px;
                                    background: #f1f5f9;
                                    cursor: pointer;
                                "
                                title="Đề xuất viết tắt từ giá trị"
                            >
                                <i data-lucide="sparkles" style="width: 14px; height: 14px"></i>
                                Gợi ý
                            </button>
                        </div>
                        <div
                            id="vmShortCodeHint"
                            style="
                                font-size: 11px;
                                color: #64748b;
                                margin-top: 4px;
                                min-height: 14px;
                            "
                        ></div>
                    </div>
                    <div class="field-row">
                        <label>Trạng thái</label>
                        <select id="vmIsActive">
                            <option value="true" selected>Đang dùng</option>
                            <option value="false">Đã ẩn</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-ghost" id="btnCancelVariant">Hủy</button>
                    <button class="btn-primary" id="btnSaveVariant">
                        <i data-lucide="save"></i> Lưu
                    </button>
                </div>
            </div>
        </div>

        <script src="../shared/web2-effects.js?v=20260521b"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <script src="../shared/web2-product-code.js?v=20260521b"></script>
        <script src="js/web2-variants-api.js?v=20260615auth"></script>
        <script src="../shared/web2-variants-cache.js?v=20260623sc"></script>
        <script src="js/web2-variants-app.js?v=20260629a"></script>
    </body>
</html>
