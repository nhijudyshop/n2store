<!-- #Note: Đọc CLAUDE.md, MEMORY.md, docs/dev-log.md trước khi code. Cập nhật dev-log sau thay đổi. | WEB2.0 module — Thu về (goods return). -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Thu về - WEB 2.0</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-effects.css?v=20260622tag" />
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260625anim" />
        <link rel="stylesheet" href="css/returns.css?v=20260622hist" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>

        <!-- Firebase compat (auth) -->

        <script src="../../shared/js/shared-auth-manager.js?v=20260606tv"></script>
        <script src="../../shared/js/notification-system.js?v=20260606tv"></script>
        <script src="../shared/web2-effects.js?v=20260606tv"></script>
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="main-content" style="overflow: auto; height: 100vh">
                <header class="page-head-mini">
                    <h1 class="page-head-title"><i data-lucide="undo-2"></i> Thu về</h1>
                    <div class="page-head-counters">
                        <span class="source-pill">web2_returns</span>
                    </div>
                </header>

                <!-- Tabs -->
                <div class="rt-tabs">
                    <button class="rt-tab is-active" id="tab-create" type="button">
                        <i data-lucide="plus-circle"></i> Tạo phiếu
                    </button>
                    <button class="rt-tab" id="tab-list" type="button">
                        <i data-lucide="list"></i> Danh sách
                    </button>
                    <button class="rt-tab" id="tab-pending" type="button">
                        <i data-lucide="clock"></i> Chờ duyệt
                        <span class="rt-badge" id="pendingCount">0</span>
                    </button>
                </div>

                <!-- ============ PANEL: CREATE ============ -->
                <section class="rt-panel" id="panel-create">
                    <div class="rt-grid">
                        <!-- Left: customer + (sau khi chọn KH) cách hàng về / vấn đề / loại -->
                        <div class="rt-card">
                            <div class="rt-card-title"><i data-lucide="user"></i> Khách hàng</div>
                            <div class="rt-cust-box">
                                <input
                                    type="text"
                                    id="custSearch"
                                    class="rt-input"
                                    placeholder="Tìm KH theo tên / SĐT…"
                                    autocomplete="off"
                                />
                                <div class="rt-dropdown" id="custResults" hidden></div>
                                <div class="rt-cust-selected" id="custSelected" hidden></div>
                            </div>

                            <!-- Ẩn cho tới khi chọn KH -->
                            <div id="formSections" hidden>
                                <div class="rt-card-title" style="margin-top: 18px">
                                    <i data-lucide="truck"></i> Cách hàng về
                                </div>
                                <div class="rt-radio-row">
                                    <label class="rt-radio">
                                        <input type="radio" name="method" value="khach_gui" />
                                        <span><b>Khách gửi</b><small>+ kho thật ngay</small></span>
                                    </label>
                                    <label class="rt-radio">
                                        <input
                                            type="radio"
                                            name="method"
                                            value="shipper_gui"
                                            checked
                                        />
                                        <span
                                            ><b>Shipper gửi</b
                                            ><small>+ kho thu về · chờ duyệt</small></span
                                        >
                                    </label>
                                </div>
                                <div class="rt-hint" id="stockHint"></div>

                                <div class="rt-card-title" style="margin-top: 18px">
                                    <i data-lucide="alert-triangle"></i> Vấn đề
                                </div>
                                <div class="rt-radio-row">
                                    <label class="rt-radio">
                                        <input
                                            type="radio"
                                            name="issue"
                                            value="van_de_khach"
                                            checked
                                        />
                                        <span><b>Vấn đề khách</b><small>boom, đổi ý…</small></span>
                                    </label>
                                    <label class="rt-radio">
                                        <input type="radio" name="issue" value="van_de_shipper" />
                                        <span><b>Vấn đề shipper</b><small>sửa COD…</small></span>
                                    </label>
                                </div>

                                <div id="subTypeBlock">
                                    <div class="rt-card-title" style="margin-top: 18px">
                                        <i data-lucide="git-branch"></i> Loại thu về
                                    </div>
                                    <div class="rt-radio-row">
                                        <label class="rt-radio">
                                            <input
                                                type="radio"
                                                name="subType"
                                                value="khong_nhan_hang"
                                            />
                                            <span
                                                ><b id="lblCaDon">Khách không nhận hàng</b
                                                ><small>hoàn cả đơn cũ</small></span
                                            >
                                        </label>
                                        <label class="rt-radio">
                                            <input
                                                type="radio"
                                                name="subType"
                                                value="thu_ve_1_phan"
                                                checked
                                            />
                                            <span
                                                ><b>Thu về 1 phần</b
                                                ><small>chọn SP trong đơn → bill 0đ</small></span
                                            >
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Right: dynamic content -->
                        <div class="rt-card" id="rightCard">
                            <div id="rightEmpty" class="rt-muted" style="padding: 8px 4px">
                                Chọn khách hàng để bắt đầu.
                            </div>

                            <div id="rightBody" hidden>
                                <div class="rt-card-title">
                                    <i data-lucide="package-x"></i>
                                    <span id="orderPickTitle">Chọn đơn</span>
                                </div>
                                <div class="rt-order-list" id="orderList">
                                    <div class="rt-muted">Đang tải đơn…</div>
                                </div>

                                <!-- Tóm tắt đơn được chọn (COD/ship/tổng) -->
                                <div id="orderSummary" class="rt-order-summary" hidden></div>

                                <!-- ===== KHÁCH flow ===== -->
                                <div id="panelKhach">
                                    <div id="orderItems" class="rt-order-items" hidden></div>
                                    <div class="rt-field" style="margin-top: 14px">
                                        <label>Lý do</label>
                                        <select id="reasonSelect" class="rt-input"></select>
                                    </div>
                                    <div class="rt-field" id="reasonNoteWrap" hidden>
                                        <label>Ghi rõ lý do</label>
                                        <input
                                            type="text"
                                            id="reasonNote"
                                            class="rt-input"
                                            placeholder="vd: không liên lạc được"
                                        />
                                    </div>
                                </div>

                                <!-- ===== SHIPPER flow (Sửa COD) ===== -->
                                <div id="panelShipper" hidden>
                                    <div class="rt-field" style="margin-top: 14px">
                                        <label>COD giảm (tiền trả shipper)</label>
                                        <input
                                            type="number"
                                            id="codReduction"
                                            class="rt-input"
                                            min="0"
                                            step="1000"
                                            placeholder="0"
                                        />
                                    </div>
                                    <div class="rt-field">
                                        <label>Lý do</label>
                                        <select id="reasonSelectShip" class="rt-input">
                                            <option value="tinh_sai_ship">Tính sai ship</option>
                                            <option value="tru_cong_no_khach">
                                                Trừ công nợ khách
                                            </option>
                                            <option value="giam_gia_le_tien">
                                                Giảm giá/Lẻ tiền
                                            </option>
                                            <option value="khach_nhan_1_phan">
                                                Khách nhận 1 phần
                                            </option>
                                            <option value="tra_hang_don_cu">Trả hàng đơn cũ</option>
                                        </select>
                                    </div>
                                    <div id="codCalc" class="rt-cod-calc" hidden></div>
                                    <div id="codWallet" class="rt-cod-wallet" hidden></div>
                                </div>

                                <div class="rt-field" style="margin-top: 16px">
                                    <label>Ghi chú</label>
                                    <input
                                        type="text"
                                        id="noteInput"
                                        class="rt-input"
                                        placeholder="Ghi chú phiếu (tuỳ chọn)"
                                    />
                                </div>

                                <div class="rt-summary">
                                    <div class="rt-credit" id="creditPreview"></div>
                                    <button class="rt-submit" id="btnSubmit" disabled>
                                        <i data-lucide="undo-2"></i> Tạo phiếu thu về
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- ============ PANEL: LIST ============ -->
                <section class="rt-panel" id="panel-list" hidden>
                    <div class="rt-list-head">
                        <input
                            type="text"
                            id="listSearch"
                            class="rt-input"
                            placeholder="Tìm mã phiếu / tên / SĐT…"
                        />
                    </div>
                    <table class="data-table rt-table rt-table-list">
                        <thead>
                            <tr>
                                <th>Mã</th>
                                <th>Khách</th>
                                <th>Cách</th>
                                <th>Loại</th>
                                <th>SP</th>
                                <th>Ví cộng</th>
                                <th>Tồn kho</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="returnsBody"></tbody>
                    </table>
                </section>

                <!-- ============ PANEL: PENDING ============ -->
                <section class="rt-panel" id="panel-pending" hidden>
                    <div class="rt-pending-note">
                        <i data-lucide="info"></i>
                        Phiếu <b>Shipper gửi</b> chờ duyệt. Duyệt xong tồn kho thu về sẽ cộng vào
                        <b>kho thật</b>. Phiếu treo > 20 ngày sẽ hiện cảnh báo (và thông báo ở
                        chuông).
                    </div>
                    <div id="pendingList"></div>
                </section>
            </main>
        </div>

        <!-- Shared scripts -->
        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-user-info.js?v=20260606tv"></script>
        <script src="../shared/web2-optimistic.js?v=20260606tv"></script>
        <script src="../shared/web2-sidebar.js?v=20260629e"></script>
        <script src="../shared/web2-skeleton.js?v=20260625a"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <script src="../shared/web2-wallet-balance.js?v=20260620leak"></script>
        <script src="js/returns-api.js?v=20260615auth"></script>
        <script src="js/returns-core.js?v=20260618w1"></script>
        <script src="js/returns-customer.js?v=20260618w1"></script>
        <script src="js/returns-order-items.js?v=20260618w1"></script>
        <script src="js/returns-cod.js?v=20260618w1"></script>
        <script src="js/returns-form.js?v=20260618w1"></script>
        <script src="js/returns-tabs.js?v=20260623r4"></script>
        <script src="js/returns-app.js?v=20260622hist"></script>
    </body>
</html>
