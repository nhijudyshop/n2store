<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chấm công — WEB 2.0</title>
        <meta name="web2-db" content="render" />

        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260625anim" />
        <link rel="stylesheet" href="css/cham-cong.css?v=20260702tpl" />

        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <script src="../../shared/js/notification-system.js?v=20260521b"></script>
    </head>
    <body>
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="web2-main">
                <div class="cc-main">
                    <div class="cc-head">
                        <div class="cc-head-titles">
                            <h1><i data-lucide="fingerprint"></i> Chấm công</h1>
                            <p>
                                Quản lý giờ công, đi muộn, tăng ca và bảng lương từ máy chấm công
                                DG-600.
                            </p>
                        </div>
                        <div class="cc-head-actions">
                            <div class="cc-month-nav">
                                <button class="cc-btn cc-btn-icon" id="ccPrev" title="Tháng trước">
                                    ‹
                                </button>
                                <input type="month" id="ccMonth" class="cc-month-input" />
                                <button class="cc-btn cc-btn-icon" id="ccNext" title="Tháng sau">
                                    ›
                                </button>
                            </div>
                            <button class="cc-btn cc-btn-icon" id="ccReload" title="Tải lại">
                                <i data-lucide="rotate-cw"></i>
                            </button>
                        </div>
                    </div>

                    <div class="cc-sync off" id="ccSync"></div>

                    <div class="cc-tabs">
                        <button class="cc-tab active" data-tab="timesheet">
                            <i data-lucide="calendar-days"></i> Bảng công
                        </button>
                        <button class="cc-tab" data-tab="payroll">
                            <i data-lucide="wallet"></i> Bảng lương
                        </button>
                        <button class="cc-tab" data-tab="employees">
                            <i data-lucide="users"></i> Nhân viên
                        </button>
                    </div>

                    <div id="ccBody" class="cc-body"></div>
                </div>
            </main>
        </div>

        <div id="ccModalMount"></div>

        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <script src="../shared/web2-sidebar.js?v=20260629e"></script>
        <script src="../shared/web2-skeleton.js?v=20260625a"></script>
        <script src="../shared/web2-sse-bridge.js?v=20260622r9"></script>
        <!-- Smart cache (IndexedDB) — load tức thì + revalidate ngầm -->
        <script src="../shared/web2-idb-store.js?v=20260619a"></script>
        <!-- Lịch sử chỉnh sửa lương (viewer audit chung) -->

        <!-- Page app — load theo thứ tự phụ thuộc (app LAST) -->

        <script src="js/cham-cong-app.js?v=20260701hist"></script>
