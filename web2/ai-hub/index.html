<!-- #Note: Đọc CLAUDE.md, MEMORY.md, docs/dev-log.md trước khi code. Cập nhật dev-log sau thay đổi. | WEB2.0 module. -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Trợ lý AI — Web 2.0</title>

        <meta name="theme-color" content="#0068ff" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />
        <link rel="apple-touch-icon" href="../shared/img/logo-emblem.png" />

        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260625anim" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <link rel="stylesheet" href="./ai-hub.css?v=20260627gen2" />
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="web2-main">
                <div class="aih">
                    <!-- ── Header + tabs ── -->
                    <header class="aih-head">
                        <h1 class="aih-title">
                            <span class="aih-spark"><i data-lucide="sparkles"></i></span>
                            Trợ lý AI
                        </h1>
                        <p class="aih-sub">
                            Chat &amp; tạo ảnh thông minh cho cửa hàng — soạn nội dung, tư vấn
                            khách, tạo hình sản phẩm.
                        </p>
                        <nav class="aih-tabs" role="tablist">
                            <button
                                class="aih-tab"
                                data-tab="gemini"
                                role="tab"
                                aria-selected="true"
                            >
                                <i data-lucide="sparkles"></i> Trợ lý AI
                            </button>
                            <button
                                class="aih-tab"
                                data-tab="html"
                                role="tab"
                                aria-selected="false"
                            >
                                <i data-lucide="layout-template"></i> HTML Studio
                            </button>
                            <button
                                class="aih-tab"
                                data-tab="keys"
                                role="tab"
                                aria-selected="false"
                                hidden
                            >
                                <i data-lucide="settings-2"></i> Cấu hình
                            </button>
                        </nav>
                    </header>

                    <!-- ════════ TRỢ LÝ AI HỢP NHẤT (Chat + Tạo ảnh + Ghép đồ + Ghép mặt) ════════ -->
                    <!-- 1 khung chat làm hết — chọn năng lực bằng CHIP CHẾ ĐỘ. Mount module shared
                         Web2GeminiChat. Chat = cookie máy Bo; Tạo ảnh/Ghép đồ/Ghép mặt qua
                         Web2GeminiClient (cookie máy Bo → fallback Nano Banana trả phí). -->
                    <section class="aih-pane" data-pane="gemini">
                        <div
                            id="aihGeminiMount"
                            class="aih-mount"
                            style="height: 76vh; min-height: 480px"
                        ></div>
                    </section>

                    <!-- ════════ QUẢN LÝ KEY ════════ -->
                    <!-- ════════ HTML STUDIO ════════ -->
                    <section class="aih-pane" data-pane="html" hidden>
                        <div class="aih-html-wrap" id="aihHtml"></div>
                    </section>

                    <section class="aih-pane" data-pane="keys" hidden>
                        <div class="aih-keys-wrap" id="aihKeys"></div>
                    </section>
                </div>
            </main>
        </div>

        <script src="../../shared/js/notification-system.js?v=20260613a"></script>
        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <!-- Thư viện mẫu câu lệnh AI (ảnh + vai trò chat) — SHARED module (web2/shared). Nạp TRƯỚC
             sidebar để autoLoadSharedModules skip (tránh nạp 2 lần). Dùng được mọi trang Web 2.0.
             Nguồn: nano-banana-pro-prompts + awesome-chatgpt-prompts + system-prompts. -->
        <script src="../shared/web2-ai-presets.js?v=20260627a"></script>
        <script src="../shared/web2-sidebar.js?v=20260629e"></script>
        <script src="../shared/web2-skeleton.js?v=20260625a"></script>
        <script src="../shared/popup.js?v=20260617a"></script>
        <script src="./js/ai-hub.js?v=20260628u"></script>
        <!-- Kho ảnh/video miễn phí dùng chung (từ video-maker) — picker stock cho
             tab Tạo ảnh + Ghép đồ (onPick callback). -->
        <script src="../video-maker/js/video-stock.js?v=20260624b"></script>
        <!-- 3 module shared dùng chung (cùng nguồn với widget ✨ Trợ lý AI): viết mô tả,
             ghép đồ, tạo card/video. ai-hub chỉ điều phối + mount, KHÔNG fork logic. -->
        <script src="../shared/web2-ai-describe.js?v=20260625b"></script>
        <!-- Bộ cài máy shop (.bat 1-click) dùng chung — cho nút "Tải bộ cài Gemini" trong tab Ghép đồ. -->
        <script src="../shared/web2-pos-installer.js?v=20260630tun"></script>
        <script src="../shared/web2-tryon.js?v=20260701a"></script>
        <!-- Chat Gemini qua COOKIE (sidecar gemini-tryon /chat) — module shared + thin wrapper. -->
        <!-- Đính ảnh hỏi Gemini (paste/kéo-thả/nén) — module shared dùng chung. -->
        <script src="../shared/web2-image-paste.js?v=20260623b"></script>
        <!-- Trợ lý AI hợp nhất: client sidecar (nguồn duy nhất) + UI 1 khung chat (chat/tạo ảnh/ghép đồ/ghép mặt). -->
        <script src="../shared/web2-gemini-client.js?v=20260701a"></script>
        <script src="../shared/web2-gemini-chat.js?v=20260628e"></script>
        <script src="./js/ai-gemini-chat.js?v=20260628b"></script>
        <script src="./js/ai-keys.js?v=20260623d"></script>
        <!-- HTML Studio: sinh HTML đẹp từ data (skill + anti-slop) bằng AI free. -->
        <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
        <script src="../shared/web2-html-skill.js?v=20260624e"></script>
        <script src="../shared/web2-video-render.js?v=20260624a"></script>
        <script src="../shared/web2-content-maker.js?v=20260625e"></script>
        <script src="./js/ai-html.js?v=20260625a"></script>
        <script>
            (function () {
                if (window.Web2Sidebar) Web2Sidebar.mount('#web2Aside', { activeRoute: 'ai-hub' });
                if (window.lucide) lucide.createIcons();
                if (window.AiHub) AiHub.init();
            })();
        </script>
    </body>
</html>
