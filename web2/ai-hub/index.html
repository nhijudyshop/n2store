<!-- #Note: Đọc CLAUDE.md, MEMORY.md, docs/dev-log.md trước khi code. Cập nhật dev-log sau thay đổi. | WEB2.0 module. -->
<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
        <title>Trợ lý AI — Web 2.0</title>

        <meta name="theme-color" content="#0068ff" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />
        <link rel="apple-touch-icon" href="../shared/img/logo-emblem.png" />

        <link rel="stylesheet" href="../shared/web2-sidebar.css?v=20260623up2" />
        <link rel="stylesheet" href="../shared/web2-theme.css?v=20260622t5" />
        <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>
        <link rel="stylesheet" href="./ai-hub.css?v=20260624i" />
    </head>
    <body class="web2-theme">
        <div class="web2-shell">
            <aside class="web2-aside" id="web2Aside"></aside>
            <main class="web2-main">
                <div class="aih">
                    <!-- ── Header + tabs ── -->
                    <header class="aih-head">
                        <h1 class="aih-title">
                            <span class="aih-spark"><i data-lucide="sparkles"></i></span>
                            Trợ lý AI
                        </h1>
                        <p class="aih-sub">
                            Chat &amp; tạo ảnh thông minh cho cửa hàng — soạn nội dung, tư vấn
                            khách, tạo hình sản phẩm.
                        </p>
                        <nav class="aih-tabs" role="tablist">
                            <button class="aih-tab" data-tab="chat" role="tab" aria-selected="true">
                                <i data-lucide="message-circle"></i> Chat
                            </button>
                            <button
                                class="aih-tab"
                                data-tab="image"
                                role="tab"
                                aria-selected="false"
                            >
                                <i data-lucide="image"></i> Tạo ảnh
                            </button>
                            <button
                                class="aih-tab"
                                data-tab="tryon"
                                role="tab"
                                aria-selected="false"
                            >
                                <i data-lucide="shirt"></i> Ghép đồ
                            </button>
                            <button
                                class="aih-tab"
                                data-tab="html"
                                role="tab"
                                aria-selected="false"
                            >
                                <i data-lucide="layout-template"></i> HTML Studio
                            </button>
                            <button
                                class="aih-tab"
                                data-tab="keys"
                                role="tab"
                                aria-selected="false"
                                hidden
                            >
                                <i data-lucide="settings-2"></i> Cấu hình
                            </button>
                        </nav>
                    </header>

                    <!-- ════════ CHAT ════════ -->
                    <section class="aih-pane" data-pane="chat">
                        <div class="aih-chat-wrap">
                            <aside class="aih-convos" id="aihConvos">
                                <button class="aih-newchat" id="aihNewChat">
                                    <i data-lucide="plus"></i> Cuộc trò chuyện mới
                                </button>
                                <div class="aih-convo-list" id="aihConvoList"></div>
                            </aside>

                            <div class="aih-chat">
                                <div class="aih-chat-bar">
                                    <div
                                        class="aih-chips"
                                        id="aihProviderChips"
                                        role="group"
                                        aria-label="Nhà cung cấp"
                                    ></div>
                                    <select class="aih-select" id="aihModel" title="Model"></select>
                                    <span class="aih-pill" id="aihKeyPill" hidden></span>
                                    <button
                                        class="aih-iconbtn"
                                        id="aihSysBtn"
                                        title="System prompt — định hướng AI"
                                    >
                                        <i data-lucide="settings-2"></i> Vai trò
                                    </button>
                                </div>

                                <div class="aih-messages" id="aihMessages"></div>

                                <div class="aih-composer">
                                    <div class="aih-attach-strip" id="aihAttachStrip" hidden></div>
                                    <div class="aih-input-row">
                                        <button
                                            type="button"
                                            class="aih-attach"
                                            id="aihAttachBtn"
                                            title="Đính ảnh (model có 👁) — dán/chọn ảnh để hỏi AI"
                                            hidden
                                        >
                                            <i data-lucide="image-plus"></i>
                                        </button>
                                        <input
                                            type="file"
                                            id="aihAttachFile"
                                            accept="image/*"
                                            multiple
                                            hidden
                                        />
                                        <textarea
                                            class="aih-textarea"
                                            id="aihInput"
                                            rows="1"
                                            placeholder="Nhập câu hỏi… (Enter gửi · Shift+Enter xuống dòng)"
                                        ></textarea>
                                        <button class="aih-send" id="aihSend" title="Gửi" disabled>
                                            <i data-lucide="arrow-up"></i>
                                        </button>
                                    </div>
                                    <div class="aih-hint" id="aihStatusHint"></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- ════════ TẠO ẢNH ════════ -->
                    <section class="aih-pane" data-pane="image" hidden>
                        <div class="aih-img-wrap">
                            <div class="aih-img-controls">
                                <div class="aih-field">
                                    <div class="aih-label-row">
                                        <label class="aih-label" for="aihImgPrompt"
                                            >Mô tả ảnh</label
                                        >
                                        <span style="display: flex; gap: 6px">
                                            <button
                                                type="button"
                                                class="aih-enhance"
                                                id="aihImgPresets"
                                                title="Chọn mẫu câu lệnh có sẵn (sản phẩm, người mẫu, đổi nền, poster…)"
                                            >
                                                <i data-lucide="layout-template"></i> Mẫu
                                            </button>
                                            <button
                                                type="button"
                                                class="aih-enhance"
                                                id="aihImgEnhance"
                                                title="Nhập ngắn (vd: áo trắng) → AI tự viết mô tả chi tiết để tạo ảnh đẹp hơn"
                                            >
                                                <i data-lucide="sparkles"></i> AI viết mô tả
                                            </button>
                                        </span>
                                    </div>
                                    <textarea
                                        class="aih-img-prompt"
                                        id="aihImgPrompt"
                                        placeholder="Nhập ngắn (vd: áo trắng nữ) rồi bấm ✨ AI viết mô tả — hoặc tả chi tiết tuỳ ý"
                                    ></textarea>
                                </div>
                                <div class="aih-field">
                                    <label class="aih-label" for="aihImgProvider">Nguồn ảnh</label>
                                    <select
                                        class="aih-select"
                                        id="aihImgProvider"
                                        style="max-width: none"
                                    ></select>
                                </div>
                                <div class="aih-field">
                                    <label class="aih-label" for="aihImgModel">Model</label>
                                    <select
                                        class="aih-select"
                                        id="aihImgModel"
                                        style="max-width: none"
                                    ></select>
                                </div>
                                <div class="aih-row2">
                                    <div class="aih-field">
                                        <label class="aih-label" for="aihImgW">Rộng</label>
                                        <select
                                            class="aih-select"
                                            id="aihImgW"
                                            style="max-width: none"
                                        >
                                            <option value="768">768</option>
                                            <option value="1024" selected>1024</option>
                                            <option value="1280">1280</option>
                                        </select>
                                    </div>
                                    <div class="aih-field">
                                        <label class="aih-label" for="aihImgH">Cao</label>
                                        <select
                                            class="aih-select"
                                            id="aihImgH"
                                            style="max-width: none"
                                        >
                                            <option value="768">768</option>
                                            <option value="1024" selected>1024</option>
                                            <option value="1280">1280</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="aih-field" id="aihImgEditField" hidden>
                                    <label class="aih-label"
                                        >Ảnh gốc để sửa/ghép (Nano Banana)</label
                                    >
                                    <input type="file" id="aihImgFile" accept="image/*" />
                                </div>
                                <button class="aih-gen" id="aihImgGen">
                                    <i data-lucide="wand-sparkles"></i> Tạo ảnh
                                </button>
                                <button
                                    type="button"
                                    class="aih-gen"
                                    id="aihImgStock"
                                    style="background: #475569; margin-top: 8px"
                                    title="Chọn ảnh bản quyền-free làm ảnh gốc để Nano Banana sửa/ghép"
                                >
                                    <i data-lucide="folder-open"></i> Kho ảnh free (làm ảnh gốc)
                                </button>
                                <button
                                    type="button"
                                    class="aih-gen"
                                    id="aihImgHistory"
                                    style="background: #0f766e; margin-top: 8px"
                                    title="Xem lại ảnh AI đã tạo (lưu trên server)"
                                >
                                    <i data-lucide="history"></i> Ảnh đã lưu
                                </button>
                                <p
                                    class="aih-keyhint"
                                    id="aihQuotaHint"
                                    hidden
                                    style="color: #b45309"
                                ></p>
                                <p class="aih-keyhint">
                                    🟢 <b>Pollinations</b> miễn phí dùng ngay.
                                    <b>Nano Banana</b> (Gemini) cần quyền + có giới hạn lượt/ngày.
                                </p>
                            </div>
                            <div class="aih-img-gallery" id="aihGallery"></div>
                        </div>
                    </section>

                    <!-- ════════ GHÉP ĐỒ / THỬ ĐỒ ════════ -->
                    <!-- Mount điểm cho module shared Web2Tryon (web2/shared/web2-tryon.js) —
                         1 NGUỒN dùng chung với widget ✨. KHÔNG dựng lại UI ở đây. -->
                    <section class="aih-pane" data-pane="tryon" hidden>
                        <div id="aihTryMount" class="aih-mount"></div>
                    </section>

                    <!-- ════════ QUẢN LÝ KEY ════════ -->
                    <!-- ════════ HTML STUDIO ════════ -->
                    <section class="aih-pane" data-pane="html" hidden>
                        <div class="aih-html-wrap" id="aihHtml"></div>
                    </section>

                    <section class="aih-pane" data-pane="keys" hidden>
                        <div class="aih-keys-wrap" id="aihKeys"></div>
                    </section>
                </div>
            </main>
        </div>

        <script src="../../shared/js/notification-system.js?v=20260613a"></script>
        <script src="../shared/web2-auth.js?v=20260621r7"></script>
        <!-- Thư viện mẫu câu lệnh AI (ảnh + vai trò chat) — SHARED module (web2/shared). Nạp TRƯỚC
             sidebar để autoLoadSharedModules skip (tránh nạp 2 lần). Dùng được mọi trang Web 2.0.
             Nguồn: nano-banana-pro-prompts + awesome-chatgpt-prompts + system-prompts. -->
        <script src="../shared/web2-ai-presets.js?v=20260624h"></script>
        <script src="../shared/web2-sidebar.js?v=20260623up2"></script>
        <script src="../shared/popup.js?v=20260617a"></script>
        <script src="./js/ai-hub.js?v=20260624h"></script>
        <script src="./js/ai-chat.js?v=20260625f"></script>
        <!-- Kho ảnh/video miễn phí dùng chung (từ video-maker) — picker stock cho
             tab Tạo ảnh + Ghép đồ (onPick callback). -->
        <script src="../video-maker/js/video-stock.js?v=20260624b"></script>
        <!-- 3 module shared dùng chung (cùng nguồn với widget ✨ Trợ lý AI): viết mô tả,
             ghép đồ, tạo card/video. ai-hub chỉ điều phối + mount, KHÔNG fork logic. -->
        <script src="../shared/web2-ai-describe.js?v=20260625b"></script>
        <script src="../shared/web2-tryon.js?v=20260625c"></script>
        <script src="./js/ai-image.js?v=20260625b"></script>
        <script src="./js/ai-tryon.js?v=20260625a"></script>
        <script src="./js/ai-keys.js?v=20260623d"></script>
        <!-- HTML Studio: sinh HTML đẹp từ data (skill + anti-slop) bằng AI free. -->
        <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
        <script src="../shared/web2-html-skill.js?v=20260624e"></script>
        <script src="../shared/web2-video-render.js?v=20260624a"></script>
        <script src="../shared/web2-content-maker.js?v=20260625e"></script>
        <script src="./js/ai-html.js?v=20260625a"></script>
        <script>
            (function () {
                if (window.Web2Sidebar) Web2Sidebar.mount('#web2Aside', { activeRoute: 'ai-hub' });
                if (window.lucide) lucide.createIcons();
                if (window.AiHub) AiHub.init();
            })();
        </script>
    </body>
</html>
