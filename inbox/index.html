  📖 GHI CHÚ CHO LẬP TRÌNH VIÊN:
  Khi code phải đọc thư mục https://github.com/nhijudyshop/n2store/tree/main/docs trước!
  Đọc các file SHARED_*.md để hiểu cách sử dụng shared modules.

<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Inbox Chat - N2STORE</title>
        <meta http-equiv="Cache-Control" content="public, max-age=31536000" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- External CSS -->
        <link rel="stylesheet" href="css/inbox.css" />

        <!-- ES Module: Shared utilities -->
        <script type="module" src="../shared/esm/compat.js"></script>

        <!-- Fallback for file:// protocol -->
        <script>
            if (window.location.protocol === 'file:') {
                document.write('<script src="../shared/js/shared-auth-manager.js"><\/script>');
                document.write('<script>if(typeof AuthManager!=="undefined")window.authManager=new AuthManager({redirectUrl:"../index.html"});<\/script>');
            }
        </script>

        <script defer src="../shared/js/navigation-modern.js"></script>

        <!-- Lucide Icons CDN -->
        <script defer src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>

        <!-- Firebase SDKs -->
        <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

        <!-- Firebase Configuration (SHARED) -->
        <script src="../shared/js/firebase-config.js"></script>
    </head>

    <body>
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="../shared/images/logo.jpg" alt="N2STORE" class="sidebar-logo-img">
                    <span>N2STORE</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i data-lucide="panel-left-close"></i>
                </button>
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Menu items will be auto-generated by navigation-modern.js -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i data-lucide="user-circle"></i>
                    </div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Admin</div>
                        <div class="user-role">Quản trị viên</div>
                    </div>
                </div>
                <button class="btn-permissions" id="btnPermissions">
                    <i data-lucide="shield-check"></i>
                    <span>Xem Quyền Của Tôi</span>
                </button>
                <button class="btn-logout" id="btnLogout">
                    <i data-lucide="log-out"></i>
                    <span>Đăng xuất</span>
                </button>
            </div>
        </aside>

        <!-- Main Content - 3 Column Inbox Layout -->
        <main class="main-content">
            <!-- ========== COLUMN 1: Conversation List ========== -->
            <div class="inbox-col inbox-col-conversations" id="col1">
                <div class="col-header">
                    <h2>Inbox</h2>
                    <div class="col-header-actions">
                        <button class="btn-icon-sm" id="btnRefreshInbox" title="Làm mới">
                            <i data-lucide="refresh-cw"></i>
                        </button>
                    </div>
                </div>

                <!-- Search & Filter -->
                <div class="conversation-search">
                    <div class="search-input-wrapper">
                        <i data-lucide="search"></i>
                        <input type="text" id="searchConversation" placeholder="Tìm khách hàng..." />
                    </div>
                </div>

                <!-- Page Selector -->
                <div class="page-selector" id="pageSelector">
                    <button class="page-selector-btn" id="pageSelectorBtn">
                        <i data-lucide="layout-grid"></i>
                        <span id="pageSelectorLabel">Tất cả Pages</span>
                        <i data-lucide="chevron-down" class="page-selector-arrow"></i>
                    </button>
                    <div class="page-selector-dropdown" id="pageSelectorDropdown" style="display:none;">
                        <!-- Page items rendered by JS -->
                    </div>
                </div>

                <!-- Filter Tabs -->
                <div class="conversation-filters">
                    <button class="filter-tab active" data-filter="all">Tất cả</button>
                    <button class="filter-tab" data-filter="unread">Chưa đọc</button>
                    <button class="filter-tab" data-filter="livestream">Livestream</button>
                    <button class="filter-tab" data-filter="starred">Đánh dấu</button>
                </div>

                <!-- Conversation List -->
                <div class="conversation-list" id="conversationList">
                    <!-- Conversations will be rendered by JS -->
                </div>
            </div>

            <!-- Resize Handle 1: between col1 and col2 -->
            <div class="resize-handle" id="resizeHandle1" data-left="col1" data-right="col2"></div>

            <!-- ========== COLUMN 2: Chat Area ========== -->
            <div class="inbox-col inbox-col-chat" id="col2">
                <!-- Chat Header -->
                <div class="chat-header" id="chatHeader">
                    <div class="chat-header-info">
                        <div class="chat-avatar">
                            <i data-lucide="user"></i>
                        </div>
                        <div class="chat-user-details">
                            <div class="chat-user-name" id="chatUserName">Chọn cuộc hội thoại</div>
                            <div class="chat-user-status" id="chatUserStatus">Chọn khách hàng từ danh sách bên trái</div>
                        </div>
                    </div>
                    <div class="chat-header-actions">
                        <button class="btn-icon-sm" id="btnStarConversation" title="Đánh dấu">
                            <i data-lucide="star"></i>
                        </button>
                        <button class="btn-icon-sm" id="btnToggleRightPanel" title="Thông tin">
                            <i data-lucide="panel-right-open"></i>
                        </button>
                    </div>
                </div>

                <!-- Chat Messages -->
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-empty-state">
                        <i data-lucide="message-square"></i>
                        <p>Chọn một cuộc hội thoại để bắt đầu chat</p>
                    </div>
                </div>

                <!-- Label Bar (moved from col3) -->
                <div class="chat-label-bar" id="chatLabelBar" style="display:none;">
                    <div class="chat-label-bar-inner">
                        <span class="chat-label-bar-title">Nhãn:</span>
                        <div class="chat-label-bar-list" id="chatLabelBarList">
                            <!-- Label buttons rendered by JS -->
                        </div>
                    </div>
                </div>

                <!-- Chat Input -->
                <div class="chat-input-area" id="chatInputArea">
                    <div class="chat-input-toolbar">
                        <button class="btn-icon-sm" title="Đính kèm ảnh" id="btnAttachImage">
                            <i data-lucide="image"></i>
                        </button>
                        <button class="btn-icon-sm" title="Gửi file" id="btnAttachFile">
                            <i data-lucide="paperclip"></i>
                        </button>
                    </div>
                    <div class="chat-input-wrapper">
                        <textarea id="chatInput" placeholder="Nhập tin nhắn..." rows="1"></textarea>
                        <button class="btn-send" id="btnSend" title="Gửi">
                            <i data-lucide="send"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Resize Handle 2: between col2 and col3 -->
            <div class="resize-handle" id="resizeHandle2" data-left="col2" data-right="col3"></div>

            <!-- ========== COLUMN 3: Info Panel (Stats + Orders) ========== -->
            <div class="inbox-col inbox-col-info" id="col3">
                <!-- Tab Headers -->
                <div class="info-tabs">
                    <button class="info-tab active" data-tab="stats">
                        <i data-lucide="bar-chart-2"></i>
                        <span>Phân Nhóm</span>
                    </button>
                    <button class="info-tab" data-tab="orders">
                        <i data-lucide="shopping-bag"></i>
                        <span>Đơn Hàng</span>
                    </button>
                </div>

                <!-- Tab 1: Stats / Group Labels - Full-width cards -->
                <div class="info-tab-content active" id="tabStats">
                    <!-- Group Stats Cards (rendered by JS) -->
                    <div class="group-stats-header">
                        <h3>Nhóm Phân Loại</h3>
                        <button class="btn-manage-groups" id="btnManageGroups">
                            <i data-lucide="settings"></i>
                            Quản Lý
                        </button>
                    </div>
                    <div class="group-stats-list" id="groupStatsList">
                        <!-- Full-width stats cards rendered by JS -->
                    </div>
                </div>

                <!-- Tab 2: Order Creation -->
                <div class="info-tab-content" id="tabOrders">
                    <div class="order-form-wrapper">
                        <h3 class="order-form-title">
                            <i data-lucide="shopping-bag"></i>
                            Tạo Đơn Hàng
                        </h3>

                        <form id="orderForm" class="order-form">
                            <!-- Customer Info -->
                            <div class="order-section">
                                <div class="order-section-title">
                                    <i data-lucide="user"></i>
                                    Thông Tin Khách Hàng
                                </div>
                                <div class="order-field">
                                    <label>Tên Khách Hàng</label>
                                    <input type="text" id="orderCustomerName" placeholder="Nhập tên KH..." />
                                </div>
                                <div class="order-field">
                                    <label>SĐT</label>
                                    <input type="tel" id="orderPhone" placeholder="Nhập số điện thoại..." />
                                </div>
                                <div class="order-field">
                                    <label>Địa Chỉ</label>
                                    <textarea id="orderAddress" placeholder="Nhập địa chỉ giao hàng..." rows="2"></textarea>
                                </div>
                            </div>

                            <!-- Product Info -->
                            <div class="order-section">
                                <div class="order-section-title">
                                    <i data-lucide="package"></i>
                                    Thông Tin Sản Phẩm
                                </div>
                                <div id="orderProductList">
                                    <div class="order-product-item" data-index="0">
                                        <div class="order-field">
                                            <label>Tên SP</label>
                                            <input type="text" class="product-name" placeholder="Tên sản phẩm..." />
                                        </div>
                                        <div class="order-field-row">
                                            <div class="order-field">
                                                <label>Phân Loại</label>
                                                <input type="text" class="product-variant" placeholder="Màu/Size..." />
                                            </div>
                                            <div class="order-field">
                                                <label>SL</label>
                                                <input type="number" class="product-qty" value="1" min="1" />
                                            </div>
                                        </div>
                                        <div class="order-field">
                                            <label>Giá (VNĐ)</label>
                                            <input type="text" class="product-price" placeholder="0" />
                                        </div>
                                    </div>
                                </div>
                                <button type="button" class="btn-add-product" id="btnAddProduct">
                                    <i data-lucide="plus-circle"></i>
                                    Thêm Sản Phẩm
                                </button>
                            </div>

                            <!-- Shipping & Payment -->
                            <div class="order-section">
                                <div class="order-section-title">
                                    <i data-lucide="truck"></i>
                                    Vận Chuyển & Thanh Toán
                                </div>
                                <div class="order-field">
                                    <label>Phí Ship (VNĐ)</label>
                                    <input type="text" id="orderShippingFee" placeholder="0" />
                                </div>
                                <div class="order-field">
                                    <label>Giảm Giá (VNĐ)</label>
                                    <input type="text" id="orderDiscount" placeholder="0" />
                                </div>
                                <div class="order-field">
                                    <label>Hình Thức Thanh Toán</label>
                                    <select id="orderPaymentMethod">
                                        <option value="cod">COD - Thanh toán khi nhận</option>
                                        <option value="transfer">Chuyển khoản</option>
                                        <option value="partial">Đặt cọc một phần</option>
                                    </select>
                                </div>
                                <div class="order-field" id="depositField" style="display:none;">
                                    <label>Số Tiền Đặt Cọc (VNĐ)</label>
                                    <input type="text" id="orderDeposit" placeholder="0" />
                                </div>
                                <div class="order-field">
                                    <label>Ghi Chú</label>
                                    <textarea id="orderNote" placeholder="Ghi chú đơn hàng..." rows="2"></textarea>
                                </div>
                            </div>

                            <!-- Order Summary -->
                            <div class="order-summary">
                                <div class="order-summary-row">
                                    <span>Tạm tính:</span>
                                    <span id="orderSubtotal">0₫</span>
                                </div>
                                <div class="order-summary-row">
                                    <span>Phí ship:</span>
                                    <span id="orderShipDisplay">0₫</span>
                                </div>
                                <div class="order-summary-row discount">
                                    <span>Giảm giá:</span>
                                    <span id="orderDiscountDisplay">-0₫</span>
                                </div>
                                <div class="order-summary-row total">
                                    <span>Tổng cộng:</span>
                                    <span id="orderTotal">0₫</span>
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="order-actions">
                                <button type="button" class="btn-order-reset" id="btnResetOrder">
                                    <i data-lucide="rotate-ccw"></i>
                                    Làm lại
                                </button>
                                <button type="submit" class="btn-order-submit" id="btnSubmitOrder">
                                    <i data-lucide="check-circle"></i>
                                    Tạo Đơn
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>

        <!-- Toast notification -->
        <div id="toastContainer" class="toast-container"></div>

        <!-- JavaScript -->
        <script src="../shared/js/permissions-helper.js"></script>

        <!-- API Config (must load before Pancake managers) -->
        <script src="js/inbox-api-config.js"></script>

        <!-- Pancake Managers (use tpos-pancake versions - has IG page filter & simpler caching) -->
        <script src="../tpos-pancake/js/pancake-token-manager.js"></script>
        <script src="../tpos-pancake/js/pancake-data-manager.js"></script>

        <!-- Inbox modules -->
        <script src="js/inbox-data.js"></script>
        <script src="js/inbox-chat.js"></script>
        <script src="js/inbox-orders.js"></script>
        <script src="js/inbox-main.js"></script>
    </body>
</html>
