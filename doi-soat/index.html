<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quét Mã Đối Soát</title>

        <!-- External CSS -->
        <link rel="stylesheet" href="css/styles.css" />

        <!-- ES Module: Shared utilities -->
        <script type="module" src="../shared/esm/compat.js"></script>

        <!-- Fallback for file:// protocol -->
        <script>
            if (window.location.protocol === 'file:') {
                document.write('<script src="../shared/js/shared-auth-manager.js"><\/script>');
                document.write('<script>if(typeof AuthManager!=="undefined")window.authManager=new AuthManager({redirectUrl:"../index.html"});<\/script>');
            }
        </script>

        <!-- Firebase SDKs -->
        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

        <!-- Shared Configuration -->
        <script src="../shared/js/firebase-config.js"></script>
        <script defer src="../shared/js/navigation-modern.js"></script>

        <!-- Token Manager (for TPOS API auth) -->
        <script src="../shared/js/shop-config.js"></script>
        <script src="../shared/js/token-manager.js"></script>
        <script src="../shared/js/tpos-config.js"></script>

        <!-- Override: doi-soat dùng account riêng "doisoatlive" -->
        <script>
        (function() {
            var tm = window.tokenManager;
            if (!tm) return;
            tm.credentials = { grant_type: 'password', username: 'doisoatlive', password: 'Aa@123456987', client_id: 'tmtWebApp' };
            tm.storageKey = 'bearer_token_data_doisoat';
            tm.token = null;
            tm.tokenExpiry = null;
            tm.initFirestore = function() {
                try {
                    if (window.firebase && window.firebase.firestore && this.firestoreReady) {
                        this.firestoreRef = window.firebase.firestore().collection('tokens').doc('tpos_token_doisoat');
                        return true;
                    }
                    return false;
                } catch (e) { return false; }
            };
        })();
        </script>

        <!-- Lucide Icons -->
        <script defer src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/css/typography.css" /> <!-- typography:shared -->
</head>
    <body>
        <!-- Page 1: Scanner -->
        <div id="scannerPage" class="page active">
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="btn-icon" id="menuToggle">
                        <i data-lucide="menu"></i>
                    </button>
                    <h1 class="page-title">Quét mã đối soát</h1>
                </div>
            </header>

            <main class="scanner-container">
                <div id="inlineMsgScanner" class="inline-msg" style="display:none;"></div>
                <div id="successBanner" class="success-banner" style="display:none;"></div>
                <div class="scanner-box">
                    <div class="barcode-icon">
                        <svg viewBox="0 0 120 100" width="160" height="130">
                            <!-- Left bracket -->
                            <path d="M10 5 L10 95 L30 95 M10 5 L30 5" stroke="#333" stroke-width="6" fill="none" stroke-linecap="round"/>
                            <!-- Right bracket -->
                            <path d="M110 5 L110 95 L90 95 M110 5 L90 5" stroke="#333" stroke-width="6" fill="none" stroke-linecap="round"/>
                            <!-- Barcode lines -->
                            <rect x="30" y="15" width="4" height="70" fill="#333"/>
                            <rect x="38" y="15" width="2" height="70" fill="#333"/>
                            <rect x="44" y="15" width="6" height="70" fill="#333"/>
                            <rect x="54" y="15" width="3" height="70" fill="#333"/>
                            <rect x="60" y="15" width="5" height="70" fill="#333"/>
                            <rect x="68" y="15" width="2" height="70" fill="#333"/>
                            <rect x="74" y="15" width="4" height="70" fill="#333"/>
                            <rect x="82" y="15" width="6" height="70" fill="#333"/>
                        </svg>
                    </div>

                    <div class="search-row">
                        <input
                            type="text"
                            id="invoiceCodeInput"
                            class="search-input"
                            placeholder="Nhập mã phiếu bán hàng"
                            autofocus
                        />
                        <button class="btn btn-search" id="searchBtn">
                            <i data-lucide="search"></i>
                        </button>
                    </div>

                    <p class="hint-text">* Tìm hoặc quét mã số PBH để lấy thông tin phiếu bán hàng</p>
                </div>
            </main>
        </div>

        <!-- Page 2: Product Reconciliation -->
        <div id="reconcilePage" class="page">
            <!-- Sticky barcode scanner -->
            <div class="sticky-scanner">
                <div class="product-scan-row">
                    <input
                        type="text"
                        id="productBarcodeInput"
                        class="search-input"
                        placeholder="Quét mã"
                    />
                    <button class="btn btn-scan" id="productScanBtn">
                        <svg viewBox="0 0 24 20" width="20" height="16">
                            <rect x="2" y="2" width="2" height="16" fill="currentColor"/>
                            <rect x="6" y="2" width="1" height="16" fill="currentColor"/>
                            <rect x="9" y="2" width="3" height="16" fill="currentColor"/>
                            <rect x="14" y="2" width="1" height="16" fill="currentColor"/>
                            <rect x="17" y="2" width="2" height="16" fill="currentColor"/>
                            <rect x="21" y="2" width="1" height="16" fill="currentColor"/>
                        </svg>
                        Quét mã
                    </button>
                    <label class="auto-clear-toggle" title="Bật: chế độ máy quét (auto-clear 1s). Tắt: nhập tay">
                        <input type="checkbox" id="autoClearToggle" checked />
                        <span>Máy quét</span>
                    </label>
                </div>
                <div class="manual-entry-row" id="manualEntryRow" style="display:none;">
                    <input
                        type="text"
                        id="manualUserName"
                        class="search-input"
                        placeholder="Tên người nhập tay"
                    />
                    <input
                        type="text"
                        id="manualNote"
                        class="search-input"
                        placeholder="Ghi chú"
                        style="margin-top:6px;"
                    />
                </div>
            </div>

            <main class="reconcile-container">
                <!-- Inline Message -->
                <div id="inlineMsg" class="inline-msg" style="display:none;"></div>

                <!-- Product Table (always visible) -->
                <div class="product-section">
                    <div class="section-header">
                        <h3 class="section-title">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                            </svg>
                            Danh sách sản phẩm
                        </h3>
                        <button class="btn btn-default" id="backBtn">Quay lại</button>
                    </div>
                    <div class="table-container">
                        <table class="product-table">
                            <thead>
                                <tr>
                                    <th>STT</th>
                                    <th>Sản phẩm</th>
                                    <th>Số lượng</th>
                                    <th>Số tiền</th>
                                    <th>Tổng tiền</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody id="productTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Order info (moved below product list) -->
                <div class="order-info-bar">
                    <h1 class="page-title">
                        Đối soát sản phẩm: <span id="orderNumber" class="order-number"></span>
                        <span id="orderStatus" class="status-badge"></span>
                    </h1>
                    <button class="btn btn-success" id="saveBtn">Lưu</button>
                </div>

                <!-- Tabs -->
                <div class="tab-nav">
                    <button class="tab-btn active" data-tab="reconcileTab">Thông tin đối soát</button>
                    <button class="tab-btn" data-tab="detailTab">Chi tiết PBH</button>
                </div>

                <!-- Tab: Thông tin đối soát -->
                <div id="reconcileTab" class="tab-content active">
                    <div class="info-section">
                        <div class="info-row info-meta">
                            <div class="info-group">
                                <label>Khách hàng:</label>
                                <span id="customerName"></span>
                            </div>
                            <div class="info-group">
                                <label>Nhân viên:</label>
                                <span id="staffName"></span>
                            </div>
                            <div class="info-group">
                                <label>Công ty:</label>
                                <span id="companyName"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab: Chi tiết PBH -->
                <div id="detailTab" class="tab-content">
                    <div id="orderDetailContent" class="detail-content">
                    </div>
                </div>
            </main>
        </div>


        <!-- Scripts -->
        <script src="js/app.js"></script>
    </body>
</html>
