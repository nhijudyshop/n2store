<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Source channels — AI KOL Studio</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/aikol.css" />

        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
        <script src="../shared/js/firebase-config.js"></script>
        <script defer src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>

        <script src="../shared/js/shared-auth-manager.js"></script>
        <script src="../shared/js/shared-cache-manager.js"></script>

        <script src="js/aikol-feature-gate.js"></script>
        <script>
            if (!window.AikolGate?.isEnabled()) {
                window.location.replace('./index.html#disabled');
            }
        </script>
        <script defer src="js/aikol-api.js"></script>
        <script defer src="js/aikol-modal.js"></script>
        <script defer src="js/aikol-sidebar.js"></script>
        <script defer src="js/channels.js"></script>
    </head>
    <body>
        <main class="aikol-shell">
            <header
                class="aikol-header"
                style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem"
            >
                <div>
                    <h1>Source channels</h1>
                    <p>Channel-level dashboard — clips imported, status, retry & download</p>
                </div>
                <div style="display: flex; gap: 0.5rem; align-items: center">
                    <span id="aikol-credits" class="aikol-credit-chip">— credits</span>
                    <a class="aikol-btn aikol-btn--secondary" href="library.html"
                        >+ Import channel</a
                    >
                </div>
            </header>

            <section class="aikol-panel">
                <div id="channels-empty" class="aikol-empty" style="display: none">
                    Chưa có channel nào — vào <a href="library.html">Clip Library</a> để import.
                </div>
                <div id="channels-list" style="display: grid; gap: 0.75rem"></div>
            </section>
        </main>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                if (window.lucide) window.lucide.createIcons();
            });
        </script>
    </body>
</html>
