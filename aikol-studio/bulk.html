<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Bulk Generate — AI KOL Studio</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="css/aikol.css" />

        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
        <script src="../shared/js/firebase-config.js"></script>
        <script defer src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>

        <script src="../shared/js/shared-auth-manager.js"></script>
        <script src="../shared/js/shared-cache-manager.js"></script>

        <script defer src="js/aikol-api.js"></script>
        <script defer src="js/aikol-sidebar.js"></script>
        <script defer src="js/aikol-prompt-generator.js"></script>
        <script defer src="js/generate-panel.js"></script>
        <script defer src="js/bulk.js"></script>
    </head>
    <body>
        <main class="aikol-shell">
            <header class="aikol-header aikol-header--row">
                <div>
                    <h1>Bulk Generate</h1>
                    <p>Chạy 1 model qua nhiều clip cùng lúc · 4 preset hoặc tự cấu hình</p>
                </div>
                <div class="aikol-header__actions">
                    <span id="aikol-credits" class="aikol-credit-chip">— credits</span>
                </div>
            </header>

            <!-- STEP 1 — Preset cards full-width -->
            <section class="aikol-panel">
                <div class="aikol-step-head">
                    <span class="aikol-step-num">1</span>
                    <h2 style="margin: 0">Pick a preset</h2>
                </div>
                <div id="preset-grid" class="aikol-preset-grid">
                    <button type="button" class="aikol-preset" data-preset="favorites_image">
                        <span class="aikol-preset__icon" aria-hidden="true">⭐</span>
                        <strong>Favorites → Image</strong>
                        <span>Tất cả clip favorite · 1 image / clip · 9:16</span>
                    </button>
                    <button type="button" class="aikol-preset" data-preset="recent_image_3">
                        <span class="aikol-preset__icon" aria-hidden="true">🆕</span>
                        <strong>Recent 5 → 3 images</strong>
                        <span>5 clip mới nhất · 3 variations · close-up</span>
                    </button>
                    <button type="button" class="aikol-preset" data-preset="favorites_video">
                        <span class="aikol-preset__icon" aria-hidden="true">🎬</span>
                        <strong>Favorites → Video std</strong>
                        <span>Favorite · Kling std 5s / clip</span>
                    </button>
                    <button type="button" class="aikol-preset" data-preset="custom">
                        <span class="aikol-preset__icon" aria-hidden="true">⚙️</span>
                        <strong>Custom</strong>
                        <span>Tự chọn filter + config</span>
                    </button>
                </div>
            </section>

            <!-- 2-column: form (left) + launch (right rail) -->
            <div class="aikol-bulk-grid">
                <form id="bulk-form" class="aikol-bulk-form">
                    <!-- STEP 2 — Pick clips (filter) -->
                    <section class="aikol-panel">
                        <div class="aikol-step-head">
                            <span class="aikol-step-num">2</span>
                            <h2 style="margin: 0">
                                Pick clips
                                <span
                                    id="bulk-match-count"
                                    style="
                                        color: var(--aikol-text-dim);
                                        font-size: 0.85rem;
                                        font-weight: 400;
                                        margin-left: 0.5rem;
                                    "
                                ></span>
                            </h2>
                        </div>

                        <div class="aikol-bulk-filterbar" id="bulk-filterbar">
                            <button
                                type="button"
                                class="aikol-chip aikol-chip--active"
                                data-quick="all"
                                aria-pressed="true"
                            >
                                All
                            </button>
                            <button type="button" class="aikol-chip" data-quick="favorites">
                                ⭐ Favorites
                            </button>
                            <button type="button" class="aikol-chip" data-quick="recent">
                                🆕 Recent
                            </button>
                            <button type="button" class="aikol-chip" data-quick="popular">
                                🔥 100K+ views
                            </button>
                        </div>

                        <div class="aikol-gen-grid">
                            <label class="aikol-gen-row">
                                <span>Platform</span>
                                <select name="platform">
                                    <option value="">All</option>
                                    <option value="tiktok">TikTok</option>
                                    <option value="upload">Upload</option>
                                    <option value="douyin">Douyin</option>
                                </select>
                            </label>
                            <label class="aikol-gen-row">
                                <span>Username (filter)</span>
                                <input
                                    type="text"
                                    name="username"
                                    placeholder="(để trống = tất cả)"
                                />
                            </label>
                            <label class="aikol-gen-row">
                                <span>Min views</span>
                                <input type="number" name="min_views" min="0" placeholder="0" />
                            </label>
                            <label class="aikol-gen-row">
                                <span>Limit clips</span>
                                <input type="number" name="limit" min="1" max="50" value="10" />
                            </label>
                        </div>
                        <fieldset class="aikol-gen-fieldset">
                            <legend>Filter</legend>
                            <label
                                ><input type="checkbox" name="favorite_only" /> Chỉ favorite</label
                            >
                        </fieldset>

                        <div id="bulk-clip-preview" class="aikol-bulk-preview" aria-live="polite">
                            <!-- thumbnails injected by bulk.js -->
                        </div>
                    </section>

                    <!-- STEP 3 — Generation config -->
                    <section class="aikol-panel">
                        <div class="aikol-step-head">
                            <span class="aikol-step-num">3</span>
                            <h2 style="margin: 0">Generation config</h2>
                        </div>

                        <div class="aikol-segmented" role="tablist" aria-label="Output kind">
                            <button
                                type="button"
                                class="aikol-segmented__btn aikol-segmented__btn--active"
                                data-kind="image"
                                aria-pressed="true"
                            >
                                🖼️ Image
                            </button>
                            <button
                                type="button"
                                class="aikol-segmented__btn"
                                data-kind="video"
                                aria-pressed="false"
                            >
                                🎬 Video (Kling AI)
                            </button>
                        </div>
                        <input type="hidden" name="kind" value="image" />

                        <div class="aikol-gen-grid" style="margin-top: 0.85rem">
                            <label class="aikol-gen-row">
                                <span>Model</span>
                                <select name="model_id" required></select>
                            </label>
                            <label class="aikol-gen-row">
                                <span>Variations / clip</span>
                                <input type="number" name="variations" min="1" max="10" value="1" />
                            </label>
                            <label class="aikol-gen-row" data-image-only>
                                <span>Image size</span>
                                <select name="image_size">
                                    <option value="9:16" selected>9:16</option>
                                    <option value="1:1">1:1</option>
                                    <option value="16:9">16:9</option>
                                </select>
                            </label>
                            <label class="aikol-gen-row" data-video-only style="display: none">
                                <span>Kling mode</span>
                                <select name="kling_mode">
                                    <option value="std" selected>Standard</option>
                                    <option value="pro">Pro</option>
                                </select>
                            </label>
                            <label class="aikol-gen-row" data-video-only style="display: none">
                                <span>Duration</span>
                                <select name="duration_seconds">
                                    <option value="5" selected>5s</option>
                                    <option value="10">10s</option>
                                </select>
                            </label>
                        </div>

                        <fieldset class="aikol-gen-fieldset" style="margin-top: 0.6rem">
                            <legend>Keep from clip</legend>
                            <label><input type="checkbox" name="keep_pose" checked /> Pose</label>
                            <label><input type="checkbox" name="keep_outfit" /> Outfit</label>
                            <label><input type="checkbox" name="keep_bg" /> Background</label>
                            <label
                                ><input type="checkbox" name="keep_lighting" checked />
                                Lighting</label
                            >
                        </fieldset>

                        <label class="aikol-gen-row" style="margin-top: 0.6rem">
                            <div
                                style="
                                    display: flex;
                                    align-items: center;
                                    justify-content: space-between;
                                    gap: 0.5rem;
                                    flex-wrap: wrap;
                                "
                            >
                                <span>Note (optional)</span>
                                <button
                                    type="button"
                                    id="bulk-note-suggest-btn"
                                    class="aikol-btn aikol-btn--secondary"
                                    style="font-size: 0.75rem; padding: 0.25rem 0.6rem"
                                >
                                    🎲 Gợi ý scene
                                </button>
                            </div>
                            <textarea
                                id="bulk-note-textarea"
                                name="note"
                                rows="2"
                                maxlength="500"
                                placeholder="Free-form prompt cho mọi clip"
                            ></textarea>
                            <div
                                id="bulk-note-suggest-list"
                                style="
                                    display: none;
                                    flex-direction: column;
                                    gap: 0.4rem;
                                    margin-top: 0.4rem;
                                "
                            ></div>
                        </label>
                    </section>
                </form>

                <!-- LAUNCH RAIL — sticky right column -->
                <aside class="aikol-bulk-launch" aria-label="Launch summary">
                    <div class="aikol-panel aikol-bulk-launch__card">
                        <div class="aikol-step-head">
                            <span class="aikol-step-num">4</span>
                            <h2 style="margin: 0">Launch</h2>
                        </div>

                        <dl class="aikol-launch-summary">
                            <div>
                                <dt>Preset</dt>
                                <dd id="launch-preset">—</dd>
                            </div>
                            <div>
                                <dt>Output</dt>
                                <dd id="launch-output">image · 1 variation</dd>
                            </div>
                            <div>
                                <dt>Filter</dt>
                                <dd id="launch-filter">All clips</dd>
                            </div>
                            <div>
                                <dt>Clips matching</dt>
                                <dd id="launch-matching">—</dd>
                            </div>
                            <div>
                                <dt>Cost / clip</dt>
                                <dd id="launch-per">— cr</dd>
                            </div>
                        </dl>

                        <div class="aikol-launch-total">
                            <span class="aikol-launch-total__label">Tổng</span>
                            <span class="aikol-launch-total__num" id="launch-total">— cr</span>
                        </div>

                        <button
                            id="launch-btn"
                            type="submit"
                            form="bulk-form"
                            class="aikol-btn aikol-btn--xl"
                        >
                            🚀 Launch
                        </button>

                        <div class="aikol-launch-meta">
                            <label class="aikol-launch-saveas">
                                <input type="checkbox" id="save-as-campaign" />
                                Lưu thành campaign
                            </label>
                            <input
                                id="campaign-name"
                                type="text"
                                class="aikol-input aikol-input--sm"
                                placeholder="Tên campaign (tuỳ chọn)"
                            />
                        </div>
                    </div>
                </aside>
            </div>

            <section
                id="aikol-queue-panel"
                class="aikol-queue"
                aria-live="polite"
                aria-label="Generation queue"
            ></section>

            <section class="aikol-panel">
                <h2>Recent runs</h2>
                <div id="bulk-recent"></div>
            </section>

            <!-- Hidden legacy element kept for backwards-compat with deep test -->
            <div id="bulk-cost-summary" hidden></div>
        </main>
    </body>
</html>
