<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Models — AI KOL Studio</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="../hanghoan/css/modern.css" />
        <link rel="stylesheet" href="css/aikol.css" />

        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
        <script src="../shared/js/firebase-config.js"></script>
        <script defer src="../shared/js/navigation-modern.js"></script>
        <script defer src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>

        <script src="../shared/js/shared-auth-manager.js"></script>
        <script src="../shared/js/shared-cache-manager.js"></script>

        <script defer src="js/aikol-api.js"></script>
        <script defer src="js/aikol-sidebar.js"></script>
        <script defer src="js/models.js"></script>
    </head>
    <body>
        <main class="aikol-shell">
            <header
                class="aikol-header"
                style="
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    flex-wrap: wrap;
                    gap: 1rem;
                "
            >
                <div>
                    <h1>Models</h1>
                    <p>Chân dung — gương mặt cloned vào output</p>
                </div>
                <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap">
                    <span id="aikol-credits" class="aikol-credit-chip">— credits</span>
                </div>
            </header>

            <section class="aikol-panel">
                <h2>Upload model mới</h2>
                <form id="model-form" style="display: grid; gap: 0.85rem; max-width: 500px">
                    <div>
                        <label class="aikol-label" for="model-name">Tên model</label>
                        <input
                            id="model-name"
                            class="aikol-input"
                            type="text"
                            placeholder="vd: Linh — full body"
                            maxlength="80"
                            required
                        />
                    </div>
                    <div>
                        <label class="aikol-label" for="model-file"
                            >Ảnh chân dung (JPEG / PNG / WEBP, ≤8MB)</label
                        >
                        <input
                            id="model-file"
                            class="aikol-input"
                            type="file"
                            accept="image/jpeg,image/png,image/webp"
                            required
                        />
                    </div>
                    <div>
                        <button id="model-submit" type="submit" class="aikol-btn">Lưu model</button>
                    </div>
                </form>
            </section>

            <section class="aikol-panel">
                <h2>Models của bạn</h2>
                <div id="models-empty" class="aikol-empty" style="display: none">
                    Chưa có model nào. Upload ảnh chân dung phía trên để bắt đầu.
                </div>
                <div id="models-list" class="aikol-models-grid"></div>
            </section>
        </main>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                if (window.lucide) window.lucide.createIcons();
            });
        </script>
    </body>
</html>
