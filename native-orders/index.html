<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
    <title>Đơn Web — N2Store</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/native-orders.css?v=20260424h">

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js" defer></script>

    <!-- Firebase compat -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <!-- Shared lib -->
    <script src="../shared/js/firebase-config.js"></script>
    <script src="../shared/js/shared-auth-manager.js"></script>
    <script src="../shared/js/notification-system.js"></script>
</head>
<body>

<main class="main-content">
    <!-- Tab Navigation -->
    <div class="tab-navigation">
        <div class="tab-nav-content">
            <a class="tab-button active" data-tab="native-orders" href="#">
                <i data-lucide="package-open" class="tab-icon"></i>
                Đơn Web
            </a>
            <a class="tab-button" data-tab="tpos-pancake" href="../tpos-pancake/index.html">
                <i data-lucide="shopping-cart" class="tab-icon"></i>
                TPOS × Pancake
            </a>
            <a class="tab-button" data-tab="web2-products" href="../web2-products/index.html">
                <i data-lucide="box" class="tab-icon"></i>
                Kho SP
            </a>
            <div class="tab-spacer"></div>
            <div class="topbar-actions">
                <span class="counter-pill" id="totalCounter">— đơn</span>
                <span class="source-pill">source=NATIVE_WEB</span>
            </div>
        </div>
    </div>

    <!-- Filter Toggle -->
    <div style="padding: 10px 20px 0 20px;">
        <button id="toggleControlBarBtn" class="btn-gray" onclick="NativeOrdersApp.toggleFilter()">
            <i data-lucide="sliders-horizontal"></i>
            <span id="toggleControlBarLabel">Hiển thị bộ lọc</span>
        </button>
    </div>

    <!-- Filter Section -->
    <section class="search-section" id="controlBar">
        <div class="filter-row">
            <div class="search-wrapper">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" class="search-input" id="filterSearch"
                    placeholder="Tìm theo SĐT, tên, mã đơn, ghi chú..."
                    autocomplete="off">
                <button class="search-clear" id="filterSearchClear" title="Xóa">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <!-- Status filter pill -->
            <div class="filter-chip-group">
                <label class="chip-label chip-label-primary">
                    <i data-lucide="bookmark-check"></i> Trạng thái:
                </label>
                <div class="chip-select-wrapper">
                    <select id="filterStatus" class="chip-select chip-select-primary">
                        <option value="all">Tất cả</option>
                        <option value="draft">Nháp</option>
                        <option value="confirmed">Đã xác nhận</option>
                        <option value="cancelled">Đã hủy</option>
                        <option value="delivered">Đã giao</option>
                    </select>
                    <i data-lucide="chevron-down" class="chip-caret"></i>
                </div>
            </div>

            <!-- Limit pill -->
            <div class="filter-chip-group">
                <label class="chip-label chip-label-muted">
                    <i data-lucide="list"></i> Hiển thị:
                </label>
                <div class="chip-select-wrapper">
                    <select id="filterLimit" class="chip-select chip-select-muted">
                        <option value="50">50 / trang</option>
                        <option value="100">100 / trang</option>
                        <option value="200" selected>200 / trang</option>
                        <option value="500">500 / trang</option>
                        <option value="1000">1000 / trang</option>
                    </select>
                    <i data-lucide="chevron-down" class="chip-caret"></i>
                </div>
            </div>
        </div>

        <!-- Search info / stats row -->
        <div class="search-info">
            <div class="search-info-left">
                <span class="search-result-count" id="searchResultCount">0</span>
                <span class="search-result-label">kết quả</span>
            </div>
            <div class="search-info-right">
                <div class="search-tips">💡 Gõ Enter để tìm nhanh</div>
                <button class="btn-reload" id="btnRefresh" title="Tải lại">
                    <i data-lucide="refresh-cw"></i> Tải lại
                </button>
                <button class="btn-settings" id="btnApplyFilter" title="Áp dụng bộ lọc">
                    <i data-lucide="filter"></i> Áp dụng
                </button>
                <button class="btn-ghost" id="btnClearFilter" title="Xóa tất cả bộ lọc">
                    <i data-lucide="x"></i> Xóa lọc
                </button>
            </div>
        </div>
    </section>

    <!-- Table -->
    <section class="table-section">
        <div class="table-scroll">
            <table class="data-table" id="ordersTable">
                <thead>
                    <tr>
                        <th class="col-check"><input type="checkbox" id="checkAll"></th>
                        <th class="col-actions">THAO TÁC</th>
                        <th class="col-code">MÃ ĐƠN</th>
                        <th class="col-stt">STT</th>
                        <th class="col-customer">KHÁCH HÀNG</th>
                        <th class="col-phone">SĐT</th>
                        <th class="col-address">ĐỊA CHỈ</th>
                        <th class="col-note">GHI CHÚ</th>
                        <th class="col-status">TRẠNG THÁI</th>
                        <th class="col-time">TẠO LÚC</th>
                        <th class="col-creator">NGƯỜI TẠO</th>
                    </tr>
                </thead>
                <tbody id="ordersTbody">
                    <tr><td colspan="11" class="loading-row">
                        <div class="spinner"></div> Đang tải dữ liệu...
                    </td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </section>
</main>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal-content" style="min-width:560px;max-width:720px;">
        <div class="modal-header">
            <h3 id="editModalTitle">
                <i data-lucide="pencil"></i>
                <span>Chỉnh sửa đơn</span>
            </h3>
            <button class="btn-icon-round" id="btnCloseModal" title="Đóng">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div class="modal-body" id="editModalBody"></div>
        <div class="modal-footer">
            <button class="btn-ghost" id="btnCancelEdit">Hủy</button>
            <button class="btn-primary" id="btnSaveEdit">
                <i data-lucide="save"></i> Lưu
            </button>
        </div>
    </div>
</div>

<!-- App Scripts -->
<script src="js/native-orders-api.js?v=20260424h"></script>
<script src="js/native-orders-app.js?v=20260424h"></script>
</body>
</html>
