        <!-- 🧹 Auto cleanup localStorage to prevent QuotaExceededError -->
        <script>
            (function () {
                try {
                    var totalSize = 0;
                    var itemSizes = [];
                    for (var key in localStorage) {
                        if (localStorage.hasOwnProperty(key)) {
                            var itemSize = localStorage[key].length + key.length;
                            totalSize += itemSize;
                            itemSizes.push({ key: key, size: itemSize });
                        }
                    }
                    var sizeMB = (totalSize / (1024 * 1024)).toFixed(2);

                    // If over 3.5MB, aggressively clean up (lowered from 4MB to prevent quota errors)
                    if (totalSize > 3.5 * 1024 * 1024) {
                        console.warn(
                            '[STORAGE] ⚠️ localStorage near quota (' +
                                sizeMB +
                                'MB), auto cleaning...'
                        );
                        var cleaned = 0;
                        var keysToRemove = [];

                        // Sort by size descending for aggressive cleanup
                        itemSizes.sort(function (a, b) {
                            return b.size - a.size;
                        });

                        for (var k in localStorage) {
                            if (localStorage.hasOwnProperty(k)) {
                                // Remove Firebase internal data
                                if (k.startsWith('firebase:')) keysToRemove.push(k);
                                // Remove large caches (Firestore is source of truth)
                                if (
                                    k === 'standard_price_cache' ||
                                    k === 'product_excel_cache' ||
                                    k === 'orders_phone_debt_cache' ||
                                    k === 'orders_phone_qr_cache' ||
                                    k === 'invoiceStatusStore_v2' ||
                                    k === 'invoiceStatusDelete_v2' ||
                                    k === 'messageSendHistory'
                                ) {
                                    keysToRemove.push(k);
                                }
                                // Remove any item > 500KB (except tab3 assignment data)
                                if (localStorage[k].length > 500000 &&
                                    k !== 'orders_productAssignments' &&
                                    k !== 'orders_productRemovals') {
                                    keysToRemove.push(k);
                                }
                            }
                        }

                        // Deduplicate
                        keysToRemove = keysToRemove.filter(function (v, i, a) {
                            return a.indexOf(v) === i;
                        });

                        keysToRemove.forEach(function (key) {
                            localStorage.removeItem(key);
                            cleaned++;
                        });

                        console.log('[STORAGE] ✅ Auto cleaned ' + cleaned + ' items');

                        // If still over quota after cleanup, remove largest remaining items
                        var afterSize = 0;
                        for (var key2 in localStorage) {
                            if (localStorage.hasOwnProperty(key2)) {
                                afterSize += localStorage[key2].length + key2.length;
                            }
                        }
                        if (afterSize > 4 * 1024 * 1024) {
                            console.warn('[STORAGE] Still over quota, removing largest items...');
                            var remaining = [];
                            for (var key3 in localStorage) {
                                if (localStorage.hasOwnProperty(key3)) {
                                    remaining.push({ key: key3, size: localStorage[key3].length });
                                }
                            }
                            remaining.sort(function (a, b) {
                                return b.size - a.size;
                            });
                            // Remove top 3 largest items (except auth-critical ones)
                            var removed = 0;
                            for (var i = 0; i < remaining.length && removed < 3; i++) {
                                var rk = remaining[i].key;
                                if (
                                    rk !== 'userType' &&
                                    rk !== 'authState' &&
                                    !rk.startsWith('auth') &&
                                    rk !== 'orders_productAssignments' &&
                                    rk !== 'orders_productRemovals'
                                ) {
                                    localStorage.removeItem(rk);
                                    removed++;
                                    console.log(
                                        '[STORAGE] Removed large item: ' +
                                            rk +
                                            ' (' +
                                            (remaining[i].size / 1024).toFixed(0) +
                                            'KB)'
                                    );
                                }
                            }
                        }
                    }
                } catch (e) {
                    console.warn('[STORAGE] Cleanup error:', e);
                }
            })();
        </script>

        <!-- Legacy wrapper functions for orders-report -->
        <script type="module">
            window.addEventListener('sharedModulesLoaded', () => {
                if (window.authManager) {
                    window.getAuthState = () => window.authManager.getAuthData();
                    window.setAuthState = (isLoggedIn, userType, roleData) => {
                        window.authManager.saveAuthData(
                            { isLoggedIn, userType, roleData, timestamp: Date.now() },
                            false
                        );
                    };
                    window.clearAuthState = () => {
                        sessionStorage.removeItem('loginindex_auth');
                        localStorage.removeItem('loginindex_auth');
                    };
                    window.isAuthenticated = () => window.authManager.isAuthenticated();
                    window.hasPermission = (level) => window.authManager.hasPermission(level);
                    window.getUserName = () => {
                        const auth = window.authManager.getAuthData();
                        return auth?.userType ? auth.userType.split('-')[0] : 'Admin';
                    };
                    window.handleLogout = () => {
                        if (confirm('Bạn có chắc muốn đăng xuất?')) {
                            window.clearAuthState();
                            window.location.href = '../index.html';
                        }
                    };
                    console.log('[AUTH] Legacy wrapper functions ready');
                }
            });
        </script>

            /* Sync indicator */

                }

        <!-- ===== Pancake Extension Relay Bridge (top frame → iframe) ===== -->
        <!-- Extension contentscript injects into top frame (main.html), NOT iframe.
             This relay catches extension events and forwards them to ordersFrame (tab1).
             Also relays iframe→extension messages (REPLY_INBOX_PHOTO, etc.) back up. -->
        <script>
        (function() {
            // Track extension connection at top frame level
            window._extensionConnected = false;

            // Trusted origins for postMessage relay (self + GitHub Pages)
            var _trustedOrigins = [
                window.location.origin,
                'https://nhijudyshop.github.io'
            ];
            function _isTrustedOrigin(origin) {
                return !origin || _trustedOrigins.indexOf(origin) !== -1;
            }

            // 1. EXTENSION → TOP FRAME → IFRAME (relay extension events down to iframe)
            window.addEventListener('message', function(e) {
                if (e.source !== window) return;
                var type = e.data && e.data.type;
                if (!type) return;

                // Extension events to relay down to iframe
                var isExtResponse = (
                    type === 'EXTENSION_LOADED' ||
                    type === 'EXTENSION_VERSION' ||
                    type === 'REPORT_EXTENSION_STATUS' ||
                    type === 'REPLY_INBOX_PHOTO_SUCCESS' ||
                    type === 'REPLY_INBOX_PHOTO_FAILURE' ||
                    type === 'UPLOAD_INBOX_PHOTO_SUCCESS' ||
                    type === 'UPLOAD_INBOX_PHOTO_FAILURE' ||
                    type === 'GET_GLOBAL_ID_FOR_CONV_SUCCESS' ||
                    type === 'GET_GLOBAL_ID_FOR_CONV_FAILURE' ||
                    type === 'GET_BUSINESS_CONTEXT_SUCCESS' ||
                    type === 'GET_BUSINESS_CONTEXT_FAILURE' ||
                    type === 'BATCH_GET_GLOBAL_ID_SUCCESS' ||
                    type === 'BATCH_GET_GLOBAL_ID_FAILURE' ||
                    type === 'SEND_COMMENT_SUCCESS' ||
                    type === 'SEND_COMMENT_FAILURE' ||
                    type === 'SEND_PRIVATE_REPLY_SUCCESS' ||
                    type === 'SEND_PRIVATE_REPLY_FAILURE'
                );

                if (isExtResponse) {
                    if (type === 'EXTENSION_LOADED') {
                        window._extensionConnected = true;
                        console.log('[MAIN-EXT] Extension connected, relaying to iframe');
                    }
                    // Forward to ordersFrame (tab1 iframe) — use specific origin
                    var ordersFrame = document.getElementById('ordersFrame');
                    if (ordersFrame && ordersFrame.contentWindow) {
                        ordersFrame.contentWindow.postMessage(e.data, window.location.origin);
                    }
                }
            });

            // 2. IFRAME → TOP FRAME → EXTENSION (relay extension commands from iframe up)
            window.addEventListener('message', function(e) {
                // Only accept messages from our iframes (not from window itself)
                if (e.source === window) return;
                // Validate origin — only accept from trusted sources
                if (!_isTrustedOrigin(e.origin)) return;
                var type = e.data && e.data.type;
                if (!type) return;

                // Extension commands that iframe sends up
                var isExtCommand = (
                    type === 'PREINITIALIZE_PAGES' ||
                    type === 'CHECK_EXTENSION_VERSION' ||
                    type === 'REPLY_INBOX_PHOTO' ||
                    type === 'UPLOAD_INBOX_PHOTO' ||
                    type === 'GET_GLOBAL_ID_FOR_CONV' ||
                    type === 'GET_BUSINESS_CONTEXT' ||
                    type === 'BATCH_GET_GLOBAL_ID' ||
                    type === 'SEND_COMMENT' ||
                    type === 'SEND_PRIVATE_REPLY' ||
                    type === 'CHECK_EXTENSION' ||
                    type === 'EXT_BRIDGE_PROBE'
                );

                if (isExtCommand) {
                    if (type === 'EXT_BRIDGE_PROBE') {
                        // Respond to probe from iframe with connection status
                        e.source.postMessage({
                            type: 'EXT_BRIDGE_PROBE_RESPONSE',
                            connected: window._extensionConnected
                        }, e.origin || window.location.origin);
                        return;
                    }
                    // Forward to extension (top frame window.postMessage → contentscript)
                    console.log('[MAIN-EXT] Relaying to extension:', type);
                    window.postMessage(e.data, window.location.origin);
                }
            });

            console.log('[MAIN-EXT] Extension relay bridge active');
        })();
        </script>

        <script>
            // Initialize Lucide icons (wait for defer script to load)
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            } else {
                window.addEventListener('DOMContentLoaded', () => {
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                });
            }

            // Tab switching
            function switchTab(tabName) {
                // Save current tab to localStorage
                localStorage.setItem('currentTab', tabName);

                // Update tab buttons (Desktop)
                document.querySelectorAll('.tab-button').forEach((btn) => {
                    btn.classList.remove('active');
                });
                const desktopBtn = document.querySelector(`.tab-button[data-tab="${tabName}"]`);
                if (desktopBtn) desktopBtn.classList.add('active');

                // Update Mobile Header & Dropdown
                updateMobileHeader(tabName);

                // Update tab content
                document.querySelectorAll('.tab-content').forEach((content) => {
                    content.classList.remove('active');
                });

                if (tabName === 'orders') {
                    document.getElementById('ordersTab').classList.add('active');
                } else if (tabName === 'product-assignment') {
                    document.getElementById('productAssignmentTab').classList.add('active');
                    // Send orders data to product assignment tab
                    const ordersFrame = document.getElementById('ordersFrame');
                    if (ordersFrame && ordersFrame.contentWindow) {
                        // Request orders data from tab1
                        ordersFrame.contentWindow.postMessage({ type: 'REQUEST_ORDERS_DATA' }, '*');
                    }
                } else if (tabName === 'overview') {
                    document.getElementById('overviewTab').classList.add('active');
                    // Request fresh orders data from Tab1 for overview
                    const ordersFrameForOverview = document.getElementById('ordersFrame');
                    if (ordersFrameForOverview && ordersFrameForOverview.contentWindow) {
                        ordersFrameForOverview.contentWindow.postMessage(
                            { type: 'REQUEST_ORDERS_DATA_FROM_OVERVIEW' }, '*'
                        );
                    }
                } else if (tabName === 'pending-delete') {
                    document.getElementById('pendingDeleteTab').classList.add('active');
                    // Refresh deleted bills data
                    const pendingDeleteFrame = document.getElementById('pendingDeleteFrame');
                    if (pendingDeleteFrame && pendingDeleteFrame.contentWindow && pendingDeleteFrame.contentWindow.loadData) {
                        pendingDeleteFrame.contentWindow.loadData();
                    }
                } else if (tabName === 'kpi-commission') {
                    document.getElementById('kpiCommissionTab').classList.add('active');
                    // Refresh KPI data
                    const kpiFrame = document.getElementById('kpiCommissionFrame');
                    if (kpiFrame && kpiFrame.contentWindow && kpiFrame.contentWindow.KPICommission) {
                        kpiFrame.contentWindow.KPICommission.init();
                    }
                } else if (tabName === 'report-online') {
                    document.getElementById('reportOnlineTab').classList.add('active');
                    // Lazy-load on first click — prevent recursive iframe load
                    var rf = document.getElementById('reportOnlineFrame');
                    if (rf && rf.dataset.src && rf.src === 'about:blank') {
                        rf.src = rf.dataset.src;
                    }
                }

                // Reinitialize icons after DOM change
                setTimeout(() => lucide.createIcons(), 100);
            }

            // Mobile Functions
            function toggleMobileDropdown() {
                const dropdown = document.getElementById('mobileTabDropdown');
                const overlay = document.getElementById('mobileDropdownOverlay');
                const arrow = document.getElementById('mobileHeaderArrow');

                if (dropdown.classList.contains('show')) {
                    closeMobileDropdown();
                } else {
                    dropdown.classList.add('show');
                    overlay.classList.add('show');
                    arrow.style.transform = 'rotate(180deg)';
                }
            }

            function closeMobileDropdown() {
                const dropdown = document.getElementById('mobileTabDropdown');
                const overlay = document.getElementById('mobileDropdownOverlay');
                const arrow = document.getElementById('mobileHeaderArrow');

                dropdown.classList.remove('show');
                overlay.classList.remove('show');
                arrow.style.transform = 'rotate(0deg)';
            }

            function switchMobileTab(tabName, title) {
                switchTab(tabName);
                closeMobileDropdown();
            }

            function updateMobileHeader(tabName) {
                // Update Title
                const titleMap = {
                    orders: 'Quản Lý Đơn Hàng',
                    'product-assignment': 'Gán Sản Phẩm - STT',
                    overview: 'Báo Cáo Tổng Hợp',
                    'pending-delete': 'Bill Đã Xóa',
                    'kpi-commission': 'KPI - HOA HỒNG',
                    'report-online': 'Báo Cáo Online',
                };

                const titleElement = document.getElementById('mobileHeaderTitle');
                if (titleElement) {
                    titleElement.textContent = titleMap[tabName] || 'Báo Cáo';
                }

                // Update Active State in Dropdown
                document.querySelectorAll('.mobile-dropdown-item').forEach((item) => {
                    item.classList.remove('active');
                    if (item.dataset.mobileTab === tabName) {
                        item.classList.add('active');
                    }
                });
            }

            // Listen for filter changes from Tab 1
            window.addEventListener('storage', function (e) {
                if (e.key === 'tab1_filter_data') {
                    showSyncIndicator();
                }
            });

            // Listen for messages from iframes
            window.addEventListener('message', function (e) {
                if (e.data.type === 'FILTER_CHANGED') {
                    // Tab 1 filter changed - save with quota handling
                    try {
                        localStorage.setItem('tab1_filter_data', JSON.stringify(e.data.filter));
                    } catch (err) {
                        if (err.name === 'QuotaExceededError') {
                            console.warn(
                                '[MAIN] localStorage quota exceeded, saving lightweight data...'
                            );
                            localStorage.removeItem('tab1_filter_data');
                            try {
                                const lightData = { ...e.data.filter, data: [], dataSkipped: true };
                                localStorage.setItem('tab1_filter_data', JSON.stringify(lightData));
                            } catch (e2) {
                                console.error('[MAIN] Failed to save lightweight data:', e2);
                            }
                        }
                    }
                    showSyncIndicator();
                } else if (e.data.type === 'REQUEST_FILTER_DATA') {
                    // Tab 2 requesting current filter data
                    const filterData = localStorage.getItem('tab1_filter_data');
                    if (filterData) {
                        e.source.postMessage(
                            {
                                type: 'FILTER_DATA',
                                data: JSON.parse(filterData),
                            },
                            '*'
                        );
                    }
                } else if (e.data.type === 'SWITCH_TO_TAB1') {
                    // Switch to orders tab
                    switchTab('orders');
                } else if (e.data.type === 'REQUEST_ORDERS_DATA_FROM_TAB3') {
                    // Tab 3 requesting orders data
                    const ordersFrame = document.getElementById('ordersFrame');
                    if (ordersFrame && ordersFrame.contentWindow) {
                        // Request orders data from tab1
                        ordersFrame.contentWindow.postMessage({ type: 'REQUEST_ORDERS_DATA' }, '*');
                    }
                } else if (e.data.type === 'REQUEST_ORDERS_DATA_FROM_OVERVIEW') {
                    // Overview tab requesting orders data - forward directly to Tab1
                    const ordersFrame = document.getElementById('ordersFrame');
                    if (ordersFrame && ordersFrame.contentWindow) {
                        ordersFrame.contentWindow.postMessage(
                            { type: 'REQUEST_ORDERS_DATA_FROM_OVERVIEW' },
                            '*'
                        );
                    }
                } else if (e.data.type === 'ORDERS_DATA_RESPONSE_TAB3') {
                    // Forward orders data from Tab 1 to Tab 3 ONLY
                    const productAssignmentFrame =
                        document.getElementById('productAssignmentFrame');
                    if (productAssignmentFrame && productAssignmentFrame.contentWindow) {
                        productAssignmentFrame.contentWindow.postMessage(e.data, '*');
                    }
                } else if (e.data.type === 'ORDERS_DATA_RESPONSE_OVERVIEW') {
                    // Forward orders data from Tab 1 to Overview ONLY
                    const overviewFrame = document.getElementById('overviewFrame');
                    if (overviewFrame && overviewFrame.contentWindow) {
                        overviewFrame.contentWindow.postMessage(e.data, '*');
                    }
                } else if (e.data.type === 'FETCH_CONVERSATIONS_FOR_ORDERS') {
                    // Forward request from Overview to Tab1 to fetch conversations
                    console.log('[MAIN] 📨 Forwarding FETCH_CONVERSATIONS_FOR_ORDERS to Tab1');
                    const ordersFrame = document.getElementById('ordersFrame');
                    if (ordersFrame && ordersFrame.contentWindow) {
                        ordersFrame.contentWindow.postMessage(e.data, '*');
                    }
                } else if (e.data.type === 'RELOAD_TAB1_ONLY') {
                    // Tab3 requested reload Tab1 only - Tab3 will receive data via ORDERS_DATA_RESPONSE
                    console.log(
                        '[MAIN] 🔄 Reloading Tab1 only (Tab3 will receive data when ready)...'
                    );

                    // Reload Tab1 để fetch fresh data từ API
                    const ordersFrame = document.getElementById('ordersFrame');
                    if (ordersFrame) {
                        ordersFrame.src = ordersFrame.src;
                        console.log('[MAIN] ✅ Tab1 (ordersFrame) reloading...');
                    }
                    // Tab3 KHÔNG reload - sẽ tự động nhận data khi Tab1 load xong
                } else if (e.data.type === 'RELOAD_TAB1_AND_TAB3') {
                    // Legacy: Tab3 requested reload with cache clear (kept for backward compatibility)
                    console.log('[MAIN] 🔄 Reloading Tab1 and Tab3 (cache already cleared)...');

                    // Reload Tab1 trước để fetch fresh data từ API
                    const ordersFrame = document.getElementById('ordersFrame');
                    if (ordersFrame) {
                        ordersFrame.src = ordersFrame.src;
                        console.log('[MAIN] ✅ Tab1 (ordersFrame) reloading...');
                    }

                    // Reload Tab3 sau 3500ms để Tab1 có thời gian init và fetch data
                    setTimeout(() => {
                        const productAssignmentFrame =
                            document.getElementById('productAssignmentFrame');
                        if (productAssignmentFrame) {
                            productAssignmentFrame.src = productAssignmentFrame.src;
                            console.log('[MAIN] ✅ Tab3 (productAssignmentFrame) reloading...');
                        }
                    }, 3500);
                } else if (e.data.type === 'CAMPAIGN_STATUS_UPDATE') {
                    // Update campaign badge from overview tab
                    updateCampaignBadge(e.data);
                } else if (e.data.type === 'REQUEST_TOKEN_FROM_OVERVIEW') {
                    // Overview tab requesting token - forward to Tab1
                    console.log('[MAIN] 🔑 Forwarding token request to Tab1');
                    const ordersFrame = document.getElementById('ordersFrame');
                    if (ordersFrame && ordersFrame.contentWindow) {
                        ordersFrame.contentWindow.postMessage(
                            { type: 'REQUEST_TOKEN', requestId: e.data.requestId },
                            '*'
                        );
                    }
                } else if (e.data.type === 'TOKEN_RESPONSE') {
                    // Forward token response from Tab1 to Overview
                    console.log('[MAIN] 🔑 Forwarding token response to Overview');
                    const overviewFrame = document.getElementById('overviewFrame');
                    if (overviewFrame && overviewFrame.contentWindow) {
                        overviewFrame.contentWindow.postMessage(e.data, '*');
                    }
                } else if (e.data.type === 'TABLE_NAME_CHANGED') {
                    // Forward table name change from Tab1 to Overview
                    const overviewFrame = document.getElementById('overviewFrame');
                    if (overviewFrame && overviewFrame.contentWindow) {
                        overviewFrame.contentWindow.postMessage(e.data, '*');
                        console.log(
                            '[MAIN] 📡 Forwarded TABLE_NAME_CHANGED to overview:',
                            e.data.tableName
                        );
                    }
                } else if (e.data.type === 'REQUEST_EMPLOYEE_RANGES') {
                    // Forward request from Overview to Tab1 for employee ranges
                    console.log('[MAIN] 📨 Forwarding REQUEST_EMPLOYEE_RANGES to Tab1');
                    const ordersFrame = document.getElementById('ordersFrame');
                    if (ordersFrame && ordersFrame.contentWindow) {
                        ordersFrame.contentWindow.postMessage(e.data, '*');
                    }
                } else if (e.data.type === 'EMPLOYEE_RANGES_RESPONSE') {
                    // Forward employee ranges response from Tab1 to Overview
                    console.log('[MAIN] 📨 Forwarding EMPLOYEE_RANGES_RESPONSE to Overview');
                    const overviewFrame = document.getElementById('overviewFrame');
                    if (overviewFrame && overviewFrame.contentWindow) {
                        overviewFrame.contentWindow.postMessage(e.data, '*');
                    }
                } else if (e.data.type === 'REQUEST_CAMPAIGN_INFO') {
                    // Forward request from Overview to Tab1 for campaign info
                    console.log('[MAIN] 📨 Forwarding REQUEST_CAMPAIGN_INFO to Tab1');
                    const ordersFrame = document.getElementById('ordersFrame');
                    if (ordersFrame && ordersFrame.contentWindow) {
                        ordersFrame.contentWindow.postMessage(e.data, '*');
                    }
                } else if (e.data.type === 'CAMPAIGN_INFO_RESPONSE') {
                    // Forward campaign info response from Tab1 to Overview
                    console.log('[MAIN] 📨 Forwarding CAMPAIGN_INFO_RESPONSE to Overview');
                    const overviewFrame = document.getElementById('overviewFrame');
                    if (overviewFrame && overviewFrame.contentWindow) {
                        overviewFrame.contentWindow.postMessage(e.data, '*');
                    }
                } else if (e.data.type === 'CAMPAIGN_CHANGED_FOR_TAB3') {
                    // Forward campaign change from Tab1 to Tab3
                    const productAssignmentFrame = document.getElementById('productAssignmentFrame');
                    if (productAssignmentFrame && productAssignmentFrame.contentWindow) {
                        productAssignmentFrame.contentWindow.postMessage(e.data, '*');
                    }
                }
            });

            // Campaign Badge Functions
            function updateCampaignBadge(data) {
                const badge = document.getElementById('campaignBadge');
                const badgeText = document.getElementById('campaignBadgeText');
                const tooltipCurrent = document.getElementById('tooltipCurrentCampaign');
                const tooltipFirebase = document.getElementById('tooltipFirebaseCampaign');
                const tooltipFetchedAt = document.getElementById('tooltipFetchedAt');
                const tooltipStatus = document.getElementById('tooltipStatus');

                // Show badge
                badge.classList.add('show');

                // Update tooltip values
                tooltipCurrent.textContent = data.currentCampaign || '---';
                tooltipFirebase.textContent = data.firebaseCampaign || 'Chưa có';
                tooltipFetchedAt.textContent = data.firebaseFetchedAt
                    ? new Date(data.firebaseFetchedAt).toLocaleString('vi-VN')
                    : '---';

                // Update badge style based on match status
                if (data.firebaseCampaign) {
                    if (data.isMatching) {
                        badge.classList.remove('mismatch');
                        badge.classList.add('match');
                        badgeText.textContent = `✓ Firebase: ${truncateCampaignName(data.firebaseCampaign)}`;
                        tooltipStatus.textContent = '✅ Khớp chiến dịch';
                        tooltipStatus.style.color = '#28a745';
                    } else {
                        badge.classList.remove('match');
                        badge.classList.add('mismatch');
                        badgeText.textContent = `⚠ Firebase: ${truncateCampaignName(data.firebaseCampaign)}`;
                        tooltipStatus.textContent = '⚠️ Khác chiến dịch hiện tại!';
                        tooltipStatus.style.color = '#dc3545';
                    }
                } else {
                    badge.classList.remove('match', 'mismatch');
                    badge.classList.add('mismatch');
                    badgeText.textContent = 'Firebase: Chưa có data';
                    tooltipStatus.textContent = '❌ Chưa tải dữ liệu';
                    tooltipStatus.style.color = '#dc3545';
                }

                // Reinitialize icons
                setTimeout(() => lucide.createIcons(), 50);

                console.log('[MAIN] 📊 Campaign badge updated:', data);
            }

            function truncateCampaignName(name, maxLength = 20) {
                if (!name) return '---';
                return name.length > maxLength ? name.substring(0, maxLength) + '...' : name;
            }

            function showSyncIndicator() {
                const indicator = document.getElementById('syncIndicator');
                indicator.classList.add('show');
                setTimeout(() => {
                    indicator.classList.remove('show');
                }, 2000);
            }

            // Tab management
            window.addEventListener('DOMContentLoaded', function () {
                // Logout handler
                const btnLogout = document.getElementById('btnLogout');
                if (btnLogout) {
                    btnLogout.addEventListener('click', function () {
                        if (confirm('Bạn có chắc muốn đăng xuất?')) {
                            // Clear ONLY auth data, preserve tokens and other data
                            sessionStorage.removeItem('loginindex_auth');
                            localStorage.removeItem('loginindex_auth');
                            window.location.href = '../index.html';
                        }
                    });
                }
                // Restore last active tab or default to orders
                const savedTab = localStorage.getItem('currentTab');
                if (
                    savedTab &&
                    [
                        'orders',
                        'product-assignment',
                        'overview',
                        'pending-delete',
                        'kpi-commission',
                        'report-online',
                    ].includes(savedTab)
                ) {
                    switchTab(savedTab);
                } else {
                    switchTab('orders');
                }

                // Reinitialize icons after everything loads
                setTimeout(() => lucide.createIcons(), 200);
            });
        </script>
