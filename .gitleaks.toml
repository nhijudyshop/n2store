# Gitleaks config — secrets scan (CI: .github/workflows/security-audit.yml).
# Extends built-in rules; allowlist các nguồn FALSE-POSITIVE đã verify (audit 2026-06-30):
# data-export dumps, docs, vendored deps, build output. Mục tiêu: bắt secret MỚI trong
# source/config, KHÔNG drown trong ~6.6k FP của data/docs.
# Lưu ý: Firebase web API key (apiKey: "AIza...") là PUBLIC theo thiết kế Google (xác thực
# qua Firebase rules) → match gcp-api-key trong file client KHÔNG hẳn là leak. Review tay
# các key Gemini/JWT/server-side (đó mới là secret thật cần rotate).
[extend]
useDefault = true

[[allowlists]]
description = "FP: data-export dumps, docs, vendor, build output, local secret file"
paths = [
    '''.*-?export\.json$''',
    '''docs/.*''',
    '''.*\.min\.js$''',
    '''node_modules/.*''',
    '''.*/node_modules/.*''',
    '''dist/.*''',
    '''serect_dont_push.*\.txt$''',
    '''.*CODEMAP.*''',
    '''.*\.png$''',
    '''downloads/.*''',
    '''\.local/.*''',
    '''web2/system/data/.*''',
    '''\.tmp/.*''',
    '''render.com/backups/.*''',
]

[[allowlists]]
description = "FP đã verify 2026-06-30: localStorage/cache KEY names, CORS header names, doc placeholder"
paths = [
    '''live-chat/js/layout/column-manager\.js''',
    '''orders-report/js/chat/new-messages-notifier\.js''',
    '''shared/js/return-order-modal\.js''',
    '''shared/js/wallet-failure-store\.js''',
    '''web2/supplier-wallet/js/supplier-wallet-storage\.js''',
    '''web2/variants/js/web2-variants-api\.js''',
    '''shared/universal/cors-headers\.js''',
    '''web2/video-maker/js/video-tts\.js''',
    '''inventory-tracking/js/order-booking-renderer\.js''',
    '''.*/DEPLOY_GUIDE\.md$''',
    '''\.claude/skills/.*''',
]

[[allowlists]]
description = "Firebase WEB config (apiKey AIza... PUBLIC theo Google) — KHÔNG phải leak"
paths = [
    '''shared/browser/firebase-config\.js''',
    '''shared/js/firebase-config\.js''',
    '''user-management/js/.*''',
    '''soquy/huong_dan_so_quy\.(html|md)$''',
    '''soluong-live/ARCHITECTURE-SOLUONGLIVE\.md$''',
    '''render.com/migrations/migrate-firebase-to-postgres\.js''',
]
