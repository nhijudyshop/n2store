# Render.com deployment configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: n2store-fb-webhook
    env: node
    plan: free
    rootDir: n2store-fb-webhook
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VERIFY_TOKEN
        sync: false
      - key: APP_SECRET
        sync: false
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: PAGE_ID
        sync: false
