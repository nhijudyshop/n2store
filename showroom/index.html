<!DOCTYPE html>
<!-- #Note: Đọc CLAUDE.md, MEMORY.md, docs/dev-log.md trước khi code. Cập nhật dev-log sau thay đổi. | Read these files before coding, update dev-log after changes. -->
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NhiJudy Album</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "on-surface": "#1b1c1c",
                    "outline-variant": "#c4c7c7",
                    "surface-container-high": "#e9e8e7",
                    "surface-container-low": "#f5f3f3",
                    "background": "#fbf9f9",
                    "surface-variant": "#e4e2e2",
                    "primary": "#000000",
                    "on-primary": "#ffffff",
                    "surface": "#fbf9f9",
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#5d5f5b"
                },
                "fontFamily": {
                    "body-md": ["Hanken Grotesk", "sans-serif"],
                    "nav-link": ["Hanken Grotesk", "sans-serif"],
                    "headline-md": ["Hanken Grotesk", "sans-serif"],
                    "display-lg-mobile": ["Hanken Grotesk", "sans-serif"],
                    "display-lg": ["Hanken Grotesk", "sans-serif"]
                },
                "fontSize": {
                    "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                    "nav-link": ["15px", { "lineHeight": "20px", "fontWeight": "500" }],
                    "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "500" }],
                    "display-lg-mobile": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                    "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                }
            }
        }
    }
</script>
<style>
    /* Ẩn scrollbar khi nav scroll trên mobile */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Image zoom overlay transitions */
    #zoom-overlay {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }
    #zoom-overlay.active {
        opacity: 1;
        pointer-events: auto;
    }
    #zoomed-image {
        transform: scale(0.9);
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;
    }
    #zoom-overlay.active #zoomed-image {
        transform: scale(1);
    }
    #zoomed-image.swapping {
        opacity: 0;
    }
</style>
</head>
<body class="bg-surface text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex flex-col justify-center items-center h-32 bg-surface/90 backdrop-blur-md border-b border-outline-variant/30">
    <div class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg tracking-[0.2em] text-primary uppercase">NHIJUDY STORE</div>
</header>

<!-- Tab nav -->
<nav class="fixed top-32 left-0 w-full z-40 bg-surface/95 backdrop-blur-sm border-b border-outline-variant/30 flex justify-center">
    <ul class="flex overflow-x-auto justify-start sm:justify-center items-center gap-x-6 py-4 px-4 w-full no-scrollbar">
        <li class="cursor-pointer shrink-0"><span class="tab-link font-nav-link text-nav-link block tracking-[0.15em] uppercase whitespace-nowrap pb-0.5" data-tab="quan">QUẦN</span></li>
        <li class="cursor-pointer shrink-0"><span class="tab-link font-nav-link text-nav-link block tracking-[0.15em] uppercase whitespace-nowrap pb-0.5" data-tab="ao">ÁO</span></li>
        <li class="cursor-pointer shrink-0"><span class="tab-link font-nav-link text-nav-link block tracking-[0.15em] uppercase whitespace-nowrap pb-0.5" data-tab="dam">ĐẦM</span></li>
        <li class="cursor-pointer shrink-0"><span class="tab-link font-nav-link text-nav-link block tracking-[0.15em] uppercase whitespace-nowrap pb-0.5" data-tab="set">SET</span></li>
        <li class="cursor-pointer shrink-0"><span class="tab-link font-nav-link text-nav-link block tracking-[0.15em] uppercase whitespace-nowrap pb-0.5" data-tab="phu-kien">PHỤ KIỆN</span></li>
    </ul>
</nav>

<!-- Main Content Canvas — 3-Column Album Grid -->
<main class="pt-[184px] pb-20">
    <div id="album-grid" class="grid grid-cols-3 gap-1 w-full p-1">
        <!-- Cards inject via JS for clean handler binding -->
    </div>
    <!-- Empty state khi tab không có album -->
    <div id="empty-state" class="hidden text-center py-24 px-4 text-secondary text-body-md">Chưa có sản phẩm trong danh mục này.</div>
</main>

<!-- Album Viewer Overlay -->
<div id="zoom-overlay" class="fixed inset-0 z-[100] bg-surface/90 backdrop-blur-md flex flex-col justify-center items-center px-4 pt-10 pb-6">
    <!-- Close Button -->
    <button type="button" class="absolute top-6 right-6 p-2 rounded-full bg-surface-container-high text-primary hover:bg-surface-variant transition-colors z-10" onclick="closeZoom()" aria-label="Đóng">
        <span class="material-symbols-outlined">close</span>
    </button>

    <!-- Image container with prev/next arrows -->
    <div class="relative w-full max-w-lg aspect-[3/4] bg-surface-container-low overflow-hidden rounded-2xl mb-4">
        <img alt="Ảnh sản phẩm" class="w-full h-full object-contain" id="zoomed-image" src=""/>

        <!-- Prev arrow -->
        <button type="button" id="prev-btn" class="absolute left-2 top-1/2 -translate-y-1/2 p-2 rounded-full bg-surface-container-high/90 text-primary hover:bg-surface-variant transition-colors" onclick="prevImage()" aria-label="Ảnh trước">
            <span class="material-symbols-outlined">chevron_left</span>
        </button>

        <!-- Next arrow -->
        <button type="button" id="next-btn" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-full bg-surface-container-high/90 text-primary hover:bg-surface-variant transition-colors" onclick="nextImage()" aria-label="Ảnh sau">
            <span class="material-symbols-outlined">chevron_right</span>
        </button>

        <!-- Counter -->
        <div id="image-counter" class="absolute bottom-3 left-1/2 -translate-x-1/2 px-3 py-1 rounded-full bg-primary/70 text-on-primary text-sm">1 / 5</div>
    </div>

    <!-- Album label -->
    <div class="text-center w-full max-w-lg">
        <p class="font-body-md text-body-md text-secondary" id="album-label">Album 1</p>
    </div>
</div>

<script>
    // Cấu hình 6 album: id, total = tổng số ảnh (gồm cả 0.jpg), category cho tab.
    // Hiện tại tất cả 6 album đều thuộc tab QUẦN.
    // Album 1-5: 0.jpg → 4.jpg (5 ảnh). Album 6: 0.jpg → 5.jpg (6 ảnh).
    const ALBUMS = [
        { id: 1, total: 5, category: 'quan' },
        { id: 2, total: 5, category: 'quan' },
        { id: 3, total: 5, category: 'quan' },
        { id: 4, total: 5, category: 'quan' },
        { id: 5, total: 5, category: 'quan' },
        { id: 6, total: 6, category: 'quan' }
    ];

    // ── Render lưới ảnh đại diện ──
    const grid = document.getElementById('album-grid');
    grid.innerHTML = ALBUMS.map(a => `
        <div class="album-card aspect-[2/3] relative overflow-hidden cursor-pointer bg-surface-container-low rounded-2xl" data-album="${a.id}" data-category="${a.category}">
            <img alt="Album ${a.id}" loading="lazy" class="w-full h-full object-contain transition-transform duration-500" src="albums/${a.id}/0.jpg"/>
        </div>
    `).join('');

    grid.addEventListener('click', (e) => {
        const card = e.target.closest('.album-card');
        if (card) openAlbum(parseInt(card.dataset.album, 10));
    });

    // ── Tab filter ──
    const emptyState = document.getElementById('empty-state');
    function setTab(category) {
        document.querySelectorAll('.tab-link').forEach(el => {
            const active = el.dataset.tab === category;
            el.classList.toggle('text-primary', active);
            el.classList.toggle('border-b', active);
            el.classList.toggle('border-primary', active);
            el.classList.toggle('text-secondary', !active);
            el.classList.toggle('hover:text-primary', !active);
            el.classList.toggle('transition-colors', !active);
            el.classList.toggle('duration-300', !active);
        });
        let visible = 0;
        document.querySelectorAll('.album-card').forEach(card => {
            const match = card.dataset.category === category;
            card.style.display = match ? '' : 'none';
            if (match) visible++;
        });
        emptyState.classList.toggle('hidden', visible > 0);
    }
    document.querySelectorAll('.tab-link').forEach(el => {
        el.addEventListener('click', () => setTab(el.dataset.tab));
    });
    setTab('quan'); // default

    // ── Viewer state ──
    let currentAlbum = null;
    let currentIndex = 0; // bắt đầu từ ảnh 0.jpg (ảnh đại diện)

    const overlay = document.getElementById('zoom-overlay');
    const zoomedImg = document.getElementById('zoomed-image');
    const counter = document.getElementById('image-counter');
    const albumLabel = document.getElementById('album-label');

    function openAlbum(albumId) {
        currentAlbum = ALBUMS.find(a => a.id === albumId);
        if (!currentAlbum) return;
        currentIndex = 0;
        renderImage();
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeZoom() {
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        setTimeout(() => { zoomedImg.src = ''; }, 300);
    }

    function renderImage() {
        if (!currentAlbum) return;
        // Fade out → swap → fade in
        zoomedImg.classList.add('swapping');
        const newSrc = `albums/${currentAlbum.id}/${currentIndex}.jpg`;
        setTimeout(() => {
            zoomedImg.src = newSrc;
            zoomedImg.classList.remove('swapping');
        }, 120);
        counter.textContent = `${currentIndex + 1} / ${currentAlbum.total}`;
        albumLabel.textContent = `Album ${currentAlbum.id}`;
    }

    function nextImage() {
        if (!currentAlbum) return;
        currentIndex = (currentIndex + 1) % currentAlbum.total; // wrap về 0 sau ảnh cuối
        renderImage();
    }

    function prevImage() {
        if (!currentAlbum) return;
        currentIndex = (currentIndex - 1 + currentAlbum.total) % currentAlbum.total; // wrap về cuối khi ở 0
        renderImage();
    }

    // Click ngoài ảnh để đóng
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeZoom();
    });

    // Bàn phím: ESC đóng, ← →  điều hướng
    document.addEventListener('keydown', (e) => {
        if (!overlay.classList.contains('active')) return;
        if (e.key === 'Escape') closeZoom();
        else if (e.key === 'ArrowRight') nextImage();
        else if (e.key === 'ArrowLeft') prevImage();
    });

    // Vuốt trên mobile (touch swipe) — kéo qua lại để chuyển ảnh
    let touchStartX = 0;
    zoomedImg.parentElement.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    zoomedImg.parentElement.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].screenX - touchStartX;
        if (Math.abs(dx) < 40) return; // threshold
        if (dx < 0) nextImage(); else prevImage();
    }, { passive: true });
</script>
</body>
</html>
