<script>
        function openZoom(element, imgSrc, title, price) {
            document.getElementById('zoomed-image').src = imgSrc;
            document.getElementById('zoom-title').textContent = title;
            document.getElementById('zoom-price').textContent = price;
            
            const overlay = document.getElementById('zoom-overlay');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeZoom() {
            const overlay = document.getElementById('zoom-overlay');
            overlay.classList.remove('active');
            document.body.style.overflow = ''; // Restore background scrolling
            
            // Clear src after transition to prevent flicker on next open
            setTimeout(() => {
                document.getElementById('zoomed-image').src = '';
            }, 300);
        }

        // Close on clicking outside the image/content area
        document.getElementById('zoom-overlay').addEventListener('click', function(e) {
            if(e.target === this) {
                closeZoom();
            }
        });
    </script>
