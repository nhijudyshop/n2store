<!DOCTYPE html>
<!-- #Note: Đọc CLAUDE.md, MEMORY.md, docs/dev-log.md trước khi code. Cập nhật dev-log sau thay đổi. | Read these files before coding, update dev-log after changes. -->
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NHIJUDY STORE — Showroom</title>

<!-- Tailwind CDN + plugins (giữ giống code mẫu) -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- Fonts: Hanken Grotesk theo DESIGN.md + Material Symbols icon -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />

<!-- Tailwind config: tokens từ DESIGN.md "Ethos Curated" (prose section — palette 4-tier) -->
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          // Palette 4-tier (## Colors — prose)
          primary:   '#1A1A1A', // Charcoal — typography & high-contrast borders
          secondary: '#5D5F5B', // Neutral gray — inactive tabs, secondary text
          tertiary:  '#D9C5B2', // Soft Beige — subtle dividers, card outline
          accent:    '#8C7355', // Taupe-Gold — active tab, CTA, selection

          // Surfaces (Level 0 = warm Cream background, Level 1 = pure white card)
          surface:                     '#F5F5F0',
          'surface-container-lowest':  '#FFFFFF',
          'surface-container-low':     '#EFEEE9',
          'surface-container':         '#E9E7E2',
          'surface-container-high':    '#E4E2DC',

          // Inverse / variants
          'on-primary':         '#FFFFFF',
          'on-surface':         '#1A1A1A',
          'on-surface-variant': '#444748',
          'outline-variant':    '#C4C7C7'
        },
        fontFamily: {
          sans: ['Hanken Grotesk', 'system-ui', 'sans-serif']
        },
        fontSize: {
          'display-lg':        ['48px', { lineHeight: '56px', letterSpacing: '-0.02em', fontWeight: '600' }],
          'display-lg-mobile': ['32px', { lineHeight: '40px', letterSpacing: '-0.01em', fontWeight: '600' }],
          'headline-md':       ['24px', { lineHeight: '32px', fontWeight: '500' }],
          'body-lg':           ['18px', { lineHeight: '28px', fontWeight: '400' }],
          'body-md':           ['16px', { lineHeight: '24px', fontWeight: '400' }],
          'nav-link':          ['15px', { lineHeight: '20px', fontWeight: '500' }],
          'label-caps':        ['12px', { lineHeight: '16px', letterSpacing: '0.1em', fontWeight: '700' }]
        },
        borderRadius: {
          // Shapes (## Shapes — soft 4px default)
          DEFAULT: '0.25rem'
        },
        maxWidth: {
          // Layout (## Layout & Spacing — container-max)
          'container': '1280px'
        }
      }
    }
  };
</script>

<link rel="stylesheet" href="showroom.css" />
</head>
<body class="bg-surface text-on-surface antialiased font-sans">

<!-- TopAppBar: brand (## Brand & Style — quiet gallery feel) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-center items-center h-24 md:h-32 bg-surface/90 backdrop-blur-md border-b border-tertiary/40">
  <div class="text-display-lg-mobile md:text-display-lg tracking-[0.2em] text-primary uppercase">NHIJUDY STORE</div>
</header>

<!-- Sub-nav: danh mục (## Components — Tabs: 2px bottom border in Accent #8C7355 cho active) -->
<nav class="fixed top-24 md:top-32 left-0 w-full z-40 bg-surface/95 backdrop-blur-sm border-b border-tertiary/40 flex justify-center">
  <ul id="category-nav" class="flex overflow-x-auto no-scrollbar justify-start sm:justify-center items-center gap-x-8 py-4 px-5 md:px-16 w-full max-w-container">
    <li><button type="button" data-category="quan" class="nav-link nav-link-active">QUẦN</button></li>
    <li><button type="button" data-category="ao" class="nav-link">ÁO</button></li>
    <li><button type="button" data-category="dam" class="nav-link">ĐẦM</button></li>
    <li><button type="button" data-category="set" class="nav-link">SET</button></li>
    <li><button type="button" data-category="phu-kien" class="nav-link">PHỤ KIỆN</button></li>
  </ul>
</nav>

<!-- Lưới sản phẩm (## Layout — 1280px max container; ## Responsive — mobile 2 cột / desktop 3 cột) -->
<main class="pt-[160px] md:pt-[184px] pb-20 max-w-container mx-auto">
  <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-0 w-full">
    <!-- product cards inject từ showroom.js -->
  </div>

  <div id="empty-state" class="hidden text-center py-24 text-secondary text-body-md">
    Chưa có sản phẩm trong danh mục này.
  </div>
</main>

<!-- Overlay zoom chi tiết -->
<div id="zoom-overlay" class="fixed inset-0 z-[100] bg-surface/90 backdrop-blur-md flex flex-col justify-center items-center px-5 pt-10 pb-6">
  <button type="button" class="absolute top-6 right-6 p-2 rounded-full bg-surface-container-high text-primary hover:bg-tertiary/50 transition-colors" onclick="closeZoom()" aria-label="Đóng">
    <span class="material-symbols-outlined">close</span>
  </button>

  <div class="w-full max-w-lg aspect-[3/4] relative overflow-hidden bg-surface-container-low mb-8 rounded border border-tertiary/60">
    <img id="zoomed-image" alt="" class="w-full h-full object-cover" src="" />
  </div>

  <!-- Title/price left-aligned theo ## Components — Product Cards -->
  <div class="w-full max-w-lg">
    <h2 id="zoom-title" class="text-headline-md text-primary mb-1">Sản phẩm</h2>
    <p id="zoom-price" class="text-body-lg text-secondary">0đ</p>
  </div>
</div>

<script src="showroom.js"></script>
</body>
</html>
