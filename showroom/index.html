<!DOCTYPE html>
<!-- #Note: Đọc CLAUDE.md, MEMORY.md, docs/dev-log.md trước khi code. Cập nhật dev-log sau thay đổi. | Read these files before coding, update dev-log after changes. -->
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NHIJUDY STORE — Showroom</title>

<!-- Tailwind CDN + plugins (giữ giống code mẫu) -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- Fonts: Hanken Grotesk theo DESIGN.md + Material Symbols icon -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />

<!-- Tailwind config: tokens từ DESIGN.md (Ethos Curated) -->
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          surface: '#fbf9f9',
          'surface-dim': '#dbdad9',
          'surface-container-lowest': '#ffffff',
          'surface-container-low': '#f5f3f3',
          'surface-container': '#efeded',
          'surface-container-high': '#e9e8e7',
          'surface-container-highest': '#e4e2e2',
          'surface-variant': '#e4e2e2',
          'on-surface': '#1b1c1c',
          'on-surface-variant': '#444748',
          outline: '#747878',
          'outline-variant': '#c4c7c7',
          primary: '#000000',
          'on-primary': '#ffffff',
          secondary: '#5d5f5b',
          'on-secondary': '#ffffff'
        },
        fontFamily: {
          sans: ['Hanken Grotesk', 'system-ui', 'sans-serif']
        },
        fontSize: {
          'display-lg': ['48px', { lineHeight: '56px', letterSpacing: '-0.02em', fontWeight: '600' }],
          'display-lg-mobile': ['32px', { lineHeight: '40px', letterSpacing: '-0.01em', fontWeight: '600' }],
          'headline-md': ['24px', { lineHeight: '32px', fontWeight: '500' }],
          'body-lg': ['18px', { lineHeight: '28px', fontWeight: '400' }],
          'body-md': ['16px', { lineHeight: '24px', fontWeight: '400' }],
          'nav-link': ['15px', { lineHeight: '20px', fontWeight: '500' }],
          'label-caps': ['12px', { lineHeight: '16px', letterSpacing: '0.1em', fontWeight: '700' }]
        }
      }
    }
  };
</script>

<link rel="stylesheet" href="showroom.css" />
</head>
<body class="bg-surface text-on-surface antialiased font-sans">

<!-- TopAppBar: brand -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-center items-center h-24 md:h-32 bg-surface/90 backdrop-blur-md border-b border-outline-variant/30">
  <div class="text-display-lg-mobile md:text-display-lg tracking-[0.2em] text-primary uppercase">NHIJUDY STORE</div>
</header>

<!-- Sub-nav: danh mục -->
<nav class="fixed top-24 md:top-32 left-0 w-full z-40 bg-surface/95 backdrop-blur-sm border-b border-outline-variant/30 flex justify-center">
  <ul id="category-nav" class="flex overflow-x-auto no-scrollbar justify-start sm:justify-center items-center gap-x-6 py-4 px-4 w-full max-w-[1280px]">
    <li><button type="button" data-category="quan" class="nav-link nav-link-active">QUẦN</button></li>
    <li><button type="button" data-category="ao" class="nav-link">ÁO</button></li>
    <li><button type="button" data-category="dam" class="nav-link">ĐẦM</button></li>
    <li><button type="button" data-category="set" class="nav-link">SET</button></li>
    <li><button type="button" data-category="phu-kien" class="nav-link">PHỤ KIỆN</button></li>
  </ul>
</nav>

<!-- Lưới sản phẩm: 2 cột mobile, 3 cột desktop, gap-0 để feel 'album' -->
<main class="pt-[160px] md:pt-[184px] pb-20">
  <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-0 w-full">
    <!-- product cards inject từ showroom.js -->
  </div>

  <div id="empty-state" class="hidden text-center py-24 text-secondary text-body-md">
    Chưa có sản phẩm trong danh mục này.
  </div>
</main>

<!-- Overlay xem chi tiết sản phẩm -->
<div id="zoom-overlay" class="fixed inset-0 z-[100] bg-surface/85 backdrop-blur-md flex flex-col justify-center items-center px-4 pt-10 pb-6">
  <button type="button" class="absolute top-6 right-6 p-2 rounded-full bg-surface-container-high text-primary hover:bg-surface-variant transition-colors" onclick="closeZoom()" aria-label="Đóng">
    <span class="material-symbols-outlined">close</span>
  </button>

  <div class="w-full max-w-lg aspect-[3/4] relative overflow-hidden shadow-2xl bg-surface-container-low mb-8 rounded">
    <img id="zoomed-image" alt="" class="w-full h-full object-cover" src="" />
  </div>

  <div class="text-center w-full max-w-lg">
    <h2 id="zoom-title" class="text-headline-md text-primary mb-2">Sản phẩm</h2>
    <p id="zoom-price" class="text-body-lg text-secondary mb-6">0đ</p>
  </div>
</div>

<script src="showroom.js"></script>
</body>
</html>
