# Render.com deployment configuration
# Service: n2store-tpos-pancake (repurposed for Facebook Webhook)

services:
  - type: web
    name: n2store-tpos-pancake
    env: node
    plan: free
    rootDir: tpos-pancake/server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VERIFY_TOKEN
        sync: false
      - key: APP_SECRET
        sync: false
