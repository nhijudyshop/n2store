<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>FB Live Player @ giây N</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                background: #000;
                color: #fff;
                font-family:
                    'Inter',
                    system-ui,
                    -apple-system,
                    sans-serif;
                overflow: hidden;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
            .topbar {
                background: #18191a;
                padding: 8px 14px;
                font-size: 12px;
                display: flex;
                gap: 12px;
                align-items: center;
                border-bottom: 1px solid #303031;
            }
            .topbar .label {
                opacity: 0.7;
            }
            .topbar .value {
                font-weight: 700;
                color: #4ade80;
            }
            #status {
                margin-left: auto;
                font-size: 11px;
                opacity: 0.7;
            }
            .video-wrap {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 8px;
                min-height: 0;
            }
            #player-slot {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .fb-video {
                width: 100% !important;
                max-width: 100%;
                max-height: 100%;
            }
            .fb-video span,
            .fb-video iframe {
                max-width: 100% !important;
                max-height: 100% !important;
            }
            .err {
                color: #fca5a5;
                padding: 20px;
                text-align: center;
                font-size: 13px;
                line-height: 1.5;
            }
        </style>
    </head>
    <body>
        <div class="topbar">
            <span class="label">Video:</span><span class="value" id="vidLabel">-</span>
            <span class="label">Bắt đầu giây:</span><span class="value" id="offLabel">-</span>
            <span id="status">⏳ Loading FB SDK...</span>
        </div>
        <div class="video-wrap" id="wrap">
            <div id="fb-root"></div>
            <div id="player-slot"></div>
        </div>
        <script>
            (function () {
                const qs = new URLSearchParams(location.search);
                const videoId = qs.get('v');
                const offsetSec = Math.max(0, Number(qs.get('t') || qs.get('start') || 0));
                const pageSlug = qs.get('page') || '';
                const status = document.getElementById('status');
                document.getElementById('vidLabel').textContent = videoId || '-';
                document.getElementById('offLabel').textContent =
                    offsetSec > 0
                        ? `${Math.floor(offsetSec / 60)}m${offsetSec % 60}s (${offsetSec}s)`
                        : '0s';
                if (!videoId) {
                    document.getElementById('wrap').innerHTML =
                        '<div class="err">❌ Thiếu param ?v=VIDEO_ID</div>';
                    return;
                }
                // Build canonical FB video URL — data-href cho fb-video plugin.
                const hrefUrl = pageSlug
                    ? `https://www.facebook.com/${encodeURIComponent(pageSlug)}/videos/${videoId}/`
                    : `https://www.facebook.com/watch/?v=${videoId}`;
                const slot = document.getElementById('player-slot');
                let seekDone = false;
                let fallbackTriggered = false;

                // Render iframe direct tới /plugins/video.php — không cần FB SDK,
                // không stuck waiting xfbml.ready. URL param `t=N` được FB respect
                // cho VOD (verified commit f6c0fe137 + general FB plugin doc).
                // Live đang chạy có thể ignore — user manual slider seek backup.
                function renderIframeDirect(reason) {
                    if (fallbackTriggered) return;
                    fallbackTriggered = true;
                    slot.innerHTML = '';
                    const pluginUrl = new URL('https://www.facebook.com/plugins/video.php');
                    pluginUrl.searchParams.set('href', hrefUrl);
                    pluginUrl.searchParams.set('show_text', 'false');
                    pluginUrl.searchParams.set('autoplay', '1');
                    pluginUrl.searchParams.set('allowfullscreen', 'true');
                    if (offsetSec > 0) pluginUrl.searchParams.set('t', String(offsetSec));
                    const iframe = document.createElement('iframe');
                    iframe.src = pluginUrl.toString();
                    iframe.style.cssText =
                        'width:100%;height:100%;border:0;max-width:100%;max-height:100%;';
                    iframe.setAttribute('allowfullscreen', 'true');
                    iframe.setAttribute(
                        'allow',
                        'autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share'
                    );
                    iframe.setAttribute('scrolling', 'no');
                    iframe.setAttribute('frameborder', '0');
                    slot.appendChild(iframe);
                    status.textContent =
                        offsetSec > 0
                            ? `▶ Iframe direct ${reason} — t=${offsetSec}s (FB có thể ignore, dùng slider seek nếu cần)`
                            : `▶ Iframe direct ${reason} — playing`;
                }

                // Approach A: xfbml plugin via FB SDK (cho seek API chính xác qua
                //   player.seek nếu xfbml.ready fire). Fallback iframe direct sau
                //   4s nếu SDK timeout.
                const fbVid = document.createElement('div');
                fbVid.className = 'fb-video';
                fbVid.dataset.href = hrefUrl;
                fbVid.dataset.width = 'adapt-container-width';
                fbVid.dataset.allowfullscreen = 'true';
                fbVid.dataset.showText = 'false';
                fbVid.dataset.autoplay = 'true';
                if (offsetSec > 0) fbVid.dataset.startTime = String(offsetSec);
                slot.appendChild(fbVid);

                window.fbAsyncInit = function () {
                    FB.init({ xfbml: true, version: 'v18.0' });
                    status.textContent = '⏳ SDK loaded — parsing player...';
                    FB.Event.subscribe('xfbml.render', function (info) {
                        if (seekDone || fallbackTriggered) return;
                        status.textContent = '⏳ Player rendered — waiting seek API...';
                    });
                    FB.Event.subscribe('xfbml.ready', function (msg) {
                        if (msg.type !== 'video' || fallbackTriggered) return;
                        seekDone = true;
                        const player = msg.instance;
                        status.textContent = '▶ Player ready — seeking ' + offsetSec + 's...';
                        try {
                            if (offsetSec > 0 && typeof player.seek === 'function') {
                                setTimeout(() => {
                                    try {
                                        player.seek(offsetSec);
                                        status.textContent =
                                            '✅ Seek tới ' + offsetSec + 's qua FB Player API';
                                    } catch (e) {
                                        status.textContent = '⚠ player.seek fail: ' + e.message;
                                    }
                                }, 500);
                            }
                            if (typeof player.play === 'function') player.play();
                        } catch (e) {
                            status.textContent = '⚠ API error: ' + e.message;
                        }
                    });
                };
                (function (d, s, id) {
                    const fjs = d.getElementsByTagName(s)[0];
                    if (d.getElementById(id)) return;
                    const js = d.createElement(s);
                    js.id = id;
                    js.src = 'https://connect.facebook.net/vi_VN/sdk.js';
                    js.async = true;
                    js.defer = true;
                    js.crossOrigin = 'anonymous';
                    js.onerror = () => renderIframeDirect('(SDK load fail)');
                    fjs.parentNode.insertBefore(js, fjs);
                })(document, 'script', 'facebook-jssdk');

                // Fallback timer: 4s nếu xfbml.ready chưa fire → iframe direct.
                // FB SDK Player API hay stuck cho live VOD vì video metadata
                // chưa load xong / plugin không expose API trong vài case.
                setTimeout(() => {
                    if (!seekDone) renderIframeDirect('(SDK timeout 4s)');
                }, 4000);
            })();
        </script>
    </body>
</html>
